<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>填写出行人 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-order-page" aria-label="填写出行人">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-calendar" viewBox="0 0 24 24">
        <path d="M7 3v4M17 3v4M4 8h16M5 5h14v16H5z"></path>
      </symbol>
      <symbol id="client-icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 20c1.3-4 4-6 7.5-6s6.2 2 7.5 6"></path>
      </symbol>
      <symbol id="client-icon-passport" viewBox="0 0 24 24">
        <path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path>
        <circle cx="12" cy="10" r="3"></circle>
        <path d="M8 17h8"></path>
      </symbol>
      <symbol id="client-icon-phone" viewBox="0 0 24 24">
        <path d="M7 3h10v18H7zM10 18h4"></path>
      </symbol>
      <symbol id="client-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
      <symbol id="client-icon-alert" viewBox="0 0 24 24">
        <path d="M12 3 2.8 20h18.4L12 3Z"></path>
        <path d="M12 9v5M12 17h.01"></path>
      </symbol>
      <symbol id="client-icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"></path>
      </symbol>
    </svg>

    <div class="client-order-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>11:24</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-order-header" aria-label="填写出行人顶部导航">
        <a href="product-detail.html?id=nordic-iceland#booking-panel" aria-label="返回选购">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>填写出行人</h1>
        <button type="button">客服</button>
      </header>
    </div>

    <div class="mobile-content client-order-scroll">
      <section class="client-order-steps" aria-label="下单进度">
        <span class="active"><b>1</b>出行人</span>
        <i></i>
        <span><b>2</b>附加服务</span>
        <i></i>
        <span><b>3</b>确认订单</span>
        <i></i>
        <span><b>4</b>支付</span>
      </section>

      <section class="client-order-summary" aria-label="已选行程">
        <img src="assets/product-nordic.jpg" alt="北欧四国冰岛线路图">
        <div>
          <span>已锁定行程</span>
          <h2>北欧四国+冰岛13天11晚</h2>
          <p>07月18日 · 舒适方案 · 北京出发 · 成人2人</p>
          <strong>合计 ¥103998</strong>
        </div>
      </section>

      <section class="client-order-card" aria-label="出行人填写说明">
        <div class="client-order-card-title">
          <h2>出行人信息</h2>
          <span>2/2 已填写</span>
        </div>
        <div class="client-traveler-toolbar">
          <a href="travelers.html?from=booking"><svg><use href="#client-icon-user"></use></svg>选择常用出行人</a>
          <a href="traveler-form.html?from=booking&mode=new"><svg><use href="#client-icon-plus"></use></svg>新增</a>
        </div>
        <div class="client-order-alert">
          <svg><use href="#client-icon-alert"></use></svg>
          <span>出境线路需确保证件有效期覆盖回程后 6 个月，提交后客服会复核材料。</span>
        </div>
      </section>

      <section class="client-traveler-card" aria-label="出行人一">
        <div class="client-traveler-head">
          <div>
            <span>出行人 1</span>
            <h3>张雨晴</h3>
          </div>
          <em class="ok"><svg><use href="#client-icon-check"></use></svg>资料完整</em>
        </div>
        <div class="client-traveler-fields">
          <label>
            <span>中文姓名</span>
            <input type="text" value="张雨晴" aria-label="出行人1中文姓名">
          </label>
          <label>
            <span>英文姓名</span>
            <input type="text" value="ZHANG YUQING" aria-label="出行人1英文姓名">
          </label>
          <label>
            <span>证件类型</span>
            <input type="text" value="护照" aria-label="出行人1证件类型">
          </label>
          <label>
            <span>证件号码</span>
            <input type="text" value="EJ1234567" aria-label="出行人1证件号码">
          </label>
          <label>
            <span>出生日期</span>
            <input type="text" value="1988-05-16" aria-label="出行人1出生日期">
          </label>
          <label>
            <span>证件有效期</span>
            <input type="text" value="2031-09-20" aria-label="出行人1证件有效期">
          </label>
        </div>
      </section>

      <section class="client-traveler-card" aria-label="出行人二">
        <div class="client-traveler-head">
          <div>
            <span>出行人 2</span>
            <h3>李明远</h3>
          </div>
          <em><svg><use href="#client-icon-passport"></use></svg>待上传证件页</em>
        </div>
        <div class="client-traveler-fields">
          <label>
            <span>中文姓名</span>
            <input type="text" value="李明远" aria-label="出行人2中文姓名">
          </label>
          <label>
            <span>英文姓名</span>
            <input type="text" value="LI MINGYUAN" aria-label="出行人2英文姓名">
          </label>
          <label>
            <span>证件类型</span>
            <input type="text" value="护照" aria-label="出行人2证件类型">
          </label>
          <label>
            <span>证件号码</span>
            <input type="text" value="EH7654321" aria-label="出行人2证件号码">
          </label>
          <label>
            <span>出生日期</span>
            <input type="text" value="1986-11-02" aria-label="出行人2出生日期">
          </label>
          <label>
            <span>证件有效期</span>
            <input type="text" value="2030-12-08" aria-label="出行人2证件有效期">
          </label>
        </div>
        <button class="client-traveler-upload" type="button">
          <svg><use href="#client-icon-passport"></use></svg>
          上传护照首页照片
        </button>
      </section>

      <section class="client-order-card" aria-label="联系人">
        <div class="client-order-card-title">
          <h2>联系人</h2>
          <span>用于订单通知</span>
        </div>
        <div class="client-contact-card">
          <span><svg><use href="#client-icon-user"></use></svg>张雨晴</span>
          <span><svg><use href="#client-icon-phone"></use></svg>138 0000 2688</span>
        </div>
      </section>
    </div>

    <footer class="client-order-footer" aria-label="填写出行人底部操作">
      <div>
        <span>已填写 2/2</span>
        <strong>¥103998</strong>
      </div>
      <a href="booking-addons.html?product=nordic-iceland&schedule=2026-07-18&plan=comfort&departure=beijing&adult=2">下一步</a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
