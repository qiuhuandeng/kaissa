<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附加服务 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-order-page" aria-label="附加服务">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 5 6v5c0 4.6 2.9 8.4 7 10 4.1-1.6 7-5.4 7-10V6l-7-3Z"></path>
        <path d="m8.5 12 2.2 2.2 4.8-5"></path>
      </symbol>
      <symbol id="client-icon-car" viewBox="0 0 24 24">
        <path d="M5 16h14M6 16l1.4-6.2A2.4 2.4 0 0 1 9.8 8h4.4a2.4 2.4 0 0 1 2.4 1.8L18 16"></path>
        <circle cx="8" cy="17" r="2"></circle>
        <circle cx="16" cy="17" r="2"></circle>
      </symbol>
      <symbol id="client-icon-bed" viewBox="0 0 24 24">
        <path d="M4 11V5h7v6M4 11h16a2 2 0 0 1 2 2v5M4 18v-7M4 18h18M20 11V8a2 2 0 0 0-2-2h-5v5"></path>
      </symbol>
      <symbol id="client-icon-message" viewBox="0 0 24 24">
        <path d="M5 5h14v10H8l-4 4V6a1 1 0 0 1 1-1Z"></path>
      </symbol>
      <symbol id="client-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
    </svg>

    <div class="client-order-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>11:28</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-order-header" aria-label="附加服务顶部导航">
        <a href="booking-travelers.html?product=nordic-iceland&schedule=2026-07-18&plan=comfort&departure=beijing&adult=2" aria-label="返回填写出行人">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>附加服务</h1>
        <button type="button">客服</button>
      </header>
    </div>

    <div class="mobile-content client-order-scroll">
      <section class="client-order-steps" aria-label="下单进度">
        <span class="done"><b>1</b>出行人</span>
        <i></i>
        <span class="active"><b>2</b>附加服务</span>
        <i></i>
        <span><b>3</b>确认订单</span>
        <i></i>
        <span><b>4</b>支付</span>
      </section>

      <section class="client-order-summary" aria-label="已选行程">
        <img src="assets/product-nordic.jpg" alt="北欧四国冰岛线路图">
        <div>
          <span>出行人已完成</span>
          <h2>北欧四国+冰岛13天11晚</h2>
          <p>07月18日 · 舒适方案 · 北京出发 · 成人2人</p>
          <strong>基础团费 ¥103998</strong>
        </div>
      </section>

      <section class="client-order-card" aria-label="附加服务说明">
        <div class="client-order-card-title">
          <h2>可选服务</h2>
          <span>按需选择</span>
        </div>
        <div class="client-order-alert">
          <svg><use href="#client-icon-check"></use></svg>
          <span>附加服务会在确认订单页合并计费，部分服务以客服二次确认为准。</span>
        </div>
      </section>

      <section class="client-addon-section" aria-label="保险保障">
        <div class="client-addon-section-head">
          <div>
            <svg><use href="#client-icon-shield"></use></svg>
            <h2>保险保障</h2>
          </div>
          <span>已选升级保障</span>
        </div>
        <label class="client-addon-option locked">
          <input type="checkbox" checked disabled aria-label="基础保障已包含">
          <span>
            <strong>基础境外旅游险</strong>
            <em>已包含医疗、意外、紧急救援基础保障。</em>
          </span>
          <b>已含</b>
        </label>
        <label class="client-addon-option selected">
          <input type="checkbox" checked aria-label="升级安心保障">
          <span>
            <strong>升级安心保障</strong>
            <em>提升医疗额度，增加行李延误、航班延误补偿。</em>
          </span>
          <b>+¥398</b>
        </label>
      </section>

      <section class="client-addon-section" aria-label="接送机服务">
        <div class="client-addon-section-head">
          <div>
            <svg><use href="#client-icon-car"></use></svg>
            <h2>接送机</h2>
          </div>
          <span>可后续补选</span>
        </div>
        <div class="client-addon-chip-grid">
          <button type="button" class="active">暂不需要</button>
          <button type="button">送机 +¥480</button>
          <button type="button">接机 +¥480</button>
        </div>
      </section>

      <section class="client-addon-section" aria-label="房型要求">
        <div class="client-addon-section-head">
          <div>
            <svg><use href="#client-icon-bed"></use></svg>
            <h2>房型要求</h2>
          </div>
          <span>以酒店确认为准</span>
        </div>
        <div class="client-addon-room-list">
          <button type="button" class="active">
            <strong>双人间</strong>
            <span>默认安排，两位成人同住</span>
            <em>¥0</em>
          </button>
          <button type="button">
            <strong>大床优先</strong>
            <span>尽量协调，不保证最终房型</span>
            <em>¥0</em>
          </button>
          <button type="button">
            <strong>单房差</strong>
            <span>单人入住独立房间</span>
            <em>+¥6800</em>
          </button>
        </div>
      </section>

      <section class="client-addon-section" aria-label="特殊需求">
        <div class="client-addon-section-head">
          <div>
            <svg><use href="#client-icon-message"></use></svg>
            <h2>特殊需求</h2>
          </div>
          <span>客服复核</span>
        </div>
        <textarea class="client-addon-note" aria-label="特殊需求">希望安排相邻房间；一位出行人偏好少油少盐餐食。</textarea>
      </section>

      <section class="client-addon-fee-card" aria-label="费用明细">
        <div>
          <span>基础团费</span>
          <strong>¥103998</strong>
        </div>
        <div>
          <span>升级安心保障</span>
          <strong>¥398</strong>
        </div>
        <div>
          <span>接送机/房型</span>
          <strong>¥0</strong>
        </div>
      </section>
    </div>

    <footer class="client-order-footer" aria-label="附加服务底部操作">
      <div>
        <span>含附加服务</span>
        <strong>¥104396</strong>
      </div>
      <a href="booking-confirm.html?product=nordic-iceland&schedule=2026-07-18&plan=comfort&departure=beijing&adult=2&insurance=plus">下一步</a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
