<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出行人资料 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-settings-page client-traveler-form-page" aria-label="出行人资料">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 20c1.3-4 4-6 7.5-6s6.2 2 7.5 6"></path>
      </symbol>
      <symbol id="client-icon-passport" viewBox="0 0 24 24">
        <path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path>
        <circle cx="12" cy="10" r="3"></circle>
        <path d="M8 17h8"></path>
      </symbol>
      <symbol id="client-icon-phone" viewBox="0 0 24 24">
        <path d="M6 4h4l1 5-2.3 1.5a11 11 0 0 0 4.8 4.8L15 13l5 1v4c0 1.1-.9 2-2 2A14 14 0 0 1 4 6c0-1.1.9-2 2-2Z"></path>
      </symbol>
      <symbol id="client-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
      <symbol id="client-icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"></circle>
        <path d="M12 8v5l3 2"></path>
      </symbol>
      <symbol id="client-icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 5 6v5c0 4.6 2.9 8.4 7 10 4.1-1.6 7-5.4 7-10V6l-7-3Z"></path>
        <path d="m8.5 12 2.2 2.2 4.8-5"></path>
      </symbol>
      <symbol id="client-icon-message" viewBox="0 0 24 24">
        <path d="M5 5h14v10H8l-4 4V6a1 1 0 0 1 1-1Z"></path>
      </symbol>
    </svg>

    <div class="client-settings-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>12:45</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-settings-header" aria-label="出行人资料顶部导航">
        <a href="travelers.html" aria-label="返回常用出行人">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>出行人资料</h1>
        <a class="client-settings-service-link" href="service.html?order=KY20260718001">客服</a>
      </header>
    </div>

    <div class="mobile-content client-settings-scroll client-traveler-form-scroll">
      <section class="client-traveler-form-hero" aria-label="资料用途">
        <div>
          <span>新增/编辑共用</span>
          <h2>完善一位出行人</h2>
          <p>保存后可用于下单选人、合同签署、材料提交和出行通知。</p>
        </div>
        <strong>80%</strong>
      </section>

      <section class="client-traveler-form-status" aria-label="资料状态">
        <div>
          <svg><use href="#client-icon-check"></use></svg>
          <span>
            <strong>基础资料已填写</strong>
            <em>姓名、手机号、关系可用于下单通知。</em>
          </span>
        </div>
        <div class="warning">
          <svg><use href="#client-icon-clock"></use></svg>
          <span>
            <strong>证件页需在材料页上传</strong>
            <em>本页只维护证件信息，不做证件照片上传。</em>
          </span>
        </div>
      </section>

      <section class="client-traveler-form-card" aria-label="基础信息">
        <div class="client-traveler-form-title">
          <h2>基础信息</h2>
          <span>用于联系人与合同</span>
        </div>
        <div class="client-traveler-form-grid">
          <label>
            <span>中文姓名</span>
            <input type="text" value="张雨晴" aria-label="中文姓名">
          </label>
          <label>
            <span>英文姓名</span>
            <input type="text" value="ZHANG YUQING" aria-label="英文姓名">
          </label>
          <label>
            <span>关系</span>
            <select aria-label="关系">
              <option>本人</option>
              <option>配偶</option>
              <option>父母</option>
              <option>子女</option>
              <option>同行人</option>
            </select>
          </label>
          <label>
            <span>性别</span>
            <select aria-label="性别">
              <option>女</option>
              <option>男</option>
            </select>
          </label>
          <label>
            <span>出生日期</span>
            <input type="text" value="1988-05-16" aria-label="出生日期">
          </label>
          <label>
            <span>手机号</span>
            <input type="text" value="13800005678" aria-label="手机号">
          </label>
        </div>
        <label class="client-traveler-form-switch">
          <span>
            <strong>设为默认出行人</strong>
            <em>下次下单优先带入该出行人。</em>
          </span>
          <input type="checkbox" checked>
          <i></i>
        </label>
      </section>

      <section class="client-traveler-form-card" aria-label="证件信息">
        <div class="client-traveler-form-title">
          <h2>证件信息</h2>
          <span>出境必填</span>
        </div>
        <div class="client-traveler-form-alert">
          <svg><use href="#client-icon-passport"></use></svg>
          <span>出境线路请确保证件有效期覆盖回程后 6 个月。</span>
        </div>
        <div class="client-traveler-form-grid">
          <label>
            <span>证件类型</span>
            <select aria-label="证件类型">
              <option>护照</option>
              <option>身份证</option>
              <option>港澳通行证</option>
              <option>台胞证</option>
            </select>
          </label>
          <label>
            <span>证件号码</span>
            <input type="text" value="EJ1234567" aria-label="证件号码">
          </label>
          <label>
            <span>签发地</span>
            <input type="text" value="北京" aria-label="签发地">
          </label>
          <label>
            <span>证件有效期</span>
            <input type="text" value="2031-09-20" aria-label="证件有效期">
          </label>
        </div>
      </section>

      <section class="client-traveler-form-card" aria-label="出行偏好">
        <div class="client-traveler-form-title">
          <h2>出行偏好</h2>
          <span>顾问可见</span>
        </div>
        <label class="client-traveler-form-note">
          <span>饮食备注</span>
          <textarea aria-label="饮食备注">低盐饮食，尽量安排靠窗座位。</textarea>
        </label>
        <label class="client-traveler-form-note">
          <span>特殊需求</span>
          <textarea aria-label="特殊需求">希望出团前提醒确认签证材料与保险信息。</textarea>
        </label>
      </section>

      <section class="client-traveler-form-safe" aria-label="隐私保护">
        <svg><use href="#client-icon-shield"></use></svg>
        <span>资料仅用于预订、合同、签证材料和出行服务，保存后可在常用出行人中继续编辑。</span>
      </section>
    </div>

    <footer class="client-traveler-form-footer" aria-label="出行人资料底部操作">
      <a class="secondary" href="traveler-materials.html?traveler=zhang-yuqing">
        <svg><use href="#client-icon-message"></use></svg>
        补材料
      </a>
      <a href="travelers.html?saved=1">
        <svg><use href="#client-icon-check"></use></svg>
        保存出行人
      </a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
