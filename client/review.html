<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出行评价 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-order-page client-review-page" aria-label="出行评价">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-star" viewBox="0 0 24 24">
        <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.9-5.4 2.9 1-6-4.4-4.3 6.1-.9L12 3Z"></path>
      </symbol>
      <symbol id="client-icon-heart" viewBox="0 0 24 24">
        <path d="M12 20s-7-4.4-9-9a4.8 4.8 0 0 1 8-5 4.8 4.8 0 0 1 8 5c-2 4.6-9 9-9 9Z"></path>
      </symbol>
      <symbol id="client-icon-calendar" viewBox="0 0 24 24">
        <path d="M5 5h14v15H5z"></path>
        <path d="M8 3v4M16 3v4M5 10h14"></path>
      </symbol>
      <symbol id="client-icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 20c1.3-4 4-6 7.5-6s6.2 2 7.5 6"></path>
      </symbol>
      <symbol id="client-icon-message" viewBox="0 0 24 24">
        <path d="M5 5h14v10H8l-4 4V6a1 1 0 0 1 1-1Z"></path>
      </symbol>
      <symbol id="client-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
      <symbol id="client-icon-alert" viewBox="0 0 24 24">
        <path d="M12 3 2 21h20L12 3Z"></path>
        <path d="M12 9v5M12 18h.01"></path>
      </symbol>
    </svg>

    <div class="client-order-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>12:16</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-order-header" aria-label="出行评价顶部导航">
        <a href="trips-list.html?status=finished" aria-label="返回我的旅程">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>出行评价</h1>
        <a class="client-order-service-link" href="service.html?order=KY20260421006">客服</a>
      </header>
    </div>

    <div class="mobile-content client-order-scroll">
      <section class="client-review-hero" aria-label="评价提示">
        <div>
          <span>旅程已结束</span>
          <h2>欢迎评价本次旅行</h2>
          <p>你的反馈会帮助顾问和产品团队优化线路，也方便我们及时处理未完成的问题。</p>
        </div>
        <svg><use href="#client-icon-heart"></use></svg>
      </section>

      <section class="client-review-summary" aria-label="评价订单摘要">
        <img src="assets/product-study.jpg" alt="英伦研学线路图">
        <div>
          <span>KY20260421006 · 亲子研学</span>
          <h2>英伦名校人文研学10天8晚</h2>
          <p>2026-04-21 已回团 · 北京出发 · 1大1小</p>
          <strong>领队已完成回团归档</strong>
        </div>
      </section>

      <section class="client-review-card client-review-overall" aria-label="总体评分">
        <div class="client-order-card-title">
          <h2>本次旅行体验</h2>
          <span>总体评分</span>
        </div>
        <div class="client-review-score">
          <strong>4.8</strong>
          <div>
            <span>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
            </span>
            <em>非常满意，愿意推荐给朋友</em>
          </div>
        </div>
      </section>

      <section class="client-review-card" aria-label="分项评价">
        <div class="client-order-card-title">
          <h2>分项评价</h2>
          <span>可调整</span>
        </div>
        <div class="client-review-ratings">
          <div>
            <span>顾问服务</span>
            <b>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
            </b>
          </div>
          <div>
            <span>行程安排</span>
            <b>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
            </b>
          </div>
          <div>
            <span>酒店住宿</span>
            <b>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg class="muted"><use href="#client-icon-star"></use></svg>
            </b>
          </div>
          <div>
            <span>交通用车</span>
            <b>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
            </b>
          </div>
          <div>
            <span>领队/导游</span>
            <b>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
              <svg><use href="#client-icon-star"></use></svg>
            </b>
          </div>
        </div>
      </section>

      <section class="client-review-card" aria-label="体验标签">
        <div class="client-order-card-title">
          <h2>体验标签</h2>
          <span>可多选</span>
        </div>
        <div class="client-review-tags">
          <label class="active"><input type="checkbox" checked><span>安排省心</span></label>
          <label class="active"><input type="checkbox" checked><span>沟通及时</span></label>
          <label class="active"><input type="checkbox" checked><span>研学内容扎实</span></label>
          <label class="active"><input type="checkbox" checked><span>节奏合适</span></label>
          <label><input type="checkbox"><span>酒店舒适</span></label>
          <label><input type="checkbox"><span>超出预期</span></label>
        </div>
      </section>

      <section class="client-review-card" aria-label="文字反馈">
        <div class="client-order-card-title">
          <h2>补充评价</h2>
          <span>选填</span>
        </div>
        <textarea class="client-review-textarea" aria-label="补充评价">孩子对剑桥校园参访和博物馆讲解印象很深，顾问前期材料提醒及时。希望后续晚餐选择可以再丰富一些。</textarea>
      </section>

      <section class="client-review-issue" id="review-issue" aria-label="问题反馈">
        <svg><use href="#client-icon-alert"></use></svg>
        <span>
          <strong>有不满意或未解决的问题？</strong>
          <em>可以先提交评价，再联系专属客服继续处理。</em>
        </span>
        <a href="service.html?order=KY20260421006">联系</a>
      </section>
    </div>

    <footer class="client-order-footer client-review-footer" aria-label="出行评价底部操作">
      <a class="secondary" href="service.html?order=KY20260421006">
        <svg><use href="#client-icon-message"></use></svg>
        联系客服
      </a>
      <a href="review.html?order=KY20260421006&status=submitted">提交评价</a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
