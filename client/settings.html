<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置与账号 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-settings-page" aria-label="设置与账号">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 20c1.3-4 4-6 7.5-6s6.2 2 7.5 6"></path>
      </symbol>
      <symbol id="client-icon-phone" viewBox="0 0 24 24">
        <path d="M6 4h4l1 5-2.3 1.5a11 11 0 0 0 4.8 4.8L15 13l5 1v4c0 1.1-.9 2-2 2A14 14 0 0 1 4 6c0-1.1.9-2 2-2Z"></path>
      </symbol>
      <symbol id="client-icon-message" viewBox="0 0 24 24">
        <path d="M5 5h14v10H8l-4 4V6a1 1 0 0 1 1-1Z"></path>
      </symbol>
      <symbol id="client-icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 5 6v5c0 4.6 2.9 8.4 7 10 4.1-1.6 7-5.4 7-10V6l-7-3Z"></path>
        <path d="m8.5 12 2.2 2.2 4.8-5"></path>
      </symbol>
      <symbol id="client-icon-bell" viewBox="0 0 24 24">
        <path d="M6 10a6 6 0 0 1 12 0v4l2 3H4l2-3v-4Z"></path>
        <path d="M10 20a2.5 2.5 0 0 0 4 0"></path>
      </symbol>
      <symbol id="client-icon-file" viewBox="0 0 24 24">
        <path d="M7 3h7l5 5v13H7z"></path>
        <path d="M14 3v6h5M9 14h6M9 18h6"></path>
      </symbol>
      <symbol id="client-icon-card" viewBox="0 0 24 24">
        <path d="M4 7h16v10H4z"></path>
        <path d="M4 10h16M8 15h4"></path>
      </symbol>
      <symbol id="client-icon-map" viewBox="0 0 24 24">
        <path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3z"></path>
        <path d="M9 3v15M15 6v15"></path>
      </symbol>
      <symbol id="client-icon-arrow-right" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6"></path>
      </symbol>
      <symbol id="client-icon-log-out" viewBox="0 0 24 24">
        <path d="M10 17 15 12 10 7"></path>
        <path d="M15 12H3"></path>
        <path d="M14 4h5v16h-5"></path>
      </symbol>
    </svg>

    <div class="client-settings-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>12:31</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-settings-header" aria-label="设置与账号顶部导航">
        <a href="profile.html" aria-label="返回我的">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>设置与账号</h1>
        <a class="client-settings-service-link" href="service.html?order=KY20260718001">客服</a>
      </header>
    </div>

    <div class="mobile-content client-settings-scroll">
      <section id="account" class="client-settings-account" aria-label="账号摘要">
        <span class="client-settings-avatar">
          <svg><use href="#client-icon-user"></use></svg>
        </span>
        <div>
          <span>微信已绑定 · 手机号已验证</span>
          <h2>张雨晴</h2>
          <p>138****5678 · 北京</p>
        </div>
        <a href="settings.html#security">管理</a>
      </section>

      <section id="security" class="client-settings-card" aria-label="账号安全">
        <div class="client-settings-section-title">
          <h2>账号安全</h2>
          <span>当前安全</span>
        </div>
        <div class="client-settings-list">
          <a href="settings.html#phone">
            <span>
              <svg><use href="#client-icon-phone"></use></svg>
              <strong>手机号</strong>
            </span>
            <em>138****5678</em>
          </a>
          <a href="settings.html#wechat">
            <span>
              <svg><use href="#client-icon-message"></use></svg>
              <strong>微信绑定</strong>
            </span>
            <em class="ok">已绑定</em>
          </a>
          <a href="settings.html#devices">
            <span>
              <svg><use href="#client-icon-shield"></use></svg>
              <strong>登录设备</strong>
            </span>
            <em>本机小程序</em>
          </a>
        </div>
      </section>

      <section id="notice" class="client-settings-card" aria-label="通知偏好">
        <div class="client-settings-section-title">
          <h2>通知偏好</h2>
          <span>小程序消息</span>
        </div>
        <div class="client-settings-switch-list">
          <label>
            <span>
              <strong>订单进度</strong>
              <em>付款、合同、退款、发票处理结果</em>
            </span>
            <input type="checkbox" checked>
            <i></i>
          </label>
          <label>
            <span>
              <strong>出行提醒</strong>
              <em>材料、集合、航班、出团通知</em>
            </span>
            <input type="checkbox" checked>
            <i></i>
          </label>
          <label>
            <span>
              <strong>优惠活动</strong>
              <em>会员权益、目的地活动和优惠券</em>
            </span>
            <input type="checkbox">
            <i></i>
          </label>
        </div>
      </section>

      <section class="client-settings-card" aria-label="常用资料">
        <div class="client-settings-section-title">
          <h2>常用资料</h2>
          <span>出行常用</span>
        </div>
        <div class="client-settings-list">
          <a href="travelers.html">
            <span>
              <svg><use href="#client-icon-shield"></use></svg>
              <strong>常用出行人</strong>
            </span>
            <em>2人建档</em>
          </a>
          <a id="invoice" href="invoice-address.html#invoice-titles">
            <span>
              <svg><use href="#client-icon-file"></use></svg>
              <strong>发票抬头</strong>
            </span>
            <em>企业抬头</em>
          </a>
          <a id="address" href="invoice-address.html#shipping-addresses">
            <span>
              <svg><use href="#client-icon-map"></use></svg>
              <strong>收货地址</strong>
            </span>
            <em>北京 · 朝阳区</em>
          </a>
        </div>
      </section>

      <section class="client-settings-card" aria-label="协议与隐私">
        <div class="client-settings-section-title">
          <h2>协议与隐私</h2>
          <span>版本 1.0</span>
        </div>
        <div class="client-settings-list">
          <a id="agreement" href="settings.html#agreement">
            <span>
              <svg><use href="#client-icon-card"></use></svg>
              <strong>用户协议</strong>
            </span>
            <svg><use href="#client-icon-arrow-right"></use></svg>
          </a>
          <a id="privacy" href="settings.html#privacy">
            <span>
              <svg><use href="#client-icon-shield"></use></svg>
              <strong>隐私政策</strong>
            </span>
            <svg><use href="#client-icon-arrow-right"></use></svg>
          </a>
        </div>
      </section>
    </div>

    <footer class="client-settings-footer" aria-label="设置底部操作">
      <a class="secondary" href="service.html?order=KY20260718001">
        <svg><use href="#client-icon-message"></use></svg>
        联系客服
      </a>
      <a href="index.html?logout=1">
        <svg><use href="#client-icon-log-out"></use></svg>
        退出登录
      </a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
