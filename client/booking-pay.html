<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付订单 - 凯撒优选</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <main class="mobile-frame client-order-page client-pay-page" aria-label="支付订单">
    <svg class="client-icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="client-icon-arrow-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="client-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6"></path>
      </symbol>
      <symbol id="client-icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"></circle>
        <path d="M12 8v5l3 2"></path>
      </symbol>
      <symbol id="client-icon-card" viewBox="0 0 24 24">
        <path d="M4 6h16v12H4zM4 10h16"></path>
      </symbol>
      <symbol id="client-icon-wallet" viewBox="0 0 24 24">
        <path d="M5 7h14a2 2 0 0 1 2 2v9H5a2 2 0 0 1-2-2V5a2 2 0 0 0 2 2Z"></path>
        <path d="M16 13h3"></path>
      </symbol>
      <symbol id="client-icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 5 6v5c0 4.6 2.9 8.4 7 10 4.1-1.6 7-5.4 7-10V6l-7-3Z"></path>
        <path d="m8.5 12 2.2 2.2 4.8-5"></path>
      </symbol>
      <symbol id="client-icon-alert" viewBox="0 0 24 24">
        <path d="M12 3 2.8 20h18.4L12 3Z"></path>
        <path d="M12 9v5M12 17h.01"></path>
      </symbol>
    </svg>

    <div class="client-order-top">
      <div class="client-statusbar" aria-hidden="true">
        <span>11:34</span>
        <span class="client-statusbar-right">
          <span class="client-signal"></span>
          <span>4G</span>
          <span class="client-battery">57</span>
        </span>
      </div>
      <header class="client-order-header" aria-label="支付订单顶部导航">
        <a href="booking-confirm.html?product=nordic-iceland&schedule=2026-07-18&plan=comfort&departure=beijing&adult=2&insurance=plus" aria-label="返回确认订单">
          <svg><use href="#client-icon-arrow-left"></use></svg>
        </a>
        <h1>支付订单</h1>
        <button type="button">客服</button>
      </header>
    </div>

    <div class="mobile-content client-order-scroll">
      <section class="client-order-steps" aria-label="下单进度">
        <span class="done"><b>1</b>出行人</span>
        <i></i>
        <span class="done"><b>2</b>附加服务</span>
        <i></i>
        <span class="done"><b>3</b>确认订单</span>
        <i></i>
        <span class="active"><b>4</b>支付</span>
      </section>

      <section class="client-pay-amount-card" aria-label="待支付金额">
        <div class="client-pay-amount-head">
          <span>待支付</span>
          <b><svg><use href="#client-icon-clock"></use></svg>14:58</b>
        </div>
        <strong>¥104396</strong>
        <p>北欧四国+冰岛13天11晚 · 成人2人 · 2026-07-18出发</p>
        <div class="client-pay-order-no">
          <span>订单号</span>
          <em>KY20260718001</em>
        </div>
      </section>

      <section class="client-pay-card" aria-label="付款类型">
        <div class="client-order-card-title">
          <h2>付款类型</h2>
          <span>名额锁定中</span>
        </div>
        <div class="client-pay-mode-list">
          <label class="client-pay-mode selected">
            <input type="radio" name="payType" checked aria-label="全款支付">
            <span>
              <strong>全款支付</strong>
              <em>支付后进入合同与材料复核</em>
            </span>
            <b>¥104396</b>
          </label>
          <label class="client-pay-mode">
            <input type="radio" name="payType" aria-label="定金支付">
            <span>
              <strong>定金支付</strong>
              <em>尾款需在出发前30天补齐</em>
            </span>
            <b>¥20000</b>
          </label>
        </div>
      </section>

      <section class="client-pay-card" aria-label="支付方式">
        <div class="client-order-card-title">
          <h2>支付方式</h2>
          <span>推荐微信支付</span>
        </div>
        <div class="client-pay-method-list">
          <label class="client-pay-method selected">
            <input type="radio" name="payMethod" checked aria-label="微信支付">
            <svg><use href="#client-icon-wallet"></use></svg>
            <span>
              <strong>微信支付</strong>
              <em>实时确认支付结果</em>
            </span>
            <b>已选</b>
          </label>
          <label class="client-pay-method">
            <input type="radio" name="payMethod" aria-label="银行卡支付">
            <svg><use href="#client-icon-card"></use></svg>
            <span>
              <strong>银行卡支付</strong>
              <em>支持主流储蓄卡、信用卡</em>
            </span>
            <b>可用</b>
          </label>
          <label class="client-pay-method disabled">
            <input type="radio" name="payMethod" disabled aria-label="账户余额不足">
            <svg><use href="#client-icon-wallet"></use></svg>
            <span>
              <strong>账户余额</strong>
              <em>当前余额不足</em>
            </span>
            <b>不可用</b>
          </label>
        </div>
      </section>

      <section class="client-pay-retry-card" aria-label="支付未完成提示">
        <svg><use href="#client-icon-alert"></use></svg>
        <div>
          <strong>支付未完成时可返回继续支付</strong>
          <span>名额锁定倒计时结束后，需要重新确认团期余位与价格。</span>
        </div>
      </section>

      <section class="client-pay-safe-card" aria-label="支付保障">
        <div>
          <svg><use href="#client-icon-shield"></use></svg>
          <span>支付成功后，订单进入客服复核，合同、出行材料和尾款提醒会在订单详情中继续承接。</span>
        </div>
        <div>
          <svg><use href="#client-icon-check"></use></svg>
          <span>如支付结果延迟，请勿重复付款，可在“我的订单”查看状态或联系客服处理。</span>
        </div>
      </section>
    </div>

    <footer class="client-order-footer client-pay-footer" aria-label="支付底部操作">
      <div>
        <span>微信支付</span>
        <strong>¥104396</strong>
      </div>
      <a href="booking-success.html?order=KY20260718001">立即支付</a>
    </footer>
    <div class="client-home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
