        ["门店管理", "新增门店、修改收款账号、调整结算方式、开启资金权限", "销售中心", "财务审核 → 业务负责人", "4小时提醒，8小时升级", "门店经营状态、资金规则", "启用"]
      ];

      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function readStored(key) {
        try {
          return JSON.parse(window.localStorage.getItem(key) || "{}");
        } catch (error) {
          return {};
        }
      }

      function writeStored(key, value) {
        window.localStorage.setItem(key, JSON.stringify(value));
      }

      function compactNo(value, fallback) {
        const text = String(value || fallback || "");
        const digits = text.replace(/\D/g, "").slice(-8);
        return digits || (text.replace(/[^a-z0-9]/gi, "").slice(-8) || "000000").toUpperCase();
      }

      function applyNoFrom(value) {
        return "PAY-" + compactNo(value, "20260629");
      }

      function tagClass(value, level) {
        if (level === "danger" || value === "已拒绝" || value === "已退回" || value === "已撤回") return "tag tag-red";
        if (level === "success" || value === "已通过") return "tag tag-green";
        if (value === "审批中") return "tag tag-blue";
        if (level === "normal") return "tag tag-gray";
        return "tag tag-orange";
      }

      function normalizeSource(value) {
        if (/产品|线路|代理/.test(value)) return "产品中心";
        if (/团期|出团|项目团|交通|履约/.test(value)) return "履约中心";
        if (/订单|销售|售后/.test(value)) return "销售中心";
        if (/渠道|分销/.test(value)) return "渠道中心";
        if (/门店/.test(value)) return "门店中心";
        if (/供应商|资源/.test(value)) return "资源";
        if (/系统|组织|员工/.test(value)) return "系统设置";
        if (/财务|应付|应收|付款|结算|发票|NC/.test(value)) return "财务";
        return value || "财务";
      }

      function taskFromStored(task, approvalNo) {
        const status = task.status || "审批中";
        const source = normalizeSource(task.source || "财务");
        const businessNo = task.businessNo || "-";
        const productText = task.productText || task.title || businessNo;
        return {
          no: approvalNo,
          matter: task.approvalType || "付款申请",
          source: source,
          scopes: String(task.scope || "todo mine overview").split(/\s+/).filter(Boolean),
          status: status,
          applicant: task.applicant || "系统",
          applicantRole: source,
          businessTitle: productText,
          businessNo: businessNo,
          context: task.subtitle || task.sourceNo || "-",
          impact: task.amount || "-",
          risk: task.risk || "单据待复核",
          riskLevel: /异常|驳回|失败|超|减免/.test(task.risk || "") ? "danger" : "warning",
          node: task.node || "当前审批人",
          due: task.timeout || (status === "审批中" ? "已提交" : "正常"),
          appliedAt: task.appliedAt || "2026-07-04",
          sourceHref: "",
          applyNo: task.applyNo || applyNoFrom(businessNo),
          detail: task.detail || [
            ["业务单据", businessNo],
            ["业务对象", productText],
            ["金额/影响", task.amount || "-"],
            ["通过后", "回写来源单据状态，涉及收付结算时由财务模块继续承接"]
          ],
          flow: (task.flow || ["业务单据已提交", "系统完成基础校验", "当前等待审批"]).map((item, index) => {
            const text = String(item);
            const parts = text.split(" ");
            return [index === 0 ? "发起" : index === 1 ? "校验" : "当前", text];
          }),
          opinion: task.opinion || "同意。请后续节点按来源单据状态继续处理。"
        };
      }

      function collectApprovals() {
        const storedTasks = readStored("caesarApprovalTasks").tasks || {};
        const storedResults = readStored("caesarApprovalResults");
        const map = {};
        baseApprovals.forEach((item) => {
          map[item.no] = Object.assign({}, item);
        });
        Object.keys(storedTasks).forEach((approvalNo) => {
          if (!map[approvalNo]) map[approvalNo] = taskFromStored(storedTasks[approvalNo] || {}, approvalNo);
        });
        Object.keys(storedResults).forEach((approvalNo) => {
          const result = storedResults[approvalNo] || {};
          if (!map[approvalNo]) return;
          if (result.status === "approved") map[approvalNo].status = "已通过";
          if (result.status === "rejected") map[approvalNo].status = "已拒绝";
        });
        return Object.keys(map).map((key) => map[key]);
      }

      let approvals = collectApprovals();

      function optionHtml(values, allText) {
        return ["<option value=\"\">" + escapeHtml(allText) + "</option>"].concat(values.map((value) => {
          return "<option value=\"" + escapeHtml(value) + "\">" + escapeHtml(value) + "</option>";
        })).join("");
      }

      function setupFilters() {
        matterSelect.innerHTML = optionHtml(matterOptions, "全部事项");
        sourceSelect.innerHTML = optionHtml(sourceOptions, "全部模块");
        statusSelect.innerHTML = optionHtml(statusOptions, "全部状态");
      }

      function tabsForView() {
        if (currentView === "todo") {
          const visibleMatters = matterOptions.filter((matter) => approvals.some((item) => item.matter === matter && item.scopes.includes("todo")));
          return ["全部"].concat(visibleMatters);
        }
        if (currentView === "mine") return ["全部", "审批中", "已退回", "已通过", "已拒绝", "已撤回"];
        if (currentView === "cc") return ["全部", "未读", "已读"];
        return ["全部", "待审批", "审批中", "已通过", "已拒绝", "已超时"];
      }

      function renderTabs() {
        const tabs = tabsForView();
        if (!tabs.includes(activeTab)) activeTab = "全部";
        typeTabs.innerHTML = tabs.map((tab) => {
          return "<button class=\"tab-item" + (tab === activeTab ? " active" : "") + "\" type=\"button\" data-tab-value=\"" + escapeHtml(tab) + "\">" + escapeHtml(tab) + "</button>";
        }).join("");
      }

      function inView(item) {
        if (currentView === "overview") return true;
        return item.scopes.includes(currentView);
      }

      function matchesTab(item) {
        if (activeTab === "全部") return true;
        if (currentView === "todo") return item.matter === activeTab;
        if (currentView === "mine") return item.status === activeTab;
        if (currentView === "cc") return (item.readStatus || "已读") === activeTab;
        if (activeTab === "已超时") return /超时|已过/.test(item.due + item.risk);
        return item.status === activeTab;
      }

      function matchesFilters(item) {
        const keyword = keywordInput.value.trim().toLowerCase();
        const source = sourceSelect.value;
        const matter = matterSelect.value;
        const status = statusSelect.value;
        const from = dateFromInput.value;
        const to = dateToInput.value;
        const haystack = [
          item.no,
          item.matter,
          item.source,
          item.applicant,
          item.businessTitle,
          item.businessNo,
          item.context,
          item.impact,
          item.risk,
          item.node
        ].join(" ").toLowerCase();
        if (keyword && !haystack.includes(keyword)) return false;
        if (source && item.source !== source) return false;
        if (matter && item.matter !== matter) return false;
        if (status && item.status !== status) return false;
        if (from && item.appliedAt < from) return false;
        if (to && item.appliedAt > to) return false;
        return true;
      }

      function visibleApprovals() {
        return approvals.filter((item) => inView(item) && matchesTab(item) && matchesFilters(item));
      }

      function actionHtml(item) {
        const no = escapeHtml(item.no);
        if (currentView === "todo") {
          if (item.status === "待审批") {
            return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"approve\" data-approval-no=\"" + no + "\">审批</button><button type=\"button\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button>";
          }
          return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button><button type=\"button\" data-approval-action=\"progress\" data-approval-no=\"" + no + "\">记录</button>";
        }
        if (currentView === "mine") {
          if (item.status === "已退回") {
            return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"supplement\" data-approval-no=\"" + no + "\">补充材料</button><button type=\"button\" data-approval-action=\"withdraw\" data-approval-no=\"" + no + "\">撤回</button><button type=\"button\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button>";
          }
          if (item.status === "审批中" || item.status === "待审批") {
            return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"progress\" data-approval-no=\"" + no + "\">进度</button><button type=\"button\" data-approval-action=\"withdraw\" data-approval-no=\"" + no + "\">撤回</button><button type=\"button\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button>";
          }
          return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button><button type=\"button\" data-approval-action=\"progress\" data-approval-no=\"" + no + "\">记录</button>";
        }
        if (currentView === "cc") {
          return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button><button type=\"button\" data-approval-action=\"progress\" data-approval-no=\"" + no + "\">记录</button>";
        }
        return "<button type=\"button\" class=\"table-action-primary\" data-approval-action=\"detail\" data-approval-no=\"" + no + "\">详情</button><button type=\"button\" data-approval-action=\"progress\" data-approval-no=\"" + no + "\">记录</button>";
      }

      function rowHtml(item) {
        return "<tr data-approval-no=\"" + escapeHtml(item.no) + "\">" +
          "<td><div><strong>" + escapeHtml(item.no) + "</strong></div><div class=\"approval-cell-line\"><span class=\"" + tagClass(item.matter, "normal") + "\">" + escapeHtml(item.matter) + "</span></div></td>" +
          "<td><div><strong>" + escapeHtml(item.businessTitle) + "</strong></div><div class=\"text-muted\">" + escapeHtml(item.businessNo) + "</div><div class=\"text-muted\">" + escapeHtml(item.context) + "</div></td>" +

          "<td><div class=\"table-action\"><button type=\"button\" class=\"table-action-primary\" data-config-action=\"detail\" data-config-matter=\"" + escapeHtml(item[0]) + "\">配置</button><button type=\"button\" data-config-action=\"log\" data-config-matter=\"" + escapeHtml(item[0]) + "\">记录</button></div></td>" +

      function renderConfig() {
        configBody.innerHTML = configItems.map(configRowHtml).join("");
        configPagination.textContent = "第1-" + configItems.length + "条/共" + configItems.length + "条";
      }

      function summaryItems(item) {
        return [
          ["审批单号", item.no],
          ["审批事项", item.matter],
          ["来源模块", item.source],
          ["申请人", item.applicant + " / " + item.applicantRole],
          ["业务对象", item.businessTitle],
          ["业务单据", item.businessNo],
          ["金额/影响", item.impact],
          ["当前节点", item.node],
          ["审批状态", item.status],
          ["申请日期", item.appliedAt]
        ];
      }

      function summaryGridHtml(items) {
        return items.map((item) => {
          return "<div class=\"description-item\"><div class=\"description-label\">" + escapeHtml(item[0]) + "</div><div class=\"description-value\">" + escapeHtml(item[1]) + "</div></div>";
        }).join("");
      }

      function detailGridHtml(items) {
        return (items || []).map((item) => {
          return "<div><span>" + escapeHtml(item[0]) + "</span><strong>" + escapeHtml(item[1]) + "</strong></div>";
        }).join("");
      }

      function approvalResultText(item) {
        if (item.status === "已通过") return "已通过，来源单据进入下一业务节点";
        if (item.status === "已拒绝") return "已拒绝，来源单据停止当前流转";
        if (item.status === "已退回") return "已退回，等待申请人补充材料";
        if (item.status === "已撤回") return "已撤回，来源单据回到申请人处理";
        if (item.status === "审批中") return "审批中，当前节点：" + item.node;
        return "待审批，当前节点：" + item.node;
      }

      function detailItemsForAction(item, action) {
        return (item.detail || []).slice();

        return [

        ];

      function flowHtml(items) {
        return (items || []).map((item) => {
          const time = Array.isArray(item) ? item[0] : "-";

        }).join("");

      function decisionControlsHtml(action) {
        if (action === "approve") {
          return "<label><input type=\"radio\" name=\"approvalDecision\" value=\"通过\" checked> 通过</label><label><input type=\"radio\" name=\"approvalDecision\" value=\"驳回\"> 驳回</label><label><input type=\"radio\" name=\"approvalDecision\" value=\"退回补充\"> 退回补充</label>";
        }
        if (action === "withdraw") {
          return "<span class=\"tag tag-red\">撤回申请</span>";
        }
        if (action === "supplement") {
          return "<span class=\"tag tag-orange\">补充材料</span>";
        }
        return "";
      }

      function modalTitleFor(action, item, actionTitle) {
        if (actionTitle) return actionTitle;

        if (action === "withdraw") return "撤回申请";
        if (action === "supplement") return "补充材料";
        return "审批详情";

      function openModal(item, action, actionTitle) {
        activeApproval = item;
        activeAction = action;
        modalTitle.textContent = modalTitleFor(action, item, actionTitle);
        detailSectionTitle.textContent = action === "approve" ? "判断依据" : "申请内容";
        summaryGrid.innerHTML = summaryGridHtml(summaryItems(item));
        detailContent.innerHTML = detailGridHtml(detailItemsForAction(item, action));
        resultPanel.hidden = !(action === "detail" || action === "progress");
        resultGrid.innerHTML = resultPanel.hidden ? "" : detailGridHtml(resultItemsForAction(item));
        flowList.innerHTML = flowHtml(item.flow);
        const canDecide = currentView === "todo" && action === "approve" && item.status === "待审批";
        const canWithdraw = currentView === "mine" && action === "withdraw" && (item.status === "审批中" || item.status === "待审批" || item.status === "已退回");
        const canSupplement = currentView === "mine" && action === "supplement" && item.status === "已退回";
        const isOperation = canDecide || canWithdraw || canSupplement;
        decisionPanel.hidden = !isOperation;
        decisionTitle.textContent = canSupplement ? "补充材料" : canWithdraw ? "撤回申请" : "本次处理";
        decisionControls.innerHTML = decisionControlsHtml(action);
        opinionInput.value = action === "approve" ? (item.opinion || "") : "";
        opinionInput.placeholder = canSupplement ? "填写补充说明或材料清单" : "填写审批意见，驳回、退回补充或撤回时必填";
        cancelBtn.hidden = !isOperation;

          modal.classList.remove("show");
          modal.hidden = true;
        }

        if (window.caesarUI && typeof window.caesarUI.toast === "function") {
          window.caesarUI.toast(message);
          return;
        }
        toastEl.textContent = message;
        toastEl.hidden = false;
        window.setTimeout(() => {
          toastEl.hidden = true;
        }, 1800);

      function writeApprovalResult(item, decision) {
        const results = readStored("caesarApprovalResults");
        results[item.no] = {
          status: decision === "通过" ? "approved" : "rejected",
          approvalType: item.matter,
          businessNo: item.businessNo,
          productText: item.businessTitle,
          amount: item.impact,
          source: item.source,
          updatedAt: "2026-07-09 16:30"
        };
        writeStored("caesarApprovalResults", results);
        const stored = readStored("caesarApprovalTasks");
        if (stored.tasks && stored.tasks[item.no]) {
          stored.tasks[item.no].status = item.status;
          stored.tasks[item.no].updatedAt = "2026-07-09 16:30";
          writeStored("caesarApprovalTasks", stored);
        }
      }

      function updateApprovalStatus(item, status) {
        item.status = status;
        item.node = status === "已退回" ? "申请人补充" : status === "已撤回" ? "已撤回" : "已完成";
        item.due = status === "已退回" ? "待补充" : "已完成";
        if (!item.flow) item.flow = [];
        item.flow = item.flow.concat([["16:30", status + " / 当前用户"]]);
      }

      function submitModalAction() {
        if (!activeApproval) {
          closeModal();
          return;
        }
        if (activeAction === "approve") {
          const decision = document.querySelector("input[name='approvalDecision']:checked");
          const decisionValue = decision ? decision.value : "通过";
          if (decisionValue !== "通过" && !opinionInput.value.trim()) {
            opinionInput.focus();
            return;
          }
          updateApprovalStatus(activeApproval, decisionValue === "通过" ? "已通过" : decisionValue === "驳回" ? "已拒绝" : "已退回");
          writeApprovalResult(activeApproval, decisionValue);
          renderApprovals();
          toast(decisionValue === "通过" ? "审批已通过，来源单据进入下一节点" : "审批意见已提交，来源单据等待处理");
          closeModal();
          return;
        }
        if (activeAction === "withdraw") {
          if (!opinionInput.value.trim()) {
            opinionInput.focus();
            return;
          }
          updateApprovalStatus(activeApproval, "已撤回");
          renderApprovals();
          toast("审批申请已撤回");
          closeModal();
          return;

          renderApprovals();
          toast("补充材料已提交，审批继续流转");
          closeModal();
          return;

        closeModal();

      }

      function setupPageByView() {
        pageTitle.textContent = viewMap[currentView];
        document.title = viewMap[currentView] + " - 凯撒旅游";
        const isConfig = currentView === "config";
        filterPanel.hidden = isConfig;
        typeTabs.hidden = isConfig;
        listArea.hidden = isConfig;
        configArea.hidden = !isConfig;
        if (isConfig) {
          renderConfig();
        } else {
          renderApprovals();
        }
      }

      function focusDirectApproval() {
        if (!directApprovalNo || currentView === "config") return;
        keywordInput.value = directApprovalNo;
        activeTab = "全部";
        renderApprovals();
        const row = rowsBody.querySelector("[data-approval-no=\"" + CSS.escape(directApprovalNo) + "\"]");
        const item = findApproval(directApprovalNo);
        if (!row || !item) return;
        row.classList.add("approval-row-highlight");
        window.setTimeout(() => {
          row.scrollIntoView({ block: "center", behavior: "smooth" });
          openModal(item, currentView === "todo" && item.status === "待审批" ? "approve" : "detail");
        }, 120);
      }

      setupFilters();
      setupPageByView();
      focusDirectApproval();

      typeTabs.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-tab-value]");
        if (!tab) return;
        activeTab = tab.dataset.tabValue || "全部";
        renderApprovals();
      });

      [keywordInput, matterSelect, sourceSelect, statusSelect, dateFromInput, dateToInput].forEach((control) => {
        control.addEventListener("input", renderApprovals);
        control.addEventListener("change", renderApprovals);
      });

      document.getElementById("searchApprovals").addEventListener("click", renderApprovals);
      document.getElementById("resetApprovals").addEventListener("click", () => {
        keywordInput.value = "";
        matterSelect.value = "";
        sourceSelect.value = "";
        statusSelect.value = "";
        dateFromInput.value = "";
        dateToInput.value = "";
        activeTab = "全部";
        renderApprovals();
      });

      rowsBody.addEventListener("click", (event) => {
        const button = event.target.closest("[data-approval-action]");
        if (!button) return;
        const item = findApproval(button.dataset.approvalNo);
        if (!item) return;
        const action = button.dataset.approvalAction;
        openModal(item, action, button.textContent.trim());
      });

      configBody.addEventListener("click", (event) => {
        const button = event.target.closest("[data-config-action]");
        if (!button) return;
        openConfigModal(button.dataset.configMatter, button.dataset.configAction, button.textContent.trim());
      });

      document.querySelectorAll("[data-close-approval-modal]").forEach((button) => {
        button.addEventListener("click", closeModal);
      });
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });
      submitBtn.addEventListener("click", submitModalAction);
    })();
  </script>
</body>
</html>
