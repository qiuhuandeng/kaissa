<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择公司主体 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="workspace-select-page workspace-subject-page">
  <main class="workspace-main">
    <section class="workspace-panel" aria-label="选择公司主体">
      <section class="workspace-picker">
        <div class="workspace-account-row">
          <div class="workspace-brand">
            <span class="workspace-brand-mark">K</span>
            <span>凯撒旅游</span>
          </div>
        </div>

        <h1 class="workspace-title workspace-title-standalone">选择公司主体</h1>

        <div class="workspace-list" aria-label="公司主体列表">
          <article class="workspace-card active" data-company="福建凯撒国际旅行社有限公司">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">福建凯撒国际旅行社有限公司</span>
                  <span class="workspace-card-meta">出境事业中心、门市销售中心</span>
                </span>
              </span>
              <span class="tag tag-blue">默认主体</span>
            </button>
          </article>

          <article class="workspace-card" data-company="北京凯撒国际旅行社有限公司">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">北京凯撒国际旅行社有限公司</span>
                  <span class="workspace-card-meta">出境事业中心、MICE会展中心</span>
                </span>
              </span>
            </button>
          </article>

          <article class="workspace-card" data-company="上海凯撒国际旅行社有限公司">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">上海凯撒国际旅行社有限公司</span>
                  <span class="workspace-card-meta">华东销售中心</span>
                </span>
              </span>
            </button>
          </article>
        </div>

        <footer class="workspace-actionbar workspace-actionbar-entry">
          <button id="enterDashboard" class="btn btn-primary btn-lg" type="button">进入该主体</button>
        </footer>
      </section>
    </section>
  </main>

  <script>
    (function () {
      var cards = document.querySelectorAll('.workspace-card');
      var enterDashboard = document.getElementById('enterDashboard');

      cards.forEach(function (card) {
        var head = card.querySelector('.workspace-card-head');

        head.addEventListener('click', function () {
          cards.forEach(function (item) {
            item.classList.remove('active');
          });
          card.classList.add('active');
        });
      });

      enterDashboard.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

    })();
  </script>
</body>
</html>
