<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择公司主体 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="workspace-select-page workspace-subject-page">
  <main class="workspace-main">
    <section class="workspace-panel" aria-label="选择公司主体">
      <section class="workspace-picker">
        <div class="workspace-account-row">
          <div class="workspace-brand">
            <span class="workspace-brand-mark">K</span>
            <span>凯撒旅游</span>
          </div>
        </div>

        <h1 class="workspace-title workspace-title-standalone">选择板块与主体公司</h1>

        <div class="workspace-list" aria-label="板块与主体公司列表">
          <article class="workspace-card active" data-company="福建凯撒">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">旅游板块 / 福建凯撒</span>
                  <span class="workspace-card-meta">厦门分公司、泉州分公司、福州分公司、漳州分公司、产品中心、长线中心、短线中心/销售中心</span>
                </span>
              </span>
              <span class="tag tag-blue">默认主体</span>
            </button>
          </article>

          <article class="workspace-card" data-company="上海凯撒">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">旅游板块 / 上海凯撒</span>
                  <span class="workspace-card-meta">下级经营组织待维护</span>
                </span>
              </span>
            </button>
          </article>

          <article class="workspace-card" data-company="福建凯撒（海洋文旅）">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">海洋文旅板块 / 福建凯撒</span>
                  <span class="workspace-card-meta">复用既有主体公司，仅承接外采采购与分销业务</span>
                </span>
              </span>
            </button>
          </article>
        </div>

        <footer class="workspace-actionbar workspace-actionbar-entry">
          <button id="enterDashboard" class="btn btn-primary btn-lg" type="button">进入当前选择</button>
        </footer>
      </section>
    </section>
  </main>

  <script>
    (function () {
      var cards = document.querySelectorAll('.workspace-card');
      var enterDashboard = document.getElementById('enterDashboard');

      cards.forEach(function (card) {
        var head = card.querySelector('.workspace-card-head');

        head.addEventListener('click', function () {
          cards.forEach(function (item) {
            item.classList.remove('active');
          });
          card.classList.add('active');
        });
      });

      enterDashboard.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

    })();
  </script>
</body>
</html>
