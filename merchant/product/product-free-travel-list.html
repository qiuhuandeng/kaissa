<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由行出行日期 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="page-workbar free-date-workbar">
    <div class="page-title-row">
      <a class="page-back-link" href="products.html">返回</a>
      <h1 id="freePageTitle" class="page-title">出行日期</h1>
    </div>
  </section>

  <section class="list-surface free-date-surface" data-list-surface>
    <section class="filter-card filter-card-compact free-travel-filter list-surface-filter" aria-label="出行日期筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <span class="dropdown table-action-more free-batch-menu">
          <button id="freeBatchMenuToggle" class="btn btn-secondary table-more-toggle" type="button" aria-expanded="false">批量操作</button>
          <span class="dropdown-menu action-dropdown-menu">
            <button class="dropdown-item" type="button" data-open-batch="open">批量开放日期</button>
            <button class="dropdown-item" type="button" data-open-batch="price">批量调价</button>
            <button class="dropdown-item danger" type="button" data-open-batch="stop">批量停售</button>
            <button class="dropdown-item" type="button" data-export-free-dates>导出日期价格</button>
          </span>
        </span>
        <button id="openFreeDateDrawer" class="btn btn-primary" type="button">新增出行日期</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="filterKeyword">出行日期/套餐</label>
          <input id="filterKeyword" type="search" placeholder="出行日期/套餐搜索">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="filterPackage">套餐</label>
          <select id="filterPackage">
            <option value="">全部套餐</option>
            <option value="机票+酒店套餐">机票+酒店套餐</option>
            <option value="纯酒店套餐">纯酒店套餐</option>
            <option value="酒店+接送机套餐">酒店+接送机套餐</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="filterSaleStatus">销售状态</label>
          <select id="filterSaleStatus">
            <option value="">全部销售状态</option>
            <option>销售中</option>
            <option>待开放</option>
            <option>低库存</option>
            <option>停售</option>
            <option>售罄</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="filterResourceStatus">资源确认</label>
          <select id="filterResourceStatus">
            <option value="">全部资源确认</option>
            <option>已确认</option>
            <option>待确认</option>
            <option>需补确认</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="filterChannelStatus">渠道状态</label>
          <select id="filterChannelStatus">
            <option value="">全部渠道状态</option>
            <option>已同步</option>
            <option>未同步</option>
            <option>暂停同步</option>
          </select>
        </div>
        <div class="filter-actions">
          <button id="applyFreeFilters" class="btn btn-secondary" type="button">查询</button>
        </div>
      </div>
    </section>

    <div class="free-date-context">
      <span><strong id="contextProduct">巴黎自由行</strong></span>
      <span>负责人：<strong id="contextOwner">郑华</strong></span>
      <span>资源组合：<strong id="contextSupplier">国际航空CA / 巴黎酒店直采</strong></span>
    </div>

    <div class="list-surface-tabbar-row free-date-view-row">
      <div class="tab-bar free-date-view-switch" role="tablist">
        <button class="tab-item active" type="button" data-free-view="list">列表视图</button>
        <button class="tab-item" type="button" data-free-view="calendar">日历视图</button>
      </div>
    </div>

    <section id="freeListPanel" class="free-date-panel">
      <div class="table-wrap free-date-table">
        <table>
          <thead>
            <tr>
              <th>出行日期</th>
              <th>套餐</th>
              <th>销售状态</th>
              <th>价格</th>
              <th>可售/已售</th>
              <th>停售时间</th>
              <th>资源确认</th>
              <th>渠道状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="freeDateRows"></tbody>
        </table>
      </div>
    </section>

    <section id="freeCalendarPanel" class="free-date-panel hidden">
      <div id="freeDateCalendar" class="free-date-calendar" aria-label="自由行出行日期"></div>
    </section>
  </section>

  <div id="freeDateDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal drawer-lg free-date-drawer" role="dialog" aria-modal="true" aria-labelledby="freeDateDrawerTitle">
      <div class="modal-header">
        <div id="freeDateDrawerTitle" class="modal-title">维护出行日期</div>
        <button class="modal-close" type="button" data-close-free-date aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <input id="freeDateId" type="hidden">
        <section class="free-date-form-section">
          <div class="section-head compact">
            <h2>日期与售卖</h2>
          </div>
          <div class="form-row free-date-form-grid">
            <div class="form-group">
              <label class="form-label" for="freeDate">出行日期</label>
              <input id="freeDate" class="form-control" type="date">
            </div>
            <div class="form-group">
              <label class="form-label" for="freePackage">适用套餐</label>
              <select id="freePackage" class="form-control">
                <option>机票+酒店套餐</option>
                <option>纯酒店套餐</option>
                <option>酒店+接送机套餐</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="freeSaleStatus">销售状态</label>
              <select id="freeSaleStatus" class="form-control">
                <option>销售中</option>
                <option>待开放</option>
                <option>低库存</option>
                <option>停售</option>
                <option>售罄</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="freeStopTime">停售时间</label>
              <input id="freeStopTime" class="form-control" type="datetime-local">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeAdultPrice">成人价</label>
              <input id="freeAdultPrice" class="form-control" type="text">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeChildPrice">儿童价</label>
              <input id="freeChildPrice" class="form-control" type="text">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeSingleDiff">单房差</label>
              <input id="freeSingleDiff" class="form-control" type="text">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeSaleable">总可售量</label>
              <input id="freeSaleable" class="form-control" type="number" min="0">
            </div>
          </div>
        </section>

        <section class="free-date-form-section">
          <div class="section-head compact">
            <h2>资源确认</h2>
          </div>
          <div class="form-row free-date-form-grid">
            <div class="form-group">
              <label class="form-label" for="freeHotelRoomType">酒店房型</label>
              <input id="freeHotelRoomType" class="form-control" type="text">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeHotelAllotment">保留房量</label>
              <input id="freeHotelAllotment" class="form-control" type="number" min="0">
            </div>
            <div class="form-group">
              <label class="form-label" for="freeHotelConfirmMode">酒店确认方式</label>
              <select id="freeHotelConfirmMode" class="form-control">
                <option>房量确认</option>
                <option>下单二次确认</option>
                <option>实时确认</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="freeFlightMode">机票确认方式</label>
              <select id="freeFlightMode" class="form-control">
                <option>实时询位</option>
                <option>采购锁位</option>
                <option>客人自理</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="freeResourceStatus">资源确认状态</label>
              <select id="freeResourceStatus" class="form-control">
                <option>已确认</option>
                <option>待确认</option>
                <option>需补确认</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="freeSupplierDeadline">供应商确认截止</label>
              <input id="freeSupplierDeadline" class="form-control" type="datetime-local">
            </div>
          </div>
        </section>

        <section class="free-date-form-section">
          <div class="section-head compact">
            <h2>渠道与附加服务</h2>
          </div>
          <div class="form-row free-date-form-grid">
            <div class="form-group">
              <label class="form-label" for="freeChannelStatus">渠道状态</label>
              <select id="freeChannelStatus" class="form-control">
                <option>已同步</option>
                <option>未同步</option>
                <option>暂停同步</option>
              </select>
            </div>
            <div class="form-group form-group-full">
              <label class="form-label">可售渠道</label>
              <div class="free-channel-options">
                <label><input class="free-channel-check" type="checkbox" value="门店"> 门店</label>
                <label><input class="free-channel-check" type="checkbox" value="小程序"> 小程序</label>
                <label><input class="free-channel-check" type="checkbox" value="OTA"> OTA</label>
                <label><input class="free-channel-check" type="checkbox" value="代理"> 代理</label>
              </div>
            </div>
            <div class="form-group form-group-full">
              <label class="form-label">附加服务</label>
              <div class="free-channel-options">
                <label><input id="freeComponentTransfer" type="checkbox"> 接送机</label>
                <label><input id="freeComponentActivity" type="checkbox"> 当地玩乐</label>
                <label><input id="freeComponentInsurance" type="checkbox"> 保险</label>
              </div>
            </div>
            <div class="form-group form-group-full">
              <label class="form-label" for="freeDateRemark">备注</label>
              <textarea id="freeDateRemark" class="form-control" rows="3"></textarea>
            </div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-free-date>取消</button>
        <button id="saveFreeDate" class="btn btn-primary" type="button">保存出行日期</button>
      </div>
    </div>
  </div>

  <div id="freeResourceDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal drawer-lg free-resource-drawer" role="dialog" aria-modal="true" aria-labelledby="freeResourceDrawerTitle">
      <div class="modal-header">
        <div id="freeResourceDrawerTitle" class="modal-title">资源状态</div>
        <button class="modal-close" type="button" data-close-free-resource aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="description-grid free-resource-summary">
          <div class="description-item"><div class="description-label">线路</div><div id="resourceProduct" class="description-value">-</div></div>
          <div class="description-item"><div class="description-label">出行日期</div><div id="resourceTravelDate" class="description-value">-</div></div>
          <div class="description-item"><div class="description-label">套餐</div><div id="resourcePackage" class="description-value">-</div></div>
          <div class="description-item"><div class="description-label">当前状态</div><div id="resourceCurrentStatus" class="description-value">-</div></div>
        </div>
        <section class="table-wrap free-resource-table">
          <table>
            <thead>
              <tr>
                <th>资源项</th>
                <th>当前记录</th>
                <th>确认号</th>
                <th>状态</th>
                <th>待处理</th>
              </tr>
            </thead>
            <tbody id="freeResourceRows"></tbody>
          </table>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-free-resource>关闭</button>
        <button id="viewResourceOrders" class="btn btn-primary" type="button">查看该日订单</button>
      </div>
    </div>
  </div>

  <div id="freeBatchDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal free-date-batch-drawer" role="dialog" aria-modal="true" aria-labelledby="freeBatchDrawerTitle">
      <div class="modal-header">
        <div id="freeBatchDrawerTitle" class="modal-title">批量维护出行日期</div>
        <button class="modal-close" type="button" data-close-free-batch aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <input id="freeBatchMode" type="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="batchStartDate">开始日期</label>
            <input id="batchStartDate" class="form-control" type="date" value="2026-07-01">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchEndDate">结束日期</label>
            <input id="batchEndDate" class="form-control" type="date" value="2026-07-31">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchPackage">适用套餐</label>
            <select id="batchPackage" class="form-control">
              <option>机票+酒店套餐</option>
              <option>纯酒店套餐</option>
              <option>酒店+接送机套餐</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="batchSaleStatus">销售状态</label>
            <select id="batchSaleStatus" class="form-control">
              <option>销售中</option>
              <option>待开放</option>
              <option>停售</option>
            </select>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label">开放星期</label>
            <div class="free-batch-weekdays">
              <label><input type="checkbox" value="1" checked> 周一</label>
              <label><input type="checkbox" value="2" checked> 周二</label>
              <label><input type="checkbox" value="3" checked> 周三</label>
              <label><input type="checkbox" value="4" checked> 周四</label>
              <label><input type="checkbox" value="5" checked> 周五</label>
              <label><input type="checkbox" value="6" checked> 周六</label>
              <label><input type="checkbox" value="0" checked> 周日</label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="batchAdultPrice">成人价</label>
            <input id="batchAdultPrice" class="form-control" type="text" value="¥4,800">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchChildPrice">儿童价</label>
            <input id="batchChildPrice" class="form-control" type="text" value="¥4,200">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchSaleable">总可售量</label>
            <input id="batchSaleable" class="form-control" type="number" min="0" value="16">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchStopTime">停售时间</label>
            <input id="batchStopTime" class="form-control" type="datetime-local" value="2026-06-28T18:00">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-free-batch>取消</button>
        <button id="saveFreeBatch" class="btn btn-primary" type="button">确认批量维护</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var dateDrawer = document.getElementById('freeDateDrawer');
      var resourceDrawer = document.getElementById('freeResourceDrawer');
      var batchDrawer = document.getElementById('freeBatchDrawer');
      var calendarPanel = document.getElementById('freeCalendarPanel');
      var listPanel = document.getElementById('freeListPanel');
      var calendar = document.getElementById('freeDateCalendar');
      var rows = document.getElementById('freeDateRows');
      var currentView = params.get('tab') === 'calendar' ? 'calendar' : 'list';
      var context = readContext();
      var dateItems = readDateItems();

      function readStored(key, fallback) {
        try {
          var raw = window.localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (error) {
          return fallback;
        }
      }

      function writeStored(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {}
      }

      function readContext() {
        var stored = readStored('caesarFreeTravelContext', {});
        return {
          product: params.get('product') || stored.product || '巴黎自由行 5-7日',
          route: params.get('route') || stored.route || '机票+酒店套餐',
          supplier: params.get('supplier') || stored.supplier || '国际航空CA / 巴黎酒店直采',
          owner: params.get('owner') || stored.owner || '郑华'
        };
      }

      function defaultItems() {
        return [
          makeItem('2026-07-01', '机票+酒店套餐', '销售中', '¥4,800', '¥4,200', '¥900', 18, 6, '2026-06-28T18:00', '已确认', '已同步', '高级大床/双床', 18, '房量确认', '实时询位'),
          makeItem('2026-07-02', '机票+酒店套餐', '销售中', '¥4,800', '¥4,200', '¥900', 16, 4, '2026-06-29T18:00', '已确认', '已同步', '高级大床/双床', 16, '房量确认', '实时询位'),
          makeItem('2026-07-03', '机票+酒店套餐', '待开放', '¥5,200', '¥4,600', '¥980', 10, 0, '2026-06-30T18:00', '待确认', '未同步', '高级大床/双床', 10, '下单二次确认', '实时询位'),
          makeItem('2026-07-04', '酒店+接送机套餐', '销售中', '¥5,600', '¥5,000', '¥1,100', 8, 3, '2026-07-01T18:00', '已确认', '已同步', '埃菲尔景观房', 8, '房量确认', '客人自理'),
          makeItem('2026-07-05', '机票+酒店套餐', '低库存', '¥5,800', '¥5,200', '¥1,100', 4, 12, '2026-07-02T18:00', '需补确认', '已同步', '高级大床/双床', 4, '下单二次确认', '采购锁位'),
          makeItem('2026-07-06', '纯酒店套餐', '销售中', '¥3,600', '¥3,200', '¥760', 20, 5, '2026-07-03T18:00', '已确认', '已同步', '舒适双床', 20, '实时确认', '客人自理'),
          makeItem('2026-07-07', '纯酒店套餐', '停售', '¥3,700', '¥3,300', '¥760', 18, 2, '2026-07-04T18:00', '待确认', '暂停同步', '舒适双床', 18, '下单二次确认', '客人自理')
        ];
      }

      function makeItem(date, packageName, saleStatus, adultPrice, childPrice, singleDiff, saleable, sold, stopTime, resourceStatus, channelStatus, hotelRoomType, hotelAllotment, hotelConfirmMode, flightMode) {
        return {
          id: date + '-' + packageName,
          date: date,
          packageName: packageName,
          saleStatus: saleStatus,
          adultPrice: adultPrice,
          childPrice: childPrice,
          singleDiff: singleDiff,
          saleable: saleable,
          sold: sold,
          stopTime: stopTime,
          resourceStatus: resourceStatus,
          channelStatus: channelStatus,
          hotelRoomType: hotelRoomType,
          hotelAllotment: hotelAllotment,
          hotelConfirmMode: hotelConfirmMode,
          flightMode: flightMode,
          supplierDeadline: stopTime,
          channels: ['门店', '小程序'],
          transfer: packageName.indexOf('接送机') >= 0,
          activity: false,
          insurance: true,
          remark: ''
        };
      }

      function readDateItems() {
        var stored = readStored('caesarFreeTravelDateItems', null);
        return Array.isArray(stored) && stored.length ? stored : defaultItems();
      }

      function saveDateItems() {
        writeStored('caesarFreeTravelDateItems', dateItems);
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function (char) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
        });
      }

      function openLayer(target) {
        if (!target) return;
        if (window.caesarUI && window.caesarUI.openLayer) window.caesarUI.openLayer(target);
        else {
          target.classList.add('show');
          target.setAttribute('aria-hidden', 'false');
        }
      }

      function closeLayer(target) {
        if (!target) return;
        if (window.caesarUI && window.caesarUI.closeLayer) window.caesarUI.closeLayer(target);
        else {
          target.classList.remove('show');
          target.setAttribute('aria-hidden', 'true');
        }
      }

      function toast(message, type) {
        if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message, { type: type || 'success' });
      }

      function statusClass(status) {
        if (status === '销售中') return 'tag-green';
        if (status === '待开放') return 'tag-blue';
        if (status === '低库存') return 'tag-orange';
        if (status === '停售' || status === '售罄') return 'tag-red';
        return 'tag-gray';
      }

      function resourceClass(status) {
        if (status === '已确认') return 'tag-green';
        if (status === '需补确认') return 'tag-orange';
        return 'tag-blue';
      }

      function channelClass(status) {
        if (status === '已同步') return 'tag-green';
        if (status === '暂停同步') return 'tag-orange';
        return 'tag-gray';
      }

      function orderListUrl(item) {
        var query = new URLSearchParams();
        query.set('productType', 'free');
        query.set('product', context.product);
        query.set('travelDate', item.date);
        query.set('package', item.packageName);
        return '../sales/orders.html?' + query.toString();
      }

      function navigateTo(url) {
        if (window.caesarNavigateTo) window.caesarNavigateTo(url);
        else window.location.href = url;
      }

      function formatDate(date) {
        var parts = String(date).split('-');
        return parts.length === 3 ? parts[1] + '/' + parts[2] : date;
      }

      function weekday(date) {
        var names = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        return names[new Date(date + 'T00:00:00').getDay()];
      }

      function visibleItems() {
        var keyword = document.getElementById('filterKeyword').value.trim().toLowerCase();
        var packageValue = document.getElementById('filterPackage').value;
        var saleStatus = document.getElementById('filterSaleStatus').value;
        var resourceStatus = document.getElementById('filterResourceStatus').value;
        var channelStatus = document.getElementById('filterChannelStatus').value;
        return dateItems.filter(function (item) {
          var haystack = [item.date, item.packageName, item.saleStatus, item.resourceStatus, item.channelStatus].join(' ').toLowerCase();
          if (keyword && haystack.indexOf(keyword) < 0) return false;
          if (packageValue && item.packageName !== packageValue) return false;
          if (saleStatus && item.saleStatus !== saleStatus) return false;
          if (resourceStatus && item.resourceStatus !== resourceStatus) return false;
          if (channelStatus && item.channelStatus !== channelStatus) return false;
          return true;
        }).sort(function (a, b) {
          return a.date.localeCompare(b.date) || a.packageName.localeCompare(b.packageName);
        });
      }

      function renderCalendar() {
        var items = visibleItems();
        if (!items.length) {
          calendar.innerHTML = '<div class="empty-state">暂无符合条件的出行日期</div>';
          return;
        }
        calendar.innerHTML = items.map(function (item) {
          var available = Math.max(Number(item.saleable || 0) - Number(item.sold || 0), 0);
          var stateClass = item.saleStatus === '低库存' ? ' is-low' : '';
          stateClass += item.saleStatus === '停售' || item.saleStatus === '售罄' ? ' is-stopped' : '';
          return '<button class="free-date-card' + stateClass + '" type="button" data-edit-free-date="' + escapeHtml(item.id) + '">' +
            '<span class="free-date-card-head"><strong>' + escapeHtml(formatDate(item.date)) + '</strong><em>' + escapeHtml(weekday(item.date)) + '</em></span>' +
            '<span class="free-date-card-package">' + escapeHtml(item.packageName) + '</span>' +
            '<span class="free-date-card-price">' + escapeHtml(item.adultPrice) + '</span>' +
            '<span class="free-date-card-body"><span>可售 ' + available + '</span><span>已售 ' + escapeHtml(item.sold) + '</span></span>' +
            '<span class="free-date-card-foot"><span class="tag ' + statusClass(item.saleStatus) + '">' + escapeHtml(item.saleStatus) + '</span><span class="tag ' + resourceClass(item.resourceStatus) + '">' + escapeHtml(item.resourceStatus) + '</span></span>' +
          '</button>';
        }).join('');
      }

      function renderRows() {
        var items = visibleItems();
        if (!items.length) {
          rows.innerHTML = '<tr><td colspan="9" class="empty-cell">暂无符合条件的出行日期</td></tr>';
          return;
        }
        rows.innerHTML = items.map(function (item) {
          var available = Math.max(Number(item.saleable || 0) - Number(item.sold || 0), 0);
          return '<tr>' +
            '<td><strong>' + escapeHtml(item.date) + '</strong><br><span class="text-muted">' + escapeHtml(weekday(item.date)) + '</span></td>' +
            '<td>' + escapeHtml(item.packageName) + '</td>' +
            '<td><span class="tag ' + statusClass(item.saleStatus) + '">' + escapeHtml(item.saleStatus) + '</span></td>' +
            '<td>成人 ' + escapeHtml(item.adultPrice) + '<br><span class="text-muted">儿童 ' + escapeHtml(item.childPrice) + '</span></td>' +
            '<td>' + available + ' / ' + escapeHtml(item.sold) + '</td>' +
            '<td>' + escapeHtml(String(item.stopTime || '').replace('T', ' ')) + '</td>' +
            '<td><span class="tag ' + resourceClass(item.resourceStatus) + '">' + escapeHtml(item.resourceStatus) + '</span></td>' +
            '<td><span class="tag ' + channelClass(item.channelStatus) + '">' + escapeHtml(item.channelStatus) + '</span></td>' +
            '<td><div class="table-action"><button class="table-action-primary" type="button" data-edit-free-date="' + escapeHtml(item.id) + '">维护</button><button type="button" data-open-free-orders="' + escapeHtml(item.id) + '">订单</button><button type="button" data-open-resource-status="' + escapeHtml(item.id) + '">资源状态</button><button type="button" data-toggle-free-date="' + escapeHtml(item.id) + '">' + (item.saleStatus === '停售' ? '开放' : '停售') + '</button></div></td>' +
          '</tr>';
        }).join('');
      }

      function renderAll() {
        renderCalendar();
        renderRows();
      }

      function syncContext() {
        document.getElementById('contextProduct').textContent = context.product;
        document.getElementById('contextOwner').textContent = context.owner;
        document.getElementById('contextSupplier').textContent = context.supplier;
        writeStored('caesarFreeTravelContext', context);
      }

      function setView(view) {
        currentView = view;
        calendarPanel.classList.toggle('hidden', view !== 'calendar');
        listPanel.classList.toggle('hidden', view !== 'list');
        document.querySelectorAll('[data-free-view]').forEach(function (button) {
          button.classList.toggle('active', button.dataset.freeView === view);
        });
      }

      function findItem(id) {
        return dateItems.find(function (item) { return item.id === id; });
      }

      function openDateDrawer(item) {
        var data = item || makeItem('', context.route, '待开放', '¥4,800', '¥4,200', '¥900', 12, 0, '', '待确认', '未同步', '高级大床/双床', 12, '下单二次确认', '实时询位');
        document.getElementById('freeDateDrawerTitle').textContent = item ? '维护出行日期' : '新增出行日期';
        document.getElementById('freeDateId').value = data.id || '';
        document.getElementById('freeDate').value = data.date || '';
        document.getElementById('freePackage').value = data.packageName || context.route;
        document.getElementById('freeSaleStatus').value = data.saleStatus || '待开放';
        document.getElementById('freeStopTime').value = data.stopTime || '';
        document.getElementById('freeAdultPrice').value = data.adultPrice || '¥4,800';
        document.getElementById('freeChildPrice').value = data.childPrice || '¥4,200';
        document.getElementById('freeSingleDiff').value = data.singleDiff || '¥900';
        document.getElementById('freeSaleable').value = data.saleable || 0;
        document.getElementById('freeHotelRoomType').value = data.hotelRoomType || '';
        document.getElementById('freeHotelAllotment').value = data.hotelAllotment || 0;
        document.getElementById('freeHotelConfirmMode').value = data.hotelConfirmMode || '下单二次确认';
        document.getElementById('freeFlightMode').value = data.flightMode || '实时询位';
        document.getElementById('freeResourceStatus').value = data.resourceStatus || '待确认';
        document.getElementById('freeSupplierDeadline').value = data.supplierDeadline || '';
        document.getElementById('freeChannelStatus').value = data.channelStatus || '未同步';
        document.getElementById('freeDateRemark').value = data.remark || '';
        document.getElementById('freeComponentTransfer').checked = !!data.transfer;
        document.getElementById('freeComponentActivity').checked = !!data.activity;
        document.getElementById('freeComponentInsurance').checked = data.insurance !== false;
        document.querySelectorAll('.free-channel-check').forEach(function (checkbox) {
          checkbox.checked = (data.channels || []).indexOf(checkbox.value) >= 0;
        });
        openLayer(dateDrawer);
      }

      function saveDateFromDrawer() {
        var date = document.getElementById('freeDate').value;
        var packageName = document.getElementById('freePackage').value;
        if (!date) {
          toast('请先选择出行日期', 'warning');
          return;
        }
        var id = document.getElementById('freeDateId').value || date + '-' + packageName;
        var item = findItem(id);
        var payload = {
          id: id,
          date: date,
          packageName: packageName,
          saleStatus: document.getElementById('freeSaleStatus').value,
          stopTime: document.getElementById('freeStopTime').value,
          adultPrice: document.getElementById('freeAdultPrice').value,
          childPrice: document.getElementById('freeChildPrice').value,
          singleDiff: document.getElementById('freeSingleDiff').value,
          saleable: Number(document.getElementById('freeSaleable').value || 0),
          sold: item ? item.sold : 0,
          hotelRoomType: document.getElementById('freeHotelRoomType').value,
          hotelAllotment: Number(document.getElementById('freeHotelAllotment').value || 0),
          hotelConfirmMode: document.getElementById('freeHotelConfirmMode').value,
          flightMode: document.getElementById('freeFlightMode').value,
          resourceStatus: document.getElementById('freeResourceStatus').value,
          supplierDeadline: document.getElementById('freeSupplierDeadline').value,
          channelStatus: document.getElementById('freeChannelStatus').value,
          channels: Array.from(document.querySelectorAll('.free-channel-check:checked')).map(function (checkbox) { return checkbox.value; }),
          transfer: document.getElementById('freeComponentTransfer').checked,
          activity: document.getElementById('freeComponentActivity').checked,
          insurance: document.getElementById('freeComponentInsurance').checked,
          remark: document.getElementById('freeDateRemark').value
        };
        if (item) Object.assign(item, payload);
        else dateItems.push(payload);
        saveDateItems();
        renderAll();
        closeLayer(dateDrawer);
        toast('出行日期已保存');
      }

      function toggleSaleStatus(id) {
        var item = findItem(id);
        if (!item) return;
        item.saleStatus = item.saleStatus === '停售' ? '销售中' : '停售';
        item.channelStatus = item.saleStatus === '停售' ? '暂停同步' : '未同步';
        saveDateItems();
        renderAll();
        toast(item.saleStatus === '停售' ? '已停售' : '已重新开放');
      }

      function resourceRowsForItem(item) {
        var hotelStatus = item.resourceStatus === '需补确认' ? ['房量不足', 'tag tag-orange', '补供应商确认号或调整可售量'] : item.resourceStatus === '待确认' ? ['待确认', 'tag tag-blue', '催酒店供应商确认房态'] : ['已确认', 'tag tag-green', '无'];
        var flightStatus = item.flightMode === '采购锁位' && item.resourceStatus !== '已确认' ? ['待出票确认', 'tag tag-orange', '确认锁位与出票时限'] : item.flightMode === '客人自理' ? ['客人自理', 'tag tag-gray', '无'] : ['已询位', 'tag tag-green', '关注航变提醒'];
        var transferStatus = item.transfer ? ['待派车确认', item.resourceStatus === '已确认' ? 'tag tag-blue' : 'tag tag-orange', '回填用车确认号'] : ['未包含', 'tag tag-gray', '无'];
        var activityStatus = item.activity ? ['待预约确认', 'tag tag-blue', '确认当地玩乐名额'] : ['未包含', 'tag tag-gray', '无'];
        return [
          ['酒店', item.hotelRoomType || '标准房型', item.resourceStatus === '已确认' ? 'HTL-' + item.date.replace(/-/g, '') : '待回传', hotelStatus[0], hotelStatus[1], hotelStatus[2]],
          ['机票', item.flightMode || '实时询位', item.flightMode === '客人自理' ? '-' : 'FLT-' + item.date.replace(/-/g, ''), flightStatus[0], flightStatus[1], flightStatus[2]],
          ['接送机', item.transfer ? '机场接送1车' : '不含接送机', item.transfer ? 'TRF-' + item.date.replace(/-/g, '') : '-', transferStatus[0], transferStatus[1], transferStatus[2]],
          ['当地玩乐', item.activity ? '巴黎城市游' : '未配置', item.activity ? 'ACT-' + item.date.replace(/-/g, '') : '-', activityStatus[0], activityStatus[1], activityStatus[2]]
        ];
      }

      function openResourceDrawer(item) {
        if (!item) return;
        document.getElementById('freeResourceDrawerTitle').textContent = item.date + ' 资源状态';
        document.getElementById('resourceProduct').textContent = context.product;
        document.getElementById('resourceTravelDate').textContent = item.date + ' ' + weekday(item.date);
        document.getElementById('resourcePackage').textContent = item.packageName;
        document.getElementById('resourceCurrentStatus').innerHTML = '<span class="tag ' + resourceClass(item.resourceStatus) + '">' + escapeHtml(item.resourceStatus) + '</span>';
        document.getElementById('freeResourceRows').innerHTML = resourceRowsForItem(item).map(function (row) {
          return '<tr><td>' + escapeHtml(row[0]) + '</td><td>' + escapeHtml(row[1]) + '</td><td>' + escapeHtml(row[2]) + '</td><td><span class="' + row[4] + '">' + escapeHtml(row[3]) + '</span></td><td>' + escapeHtml(row[5]) + '</td></tr>';
        }).join('');
        document.getElementById('viewResourceOrders').dataset.orderUrl = orderListUrl(item);
        openLayer(resourceDrawer);
      }

      function openBatchDrawer(mode) {
        var titleMap = { open: '批量开放日期', price: '批量调价', stop: '批量停售' };
        document.getElementById('freeBatchDrawerTitle').textContent = titleMap[mode] || '批量维护出行日期';
        document.getElementById('freeBatchMode').value = mode;
        document.getElementById('batchSaleStatus').value = mode === 'stop' ? '停售' : '销售中';
        openLayer(batchDrawer);
      }

      function datesBetween(start, end, weekdays) {
        var result = [];
        var current = new Date(start + 'T00:00:00');
        var last = new Date(end + 'T00:00:00');
        while (current <= last) {
          if (weekdays.indexOf(String(current.getDay())) >= 0) result.push(current.toISOString().slice(0, 10));
          current.setDate(current.getDate() + 1);
        }
        return result;
      }

      function saveBatch() {
        var mode = document.getElementById('freeBatchMode').value;
        var start = document.getElementById('batchStartDate').value;
        var end = document.getElementById('batchEndDate').value;
        var weekdays = Array.from(document.querySelectorAll('.free-batch-weekdays input:checked')).map(function (checkbox) { return checkbox.value; });
        var packageName = document.getElementById('batchPackage').value;
        if (!start || !end || start > end || !weekdays.length) {
          toast('请检查日期范围和开放星期', 'warning');
          return;
        }
        datesBetween(start, end, weekdays).forEach(function (date) {
          var id = date + '-' + packageName;
          var item = findItem(id);
          if (!item) {
            item = makeItem(date, packageName, '待开放', document.getElementById('batchAdultPrice').value, document.getElementById('batchChildPrice').value, '¥900', Number(document.getElementById('batchSaleable').value || 0), 0, document.getElementById('batchStopTime').value, '待确认', '未同步', '高级大床/双床', Number(document.getElementById('batchSaleable').value || 0), '下单二次确认', packageName === '纯酒店套餐' ? '客人自理' : '实时询位');
            dateItems.push(item);
          }
          if (mode === 'price' || mode === 'open') {
            item.adultPrice = document.getElementById('batchAdultPrice').value;
            item.childPrice = document.getElementById('batchChildPrice').value;
            item.saleable = Number(document.getElementById('batchSaleable').value || item.saleable);
          }
          item.saleStatus = mode === 'stop' ? '停售' : document.getElementById('batchSaleStatus').value;
          item.stopTime = document.getElementById('batchStopTime').value;
          item.channelStatus = item.saleStatus === '停售' ? '暂停同步' : '未同步';
        });
        saveDateItems();
        renderAll();
        closeLayer(batchDrawer);
        toast('批量维护已完成');
      }

      function bindEvents() {
        document.getElementById('openFreeDateDrawer').addEventListener('click', function () {
          openDateDrawer(null);
        });
        document.getElementById('saveFreeDate').addEventListener('click', saveDateFromDrawer);
        document.getElementById('saveFreeBatch').addEventListener('click', saveBatch);
        document.getElementById('applyFreeFilters').addEventListener('click', renderAll);
        document.getElementById('filterKeyword').addEventListener('keydown', function (event) {
          if (event.key === 'Enter') renderAll();
        });
        document.querySelectorAll('[data-free-view]').forEach(function (button) {
          button.addEventListener('click', function () {
            setView(button.dataset.freeView);
          });
        });
        document.querySelectorAll('[data-close-free-date]').forEach(function (button) {
          button.addEventListener('click', function () { closeLayer(dateDrawer); });
        });
        document.querySelectorAll('[data-close-free-batch]').forEach(function (button) {
          button.addEventListener('click', function () { closeLayer(batchDrawer); });
        });
        document.querySelectorAll('[data-close-free-resource]').forEach(function (button) {
          button.addEventListener('click', function () { closeLayer(resourceDrawer); });
        });
        document.getElementById('viewResourceOrders').addEventListener('click', function () {
          navigateTo(this.dataset.orderUrl || '../sales/orders.html?productType=free');
        });
        document.querySelectorAll('[data-open-batch]').forEach(function (button) {
          button.addEventListener('click', function () {
            document.querySelector('.free-batch-menu').classList.remove('open');
            openBatchDrawer(button.dataset.openBatch);
          });
        });
        document.querySelector('[data-export-free-dates]').addEventListener('click', function () {
          document.querySelector('.free-batch-menu').classList.remove('open');
          toast('日期价格已加入导出任务');
        });
        document.getElementById('freeBatchMenuToggle').addEventListener('click', function (event) {
          event.stopPropagation();
          document.querySelector('.free-batch-menu').classList.toggle('open');
        });
        document.addEventListener('click', function () {
          document.querySelector('.free-batch-menu').classList.remove('open');
        });
        document.addEventListener('click', function (event) {
          var editButton = event.target.closest('[data-edit-free-date]');
          if (editButton) openDateDrawer(findItem(editButton.dataset.editFreeDate));
          var toggleButton = event.target.closest('[data-toggle-free-date]');
          if (toggleButton) toggleSaleStatus(toggleButton.dataset.toggleFreeDate);
          var orderButton = event.target.closest('[data-open-free-orders]');
          if (orderButton) {
            var orderItem = findItem(orderButton.dataset.openFreeOrders);
            if (orderItem) navigateTo(orderListUrl(orderItem));
          }
          var resourceButton = event.target.closest('[data-open-resource-status]');
          if (resourceButton) openResourceDrawer(findItem(resourceButton.dataset.openResourceStatus));
        });
        [dateDrawer, batchDrawer, resourceDrawer].forEach(function (drawer) {
          drawer.addEventListener('click', function (event) {
            if (event.target === drawer) closeLayer(drawer);
          });
        });
      }

      syncContext();
      setView(currentView);
      renderAll();
      bindEvents();
    })();
  </script>
</body>
</html>
