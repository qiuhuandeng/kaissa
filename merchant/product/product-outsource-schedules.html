<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代理团期 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="product-schedule-page outsource-schedule-page">
    <section class="page-workbar product-schedule-workbar">
      <div class="page-title-row">
        <a class="page-back-link" href="product-outsource-list.html">返回</a>
        <h1 class="page-title">代理团期</h1>
      </div>
      <div class="btn-group">
        <a id="outsourceProductDetailLink" class="btn btn-secondary" href="product-outsource-detail.html">代理产品详情</a>
      </div>
    </section>

    <section class="card product-schedule-hero" aria-label="当前代理产品信息">
      <figure class="product-schedule-cover">
        <img id="summaryProductCover" src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=900&q=80" alt="代理产品封面">
        <figcaption class="product-schedule-cover-overlay">
          <span id="summaryProductStatus" class="tag tag-green">销售中</span>
          <strong id="summaryProductName">-</strong>
          <small id="summaryProductMeta">-</small>
        </figcaption>
      </figure>
      <div class="product-schedule-info">
        <div class="product-schedule-field-grid">
          <div class="product-schedule-field"><span>来源供应商</span><strong id="summarySupplier">-</strong></div>
          <div class="product-schedule-field"><span>产品类型</span><strong id="summaryProductType">-</strong></div>
          <div class="product-schedule-field"><span>出发地</span><strong id="summaryDeparture">-</strong></div>
          <div class="product-schedule-field"><span>目的地</span><strong id="summaryDestination">-</strong></div>
          <div class="product-schedule-field"><span>销售范围</span><strong id="summarySaleScope">-</strong></div>
        </div>
        <div class="product-schedule-context">
          <div class="product-schedule-sale-metric">
            <span>当前可售</span>
            <div><strong id="summarySaleCount">0</strong><em id="summarySaleObject">个团期</em></div>
          </div>
          <div id="summaryScheduleStats" class="product-schedule-context-stat">-</div>
          <div id="summaryOwnerLine" class="product-schedule-context-audit">-</div>
        </div>
      </div>
    </section>

    <section class="product-schedule-route-section" aria-label="代理产品线路">
      <div id="outsourceScheduleRoutes" class="product-schedule-route-grid"></div>
    </section>

    <section class="filter-card filter-card-compact product-schedule-filter-surface" aria-label="代理团期筛选">
      <div class="filter-row">
        <div class="filter-item filter-item-search product-schedule-filter-keyword">
          <label class="sr-only" for="scheduleKeyword">团期编号/线路名称</label>
          <input id="scheduleKeyword" type="text" placeholder="团期编号/线路名称">
        </div>
        <div class="filter-item-sm">
          <label class="sr-only" for="scheduleStatusFilter">销售状态</label>
          <select id="scheduleStatusFilter">
            <option value="">全部状态</option>
            <option>审核中</option>
            <option>销售中</option>
            <option>停售</option>
          </select>
        </div>
        <div class="filter-item-sm">
          <label class="sr-only" for="priceLockFilter">售价状态</label>
          <select id="priceLockFilter">
            <option value="">全部售价状态</option>
            <option>待定价</option>
            <option>未锁定</option>
            <option>审核中</option>
            <option>已锁定</option>
          </select>
        </div>
        <label class="filter-check"><input id="hideStoppedSchedules" type="checkbox" checked> 隐藏停售</label>
        <div class="filter-actions">
          <button id="resetScheduleFilters" class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="list-surface product-schedule-table-surface" data-list-surface>
      <section class="table-wrap list-surface-table list-table-with-pagination product-schedule-table-wrap" aria-label="代理团期列表">
        <table class="product-schedule-table agency-product-schedule-table">
          <colgroup>
            <col class="agency-schedule-col-code">
            <col class="agency-schedule-col-route">
            <col class="agency-schedule-col-date">
            <col class="agency-schedule-col-deadline">
            <col class="agency-schedule-col-stock">
            <col class="agency-schedule-col-settlement">
            <col class="agency-schedule-col-price">
            <col class="agency-schedule-col-lock">
            <col class="agency-schedule-col-status">
            <col class="agency-schedule-col-confirm">
            <col class="agency-schedule-col-action">
          </colgroup>
          <thead>
            <tr>
              <th id="scheduleCodeHead">代理团期</th>
              <th>使用线路</th>
              <th>出发/返回</th>
              <th>报名截止</th>
              <th>名额/已售</th>
              <th>供应商结算价</th>
              <th>我方销售价</th>
              <th>售价状态</th>
              <th>销售状态</th>
              <th>供应商确认</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="productScheduleRows"></tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span id="productSchedulePager">0条</span>
      </div>
    </section>
  </main>

  <div id="schedulePriceDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outsource-product-modal outsource-price-modal" role="dialog" aria-modal="true" aria-labelledby="schedulePriceTitle">
      <div class="modal-header">
        <div id="schedulePriceTitle" class="modal-title">设置定价</div>
        <button class="modal-close" type="button" data-close-price aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">代理团期</h3>
          </div>
          <div id="schedulePriceSummary" class="description-grid"></div>
        </section>
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">本次定价</h3>
          </div>
          <div class="table-wrap product-outsource-drawer-table">
            <table class="outsource-price-matrix-table">
              <colgroup>
                <col class="outsource-price-col-item">
                <col class="outsource-price-col-settlement">
                <col class="outsource-price-col-sale">
                <col class="outsource-price-col-status">

              <tbody id="schedulePriceMatrixRows"></tbody>
            </table>
          </div>
          <div class="form-grid outsource-price-reason-grid">
            <div class="form-group form-group-full"><label class="form-label" for="schedulePriceRemark">定价原因</label><textarea id="schedulePriceRemark" class="form-control" rows="3"></textarea></div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-price>取消</button>
        <button id="saveSchedulePrice" class="btn btn-secondary" type="button">保存草稿</button>
        <button id="submitSchedulePriceReview" class="btn btn-primary" type="button">提交开售审核</button>
      </div>
    </div>
  </div>

  <div id="scheduleDetailDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outsource-schedule-detail-drawer" role="dialog" aria-modal="true" aria-labelledby="scheduleDetailTitle">
      <div class="modal-header">
        <div id="scheduleDetailTitle" class="modal-title">代理团期详情</div>
        <button class="modal-close" type="button" data-close-detail aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">代理团期</h3>
          </div>
          <div id="scheduleDetailSummary" class="description-grid"></div>
        </section>
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">订单占用</h3>
          </div>
          <div class="table-wrap product-outsource-drawer-table">
            <table>
              <thead><tr><th>订单号</th><th>客户/渠道</th><th>占用</th><th>收款</th></tr></thead>
              <tbody id="scheduleOrderRows"></tbody>
            </table>
          </div>
        </section>
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">操作记录</h3>
          </div>
          <div id="scheduleLogRows" class="timeline-list"></div>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-detail>关闭</button>
      </div>
    </div>
  </div>

  <div id="stopScheduleModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm outsource-stop-modal" role="dialog" aria-modal="true" aria-labelledby="stopScheduleTitle">
      <div class="modal-header">
        <div id="stopScheduleTitle" class="modal-title">停售团期</div>
        <button class="modal-close" type="button" data-close-stop aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div id="stopScheduleSummary" class="outsource-stop-summary"></div>
        <div class="form-group outsource-stop-reason"><label class="form-label" for="stopScheduleReason">停售原因</label><textarea id="stopScheduleReason" class="form-control" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-stop>取消</button>
        <button id="confirmStopSchedule" class="btn btn-warning" type="button">确认停售</button>
      </div>
    </div>
  </div>

          return [
            { name: '软卧下铺 成人', settlement: settlementLabel('软卧下铺', base || 4800), value: item.salePrice || 0, enabled: true },
            { name: '软卧上铺 成人', settlement: settlementLabel('软卧上铺', Math.max((base || 4800) - 400, 0)), value: Math.max(Number(item.salePrice || 0) - 600, 0), enabled: true },
            { name: '硬卧 成人', settlement: settlementLabel('硬卧', Math.max((base || 4800) - 1200, 0)), value: Math.max(Number(item.salePrice || 0) - 1800, 0), enabled: true },
            { name: '儿童占铺', settlement: settlementLabel('儿童占铺', Math.max((base || 4800) - 900, 0)), value: item.childPrice || 0, enabled: true },
            { name: '儿童不占铺', settlement: settlementLabel('儿童不占铺', 1200), value: 1800, enabled: true }
          ];
        }
        if (product.type === '自由行') {
          return [
            { name: '基础套餐', settlement: settlementLabel('基础套餐', base || 3200), value: item.salePrice || 0, enabled: true },
            { name: '亲子套餐', settlement: settlementLabel('亲子套餐', (base || 3200) + 900), value: item.childPrice || item.salePrice || 0, enabled: true },
            { name: '房型升级差', settlement: settlementLabel('升级差', 600), value: item.singleRoom || 0, enabled: true },
            { name: '加住一晚', settlement: settlementLabel('加住一晚', 680), value: 980, enabled: false }
          ];
        }
        if (product.type === '单项服务') {
          return [
            { name: '标准办理', settlement: settlementLabel('标准办理', base || 480), value: item.salePrice || 0, enabled: true },
            { name: '加急办理', settlement: settlementLabel('加急办理', (base || 480) + 260), value: Number(item.salePrice || 0) + 360, enabled: true }
          ];
        }
        return [
          { name: '成人', settlement: settlementLabel('成人', base || 4900), value: item.salePrice || 0, enabled: true },
          { name: '儿童占床', settlement: settlementLabel('儿童占床', Math.max((base || 4900) - 1000, 0)), value: item.childPrice || 0, enabled: true },
          { name: '儿童不占床', settlement: settlementLabel('儿童不占床', Math.max((base || 4900) - 1600, 0)), value: Math.max(Number(item.childPrice || 0) - 600, 0), enabled: true },
          { name: '单房差', settlement: settlementLabel('单房差', Math.max(Math.round((base || 4900) * 0.25), 0)), value: item.singleRoom || 0, enabled: true }
        ];
      }

      function renderPriceMatrix(item) {
        document.getElementById('schedulePriceMatrixRows').innerHTML = priceItemsFor(item).map(function (priceItem, index) {
          return [
            '<tr>',
            '<td><strong>' + escapeHtml(priceItem.name) + '</strong></td>',
            '<td>' + escapeHtml(priceItem.settlement) + '</td>',
            '<td><input class="table-input" type="number" min="0" value="' + Number(priceItem.value || 0) + '" data-price-item-value data-price-index="' + index + '"></td>',
            '<td><select class="form-control" data-price-item-enabled><option' + (priceItem.enabled ? ' selected' : '') + '>销售</option><option' + (!priceItem.enabled ? ' selected' : '') + '>不售</option></select></td>',
            '</tr>'
          ].join('');
        }).join('');
      }

      function priceSummaryText(item) {
        if (item.priceStatus === '待定价') return '<strong>待定价</strong><span>需按' + product.objectName + '价格矩阵维护</span>';
        if (product.type === '邮轮') return '<strong>阳台舱 ' + escapeHtml(money(item.salePrice)) + '</strong><span>儿童占位 ' + escapeHtml(money(item.childPrice)) + ' / 儿童不占位 ¥3,800</span>';
        if (product.type === '专列') return '<strong>软卧下铺 ' + escapeHtml(money(item.salePrice)) + '</strong><span>儿童占铺 ' + escapeHtml(money(item.childPrice)) + ' / 不占铺 ¥1,800</span>';
        if (product.type === '自由行') return '<strong>基础套餐 ' + escapeHtml(money(item.salePrice)) + '</strong><span>亲子套餐 ' + escapeHtml(money(item.childPrice)) + '</span>';
        return '<strong>成人 ' + escapeHtml(money(item.salePrice)) + '</strong><span>儿童 ' + escapeHtml(money(item.childPrice)) + ' / 单房差 ' + escapeHtml(money(item.singleRoom)) + '</span>';
      }

      function toast(message) {
        if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message);
      }

      function openLayer(modal) {
        if (window.caesarUI && window.caesarUI.openLayer) window.caesarUI.openLayer(modal);
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeLayer(modal) {
        if (window.caesarUI && window.caesarUI.closeLayer) window.caesarUI.closeLayer(modal);
        else modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }

      function tagClass(status) {
        if (status === '销售中' || status === '已确认' || status === '已锁定') return 'tag tag-green';
        if (status === '审核中' || status === '待确认' || status === '未锁定' || status === '待定价') return 'tag tag-blue';
        if (status === '停售' || status === '已关闭') return 'tag tag-gray';
        return 'tag tag-gray';
      }

      function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      function saleCount() {
        return product.schedules.filter(function (item) { return item.status === '销售中'; }).length;
      }

      function routeStats(route) {
        var list = product.schedules.filter(function (item) { return item.route === route.name; });
        var saleRows = list.filter(function (item) { return item.status === '销售中'; });
        var sold = list.reduce(function (sum, item) { return sum + Number(item.sold || 0); }, 0);
        var nextDepart = saleRows.map(function (item) { return item.depart; }).sort()[0] || list.map(function (item) { return item.depart; }).sort()[0] || '暂无';
        return { total: list.length, saleCount: saleRows.length, sold: sold, nextDepart: nextDepart };
      }

      function renderRoutes() {
        var routeList = product.routes || [];
        document.getElementById('outsourceScheduleRoutes').innerHTML = routeList.map(function (route) {
          var stats = routeStats(route);
          return [
            '<button class="product-schedule-route-card' + (activeRoute === route.name ? ' active' : '') + '" type="button" data-route-filter="' + escapeHtml(route.name) + '">',
            '<strong>' + escapeHtml(route.name) + '</strong>',
            '<span>' + escapeHtml(stats.saleCount + '个可售' + product.objectName + ' / 已售' + stats.sold + product.unit) + '</span>',
            '<em>最近 ' + escapeHtml(stats.nextDepart) + '</em>',
            '</button>'
          ].join('');
        }).join('');
      }

      function renderSummary() {
        var nextDepart = product.schedules.filter(function (item) { return item.status === '销售中'; }).map(function (item) { return item.depart; }).sort()[0] || '暂无';
        document.title = product.name + ' - 代理团期 - 凯撒旅游';
        document.getElementById('outsourceProductDetailLink').href = product.detailHref;
        document.getElementById('summaryProductCover').src = product.cover;
        document.getElementById('summaryProductCover').alt = product.name + '封面';
        setText('summaryProductName', product.name);
        setText('summaryProductMeta', product.type + ' · 代理产品');
        setText('summarySupplier', product.supplier);
        setText('summaryProductType', product.type);
        setText('summaryDeparture', product.departure);
        setText('summaryDestination', product.destination);
        setText('summarySaleScope', product.scope);
        setText('summarySaleCount', saleCount());
        setText('summarySaleObject', '个' + product.objectName);
        setText('summaryScheduleStats', (product.routes || []).length + '条线路 / 共' + product.schedules.length + '个' + product.objectName + ' / ' + product.schedules.filter(function (item) { return item.priceStatus !== '已锁定'; }).length + '个待定价或待审核');
        setText('summaryOwnerLine', '操作人 ' + product.owner + ' · 最近出发 ' + nextDepart);
        setText('scheduleCodeHead', '代理' + product.objectName);
        document.getElementById('summaryProductStatus').textContent = product.status;
        document.getElementById('summaryProductStatus').className = tagClass(product.status);
      }

      function filteredSchedules() {
        var keyword = document.getElementById('scheduleKeyword').value.trim().toLowerCase();
        var status = document.getElementById('scheduleStatusFilter').value;
        var priceLock = document.getElementById('priceLockFilter').value;
        var hideStopped = document.getElementById('hideStoppedSchedules').checked;
        return product.schedules.filter(function (item) {
          if (activeRoute !== '__all' && item.route !== activeRoute) return false;
          if (keyword && [item.no, item.route, item.routeMeta, item.depart, item.back, product.name].join(' ').toLowerCase().indexOf(keyword) < 0) return false;
          if (status && item.status !== status) return false;
          if (priceLock && item.priceStatus !== priceLock) return false;
          if (hideStopped && item.status === '停售') return false;
          return true;
        });
      }

      function actionHtml(item) {
        var parts = [];
        if (item.priceStatus === '待定价' || item.priceStatus === '未锁定') {
          parts.push('<button class="table-action-primary" type="button" data-open-price data-schedule-no="' + escapeHtml(item.no) + '">设置定价</button>');
        } else {
          parts.push('<button class="table-action-primary" type="button" data-open-price data-schedule-no="' + escapeHtml(item.no) + '">' + (item.priceStatus === '审核中' ? '查看定价' : item.priceStatus === '已锁定' ? '改价申请' : '设置定价') + '</button>');
        }
        if (item.priceStatus === '未锁定') {
          parts.push('<button type="button" data-submit-price-review data-schedule-no="' + escapeHtml(item.no) + '">提交开售审核</button>');
        }
        if (item.priceStatus === '已锁定') {
          parts.push('<button type="button" data-submit-price-review data-schedule-no="' + escapeHtml(item.no) + '">提交改价审核</button>');
        }
        if (item.status === '停售') {
          parts.push('<button type="button" data-restore-schedule data-schedule-no="' + escapeHtml(item.no) + '">恢复销售</button>');
        } else {
          parts.push('<button type="button" data-open-stop data-schedule-no="' + escapeHtml(item.no) + '">停售团期</button>');
        }
        parts.push('<button type="button" data-open-detail data-schedule-no="' + escapeHtml(item.no) + '">详情</button>');
        return parts.join('');
      }

      function renderRows() {
        var list = filteredSchedules();
        scheduleRows.innerHTML = list.map(function (item) {
          var left = Math.max(Number(item.quota || 0) - Number(item.sold || 0), 0);
          return [
            '<tr data-schedule-no="' + escapeHtml(item.no) + '">',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.no) + '</strong><span>' + escapeHtml(product.name) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.route || '-') + '</strong><span>' + escapeHtml(item.routeMeta || product.name) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.depart) + '</strong><span>返回 ' + escapeHtml(item.back) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.deadline) + '</strong><span>截止报名</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(left + '/' + item.quota + product.unit) + '</strong><span>已售 ' + escapeHtml(item.sold + product.unit) + '</span></div></td>',
            '<td><strong>' + escapeHtml(item.settlement) + '</strong></td>',
            '<td><div class="table-cell-main">' + priceSummaryText(item) + '</div></td>',
            '<td><span class="' + tagClass(item.priceStatus) + '">' + escapeHtml(item.priceStatus) + '</span></td>',
            '<td><span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span></td>',
            '<td><div class="table-cell-main"><strong><span class="' + tagClass(item.confirm) + '">' + escapeHtml(item.confirm) + '</span></strong><span>' + escapeHtml(item.confirmNo || '-') + '</span></div></td>',
            '<td><div class="table-action">' + actionHtml(item) + '</div></td>',
            '</tr>'
          ].join('');
        }).join('');
        if (!list.length) {
          scheduleRows.innerHTML = '<tr><td colspan="11" class="text-muted">当前线路暂无符合条件的代理团期</td></tr>';
        }
        document.getElementById('productSchedulePager').textContent = list.length + '条';
        renderRoutes();
        renderSummary();
      }

      function findSchedule(no) {
        return product.schedules.find(function (item) { return item.no === no; }) || product.schedules[0];
      }

      function description(items) {
        return items.map(function (item) {
          return '<div class="description-item"><div class="description-label">' + escapeHtml(item[0]) + '</div><div class="description-value">' + item[1] + '</div></div>';
        }).join('');
      }

      function scheduleSummary(item) {
        return description([
          ['代理团期', escapeHtml(item.no)],
          ['出发/返回', escapeHtml(item.depart + ' / ' + item.back)],
          ['代理产品', escapeHtml(product.name)],
          ['销售状态', '<span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span>'],
          ['售价状态', '<span class="' + tagClass(item.priceStatus) + '">' + escapeHtml(item.priceStatus) + '</span>'],
          ['供应商确认', '<span class="' + tagClass(item.confirm) + '">' + escapeHtml(item.confirm) + '</span>']
        ]);
      }

      function stopScheduleSummary(item) {
        var left = Math.max(Number(item.quota || 0) - Number(item.sold || 0), 0);
        return [
          '<div class="outsource-stop-object">',
          '<strong>' + escapeHtml(item.no) + '</strong>',
          '<span>' + escapeHtml(product.name + ' · ' + item.depart + ' / ' + item.back) + '</span>',
          '</div>',
          '<div class="outsource-stop-metrics">',
          '<div><span>销售状态</span><strong><span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span></strong></div>',
          '<div><span>售价状态</span><strong><span class="' + tagClass(item.priceStatus) + '">' + escapeHtml(item.priceStatus) + '</span></strong></div>',
          '<div><span>剩余/总名额</span><strong>' + escapeHtml(left + '/' + item.quota + product.unit) + '</strong></div>',
          '<div><span>供应商确认</span><strong><span class="' + tagClass(item.confirm) + '">' + escapeHtml(item.confirm) + '</span></strong></div>',
          '</div>'
        ].join('');
      }

      function openPrice(no) {
        var item = findSchedule(no);
        activeScheduleNo = item.no;
        document.getElementById('schedulePriceSummary').innerHTML = scheduleSummary(item);
        renderPriceMatrix(item);
        document.getElementById('submitSchedulePriceReview').textContent = item.priceStatus === '已锁定' ? '提交改价审核' : '提交开售审核';
        document.getElementById('schedulePriceRemark').value = '';
        openLayer(priceDrawer);
      }

      function openDetail(no) {
        var item = findSchedule(no);
        document.getElementById('scheduleDetailSummary').innerHTML = scheduleSummary(item) + description([
          ['供应商结算价', escapeHtml(item.settlement)],
          ['我方销售价', item.priceStatus === '待定价' ? '待定价' : escapeHtml(money(item.salePrice)) + ' 起'],
          ['名额/已售', escapeHtml(item.quota + product.unit + ' / 已售' + item.sold + product.unit)],
          ['报名截止', escapeHtml(item.deadline)]
        ]);
        document.getElementById('scheduleOrderRows').innerHTML = item.orders.length ? item.orders.map(function (row) {
          return '<tr><td>' + escapeHtml(row[0]) + '</td><td>' + escapeHtml(row[1]) + '</td><td>' + escapeHtml(row[2]) + '</td><td><span class="' + tagClass(row[3]) + '">' + escapeHtml(row[3]) + '</span></td></tr>';
        }).join('') : '<tr><td colspan="4" class="text-muted">暂无订单占用</td></tr>';
        document.getElementById('scheduleLogRows').innerHTML = item.logs.map(function (row) {
          return '<div class="timeline-item"><strong>' + escapeHtml(row[0]) + '</strong><span>' + escapeHtml(row[1]) + '</span></div>';
        }).join('');
        openLayer(detailDrawer);
      }

      function openStop(no) {
        var item = findSchedule(no);
        activeScheduleNo = item.no;
        document.getElementById('stopScheduleSummary').innerHTML = stopScheduleSummary(item);
        document.getElementById('stopScheduleReason').value = '';
        openLayer(stopScheduleModal);
      }

      function resetFilters() {
        document.getElementById('scheduleKeyword').value = '';
        document.getElementById('scheduleStatusFilter').value = '';
        document.getElementById('priceLockFilter').value = '';
        document.getElementById('hideStoppedSchedules').checked = true;
        renderRows();
      }

      ['scheduleKeyword', 'scheduleStatusFilter', 'priceLockFilter', 'hideStoppedSchedules'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', renderRows);
        document.getElementById(id).addEventListener('change', renderRows);
      });
      document.getElementById('resetScheduleFilters').addEventListener('click', resetFilters);
      document.getElementById('outsourceScheduleRoutes').addEventListener('click', function (event) {
        var card = event.target.closest('[data-route-filter]');
        if (!card) return;
        activeRoute = activeRoute === card.dataset.routeFilter ? '__all' : card.dataset.routeFilter;
        renderRows();
      });
      document.addEventListener('click', function (event) {
        if (event.target.closest('[data-close-price]')) closeLayer(priceDrawer);
        if (event.target.closest('[data-close-detail]')) closeLayer(detailDrawer);
        if (event.target.closest('[data-close-stop]')) closeLayer(stopScheduleModal);
        var priceButton = event.target.closest('[data-open-price]');
        if (priceButton) openPrice(priceButton.dataset.scheduleNo);
        var detailButton = event.target.closest('[data-open-detail]');
        if (detailButton) openDetail(detailButton.dataset.scheduleNo);
        var stopButton = event.target.closest('[data-open-stop]');
        if (stopButton) openStop(stopButton.dataset.scheduleNo);
        var reviewButton = event.target.closest('[data-submit-price-review]');
        if (reviewButton) {
          var reviewItem = findSchedule(reviewButton.dataset.scheduleNo);
          reviewItem.priceStatus = '审核中';
          reviewItem.logs.unshift(['2026-07-14 10:28', '代理运营提交' + product.objectName + '定价审核。']);
          renderRows();
          toast('定价已提交审核');
        }
        var restoreButton = event.target.closest('[data-restore-schedule]');
        if (restoreButton) {
          findSchedule(restoreButton.dataset.scheduleNo).status = '销售中';
          renderRows();
          toast('团期已恢复销售');
        }
        if (event.target.classList.contains('modal-overlay')) closeLayer(event.target);
      });
      document.getElementById('saveSchedulePrice').addEventListener('click', function () {
        var item = findSchedule(activeScheduleNo);
        var values = Array.prototype.map.call(document.querySelectorAll('[data-price-item-value]'), function (input) { return Number(input.value || 0); });
        if (values[0]) item.salePrice = values[0];
        if (values[1]) item.childPrice = values[1];
        if (values[2] != null) item.singleRoom = values[2];
        if (item.priceStatus === '待定价') item.priceStatus = '未锁定';
        item.logs.unshift(['2026-07-14 10:30', '代理运营保存' + product.objectName + '定价草稿。']);
        closeLayer(priceDrawer);
        renderRows();
        toast('定价草稿已保存');
      });
      document.getElementById('submitSchedulePriceReview').addEventListener('click', function () {
        var item = findSchedule(activeScheduleNo);
        var values = Array.prototype.map.call(document.querySelectorAll('[data-price-item-value]'), function (input) { return Number(input.value || 0); });
        if (values[0]) item.salePrice = values[0];
        if (values[1]) item.childPrice = values[1];
        if (values[2] != null) item.singleRoom = values[2];
        item.priceStatus = '审核中';
        item.logs.unshift(['2026-07-14 10:32', '代理运营提交' + product.objectName + '定价审核。']);
        closeLayer(priceDrawer);
        renderRows();
        toast('定价已提交审核');
      });
      document.getElementById('confirmStopSchedule').addEventListener('click', function () {
        var item = findSchedule(activeScheduleNo);
        item.status = '停售';
        item.logs.unshift(['2026-07-14 10:35', '代理运营停售团期。']);
        closeLayer(stopScheduleModal);
        renderRows();
        toast('团期已停售');
      });

      renderSummary();
      renderRoutes();
      renderRows();
    })();
  </script>
</body>
</html>
