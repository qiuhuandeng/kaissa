<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代理产品 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel outsource-product-page">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">代理产品</h1>
      </div>
    </div>
  </section>

  <section class="list-surface product-outsource-list-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact outsource-filter list-surface-filter" aria-label="代理产品筛选">
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="outsourceKeyword">代理产品</label>
          <input id="outsourceKeyword" type="search" placeholder="代理产品/供应商/目的地">
        </div>
        <div class="filter-item-sm">
          <label class="sr-only" for="outsourceType">产品类型</label>
          <select id="outsourceType">
            <option value="">全部类型</option>
            <option>参团游</option>
            <option>邮轮</option>
            <option>专列</option>
            <option>自由行</option>
          </select>
        </div>
        <div class="filter-item-status">
          <label class="sr-only" for="proxyStatus">销售状态</label>
          <select id="proxyStatus">
            <option value="">全部状态</option>
            <option>待定价</option>
            <option>开售审核中</option>
            <option>销售中</option>
            <option>停售</option>
          </select>
        </div>
        <div class="filter-item-sm">
          <label class="sr-only" for="outsourceOwner">操作人</label>
          <select id="outsourceOwner">
            <option value="">全部操作人</option>
            <option>陈琳</option>
            <option>周婷</option>
            <option>陈红</option>
          </select>
        </div>
        <div class="filter-actions outsource-filter-actions">
          <button id="filterOutsource" class="btn btn-secondary btn-filter-search" type="button">搜索</button>
          <button id="resetOutsourceFilters" class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="table-wrap outsource-table outsource-ops-table list-surface-table list-table-with-pagination" aria-label="代理产品列表">
      <table>
        <thead>
          <tr>
            <th>代理产品</th>
            <th>出发/目的地</th>
            <th>代理团期</th>
            <th>定价进度</th>
            <th>销售范围</th>
            <th>状态</th>
            <th>操作人</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="outsourceRows"></tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span id="outsourcePagination">0条</span>
    </div>
  </section>

  <div id="ownerDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outsource-product-modal" role="dialog" aria-modal="true" aria-labelledby="ownerDrawerTitle">
      <div class="modal-header">
        <div id="ownerDrawerTitle" class="modal-title">更新操作人</div>
        <button class="modal-close" type="button" data-close-owner aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">代理产品</h3>
          </div>
          <div id="ownerProductSummary" class="description-grid"></div>
        </section>
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">操作人</h3>
          </div>
          <div class="form-grid form-grid-2">
            <div class="form-group"><label class="form-label" for="currentOwner">当前操作人</label><input id="currentOwner" class="form-control" type="text" readonly></div>
            <div class="form-group"><label class="form-label" for="nextOwner">新操作人</label><select id="nextOwner" class="form-control"><option>陈琳</option><option>周婷</option><option>陈红</option><option>李哲</option></select></div>
            <div class="form-group form-group-full"><label class="form-label" for="ownerRemark">交接备注</label><textarea id="ownerRemark" class="form-control" rows="3"></textarea></div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-owner>取消</button>
        <button id="saveOwner" class="btn btn-primary" type="button">确认更新</button>
      </div>
    </div>
  </div>

  <div id="stopProductModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm outsource-stop-modal" role="dialog" aria-modal="true" aria-labelledby="stopProductTitle">
      <div class="modal-header">
        <div id="stopProductTitle" class="modal-title">停售</div>
        <button class="modal-close" type="button" data-close-stop aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div id="stopProductSummary" class="outsource-stop-summary"></div>
        <div class="form-group outsource-stop-reason"><label class="form-label" for="stopReason">停售原因</label><textarea id="stopReason" class="form-control" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-stop>取消</button>
        <button id="confirmStopProduct" class="btn btn-warning" type="button">确认停售</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var rows = document.getElementById('outsourceRows');
      var ownerDrawer = document.getElementById('ownerDrawer');
      var stopProductModal = document.getElementById('stopProductModal');
      var activeKey = '';
      var products = [
        {
          key: 'group',
          name: '西欧精选8日散拼',
          type: '参团游',
          supplier: '欧洲联合地接社',
          departure: '北京',
          destination: '法国/德国/瑞士',
          schedules: 3,
          scheduleObject: '团期',
          scheduleStatus: '已定价2 / 待定价1 / 停售1',
          quota: '总代理名额42人',
          price: '起售价 ¥9,800',
          priceSub: '2/3个团期已定价 · 1个待开售审核',
          priceAdult: 9800,
          priceChild: 8600,
          singleRoom: 1800,
          lockText: '1个团期待定价',
          scope: '门店+分销 / 华东直营',
          status: '销售中',
          owner: '陈琳',
          detailHref: 'product-outsource-detail.html?type=group&source=OUT-EU-0001'
        },
        {
          key: 'jp',
          name: '日本本州经典8日',
          type: '参团游',
          supplier: '樱花旅游地接',
          departure: '广州',
          destination: '东京/大阪/京都',
          schedules: 2,
          scheduleObject: '团期',
          scheduleStatus: '待定价2',
          quota: '总代理名额26人',
          price: '待定价',
          priceSub: '0/2个团期已定价 · 入库审核通过后维护',
          priceAdult: 7200,
          priceChild: 6600,
          singleRoom: 1200,
          lockText: '2个团期待定价',
          scope: '门店销售 / 华南直营',
          status: '待定价',
          owner: '陈琳',
          detailHref: 'product-outsource-detail.html?type=group&source=OUT-JP-0005'
        },
        {
          key: 'cruise',
          name: '理想号地中海邮轮舱房包销',
          type: '邮轮',
          supplier: '地中海旅游集团',
          departure: '巴塞罗那母港',
          destination: '巴塞罗那/罗马/马赛',
          schedules: 1,
          scheduleObject: '航次',
          scheduleStatus: '待定价1',
          quota: '阳台舱18间',
          price: '待定价',
          priceSub: '1个航次需按舱型矩阵定价',
          priceAdult: 18800,
          priceChild: 12800,
          singleRoom: 3200,
          lockText: '1个航次待定价',
          scope: '门店+分销 / 邮轮销售组',
          status: '销售中',
          owner: '周婷',
          detailHref: 'product-outsource-detail.html?type=cruise&source=OUT-CR-0006'
        },
        {
          key: 'free',
          name: '兰卡威机票酒店套餐',
          type: '自由行',
          supplier: '兰卡威酒店直采',
          departure: '全国',
          destination: '兰卡威',
          schedules: 1,
          scheduleObject: '出行日期',
          scheduleStatus: '已定价1 / 停售1',
          quota: '套餐名额30套',
          price: '起售价 ¥4,200',
          priceSub: '1/1个出行日期已定价',
          priceAdult: 4200,
          priceChild: 4200,
          singleRoom: 0,
          lockText: '已定价',
          scope: '官网+小程序 / 全部门店',
          status: '停售',
          owner: '陈红',
          detailHref: 'product-outsource-detail.html?type=free&source=OUT-FT-0008'
        },
        {
          key: 'offline',
          name: '西葡经典10日散拼',
          type: '参团游',
          supplier: '布拉格优选旅游',
          departure: '北京',
          destination: '西班牙/葡萄牙',
          schedules: 2,
          scheduleObject: '团期',
          scheduleStatus: '已定价2 / 停售2',
          quota: '历史名额32人',
          price: '起售价 ¥11,200',
          priceSub: '2/2个团期已定价',
          priceAdult: 11200,
          priceChild: 9800,
          singleRoom: 2100,
          lockText: '已定价',
          scope: '门店销售 / 历史订单保留',
          status: '停售',
          owner: '陈琳',
          detailHref: 'product-outsource-detail.html?type=group&source=OUT-EU-0012'
        }
      ];

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (char) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
        });
      }

      function toast(message) {
        if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message);
      }

      function openLayer(modal) {
        if (window.caesarUI && window.caesarUI.openLayer) window.caesarUI.openLayer(modal);
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeLayer(modal) {
        if (window.caesarUI && window.caesarUI.closeLayer) window.caesarUI.closeLayer(modal);
        else modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }

      function tagClass(status) {
        if (status === '销售中') return 'tag tag-green';
        if (status === '待定价' || status === '开售审核中') return 'tag tag-blue';
        if (status === '停售') return 'tag tag-gray';
        return 'tag tag-gray';
      }

      function scheduleHref(item) {
        return 'product-outsource-schedules.html?product=' + encodeURIComponent(item.key);
      }

      function productText(item) {
        return [
          item.name,
          item.supplier,
          item.type,
          item.departure,
          item.destination,
          item.status,
          item.owner
        ].join(' ').toLowerCase();
      }

      function filteredProducts() {
        var keyword = document.getElementById('outsourceKeyword').value.trim().toLowerCase();
        var type = document.getElementById('outsourceType').value;
        var status = document.getElementById('proxyStatus').value;
        var owner = document.getElementById('outsourceOwner').value;
        return products.filter(function (item) {
          if (keyword && productText(item).indexOf(keyword) < 0) return false;
          if (type && item.type !== type) return false;
          if (status && item.status !== status) return false;
          if (owner && item.owner !== owner) return false;
          return true;
        });
      }

      function actionHtml(item) {
        var priceLabel = item.scheduleObject === '出行日期' ? '日期定价' : item.scheduleObject + '定价';
        var main = '<a class="table-action-primary" href="' + escapeHtml(scheduleHref(item)) + '" data-open-schedules>' + escapeHtml(priceLabel) + '</a>';
        var menu = [];
        if (item.status === '销售中') {
          menu = [
            '<button class="dropdown-item" type="button" data-open-stop data-key="' + escapeHtml(item.key) + '">停售</button>',
            '<button class="dropdown-item" type="button" data-open-owner data-key="' + escapeHtml(item.key) + '">负责人</button>',
            '<a class="dropdown-item" href="' + escapeHtml(item.detailHref) + '">详情</a>'
          ];
        } else if (item.status === '停售') {
          menu = [
            '<button class="dropdown-item" type="button" data-restore-product data-key="' + escapeHtml(item.key) + '">重新销售</button>',
            '<button class="dropdown-item" type="button" data-open-owner data-key="' + escapeHtml(item.key) + '">负责人</button>',
            '<a class="dropdown-item" href="' + escapeHtml(item.detailHref) + '">详情</a>'
          ];
        } else {
          menu = [
            '<button class="dropdown-item" type="button" data-open-owner data-key="' + escapeHtml(item.key) + '">负责人</button>',
            '<a class="dropdown-item" href="' + escapeHtml(item.detailHref) + '">详情</a>'
          ];
        }
        return main + '<span class="dropdown table-action-more"><button class="muted table-more-toggle" type="button" data-row-more aria-expanded="false">更多</button><span class="dropdown-menu action-dropdown-menu">' + menu.join('') + '</span></span>';
      }

      function renderRows() {
        var list = filteredProducts();
        rows.innerHTML = list.map(function (item) {
          return [
            '<tr data-key="' + escapeHtml(item.key) + '" data-status="' + escapeHtml(item.status) + '">',
            '<td><div class="table-cell-main"><strong><a class="link-primary table-main-link" href="' + escapeHtml(item.detailHref) + '">' + escapeHtml(item.name) + '</a></strong><span>' + escapeHtml(item.supplier + ' · ' + item.type) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.departure) + '</strong><span>' + escapeHtml(item.destination) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong><span class="count-link-line"><a class="count-link-number" href="' + escapeHtml(scheduleHref(item)) + '">' + escapeHtml(item.schedules) + '</a>' + escapeHtml('个' + item.scheduleObject) + '</span></strong><span>' + escapeHtml(item.scheduleStatus + ' · ' + item.quota) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.price) + '</strong><span>' + escapeHtml(item.priceSub) + '</span></div></td>',
            '<td><div class="table-cell-main"><strong>' + escapeHtml(item.scope.split(' / ')[0] || item.scope) + '</strong><span>' + escapeHtml(item.scope.split(' / ')[1] || '') + '</span></div></td>',
            '<td><span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span></td>',
            '<td><strong>' + escapeHtml(item.owner) + '</strong></td>',
            '<td><div class="table-action">' + actionHtml(item) + '</div></td>',
            '</tr>'
          ].join('');
        }).join('');
        if (!list.length) {
          rows.innerHTML = '<tr><td colspan="8" class="text-muted">暂无符合条件的代理产品</td></tr>';
        }
        document.getElementById('outsourcePagination').textContent = '第1-' + list.length + '条/共' + products.length + '条';
      }

      function findProduct(key) {
        return products.find(function (item) { return item.key === key; }) || products[0];
      }

      function description(items) {
        return items.map(function (item) {
          return '<div class="description-item"><div class="description-label">' + escapeHtml(item[0]) + '</div><div class="description-value">' + item[1] + '</div></div>';
        }).join('');
      }

      function productSummary(item) {
        return description([
          ['代理产品', escapeHtml(item.name)],
          ['来源供应商', escapeHtml(item.supplier)],
          ['代理团期', escapeHtml(item.schedules + '个' + item.scheduleObject + ' / ' + item.quota)],
          ['当前状态', '<span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span>']
        ]);
      }

      function stopProductSummary(item) {
        return [
          '<div class="outsource-stop-object">',
          '<strong>' + escapeHtml(item.name) + '</strong>',
          '<span>' + escapeHtml(item.supplier + ' · ' + item.departure + ' / ' + item.destination) + '</span>',
          '</div>',
          '<div class="outsource-stop-metrics">',
          '<div><span>当前状态</span><strong><span class="' + tagClass(item.status) + '">' + escapeHtml(item.status) + '</span></strong></div>',
          '<div><span>代理团期</span><strong>' + escapeHtml(item.schedules + '个' + item.scheduleObject) + '</strong></div>',
          '<div><span>定价进度</span><strong>' + escapeHtml(item.priceSub) + '</strong></div>',
          '<div><span>操作人</span><strong>' + escapeHtml(item.owner) + '</strong></div>',
          '</div>'
        ].join('');
      }

      function openOwner(key) {
        var item = findProduct(key);
        activeKey = item.key;
        document.getElementById('ownerProductSummary').innerHTML = productSummary(item);
        document.getElementById('currentOwner').value = item.owner;
        document.getElementById('nextOwner').value = item.owner;
        document.getElementById('ownerRemark').value = '';
        openLayer(ownerDrawer);
      }

      function openStop(key) {
        var item = findProduct(key);
        activeKey = item.key;
        document.getElementById('stopProductSummary').innerHTML = stopProductSummary(item);
        document.getElementById('stopReason').value = '';
        openLayer(stopProductModal);
      }

      document.getElementById('filterOutsource').addEventListener('click', renderRows);
      ['outsourceKeyword', 'outsourceType', 'proxyStatus', 'outsourceOwner'].forEach(function (id) {
        document.getElementById(id).addEventListener('change', function () {
          renderRows();
        });
      });
      document.getElementById('outsourceKeyword').addEventListener('keydown', function (event) {
        if (event.key === 'Enter') renderRows();
      });
      document.getElementById('resetOutsourceFilters').addEventListener('click', function () {
        document.querySelectorAll('.outsource-filter input').forEach(function (input) { input.value = ''; });
        document.querySelectorAll('.outsource-filter select').forEach(function (select) { select.value = ''; });
        renderRows();
      });
      document.addEventListener('click', function (event) {
        if (event.target.closest('[data-close-owner]')) closeLayer(ownerDrawer);
        if (event.target.closest('[data-close-stop]')) closeLayer(stopProductModal);
        var ownerButton = event.target.closest('[data-open-owner]');
        if (ownerButton) openOwner(ownerButton.dataset.key);
        var stopButton = event.target.closest('[data-open-stop]');
        if (stopButton) openStop(stopButton.dataset.key);
        var restoreButton = event.target.closest('[data-restore-product]');
        if (restoreButton) {
          findProduct(restoreButton.dataset.key).status = '销售中';
          renderRows();
          toast('已恢复销售');
        }
        if (event.target.classList.contains('modal-overlay')) closeLayer(event.target);
      });
      document.getElementById('saveOwner').addEventListener('click', function () {
        var item = findProduct(activeKey);
        item.owner = document.getElementById('nextOwner').value || item.owner;
        closeLayer(ownerDrawer);
        renderRows();
        toast('操作人已更新');
      });
      document.getElementById('confirmStopProduct').addEventListener('click', function () {
        findProduct(activeKey).status = '停售';
        closeLayer(stopProductModal);
        renderRows();
        toast('产品已停售');
      });

      renderRows();
    })();
  </script>
</body>
</html>
