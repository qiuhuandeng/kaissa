<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自营产品编辑 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="product-create-page">
    <section class="page-workbar">
      <div>
        <div class="page-title-row">
          <a class="page-back-link" href="products.html" data-confirm-back>返回自营产品</a>
          <h1 class="page-title">自营产品编辑</h1>
        </div>
      </div>
      <div class="btn-group">
        <button id="saveDraftTop" class="btn btn-secondary" type="button">保存草稿</button>
        <button id="submitReviewTop" class="btn btn-primary" type="button">提交审核</button>
      </div>
    </section>

    <section class="product-create-layout">
      <aside class="product-step-panel" aria-label="产品创建步骤">
        <div class="steps">
          <button class="product-step active" type="button" data-step-target="step1"><span class="product-step-index">Step 1</span><span>基础信息</span></button>
          <button class="product-step" type="button" data-step-target="step2"><span class="product-step-index">Step 2</span><span>行程内容</span></button>
          <button class="product-step" type="button" data-step-target="step3"><span class="product-step-index">Step 3</span><span>价格费用</span></button>
          <button class="product-step" type="button" data-step-target="step4"><span class="product-step-index">Step 4</span><span>确认提交</span></button>
        </div>
      </aside>

      <div>
        <section id="step1" class="product-step-content active">
          <section class="card">
            <div class="card-header">
              <div class="card-title">核心信息</div>
            </div>
            <div class="form-grid">
              <div class="form-group form-group-full">
                <label class="form-label" for="productName">产品名称 <span class="req">*</span></label>
                <div class="field-with-count">
                  <input id="productName" class="form-control" type="text" maxlength="50" placeholder="请输入产品名称">
                  <span id="productNameCount" class="field-count">0/50</span>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="productCode">产品编号 <span class="req">*</span></label>
                <div class="field-with-action">
                  <input id="productCode" class="form-control" type="text" placeholder="请输入产品编号">
                  <button id="generateCode" class="btn btn-secondary" type="button">自动生成</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">产品类型</label>
                <div class="readonly-field">跟团游</div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label" for="supplierInput">供应商 <span class="req">*</span></label>
                <div id="supplierSearch" class="select-search">
                  <input id="supplierInput" class="form-control" type="text" placeholder="输入供应商名称搜索" autocomplete="off">
                  <div class="select-dropdown" role="listbox">
                    <button class="select-option" type="button">北京凯撒旅游</button>
                    <button class="select-option" type="button">日本地接XYZ</button>
                    <button class="select-option" type="button">泰国地接DEF</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div class="card-title">目的地信息</div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">出发地</label>
                <div class="inline-value">
                  <span id="departureCity">北京</span>
                  <button id="openCityModal" class="btn btn-secondary btn-sm" type="button">修改</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="durationDays">行程天数</label>
                <div class="field-with-suffix">
                  <input id="durationDays" class="form-control" type="number" min="1" value="12">
                  <span id="durationNights" class="field-suffix">11晚</span>
                </div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label">目的地</label>
                <div class="tag-row" data-tag-row>
                  <span class="tag tag-blue">法国<button class="tag-remove" type="button" aria-label="删除法国">×</button></span>
                  <span class="tag tag-blue">德国<button class="tag-remove" type="button" aria-label="删除德国">×</button></span>
                  <span class="tag tag-blue">意大利<button class="tag-remove" type="button" aria-label="删除意大利">×</button></span>
                  <button class="btn btn-secondary btn-sm" type="button">+添加目的地</button>
                </div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label">产品标签</label>
                <div class="tag-row" data-tag-row>
                  <span class="tag tag-purple">纯玩<button class="tag-remove" type="button" aria-label="删除纯玩">×</button></span>
                  <span class="tag tag-purple">含签证<button class="tag-remove" type="button" aria-label="删除含签证">×</button></span>
                  <span class="tag tag-purple">直飞<button class="tag-remove" type="button" aria-label="删除直飞">×</button></span>
                  <button class="btn btn-secondary btn-sm" type="button">+添加</button>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div class="card-title">封面与简介</div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">封面图</label>
                <div class="cover-row">
                  <button class="upload-box" type="button">
                    <span class="upload-icon">📷</span>
                    <span>点击上传封面图</span>
                  </button>
                  <div class="cover-preview">
                    <button class="cover-remove" type="button" aria-label="删除封面图">×</button>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="productIntro">产品简介</label>
                <textarea id="productIntro" class="form-control" rows="6" maxlength="200">欧洲十国经典游是凯撒旅游明星产品，涵盖法国、德国、意大利等十个顶级目的地，全程纯玩无购物...</textarea>
                <div id="introCount" class="textarea-foot">48/200</div>
              </div>
            </div>
          </section>
        </section>

        <section id="step2" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">行程内容</div>
            </div>
            <div class="itinerary-draft-card">
              <div class="itinerary-draft-head">
                <div>
                  <div class="itinerary-draft-title">行程草稿</div>
                  <div id="pasteParseHint" class="text-muted">支持按第1天、Day1、D1或逐行自动拆分</div>
                </div>
                <div class="itinerary-draft-actions">
                  <button id="aiGenerateTrip" class="ai-btn" type="button">AI生成</button>
                </div>
              </div>
              <textarea id="bulkItineraryInput" class="form-control itinerary-draft-textarea" rows="8" placeholder="可粘贴完整行程，例如：&#10;Day1 北京集合，搭乘国际航班前往巴黎。&#10;Day2 巴黎市区游览，参观卢浮宫外观、凯旋门。"></textarea>
              <div class="itinerary-draft-footer">
                <button id="applyDraftTrip" class="btn btn-primary" type="button">采用</button>
              </div>
            </div>
            <div id="itineraryEditor" class="itinerary-editor" aria-label="按天行程编辑器"></div>
            <button id="addItineraryDay" class="btn btn-secondary" type="button">添加一天</button>
          </section>
        </section>

        <section id="step3" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">价格费用</div>
            </div>
            <div class="table-wrap compact-table">
              <table class="editable-price-table">
                <thead>
                  <tr>
                    <th>价格类型</th>
                    <th>成本价</th>
                    <th>零售价</th>
                    <th>结算价</th>
                    <th>分销价</th>
                  </tr>
                </thead>
                <tbody>
                  <tr data-price-row="成人标准">
                    <td>成人标准</td>
                    <td><input class="table-input" type="number" min="0" value="9800" data-price-field="cost"></td>
                    <td><input class="table-input" type="number" min="0" value="12800" data-price-field="retail"></td>
                    <td><input class="table-input" type="number" min="0" value="11800" data-price-field="settlement"></td>
                    <td><input class="table-input" type="number" min="0" value="12200" data-price-field="distribution"></td>
                  </tr>
                  <tr data-price-row="儿童占床">
                    <td>儿童占床</td>
                    <td><input class="table-input" type="number" min="0" value="8600" data-price-field="cost"></td>
                    <td><input class="table-input" type="number" min="0" value="11200" data-price-field="retail"></td>
                    <td><input class="table-input" type="number" min="0" value="10400" data-price-field="settlement"></td>
                    <td><input class="table-input" type="number" min="0" value="10800" data-price-field="distribution"></td>
                  </tr>
                  <tr data-price-row="儿童不占床">
                    <td>儿童不占床</td>
                    <td><input class="table-input" type="number" min="0" value="7200" data-price-field="cost"></td>
                    <td><input class="table-input" type="number" min="0" value="9200" data-price-field="retail"></td>
                    <td><input class="table-input" type="number" min="0" value="8500" data-price-field="settlement"></td>
                    <td><input class="table-input" type="number" min="0" value="8900" data-price-field="distribution"></td>
                  </tr>
                  <tr data-price-row="单房差">
                    <td>单房差</td>
                    <td><input class="table-input" type="number" min="0" value="2400" data-price-field="cost"></td>
                    <td><input class="table-input" type="number" min="0" value="3200" data-price-field="retail"></td>
                    <td><input class="table-input" type="number" min="0" value="2800" data-price-field="settlement"></td>
                    <td><input class="table-input" type="number" min="0" value="3000" data-price-field="distribution"></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="profit-summary">
              <span>综合毛利率</span>
              <strong id="profitRate">0%</strong>
            </div>
          </section>
        </section>

        <section id="step4" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">确认提交</div>
            </div>
            <div id="submitSummary" class="submit-summary"></div>
          </section>
        </section>

        <div class="page-bottom-actions">
          <a class="btn btn-secondary" href="products.html" data-confirm-back>取消</a>
          <button id="saveDraftBottom" class="btn btn-secondary" type="button">保存草稿</button>
          <button id="nextStep" class="btn btn-primary" type="button">下一步</button>
        </div>
      </div>
    </section>
  </main>

  <div id="cityModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-md" role="dialog" aria-modal="true" aria-labelledby="cityModalTitle">
      <div class="modal-header">
        <div id="cityModalTitle" class="modal-title">选择出发城市</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-city-close>×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input id="citySearch" class="form-control" type="text" placeholder="搜索城市">
        </div>
        <div class="form-group">
          <label class="form-label">热门城市</label>
          <div class="city-tags">
            <button class="city-tag active" type="button">北京</button>
            <button class="city-tag" type="button">上海</button>
            <button class="city-tag" type="button">广州</button>
            <button class="city-tag" type="button">深圳</button>
            <button class="city-tag" type="button">成都</button>
            <button class="city-tag" type="button">杭州</button>
            <button class="city-tag" type="button">西安</button>
          </div>
        </div>
        <div class="city-group">
          <div class="city-letter">A</div>
          <div class="city-list"><button class="city-tag" type="button">安庆</button><button class="city-tag" type="button">澳门</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">B</div>
          <div class="city-list"><button class="city-tag active" type="button">北京</button><button class="city-tag" type="button">保定</button><button class="city-tag" type="button">包头</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">C</div>
          <div class="city-list"><button class="city-tag" type="button">成都</button><button class="city-tag" type="button">重庆</button><button class="city-tag" type="button">长沙</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">G</div>
          <div class="city-list"><button class="city-tag" type="button">广州</button><button class="city-tag" type="button">贵阳</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">H</div>
          <div class="city-list"><button class="city-tag" type="button">杭州</button><button class="city-tag" type="button">哈尔滨</button><button class="city-tag" type="button">合肥</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">S</div>
          <div class="city-list"><button class="city-tag" type="button">上海</button><button class="city-tag" type="button">深圳</button><button class="city-tag" type="button">沈阳</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">X</div>
          <div class="city-list"><button class="city-tag" type="button">西安</button><button class="city-tag" type="button">厦门</button></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-city-close>取消</button>
        <button id="confirmCity" class="btn btn-primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <div id="submitSuccessModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="submitSuccessTitle">
      <div class="modal-header">
        <div id="submitSuccessTitle" class="modal-title">提交成功</div>
      </div>
      <div class="modal-body">
        <p class="modal-center-text">产品已提交审核，审核通过后将自动上架</p>
      </div>
      <div class="modal-footer">
        <button id="confirmSubmitSuccess" class="btn btn-primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <div id="draftToast" class="toast-notice" hidden>草稿已保存，产品编号 KS-EU-XXX</div>

  <script>
    (function () {
      var currentStep = 0;
      var selectedCity = '北京';
      var stepButtons = Array.from(document.querySelectorAll('[data-step-target]'));
      var stepPanels = Array.from(document.querySelectorAll('.product-step-content'));
      var nextButton = document.getElementById('nextStep');
      var nameInput = document.getElementById('productName');
      var nameCount = document.getElementById('productNameCount');
      var introInput = document.getElementById('productIntro');
      var introCount = document.getElementById('introCount');
      var durationInput = document.getElementById('durationDays');
      var durationNights = document.getElementById('durationNights');
      var supplierSearch = document.getElementById('supplierSearch');
      var supplierInput = document.getElementById('supplierInput');
      var cityModal = document.getElementById('cityModal');
      var departureCity = document.getElementById('departureCity');
      var itineraryEditor = document.getElementById('itineraryEditor');
      var aiGenerateTrip = document.getElementById('aiGenerateTrip');
      var bulkItineraryInput = document.getElementById('bulkItineraryInput');
      var pasteParseHint = document.getElementById('pasteParseHint');
      var submitSuccessModal = document.getElementById('submitSuccessModal');
      var draftToast = document.getElementById('draftToast');
      var formDirty = false;
      var aiTripVariant = 0;
      var aiTripPlans = [
        '北京集合，搭乘国际航班前往巴黎，抵达后入住酒店休息。',
        '巴黎市区游览，参观卢浮宫外观、凯旋门与香榭丽舍大道。',
        '巴黎自由活动，午后前往法国小镇，体验欧洲慢生活。',
        '前往瑞士，沿途欣赏阿尔卑斯风光，抵达湖区小镇。',
        '游览卢塞恩，安排卡佩尔廊桥与湖畔漫步。',
        '前往德国，参观新天鹅堡外观与巴伐利亚小镇。',
        '抵达奥地利维也纳，游览城市环线与金色大厅外观。',
        '前往意大利威尼斯，体验水城街巷与贡多拉文化。',
        '佛罗伦萨文艺复兴主题游览，参观圣母百花大教堂外观。',
        '罗马深度游，参观古罗马斗兽场外观与许愿池。',
        '安排欧洲特色晚餐，整理行程亮点并预留购物时间。',
        '搭乘国际航班返回北京，结束欧洲十国经典游。'
      ];

      function markDirty() {
        formDirty = true;
      }

      function setStep(index) {
        currentStep = index;
        stepButtons.forEach(function (button, buttonIndex) {
          button.classList.toggle('active', buttonIndex === index);
        });
        stepPanels.forEach(function (panel, panelIndex) {
          panel.classList.toggle('active', panelIndex === index);
        });
        nextButton.textContent = index >= stepPanels.length - 1 ? '提交审核' : '下一步';
        if (index === stepPanels.length - 1) {
          renderSubmitSummary();
        }
      }

      function updateCount(input, target, max) {
        target.textContent = input.value.length + '/' + max;
      }

      function updateNights() {
        var days = Number(durationInput.value || 1);
        durationNights.textContent = Math.max(days - 1, 0) + '晚';
      }

      function openCityModal() {
        document.getElementById('citySearch').value = '';
        filterCreateCities('');
        cityModal.classList.add('show');
        cityModal.setAttribute('aria-hidden', 'false');
      }

      function closeCityModal() {
        cityModal.classList.remove('show');
        cityModal.setAttribute('aria-hidden', 'true');
      }

      function selectCity(button) {
        selectedCity = button.textContent.trim();
        document.querySelectorAll('.city-tag').forEach(function (item) {
          item.classList.toggle('active', item.textContent.trim() === selectedCity);
        });
      }

      function mealSelect(name, value) {
        var options = ['酒店', '中餐厅', '西餐厅', '自理', '机上'];
        return '<select class="form-control" data-meal="' + name + '">' + options.map(function (option) {
          return '<option' + (option === value ? ' selected' : '') + '>' + option + '</option>';
        }).join('') + '</select>';
      }

      function iconButton(label, icon, attrs, danger) {
        return '<button class="icon-action-btn' + (danger ? ' danger' : '') + '" type="button" title="' + label + '" aria-label="' + label + '" ' + attrs + '><span aria-hidden="true">' + icon + '</span></button>';
      }

      function createItineraryDay(index, desc, title) {
        var row = document.createElement('div');
        row.className = 'itinerary-day-row';
        row.innerHTML = [
          '<div class="itinerary-day-head">',
          '<strong class="itinerary-day-title">Day' + index + '</strong>',
          '<div class="icon-action-group itinerary-actions">',
          iconButton('上移', '↑', 'data-day-move="up"', false),
          iconButton('下移', '↓', 'data-day-move="down"', false),
          iconButton('删除', '×', 'data-day-delete', true),
          '</div>',
          '</div>',
          '<div class="itinerary-title-field">',
          '<label class="itinerary-field"><span class="itinerary-field-label">标题</span><input class="form-control" type="text" data-day-title value="' + (title || '') + '" placeholder="请输入第' + index + '天标题"></label>',
          '</div>',
          '<textarea class="form-control" rows="3" data-day-desc placeholder="请输入第' + index + '天行程描述">' + (desc || '') + '</textarea>',
          '<div class="itinerary-meal-grid">',
          '<label class="itinerary-field"><span class="itinerary-field-label">早餐</span>' + mealSelect('breakfast', index === 1 || index === 12 ? '机上' : '酒店') + '</label>',
          '<label class="itinerary-field"><span class="itinerary-field-label">午餐</span>' + mealSelect('lunch', index % 3 === 0 ? '西餐厅' : '中餐厅') + '</label>',
          '<label class="itinerary-field"><span class="itinerary-field-label">晚餐</span>' + mealSelect('dinner', index === 11 ? '西餐厅' : '中餐厅') + '</label>',
          '<label class="itinerary-field itinerary-stay-field"><span class="itinerary-field-label">住宿</span><input class="form-control" type="text" data-stay value="' + (index === 12 ? '机上' : '当地四星酒店') + '" placeholder="请输入住宿安排"></label>',
          '</div>'
        ].join('');
        return row;
      }

      function refreshDayTitles() {
        var rows = Array.from(itineraryEditor.querySelectorAll('.itinerary-day-row'));
        rows.forEach(function (row, index) {
          row.querySelector('.itinerary-day-title').textContent = 'Day' + (index + 1);
          row.querySelector('[data-day-title]').placeholder = '请输入第' + (index + 1) + '天标题';
          row.querySelector('[data-day-desc]').placeholder = '请输入第' + (index + 1) + '天行程描述';
          row.querySelector('[data-day-move="up"]').disabled = index === 0;
          row.querySelector('[data-day-move="down"]').disabled = index === rows.length - 1;
        });
      }

      function initItinerary() {
        itineraryEditor.innerHTML = '';
        Array.from({ length: 12 }).forEach(function (_, index) {
          itineraryEditor.appendChild(createItineraryDay(index + 1, ''));
        });
        refreshDayTitles();
      }

      function buildAiTripPlan() {
        var variants = [
          [
            { title: '北京-巴黎', desc: '北京集合，搭乘国际航班前往巴黎，抵达后入住酒店休息。' },
            { title: '巴黎城市精华', desc: '巴黎市区游览，参观卢浮宫外观、凯旋门与香榭丽舍大道。' },

            { title: '罗马全天游览', desc: '罗马全天游览，预留自由活动与特色晚餐。' },

        aiTripPlans = variants[aiTripVariant % variants.length].slice();
        aiTripVariant += 1;
      }

      function formatTripDraft(plan) {
        return plan.map(function (item, index) {
          var normalized = normalizeTripItem(item);
          return 'Day' + (index + 1) + ' ' + normalized.title + '：' + normalized.desc;
        }).join('\n');
      }

      function normalizeTripItem(item) {
        if (typeof item === 'string') {
          return splitTripTitleAndDesc(item);
        }
        return {
          title: item && item.title ? item.title : '',
          desc: item && item.desc ? item.desc : ''
        };
      }

      function applyTripPlan(plan, feedbackButton) {
        var rows = Array.from(itineraryEditor.querySelectorAll('.itinerary-day-row'));
        while (rows.length < plan.length) {
          itineraryEditor.appendChild(createItineraryDay(rows.length + 1, ''));
          rows = Array.from(itineraryEditor.querySelectorAll('.itinerary-day-row'));
        }
        rows.forEach(function (row, index) {
          var item = normalizeTripItem(plan[index] || '');
          var title = row.querySelector('[data-day-title]');
          var desc = row.querySelector('[data-day-desc]');
          if (title) title.value = item.title || '';
          if (desc) desc.value = item.desc || '';
        });
        refreshDayTitles();
        itineraryEditor.classList.add('is-applied');
        window.setTimeout(function () {
          itineraryEditor.classList.remove('is-applied');
        }, 900);
        if (feedbackButton) {
          var originalText = feedbackButton.textContent;
          feedbackButton.textContent = '已采用';
          window.setTimeout(function () {
            feedbackButton.textContent = originalText;
          }, 1200);
        }
        markDirty();
      }

      function normalizeTripText(text) {
        return (text || '')
          .replace(/\r/g, '\n')
          .replace(/\u3000/g, ' ')
          .replace(/[ \t]+/g, ' ')
          .trim();
      }

      function parsePastedTrip(text) {
        var normalized = normalizeTripText(text);
        if (!normalized) return [];

        var withBreaks = normalized.replace(/(?:^|\n|\s)(第\s*\d+\s*天|Day\s*\d+|D\s*\d+|DAY\s*\d+|day\s*\d+)[：:、.\s-]*/g, function (match, marker) {
          return '\n@@DAY@@' + marker.replace(/\s/g, '') + ' ';
        });
        var dayParts = withBreaks.split('\n@@DAY@@').map(function (part) {
          return part.trim();
        }).filter(Boolean);

        if (dayParts.length > 1) {
          return dayParts.map(function (part) {
            return splitTripTitleAndDesc(part.replace(/^(第\d+天|Day\d+|DAY\d+|day\d+|D\d+)[：:、.\s-]*/i, '').trim());
          }).filter(Boolean);
        }

        return normalized.split(/\n+/).map(function (line) {
          return splitTripTitleAndDesc(line.replace(/^\s*(?:\d+[.、]|[-*])\s*/, '').trim());
        }).filter(Boolean);
      }

      function splitTripTitleAndDesc(text) {
        var value = (text || '').trim();
        if (!value) return { title: '', desc: '' };
        var colonMatch = value.match(/^(.{2,24}?)[：:]\s*(.+)$/);
        if (colonMatch) {
          return { title: colonMatch[1].trim(), desc: colonMatch[2].trim() };
        }
        var commaMatch = value.match(/^(.{2,18}?)[，,]\s*(.+)$/);
        if (commaMatch && commaMatch[1].length <= 12) {
          return { title: commaMatch[1].trim(), desc: commaMatch[2].trim() };
        }
        var sentenceMatch = value.match(/^(.{2,18}?)(?:。|\s{2,})(.+)$/);
        if (sentenceMatch) {
          return { title: sentenceMatch[1].trim(), desc: sentenceMatch[2].trim() };
        }
        return { title: value.slice(0, 12), desc: value };
      }

      function updatePasteHint() {
        var count = parsePastedTrip(bulkItineraryInput.value).length;
        pasteParseHint.textContent = count ? '已识别 ' + count + ' 天行程，点击采用后自动填入下方编辑器' : '支持按第1天、Day1、D1或逐行自动拆分';
      }

      function applyDraftTrip() {
        var parsed = parsePastedTrip(bulkItineraryInput.value);
        if (!parsed.length) {
          pasteParseHint.textContent = '请先粘贴行程内容';
          bulkItineraryInput.focus();
          return;
        }
        applyTripPlan(parsed, document.getElementById('applyDraftTrip'));
        pasteParseHint.textContent = '已采用 ' + parsed.length + ' 天行程，可继续在下方逐日调整';
      }

      function generateTripDraft(triggerButton) {
        var button = triggerButton || aiGenerateTrip;
        button.disabled = true;
        button.textContent = 'AI生成中...';
        window.setTimeout(function () {
          buildAiTripPlan();
          bulkItineraryInput.value = formatTripDraft(aiTripPlans);
          updatePasteHint();
          button.disabled = false;
          button.textContent = 'AI生成';
          bulkItineraryInput.focus();
          markDirty();
        }, 700);
      }

      function calculateProfit() {
        var totalCost = 0;
        var totalRetail = 0;
        document.querySelectorAll('[data-price-row]').forEach(function (row) {
          totalCost += Number(row.querySelector('[data-price-field="cost"]').value || 0);
          totalRetail += Number(row.querySelector('[data-price-field="retail"]').value || 0);
        });
        var rate = totalRetail > 0 ? ((totalRetail - totalCost) / totalRetail * 100) : 0;
        var profitRate = document.getElementById('profitRate');
        profitRate.textContent = rate.toFixed(1) + '%';
        profitRate.classList.toggle('warning', rate < 15);
      }

      function summaryField(label, value) {
        return '<div><dt>' + label + '</dt><dd>' + (value || '-') + '</dd></div>';
      }

      function renderSubmitSummary() {
        var priceRows = Array.from(document.querySelectorAll('[data-price-row]')).map(function (row) {
          return row.dataset.priceRow + '：成本价 ¥' + (row.querySelector('[data-price-field="cost"]').value || 0) +
            '，零售价 ¥' + (row.querySelector('[data-price-field="retail"]').value || 0) +
            '，结算价 ¥' + (row.querySelector('[data-price-field="settlement"]').value || 0) +
            '，分销价 ¥' + (row.querySelector('[data-price-field="distribution"]').value || 0);
        }).join('<br>');
        var tripRows = Array.from(itineraryEditor.querySelectorAll('.itinerary-day-row')).map(function (row, index) {
          var title = row.querySelector('[data-day-title]').value || '未填写标题';
          var desc = row.querySelector('[data-day-desc]').value || '未填写';
          var stay = row.querySelector('[data-stay]').value || '未填写';
          var breakfast = row.querySelector('[data-meal="breakfast"]').value;
          var lunch = row.querySelector('[data-meal="lunch"]').value;
          var dinner = row.querySelector('[data-meal="dinner"]').value;
          return 'Day' + (index + 1) + ' ' + title + '：' + desc + '｜早餐：' + breakfast + '，午餐：' + lunch + '，晚餐：' + dinner + '｜住宿：' + stay;
        }).join('<br>');
        document.getElementById('submitSummary').innerHTML = [
          '<section class="summary-section"><h3>基础信息</h3><dl>',
          summaryField('产品名称', nameInput.value),
          summaryField('产品编号', document.getElementById('productCode').value),
          summaryField('供应商', supplierInput.value),
          summaryField('出发地', departureCity.textContent),
          summaryField('行程天数', durationInput.value + '天' + durationNights.textContent),
          summaryField('产品简介', introInput.value),
          '</dl></section>',
          '<section class="summary-section"><h3>行程内容</h3><p>' + tripRows + '</p></section>',
          '<section class="summary-section"><h3>价格费用</h3><p>' + priceRows + '</p><p>综合毛利率：' + document.getElementById('profitRate').textContent + '</p></section>'
        ].join('');
      }

      function submitReview() {
        renderSubmitSummary();
        submitSuccessModal.classList.add('show');
        submitSuccessModal.setAttribute('aria-hidden', 'false');
        formDirty = false;
      }

      function saveDraft() {
        draftToast.hidden = false;
        window.clearTimeout(saveDraft.toastTimer);
        saveDraft.toastTimer = window.setTimeout(function () {
          draftToast.hidden = true;
        }, 3000);
        formDirty = false;
      }

      function filterCreateCities(keyword) {
        var query = (keyword || '').trim();
        document.querySelectorAll('#cityModal .city-group').forEach(function (group) {
          var visibleCount = 0;
          group.querySelectorAll('.city-tag').forEach(function (button) {
            var matched = !query || button.textContent.trim().indexOf(query) !== -1;
            button.hidden = !matched;
            if (matched) visibleCount += 1;
          });
          group.hidden = visibleCount === 0;
        });
      }

      stepButtons.forEach(function (button, index) {
        button.addEventListener('click', function () {
          setStep(index);
        });
      });

      nextButton.addEventListener('click', function () {
        if (currentStep < stepPanels.length - 1) {
          setStep(currentStep + 1);
        } else {
          submitReview();
        }
      });

      document.getElementById('generateCode').addEventListener('click', function () {
        var randomCode = String(Math.floor(Math.random() * 900) + 100);
        document.getElementById('productCode').value = 'KS-EU-' + randomCode;
        markDirty();
      });

      nameInput.addEventListener('input', function () {
        updateCount(nameInput, nameCount, 50);
      });

      introInput.addEventListener('input', function () {
        updateCount(introInput, introCount, 200);
      });

      durationInput.addEventListener('input', updateNights);

      supplierInput.addEventListener('focus', function () {
        supplierSearch.classList.add('open');
      });

      supplierInput.addEventListener('input', function () {
        supplierSearch.classList.add('open');
      });

      document.querySelectorAll('.select-option').forEach(function (option) {
        option.addEventListener('click', function () {
          supplierInput.value = option.textContent.trim();
          supplierSearch.classList.remove('open');
          markDirty();
        });
      });

      document.addEventListener('click', function (event) {
        if (!supplierSearch.contains(event.target)) {
          supplierSearch.classList.remove('open');
        }
      });

      document.querySelectorAll('[data-tag-row]').forEach(function (row) {
        row.addEventListener('click', function (event) {
          if (event.target.classList.contains('tag-remove')) {
            event.target.closest('.tag').remove();
            markDirty();
          }
        });
      });

      document.getElementById('openCityModal').addEventListener('click', openCityModal);
      document.querySelectorAll('[data-city-close]').forEach(function (button) {
        button.addEventListener('click', closeCityModal);
      });
      cityModal.addEventListener('click', function (event) {
        if (event.target === cityModal) {
          closeCityModal();
        }
      });
      document.querySelectorAll('.city-tag').forEach(function (button) {
        button.addEventListener('click', function () {
          selectCity(button);
        });
      });
      document.getElementById('confirmCity').addEventListener('click', function () {
        departureCity.textContent = selectedCity;
        markDirty();
        closeCityModal();
      });
      document.getElementById('citySearch').addEventListener('input', function (event) {
        filterCreateCities(event.target.value);
      });

      aiGenerateTrip.addEventListener('click', function () {
        generateTripDraft(aiGenerateTrip);
      });
      document.getElementById('applyDraftTrip').addEventListener('click', applyDraftTrip);
      bulkItineraryInput.addEventListener('input', function () {
        updatePasteHint();
        markDirty();
      });

      document.getElementById('addItineraryDay').addEventListener('click', function () {
        itineraryEditor.appendChild(createItineraryDay(itineraryEditor.children.length + 1, ''));
        refreshDayTitles();
        markDirty();
      });

      itineraryEditor.addEventListener('click', function (event) {
        var row = event.target.closest('.itinerary-day-row');
        if (!row) return;

        var deleteButton = event.target.closest('[data-day-delete]');
        var upButton = event.target.closest('[data-day-move="up"]');
        var downButton = event.target.closest('[data-day-move="down"]');

        if (deleteButton) {
          row.remove();
          refreshDayTitles();
          markDirty();
          return;
        }

        if (upButton && row.previousElementSibling) {
          itineraryEditor.insertBefore(row, row.previousElementSibling);
          refreshDayTitles();
          markDirty();
          return;
        }

        if (downButton && row.nextElementSibling) {
          itineraryEditor.insertBefore(row.nextElementSibling, row);
          refreshDayTitles();
          markDirty();
        }
      });
      itineraryEditor.addEventListener('input', markDirty);
      itineraryEditor.addEventListener('change', markDirty);

      document.querySelectorAll('[data-price-field]').forEach(function (input) {
        input.addEventListener('input', calculateProfit);
      });

      document.getElementById('submitReviewTop').addEventListener('click', function () {
        setStep(stepPanels.length - 1);
        submitReview();
      });
      document.getElementById('saveDraftTop').addEventListener('click', saveDraft);
      document.getElementById('saveDraftBottom').addEventListener('click', saveDraft);
      function navigateTo(href) {
        window.caesarNavigateTo(href);
      }

      document.getElementById('confirmSubmitSuccess').addEventListener('click', function () {
        navigateTo('products.html');
      });

      document.querySelector('.cover-remove').addEventListener('click', function (event) {
        event.currentTarget.closest('.cover-preview').remove();
        markDirty();
      });

      document.querySelectorAll('input, textarea, select').forEach(function (field) {
        field.addEventListener('input', markDirty);
        field.addEventListener('change', markDirty);
      });

      document.querySelectorAll('[data-confirm-back]').forEach(function (link) {
        link.addEventListener('click', function (event) {
          if (formDirty && !window.confirm('当前内容未保存，确认离开吗？')) {
            event.preventDefault();
          }
        });
      });

      window.addEventListener('load', function () {
        document.querySelectorAll('.nav-item').forEach(function (item) {
          var isProductManage = item.textContent.trim() === '自营产品';
          item.classList.toggle('active', isProductManage);
          if (isProductManage) {
            item.closest('.nav-parent').classList.add('open');
          }
        });
      });

      updateCount(nameInput, nameCount, 50);
      updateNights();
      initItinerary();
      calculateProfit();
    })();
  </script>
