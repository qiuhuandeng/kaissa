  <section class="list-surface pricing-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact pricing-filter list-surface-filter" aria-label="定价策略筛选">
      <div class="filter-row">
        <div class="pricing-policy-filter-fields">
          <div class="filter-item">
            <label class="sr-only" for="pricingKeyword">策略名称/适用对象/创建人</label>
            <input id="pricingKeyword" type="search" placeholder="策略名称/适用对象/创建人">
          </div>
          <div class="filter-item filter-item-sm">
            <label class="sr-only" for="pricingLayerFilter">策略层级</label>
            <select id="pricingLayerFilter">
              <option value="">全部层级</option>
              <option>产品大类默认策略</option>
              <option>线路级策略</option>
              <option>团期级策略</option>
              <option>渠道客群叠加</option>
            </select>
          </div>
          <div class="filter-item filter-item-sm">
            <label class="sr-only" for="pricingStatusFilter">主状态</label>
            <select id="pricingStatusFilter">
              <option value="">全部状态</option>
              <option value="active">启用中</option>
              <option value="draft">草稿</option>
              <option value="approving">审批中</option>
              <option value="inactive">已停用</option>
            </select>
          </div>
          <div class="filter-actions pricing-policy-query-actions">
            <button class="btn btn-secondary" type="button" data-filter-pricing>搜索</button>
            <button class="btn btn-secondary" type="button" data-reset-pricing>重置</button>
          </div>
        </div>
        <div class="filter-actions pricing-policy-actions">
          <button id="openPricingDrawer" class="btn btn-primary" type="button">新增定价策略</button>
        </div>
      </div>
    </section>

    <nav id="pricingCategoryTabs" class="tab-bar pricing-category-tabs list-surface-tabs list-filter-tabs" aria-label="产品大类筛选" data-filter-tabs>
      <button class="tab-item active" type="button" data-category-tab="all"><span class="list-tab-label">全部</span></button>
      <button class="tab-item" type="button" data-category-tab="跟团游"><span class="list-tab-label">跟团游</span></button>
      <button class="tab-item" type="button" data-category-tab="邮轮"><span class="list-tab-label">邮轮</span></button>
      <button class="tab-item" type="button" data-category-tab="专列"><span class="list-tab-label">专列</span></button>
      <button class="tab-item" type="button" data-category-tab="自由行"><span class="list-tab-label">自由行</span></button>
      <button class="tab-item" type="button" data-category-tab="单项委托"><span class="list-tab-label">单项委托</span></button>
    </nav>

    <section class="table-wrap pricing-policy-table list-surface-table list-table-with-pagination" aria-label="定价策略列表">
      <table>
        <colgroup>
          <col class="pricing-col-main">
          <col class="pricing-col-object">
          <col class="pricing-col-linked">
          <col class="pricing-col-floor">
          <col class="pricing-col-status">
          <col class="pricing-col-action">
        </colgroup>
        <thead>
          <tr>
            <th>策略名称</th>
            <th>适用对象</th>
            <th>关联情况</th>
            <th>最低限价</th>
            <th>主状态</th>
            <th class="pricing-action-head">操作</th>
          </tr>
        </thead>
        <tbody id="pricingStrategyRows"></tbody>
      </table>
    </section>

    <div class="pagination list-surface-pagination list-pagination-attached">
      <span id="pricingPagination">第0-0条/共0条</span>
    </div>
  </section>

  <div id="pricingDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal pricing-drawer pricing-config-drawer drawer-lg" role="dialog" aria-modal="true" aria-labelledby="pricingDrawerTitle">
      <div class="modal-header">

        <button class="modal-close" type="button" aria-label="关闭" data-close-pricing>×</button>
      </div>
      <div id="pricingDrawerBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-pricing>取消</button>
        <button id="pricingViewToEdit" class="btn btn-secondary" type="button" hidden>编辑</button>
        <button id="savePricingDraft" class="btn btn-secondary" type="button">保存草稿</button>
        <button id="enablePricingStrategy" class="btn btn-primary" type="button">保存并启用</button>
      </div>
    </section>
  </div>

        status: document.getElementById('pricingStatusFilter'),
        categoryTabs: document.getElementById('pricingCategoryTabs'),
        rows: document.getElementById('pricingStrategyRows'),
        pagination: document.getElementById('pricingPagination'),
        drawer: document.getElementById('pricingDrawer'),

        viewToEdit: document.getElementById('pricingViewToEdit'),
        saveDraft: document.getElementById('savePricingDraft'),
        saveEnable: document.getElementById('enablePricingStrategy')
      };

      function toast(message, type) {
        if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message, { type: type || 'success' });
      }

      function openLayer(layer) {
        if (window.caesarUI && window.caesarUI.openLayer) window.caesarUI.openLayer(layer);
        else if (layer) { layer.hidden = false; layer.classList.add('show'); }
      }

      function closeLayer(layer) {
        if (window.caesarUI && window.caesarUI.closeLayer) window.caesarUI.closeLayer(layer);
        else if (layer) { layer.classList.remove('show'); layer.hidden = true; }
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function money(value) {
        var num = Number(value || 0);
        return '¥' + num.toLocaleString('zh-CN');
      }

      function statusText(status) {
        return status === 'active' ? '启用中' : status === 'draft' ? '草稿' : status === 'approving' ? '审批中' : '已停用';
      }

      function statusClass(status) {
        return status === 'active' ? 'tag-green' : status === 'draft' ? 'tag-gray' : status === 'approving' ? 'tag-orange' : 'tag-yellow';
      }

      function moduleLabels(form) {
        var tags = [];
        if (form.seasonPricing.enabled) tags.push({ key: 'season', label: '淡旺季', count: form.seasonPricing.segments.length });
        if (form.timePricing.enabled) tags.push({ key: 'time', label: '时间梯度', count: form.timePricing.tiers.length });
        if (form.groupPricing.enabled) tags.push({ key: 'group', label: '成团联动', count: form.groupPricing.tiers.length });
        if (form.cityPricing.enabled) tags.push({ key: 'city', label: '出发地差价', count: form.cityPricing.cities.length });
        if (form.channelPricing.enabled) tags.push({ key: 'channel', label: '渠道差异', count: form.channelPricing.channels.length });
        if (form.customerPricing.enabled) tags.push({ key: 'customer', label: '客群差异', count: form.customerPricing.types.length });
        return tags;
      }

      function filteredStrategies() {
        var keyword = els.keyword.value.trim().toLowerCase();
        var layer = els.layer.value;
        var status = els.status.value;
        return strategies.filter(function (strategy) {
          var text = [strategy.name, strategy.creator, strategy.objectName, strategy.category, strategy.layer, strategy.scopeDetail].join(' ').toLowerCase();
          return (state.activeCategory === 'all' || strategy.category === state.activeCategory) &&
            (!keyword || text.indexOf(keyword) > -1) &&
            (!layer || strategy.layer === layer) &&
            (!status || strategy.status === status);
        });
      }

      function renderCategoryTabs() {
        els.categoryTabs.querySelectorAll('[data-category-tab]').forEach(function (tab) {
          var key = tab.dataset.categoryTab;
          tab.classList.toggle('active', state.activeCategory === key);
          var label = tab.querySelector('.list-tab-label');
          if (label) label.textContent = label.textContent.replace(/\s*\(\d+\)$/, '');
        });
      }

      function renderList() {
        var rows = filteredStrategies();
        els.pagination.textContent = rows.length ? '第1-' + rows.length + '条/共' + rows.length + '条' : '第0-0条/共0条';
        if (!rows.length) {
          els.rows.innerHTML = '<tr><td class="list-empty-cell" colspan="6">暂无符合条件的定价策略</td></tr>';
          renderCategoryTabs();
          return;
        }
        els.rows.innerHTML = rows.map(function (strategy) {
          var linked = '<span><button type="button" class="count-link-number" data-linked-products="' + strategy.id + '">' + strategy.linkedProducts + '</button>条线路</span>' +
            '<span><button type="button" class="count-link-number" data-linked-groups="' + strategy.id + '">' + strategy.linkedGroups + '</button>个团期</span>' +
            '<span><button type="button" class="count-link-number" data-linked-channels="' + strategy.id + '">' + strategy.linkedChannels + '</button>个渠道</span>';
          var floor = strategy.minPrice > 0
            ? '<span class="pricing-floor-main">成人 ' + money(strategy.minPrice) + '</span><span class="pricing-cell-meta">低于保护价需拦截或审批</span>'
            : '<span class="pricing-cell-empty">未配置</span><span class="pricing-cell-meta">启用前需补成人最低价</span>';
          return '<tr data-pricing-id="' + strategy.id + '">' +
            '<td class="pricing-main-cell"><a class="link-primary table-main-link" href="javascript:void(0)" data-pricing-action="view" data-id="' + strategy.id + '">' + escapeHtml(strategy.name) + '</a><span class="pricing-cell-meta">' + escapeHtml(strategy.category) + ' · ' + escapeHtml(strategy.layer) + '</span><span class="pricing-cell-meta">创建人：' + escapeHtml(strategy.creator) + ' · 更新 ' + escapeHtml(strategy.updatedAt) + '</span></td>' +
            '<td class="pricing-object-cell"><span class="pricing-cell-main">' + escapeHtml(destinationLabel(strategy.objectName)) + '</span><span class="pricing-cell-meta">' + escapeHtml(strategy.scopeDetail) + '</span></td>' +
            '<td class="pricing-linked-cell">' + linked + '</td>' +
            '<td class="pricing-floor-cell">' + floor + '</td>' +
            '<td class="pricing-status-cell"><span class="tag ' + statusClass(strategy.status) + '">' + statusText(strategy.status) + '</span></td>' +
            '<td class="pricing-action-cell"><div class="table-action pricing-row-actions">' +
              '<button class="table-action-primary" type="button" data-pricing-action="view" data-id="' + strategy.id + '">查看</button>' +
              '<button class="table-link" type="button" data-pricing-action="edit" data-id="' + strategy.id + '">编辑</button>' +
              '<span class="pricing-table-more"><button class="table-link" type="button" data-more-toggle>更多</button><span class="pricing-table-menu">' +
                '<button type="button" data-pricing-action="copy" data-id="' + strategy.id + '">复制策略</button>' +
                '<button type="button" data-pricing-action="products" data-id="' + strategy.id + '">关联线路</button>' +
                '<button type="button" data-pricing-action="groups" data-id="' + strategy.id + '">关联团期</button>' +
                '<button type="button" data-pricing-action="history" data-id="' + strategy.id + '">变更记录</button>' +
                (strategy.status === 'active' ? '<button type="button" data-pricing-action="inactive" data-id="' + strategy.id + '">停用</button>' : '<button type="button" data-pricing-action="active" data-id="' + strategy.id + '">启用</button>') +
                (strategy.status === 'draft' ? '<button type="button" class="danger" data-pricing-action="delete" data-id="' + strategy.id + '">删除草稿</button>' : '') +
              '</span></span>' +
            '</div></td>' +
          '</tr>';
        }).join('');
        renderCategoryTabs();
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function formFromStrategy(strategy) {
        var form = defaultForm();
        form.id = strategy.id;
        form.name = strategy.name;
        form.layer = strategy.layer;
        form.category = strategy.category;
        form.status = strategy.status;
        form.objectName = strategy.objectName;
        form.creator = strategy.creator;
        form.description = strategy.description || '';
        form.linkedProducts = strategy.linkedProducts;
        form.linkedGroups = strategy.linkedGroups;
        form.linkedChannels = strategy.linkedChannels;
        form.scopeDetail = strategy.scopeDetail;
        form.minPrice.adult = strategy.minPrice || form.minPrice.adult;
        return form;
      }

      function getPath(root, path) {
        return path.split('.').reduce(function (current, key) { return current == null ? undefined : current[key]; }, root);
      }

      function setPath(root, path, value) {
        var parts = path.split('.');
        var last = parts.pop();
        var target = parts.reduce(function (current, key) { return current[key]; }, root);
        target[last] = value;
      }

      function disabledAttr() {
        return state.drawerMode === 'view' ? ' disabled' : '';
      }

      function checkedAttr(value) {
        return value ? ' checked' : '';
      }

      function selectedAttr(actual, expected) {
        return String(actual) === String(expected) ? ' selected' : '';
      }

      var destinationTreeOptions = [
        {
          value: '欧洲',
          label: '欧洲',
          children: [
            { value: '欧洲 / 法国', label: '法国', children: [{ value: '欧洲 / 法国 / 巴黎', label: '巴黎' }] },
            { value: '欧洲 / 意大利', label: '意大利', children: [{ value: '欧洲 / 意大利 / 罗马', label: '罗马' }] },
            { value: '欧洲 / 地中海', label: '地中海', children: [] }
          ]
        },
        {
          value: '东南亚',
          label: '东南亚',
          children: [
            { value: '东南亚 / 泰国', label: '泰国', children: [{ value: '东南亚 / 泰国 / 曼谷', label: '曼谷' }] }
          ]
        },
        {
          value: '国内',
          label: '国内',
          children: [
            { value: '国内 / 西北', label: '西北', children: [{ value: '国内 / 西北 / 敦煌', label: '敦煌' }] }
          ]
        },
        {
          value: '日本',
          label: '日本',
          children: [
            { value: '日本 / 关西', label: '关西', children: [{ value: '日本 / 关西 / 大阪', label: '大阪' }, { value: '日本 / 关西 / 京都', label: '京都' }] }
          ]
        }
      ];

      function destinationValues(value) {
        return String(value || '').split('|').map(function (item) {
          return item.trim();
        }).filter(Boolean);
      }

      function destinationLabel(value) {
        var values = destinationValues(value);
        return values.length ? values.join('、') : '请选择目的地分类';
      }

      function findDestinationNode(value, nodes) {
        var list = nodes || destinationTreeOptions;
        for (var index = 0; index < list.length; index += 1) {
          if (list[index].value === value) return list[index];
          var child = findDestinationNode(value, list[index].children || []);
          if (child) return child;
        }
        return null;
      }

      function destinationOptionHtml(node, level, selectedValues, activeValue) {
        var hasChildren = node.children && node.children.length;
        var selected = selectedValues.indexOf(node.value) > -1;
        return '<div class="destination-cascade-option' + (node.value === activeValue ? ' active' : '') + (selected ? ' is-selected' : '') + (hasChildren ? ' has-children' : '') + '" data-pricing-destination-option data-level="' + level + '" data-value="' + escapeHtml(node.value) + '">' +
          '<label><input type="checkbox" value="' + escapeHtml(node.value) + '" data-pricing-destination-checkbox' + checkedAttr(selected) + disabledAttr() + '><span>' + escapeHtml(node.label) + '</span></label>' +
          (hasChildren ? '<button type="button" aria-label="查看下级" data-pricing-destination-drill' + disabledAttr() + '>›</button>' : '<i aria-hidden="true"></i>') +
        '</div>';
      }

      function ensureDestinationActive(select) {
        if (!select) return;
        var values = destinationValues(state.form && state.form.objectName);
        var first = values[0] || '';
        if (!select.dataset.destinationRoot) select.dataset.destinationRoot = first.split(' / ')[0] || (destinationTreeOptions[0] && destinationTreeOptions[0].value) || '';
        var root = findDestinationNode(select.dataset.destinationRoot) || destinationTreeOptions[0];
        if (!root) return;
        select.dataset.destinationRoot = root.value;
        if (!select.dataset.destinationBranch || !(root.children || []).some(function (child) { return child.value === select.dataset.destinationBranch; })) {
          var parts = first.split(' / ');
          var branchValue = parts.length > 1 ? parts.slice(0, 2).join(' / ') : '';
          var branch = (root.children || []).find(function (child) { return child.value === branchValue; }) || (root.children || [])[0];
          select.dataset.destinationBranch = branch ? branch.value : '';
        }
      }

      function renderPricingDestinationCascade(select) {
        if (!select) return;
        ensureDestinationActive(select);
        var menu = select.querySelector('.destination-cascade-menu');
        if (!menu) return;
        var selectedValues = destinationValues(state.form && state.form.objectName);
        var root = findDestinationNode(select.dataset.destinationRoot) || destinationTreeOptions[0];
        var branch = findDestinationNode(select.dataset.destinationBranch);
        var secondLevel = root && root.children || [];
        var thirdLevel = branch && branch.children || [];
        menu.innerHTML = '<div class="destination-cascade-column">' +
          destinationTreeOptions.map(function (node) { return destinationOptionHtml(node, 0, selectedValues, root && root.value); }).join('') +
          '</div><div class="destination-cascade-column">' +
          (secondLevel.length ? secondLevel.map(function (node) { return destinationOptionHtml(node, 1, selectedValues, branch && branch.value); }).join('') : '<div class="destination-cascade-empty">暂无下级</div>') +
          '</div><div class="destination-cascade-column">' +
          (thirdLevel.length ? thirdLevel.map(function (node) { return destinationOptionHtml(node, 2, selectedValues, ''); }).join('') : '<div class="destination-cascade-empty">暂无下级</div>') +
          '</div>';
        alignPricingDestinationCascade(select);
      }

      function alignPricingDestinationCascade(select) {
        if (!select) return;
        var menuWidth = Math.min(680, Math.max(0, window.innerWidth - 64));
        var rect = select.getBoundingClientRect();
        var container = select.closest('.modal-body, .drawer-modal, .form-grid, .pricing-drawer') || document.documentElement;
        var containerRect = container.getBoundingClientRect ? container.getBoundingClientRect() : { left: 16, right: window.innerWidth - 16 };
        var rightLimit = Math.min(window.innerWidth - 16, containerRect.right - 16);
        var leftLimit = Math.max(16, containerRect.left + 16);
        var shouldAlignRight = rect.left + menuWidth > rightLimit && rect.right - menuWidth >= leftLimit;
        select.classList.toggle('destination-cascade-align-right', shouldAlignRight);
      }

      function syncPricingDestinationLabel(select) {
        var label = select && select.querySelector('[data-pricing-destination-label]');
        if (label) label.textContent = destinationLabel(state.form && state.form.objectName);
      }

      function closePricingDestinationSelects(except) {
        document.querySelectorAll('[data-pricing-destination-tree].open').forEach(function (select) {
          if (except && select === except) return;
          select.classList.remove('open');
          var trigger = select.querySelector('[data-pricing-destination-trigger]');
          if (trigger) trigger.setAttribute('aria-expanded', 'false');
        });
      }

      function activatePricingDestinationOption(select, option) {
        if (!select || !option) return;
        var node = findDestinationNode(option.dataset.value);
        var level = Number(option.dataset.level || 0);
        if (!node) return;
        if (level === 0) {
          select.dataset.destinationRoot = node.value;
          select.dataset.destinationBranch = (node.children && node.children[0] && node.children[0].value) || '';
        } else if (level === 1) {
          select.dataset.destinationBranch = node.value;
        }
        renderPricingDestinationCascade(select);
      }

      function renderPricingDestinationSelect() {
        var values = destinationValues(state.form && state.form.objectName);
        var first = values[0] || '';
        var parts = first.split(' / ');
        var root = parts[0] || '欧洲';
        var branch = parts.length > 1 ? parts.slice(0, 2).join(' / ') : '';
        return '<div class="form-group"><label class="form-label">目的地分类 <span class="req">*</span></label>' +
          '<div class="multi-select route-destination-tree-select" data-pricing-destination-tree data-destination-root="' + escapeHtml(root) + '" data-destination-branch="' + escapeHtml(branch) + '">' +
          '<button class="multi-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" data-pricing-destination-trigger' + disabledAttr() + '><span data-pricing-destination-label>' + escapeHtml(destinationLabel(state.form && state.form.objectName)) + '</span></button>' +
          '<div class="multi-select-menu destination-cascade-menu" role="listbox" aria-label="目的地分类"></div>' +
          '</div></div>';
      }

      function moduleOpen(key) {
        return state.openModules.indexOf(key) > -1;
      }

      function moduleCountBadge(text) {
        return '<span class="pricing-config-module-badge">' + escapeHtml(text) + '</span>';
      }

      function renderDrawer() {
        var form = state.form;
        var disabled = disabledAttr();
        var isView = state.drawerMode === 'view';
        els.drawerTitle.textContent = state.drawerMode === 'new' ? '新增定价策略' : state.drawerMode === 'edit' ? '编辑定价策略' : '查看定价策略';
        els.viewToEdit.hidden = !isView;
        els.saveDraft.hidden = isView;
        els.saveEnable.hidden = isView;
        els.drawerBody.innerHTML =

          renderBaseSection() +
          '<section class="drawer-section pricing-drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">策略模块配置</h3></div>' +

          renderCustomerModule() +
          renderMinPriceModule() +
          '</section>';
        var destinationSelect = els.drawerBody.querySelector('[data-pricing-destination-tree]');
        if (destinationSelect) {
          renderPricingDestinationCascade(destinationSelect);
          syncPricingDestinationLabel(destinationSelect);
        }

        if (isView) {
          els.drawerBody.querySelectorAll('input, select, textarea, button[data-array-add], button[data-array-delete]').forEach(function (control) {
            control.disabled = true;
          });
        }

        function renderBaseSection() {
          return '<section class="drawer-section pricing-drawer-section">' +
            '<div class="drawer-section-head"><h3 class="drawer-section-title">基础信息</h3></div>' +
            '<div class="form-grid">' +
              '<div class="form-group form-group-full"><label class="form-label">策略名称 <span class="req">*</span></label><input class="form-control" type="text" data-path="name" value="' + escapeHtml(form.name) + '"' + disabled + '></div>' +
              '<div class="form-group"><label class="form-label">适用产品大类 <span class="req">*</span></label><select class="form-control" data-path="category"' + disabled + '>' +
                '<option value="">请选择</option>' +
                '<option' + selectedAttr(form.category, '跟团游') + '>跟团游</option>' +
                '<option' + selectedAttr(form.category, '邮轮') + '>邮轮</option>' +
                '<option' + selectedAttr(form.category, '专列') + '>专列</option>' +
                '<option' + selectedAttr(form.category, '自由行') + '>自由行</option>' +
                '<option' + selectedAttr(form.category, '单项委托') + '>单项委托</option>' +
              '</select></div>' +
              renderPricingDestinationSelect() +
              '<div class="form-group form-group-full"><label class="form-label">策略描述</label><textarea class="form-control" rows="2" data-path="description"' + disabled + '>' + escapeHtml(form.description) + '</textarea></div>' +
            '</div></section>';
        }
      }

      function renderActiveNotice() {
        return '<section class="pricing-drawer-warn"><strong>已启用策略</strong><span>关联线路 ' + state.form.linkedProducts + ' 条 / 团期 ' + state.form.linkedGroups + ' 个，保存后影响后续询价和下单价格。</span></section>';

      function renderModuleShell(key, title, enabledPath, countText, rightControls, body) {

            '<div class="pricing-config-module-tools">' + (rightControls || '') +
              '<button class="pricing-module-toggle" type="button" data-toggle-module="' + key + '" aria-label="展开或收起">' + (moduleOpen(key) ? '收起' : '展开') + '</button>' +
            '</div>' +
          '</div>' +
          (moduleOpen(key) ? '<div class="pricing-config-module-body">' + body + '</div>' : '') +
        '</article>';
      }

      function renderSeasonModule() {
        var form = state.form;

              : '<input class="form-control pricing-number-cell" type="number" min="0" max="1" step="0.01" data-type="number" data-path="timePricing.tiers.' + index + '.discountValue" value="' + escapeHtml(tier.discountValue) + '"><span class="pricing-cell-note">折</span>';

        return renderModuleShell('group', '成团人数联动', 'groupPricing.enabled', '已配置 ' + form.groupPricing.tiers.length + ' 档', '',
          '<div class="pricing-sub-controls"><span>最低成团人数</span><input class="form-control pricing-number-cell" type="number" min="1" data-type="number" data-path="groupPricing.minPeople" value="' + escapeHtml(form.groupPricing.minPeople) + '"><span>人</span></div>' +
          '<div class="table-wrap pricing-config-table"><table><thead><tr><th>人数区间</th><th>价格调整</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
          '<button class="table-link pricing-module-add" type="button" data-array-add="group">新增档位</button>');
      }

      function renderCityModule() {
        var form = state.form;
        var rows = form.cityPricing.cities.map(function (city, index) {
          return '<tr><td><input class="form-control" type="text" data-path="cityPricing.cities.' + index + '.city" value="' + escapeHtml(city.city) + '"></td>' +
            '<td><input class="form-control" type="text" data-path="cityPricing.cities.' + index + '.diff" value="' + escapeHtml(city.diff) + '"></td>' +
            '<td><input class="form-control" type="text" data-path="cityPricing.cities.' + index + '.note" value="' + escapeHtml(city.note) + '"></td>' +
            '<td><button class="table-link danger" type="button" data-array-delete="cityPricing.cities" data-index="' + index + '">删除</button></td></tr>';
        }).join('');
        var controls = '<label class="pricing-radio-mini"><input type="radio" name="cityMode" value="inherit" data-path="cityPricing.mode"' + checkedAttr(form.cityPricing.mode === 'inherit') + '> 继承产品配置</label>' +
          '<label class="pricing-radio-mini"><input type="radio" name="cityMode" value="override" data-path="cityPricing.mode"' + checkedAttr(form.cityPricing.mode === 'override') + '> 本策略覆盖</label>';
        return renderModuleShell('city', '出发地差价', 'cityPricing.enabled', '已配置 ' + form.cityPricing.cities.length + ' 个城市', controls,
          '<div class="pricing-sub-controls"><span>基准出发城市</span><input class="form-control pricing-mini-cell" type="text" data-path="cityPricing.baseCity" value="' + escapeHtml(form.cityPricing.baseCity) + '"></div>' +
          '<div class="table-wrap pricing-config-table"><table><thead><tr><th>出发城市</th><th>差价</th><th>备注</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
          '<button class="table-link pricing-module-add" type="button" data-array-add="city">新增城市</button>');
      }

      function renderChannelModule() {
        var form = state.form;
        var rows = form.channelPricing.channels.map(function (channel, index) {
          var valueInput = channel.ruleType === 'contract'
            ? '<span class="pricing-cell-note">详见合同</span>'
            : '<input class="form-control pricing-number-cell" type="number" min="0" step="0.01" data-type="number" data-path="channelPricing.channels.' + index + '.value" value="' + escapeHtml(channel.value) + '">';
          return '<tr><td><input class="form-control" type="text" data-path="channelPricing.channels.' + index + '.name" value="' + escapeHtml(channel.name) + '"></td>' +
            '<td><select class="form-control" data-path="channelPricing.channels.' + index + '.ruleType"><option value="ratio"' + selectedAttr(channel.ruleType, 'ratio') + '>价格系数</option><option value="commission"' + selectedAttr(channel.ruleType, 'commission') + '>扣点率</option><option value="fixed"' + selectedAttr(channel.ruleType, 'fixed') + '>固定加价</option><option value="contract"' + selectedAttr(channel.ruleType, 'contract') + '>合同协议价</option></select></td>' +
            '<td><div class="pricing-cell-inline">' + valueInput + '</div></td>' +
            '<td><input class="form-control" type="text" data-path="channelPricing.channels.' + index + '.note" value="' + escapeHtml(channel.note) + '"></td>' +
            '<td><button class="table-link danger" type="button" data-array-delete="channelPricing.channels" data-index="' + index + '">删除</button></td></tr>';
        }).join('');
        return renderModuleShell('channel', '渠道差异化策略', 'channelPricing.enabled', '已配置 ' + form.channelPricing.channels.length + ' 个渠道', '',
          '<div class="table-wrap pricing-config-table"><table class="pricing-channel-config-table"><thead><tr><th>渠道名称</th><th>定价规则</th><th>参数值</th><th>说明</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
          '<button class="table-link pricing-module-add" type="button" data-array-add="channel">新增渠道</button>');
      }

      function renderCustomerModule() {
        var form = state.form;
        var rows = form.customerPricing.types.map(function (customer, index) {
          var valueInput = customer.discountType === 'fixed'
            ? '<span class="pricing-cell-note">-¥</span><input class="form-control pricing-number-cell" type="number" min="0" data-type="number" data-path="customerPricing.types.' + index + '.discountValue" value="' + escapeHtml(customer.discountValue) + '">'
            : customer.discountType === 'ratio'
              ? '<input class="form-control pricing-number-cell" type="number" min="0" max="1" step="0.01" data-type="number" data-path="customerPricing.types.' + index + '.discountValue" value="' + escapeHtml(customer.discountValue) + '"><span class="pricing-cell-note">折</span>'
              : '<span class="pricing-cell-note">¥</span><input class="form-control pricing-number-cell" type="number" min="0" data-type="number" data-path="customerPricing.types.' + index + '.discountValue" value="' + escapeHtml(customer.discountValue) + '">';
          return '<tr><td><input class="form-control" type="text" data-path="customerPricing.types.' + index + '.name" value="' + escapeHtml(customer.name) + '"></td>' +
            '<td><input class="form-control" type="text" data-path="customerPricing.types.' + index + '.condition" value="' + escapeHtml(customer.condition) + '"></td>' +
            '<td><div class="pricing-cell-inline"><select class="form-control pricing-mini-cell" data-path="customerPricing.types.' + index + '.discountType"><option value="fixed"' + selectedAttr(customer.discountType, 'fixed') + '>减金额</option><option value="ratio"' + selectedAttr(customer.discountType, 'ratio') + '>折扣率</option><option value="special"' + selectedAttr(customer.discountType, 'special') + '>专项价</option></select>' + valueInput + '</div></td>' +
            '<td><label class="pricing-radio-mini"><input type="checkbox" data-type="checkbox" data-path="customerPricing.types.' + index + '.stackable"' + checkedAttr(customer.stackable) + '> 可叠加</label></td>' +
            '<td><button class="table-link danger" type="button" data-array-delete="customerPricing.types" data-index="' + index + '">删除</button></td></tr>';
        }).join('');
        var controls = '<label class="pricing-radio-mini"><input type="radio" name="customerStackMode" value="exclusive" data-path="customerPricing.stackMode"' + checkedAttr(form.customerPricing.stackMode === 'exclusive') + '> 互斥取最优</label>' +
          '<label class="pricing-radio-mini"><input type="radio" name="customerStackMode" value="additive" data-path="customerPricing.stackMode"' + checkedAttr(form.customerPricing.stackMode === 'additive') + '> 可叠加</label>';
        return renderModuleShell('customer', '客群差异化策略', 'customerPricing.enabled', '已配置 ' + form.customerPricing.types.length + ' 类', controls,
          '<div class="table-wrap pricing-config-table"><table><thead><tr><th>客群类型</th><th>条件说明</th><th>优惠规则</th><th>叠加</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
          '<button class="table-link pricing-module-add" type="button" data-array-add="customer">新增客群</button>');
      }

      function renderMinPriceModule() {
        var form = state.form;
        return '<article class="pricing-config-module pricing-minprice-module">' +
          '<div class="pricing-config-module-head"><strong class="pricing-config-module-title">最低限价保护 ' + moduleCountBadge('必填') + '</strong><button class="pricing-module-toggle" type="button" data-toggle-module="minprice">' + (moduleOpen('minprice') ? '收起' : '展开') + '</button></div>' +
          (moduleOpen('minprice') ? '<div class="pricing-config-module-body"><div class="form-grid pricing-module-form-grid">' +
            '<div class="form-group"><label class="form-label">成人最低价 <span class="req">*</span></label><div class="field-with-suffix"><input class="form-control" type="number" min="0" data-type="number" data-path="minPrice.adult" value="' + escapeHtml(form.minPrice.adult) + '"><span class="field-suffix">元</span></div></div>' +
            '<div class="form-group"><label class="form-label">儿童含床最低价</label><div class="field-with-suffix"><input class="form-control" type="number" min="0" data-type="number" data-path="minPrice.childBed" value="' + escapeHtml(form.minPrice.childBed) + '"><span class="field-suffix">元</span></div></div>' +
            '<div class="form-group"><label class="form-label">儿童不含床最低价</label><div class="field-with-suffix"><input class="form-control" type="number" min="0" data-type="number" data-path="minPrice.childNoBed" value="' + escapeHtml(form.minPrice.childNoBed) + '"><span class="field-suffix">元</span></div></div>' +
            '<div class="form-group form-group-full"><label class="form-label">低于限价时</label><div class="pricing-sub-controls"><label><input type="radio" name="minPriceTrigger" value="block" data-path="minPrice.triggerMode"' + checkedAttr(form.minPrice.triggerMode === 'block') + '> 拦截保存</label><label><input type="radio" name="minPriceTrigger" value="approve" data-path="minPrice.triggerMode"' + checkedAttr(form.minPrice.triggerMode === 'approve') + '> 进入审批流</label></div></div>' +
          '</div></div>' : '') +
        '</article>';
      }

      function openDrawer(mode, id) {
        var strategy = strategies.find(function (item) { return item.id === id; });
        state.drawerMode = mode;
        state.editingId = id || null;
        state.form = mode === 'new' || !strategy ? defaultForm() : formFromStrategy(strategy);
        if (mode === 'copy' && strategy) {
          state.drawerMode = 'new';
          state.form.name = strategy.name + ' 副本';
          state.form.status = 'draft';
          state.form.id = null;
          state.form.linkedProducts = 0;
          state.form.linkedGroups = 0;
          state.form.linkedChannels = 0;
        }
        state.openModules = ['season', 'time', 'minprice'];
        renderDrawer();
        openLayer(els.drawer);
      }

      function closeDrawer() {
        closeLayer(els.drawer);
      }

      function addArrayItem(type) {
        var form = state.form;
        var map = {
          season: function () { form.seasonPricing.segments.push({ name: '新日期段', startDate: '', endDate: '', sign: '-', amount: 0, ratio: 1.00 }); },
          time: function () { form.timePricing.tiers.push({ name: '新档位', days: '', discountType: 'fixed', discountValue: 0, manual: false }); },
          group: function () { form.groupPricing.tiers.push({ range: '', sign: '-', amount: 0 }); },
          city: function () { form.cityPricing.cities.push({ city: '', diff: '+ ¥0', note: '' }); },
          channel: function () { form.channelPricing.channels.push({ name: '', ruleType: 'ratio', value: 1, note: '' }); },
          customer: function () { form.customerPricing.types.push({ name: '', condition: '', discountType: 'fixed', discountValue: 0, stackable: false }); }
        };
        if (map[type]) map[type]();
        renderDrawer();
        toast('已新增一行配置草稿');
      }

      function deleteArrayItem(path, index) {
        var list = getPath(state.form, path);
        if (Array.isArray(list)) list.splice(Number(index), 1);
        renderDrawer();
        toast('配置行已删除');
      }

      function persistForm(status) {
        var form = state.form;
        if (!form.name.trim()) { toast('请填写策略名称', 'error'); return; }
        if (!form.category) { toast('请选择适用产品大类', 'error'); return; }
        if (!form.objectName.trim()) { toast('请选择目的地分类', 'error'); return; }
        if (status === 'active' && !Number(form.minPrice.adult || 0)) { toast('请填写成人最低限价', 'error'); return; }
        form.status = status;
        var existing = strategies.find(function (strategy) { return strategy.id === form.id; });
        var payload = {
          id: existing ? existing.id : state.nextId++,
          name: form.name,
          layer: form.layer,
          category: form.category,
          status: form.status,
          creator: existing ? existing.creator : '当前登录人',
          updatedAt: '2026-07-15',
          linkedProducts: existing ? existing.linkedProducts : 0,
          linkedGroups: existing ? existing.linkedGroups : 0,
          linkedChannels: existing ? existing.linkedChannels : 0,
          minPrice: Number(form.minPrice.adult || 0),
          objectName: form.objectName,
          scopeDetail: form.scopeDetail,
          description: form.description,
          modules: moduleLabels(form)
        };
        if (existing) Object.assign(existing, payload);
        else strategies.unshift(payload);
        closeDrawer();
        renderList();
        toast(status === 'active' ? '定价策略已保存并启用' : '定价策略草稿已保存');
      }

      function handlePricingAction(action, id) {
        var strategy = strategies.find(function (item) { return item.id === id; });
        if (!strategy) return;
        if (action === 'view' || action === 'edit') { openDrawer(action, id); return; }
        if (action === 'copy') { openDrawer('copy', id); return; }
        if (action === 'active' || action === 'inactive') {
          strategy.status = action;
          strategy.updatedAt = '2026-07-15';
          renderList();
          toast(action === 'active' ? '策略已启用' : '策略已停用');
          return;
        }
        if (action === 'delete') {
          strategies = strategies.filter(function (item) { return item.id !== id; });
          renderList();
          toast('策略草稿已删除');
          return;
        }
        var messages = {
          products: '已进入关联线路查看入口',
          groups: '已进入关联团期查看入口',
          history: '已打开变更记录入口'
        };
        toast(messages[action] || '操作已完成');
      }

      function resetFilters() {
        els.keyword.value = '';
        els.layer.value = '';
        els.status.value = '';
        state.activeCategory = 'all';
        renderList();
      }

      function closePricingMenus(exceptNode) {
        document.querySelectorAll('.pricing-table-more.open').forEach(function (node) {
          if (node !== exceptNode) {
            node.classList.remove('open');
            var cell = node.closest('.pricing-action-cell');
            if (cell) cell.classList.remove('pricing-action-cell-open');
            var menu = node.querySelector('.pricing-table-menu');
            if (menu) {
              menu.style.top = '';
              menu.style.left = '';
            }
          }
        });
      }

      function positionPricingMenu(node) {
        var button = node.querySelector('[data-more-toggle]');
        var menu = node.querySelector('.pricing-table-menu');
        if (!button || !menu) return;
        var rect = button.getBoundingClientRect();
        var menuWidth = menu.offsetWidth || 130;
        var left = Math.max(8, Math.min(rect.right - menuWidth, window.innerWidth - menuWidth - 8));
        menu.style.top = rect.bottom + 6 + 'px';
        menu.style.left = left + 'px';
        var cell = node.closest('.pricing-action-cell');
        if (cell) cell.classList.add('pricing-action-cell-open');
      }

      document.addEventListener('click', function (event) {
        var tab = event.target.closest('[data-category-tab]');
        if (tab) {
          state.activeCategory = tab.dataset.categoryTab;
          renderList();
          return;
        }
        var more = event.target.closest('[data-more-toggle]');
        if (more) {
          var moreNode = more.closest('.pricing-table-more');
          closePricingMenus(moreNode);
          moreNode.classList.toggle('open');
          if (moreNode.classList.contains('open')) {
            positionPricingMenu(moreNode);
          } else {
            var cell = moreNode.closest('.pricing-action-cell');
            if (cell) cell.classList.remove('pricing-action-cell-open');
          }
          return;
        }
        if (!event.target.closest('.pricing-table-more')) {
          closePricingMenus();
        }
        var action = event.target.closest('[data-pricing-action]');
        if (action) {
          closePricingMenus();
          handlePricingAction(action.dataset.pricingAction, Number(action.dataset.id));
          return;
        }
        if (event.target.closest('#openPricingDrawer')) { openDrawer('new'); return; }
        if (event.target.closest('[data-filter-pricing]')) { renderList(); return; }
        if (event.target.closest('[data-reset-pricing]')) { resetFilters(); return; }
        if (event.target.closest('[data-close-pricing]') || event.target === els.drawer) { closeDrawer(); return; }
        var toggle = event.target.closest('[data-toggle-module]');
        if (toggle) {
          var key = toggle.dataset.toggleModule;
          state.openModules = moduleOpen(key) ? state.openModules.filter(function (item) { return item !== key; }) : state.openModules.concat(key);
          renderDrawer();
          return;
        }
        var add = event.target.closest('[data-array-add]');
        if (add) { addArrayItem(add.dataset.arrayAdd); return; }
        var del = event.target.closest('[data-array-delete]');
        if (del) { deleteArrayItem(del.dataset.arrayDelete, del.dataset.index); }
        var destinationTrigger = event.target.closest('[data-pricing-destination-trigger]');
        if (destinationTrigger) {
          var destinationSelect = destinationTrigger.closest('[data-pricing-destination-tree]');
          var willOpen = !destinationSelect.classList.contains('open');
          closePricingDestinationSelects(destinationSelect);
          renderPricingDestinationCascade(destinationSelect);
          destinationSelect.classList.toggle('open', willOpen);
          destinationTrigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
          return;
        }
        var destinationDrill = event.target.closest('[data-pricing-destination-drill]');
        if (destinationDrill) {
          activatePricingDestinationOption(destinationDrill.closest('[data-pricing-destination-tree]'), destinationDrill.closest('[data-pricing-destination-option]'));
          return;
        }
        if (!event.target.closest('[data-pricing-destination-tree]')) closePricingDestinationSelects();
      });

      document.addEventListener('input', function (event) {
        var input = event.target.closest('[data-path]');
        if (input && state.form) {
          var value = input.type === 'checkbox' ? input.checked : input.dataset.type === 'number' ? Number(input.value || 0) : input.value;
          setPath(state.form, input.dataset.path, value);
        }
      });

      document.addEventListener('change', function (event) {
        if (event.target === els.layer || event.target === els.status) {
          renderList();
          return;
        }
        var destinationCheckbox = event.target.closest('[data-pricing-destination-checkbox]');
        if (destinationCheckbox && state.form) {
          var destinationSelect = destinationCheckbox.closest('[data-pricing-destination-tree]');
          var option = destinationCheckbox.closest('[data-pricing-destination-option]');
          var values = destinationValues(state.form.objectName).filter(function (item) {
            return item !== destinationCheckbox.value;
          });
          if (destinationCheckbox.checked) values.push(destinationCheckbox.value);
          state.form.objectName = values.join('|');
          state.form.scopeDetail = values.length ? '按目的地分类匹配产品线路' : '';
          activatePricingDestinationOption(destinationSelect, option);
          renderPricingDestinationCascade(destinationSelect);
          syncPricingDestinationLabel(destinationSelect);
          return;
        }
        var selector = event.target.closest('[data-path]');
        if (selector && state.form) {
          var value = selector.type === 'checkbox' ? selector.checked : selector.dataset.type === 'number' ? Number(selector.value || 0) : selector.value;
          setPath(state.form, selector.dataset.path, value);
          renderDrawer();
        }
      });

      els.keyword.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') renderList();
      });

      els.viewToEdit.addEventListener('click', function () {
        state.drawerMode = 'edit';
        renderDrawer();
      });
      els.saveDraft.addEventListener('click', function () { persistForm('draft'); });
      els.saveEnable.addEventListener('click', function () { persistForm('active'); });

      els.keyword.value = '';
      els.layer.value = '';
      els.status.value = '';
      state.activeCategory = 'all';
      renderList();
    })();
  </script>
</body>
</html>
