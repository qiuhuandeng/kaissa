<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渠道来源 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="channel-sources-page">
    <section class="list-page-panel">
      <div class="list-page-head">
        <h1 class="page-title">渠道来源</h1>
      </div>
    </section>

    <section class="list-surface" data-list-surface>
      <section class="filter-card filter-card-compact list-surface-filter" aria-label="渠道来源筛选">
        <div class="list-surface-filter-actions list-filter-pinned-actions">
          <button class="btn btn-primary" type="button" data-open-source>新增来源</button>
        </div>
        <div class="filter-row">
          <label class="filter-item filter-item-search">
            <span class="sr-only">来源名称</span>
            <input type="search" placeholder="来源名称/适用对象">
          </label>
          <label class="filter-item filter-item-sm">
            <span class="sr-only">来源类型</span>
            <select>
              <option>全部类型</option>
              <option>门店</option>
              <option>分销渠道</option>
              <option>OTA平台</option>
              <option>官网</option>
              <option>企业客户</option>
            </select>
          </label>
          <label class="filter-item filter-item-status">
            <span class="sr-only">状态</span>
            <select>
              <option>全部状态</option>
              <option>启用</option>
              <option>停用</option>
            </select>
          </label>
          <div class="filter-actions">
            <button class="btn btn-secondary btn-filter-search" type="button">搜索</button>
            <button class="btn btn-secondary" type="button">重置</button>
          </div>
        </div>
      </section>

      <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="渠道来源列表">
        <table>
          <thead>
            <tr>
              <th>来源名称</th>
              <th>来源类型</th>
              <th>适用对象</th>
              <th>订单归属</th>
              <th>收款/对账承接</th>
              <th>默认处理方式</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr><td><strong>门店来源</strong></td><td><span class="tag tag-blue">门店</span></td><td>门店中心全部启用门店</td><td>门店订单</td><td>门店预存 / 门店对账</td><td>按门店档案结算规则</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" class="table-action-primary" data-open-source>编辑</button></div></td></tr>
            <tr><td><strong>分销来源</strong></td><td><span class="tag tag-purple">分销渠道</span></td><td>分销渠道档案</td><td>分销台账</td><td>分销对账 / 佣金规则</td><td>内部代下单</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" class="table-action-primary" data-open-source>编辑</button></div></td></tr>
            <tr><td><strong>OTA来源</strong></td><td><span class="tag tag-cyan">OTA平台</span></td><td>店铺配置中的平台店铺</td><td>OTA订单</td><td>平台对账 / 服务费</td><td>平台接口同步</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" class="table-action-primary" data-open-source>编辑</button></div></td></tr>
            <tr><td><strong>官网直客</strong></td><td><span class="tag tag-green">官网</span></td><td>官方商城 / 小程序</td><td>直客订单</td><td>到账流水 / 认款复核</td><td>在线支付</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" class="table-action-primary" data-open-source>编辑</button></div></td></tr>
          </tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span>第1-4条/共4条</span>
      </div>
    </section>
  </main>

  <div id="sourceDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal drawer-edit drawer-md channel-source-drawer" role="dialog" aria-modal="true" aria-labelledby="sourceDrawerTitle">
      <div class="modal-header">
        <div id="sourceDrawerTitle" class="modal-title">新增来源</div>
        <button class="modal-close" type="button" aria-label="关闭抽屉" data-close-source>×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">基础信息</h3>
          </div>
          <div class="form-grid channel-source-form">
            <div class="form-group">
              <label class="form-label" for="sourceName">来源名称</label>
              <input id="sourceName" class="form-control" type="text" data-source-name>
            </div>
            <div class="form-group">
              <label class="form-label" for="sourceType">来源类型</label>
              <select id="sourceType" class="form-control" data-source-type>
                <option>门店</option>
                <option>分销渠道</option>
                <option>OTA平台</option>
                <option>官网</option>
                <option>企业客户</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="sourceStatus">状态</label>
              <select id="sourceStatus" class="form-control" data-source-status>
                <option>启用</option>
                <option>停用</option>
              </select>
            </div>
          </div>
        </section>

        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">业务承接</h3>
          </div>
          <div class="form-grid channel-source-form">
            <div class="form-group">
              <label class="form-label" for="sourceOwner">适用对象</label>
              <input id="sourceOwner" class="form-control" type="text" data-source-owner>
            </div>
            <div class="form-group">
              <label class="form-label" for="sourceOrderOwner">订单归属</label>
              <input id="sourceOrderOwner" class="form-control" type="text" data-source-order-owner>
            </div>
            <div class="form-group">
              <label class="form-label" for="sourceSettlement">收款/对账承接</label>
              <select id="sourceSettlement" class="form-control" data-source-settlement>
                <option>门店预存 / 门店对账</option>
                <option>分销对账 / 佣金规则</option>
                <option>平台对账 / 服务费</option>
                <option>到账流水 / 认款复核</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="sourceDefault">默认处理方式</label>
              <input id="sourceDefault" class="form-control" type="text" data-source-default>
            </div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <div class="drawer-footer-actions">
          <button class="btn btn-secondary" type="button" data-close-source>取消</button>
          <button class="btn btn-primary" type="button" data-save-source>保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('sourceDrawer');

      function cellText(row, index) {
        return row ? row.children[index].textContent.trim().replace(/\s+/g, ' ') : '';
      }

      function fillSource(row) {
        drawer.querySelector('#sourceDrawerTitle').textContent = row ? '编辑来源' : '新增来源';
        drawer.querySelector('[data-source-name]').value = cellText(row, 0);
        drawer.querySelector('[data-source-type]').value = row ? cellText(row, 1) : '门市';
        drawer.querySelector('[data-source-owner]').value = cellText(row, 2);
        drawer.querySelector('[data-source-order-owner]').value = cellText(row, 3);
        drawer.querySelector('[data-source-settlement]').value = row ? cellText(row, 4) : '门店预存 / 门店对账';
        drawer.querySelector('[data-source-default]').value = cellText(row, 5);
        drawer.querySelector('[data-source-status]').value = row ? cellText(row, 6) : '启用';
      }

      document.querySelectorAll('[data-open-source]').forEach(function (button) {
        button.addEventListener('click', function () {
          fillSource(button.closest('tr'));
          window.caesarUI.openLayer(drawer);
        });
      });
      drawer.querySelectorAll('[data-close-source]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
      drawer.querySelector('[data-save-source]').addEventListener('click', function () {
        window.caesarUI.closeLayer(drawer);
        window.caesarUI.toast('渠道来源已保存。');
      });
    })();
  </script>
</body>
</html>
