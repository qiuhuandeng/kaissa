<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺配置 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="ota-shops-page">
    <section class="list-page-panel">
      <div class="list-page-head">
        <h1 class="page-title">店铺配置</h1>
      </div>
    </section>

    <section class="list-surface" data-list-surface>
      <section class="filter-card filter-card-compact list-surface-filter" aria-label="OTA店铺筛选">
        <div class="list-surface-filter-actions list-filter-pinned-actions">
          <button class="btn btn-primary" type="button" data-open-shop>新增店铺</button>
        </div>
        <div class="filter-row">
          <label class="filter-item filter-item-search"><span class="sr-only">店铺</span><input type="search" placeholder="店铺名称/账号/负责人"></label>
          <label class="filter-item filter-item-sm"><span class="sr-only">平台</span><select><option>全部平台</option><option>携程</option><option>飞猪</option><option>同程</option></select></label>
          <label class="filter-item filter-item-status"><span class="sr-only">授权状态</span><select><option>全部状态</option><option>已授权</option><option>待授权</option><option>异常</option><option>停用</option></select></label>
          <div class="filter-actions"><button class="btn btn-secondary btn-filter-search" type="button">搜索</button><button class="btn btn-secondary" type="button">重置</button></div>
        </div>
      </section>

      <section class="table-wrap list-surface-table list-table-with-pagination business-optimized-table business-optimized-table-ota-shop" aria-label="OTA店铺列表">
        <table>
          <thead>
            <tr>
              <th>平台/店铺</th>
              <th>店铺账号</th>
              <th>负责人</th>
              <th>结算/类目</th>
              <th>退改/同步</th>
              <th>授权状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr data-shop="携程旗舰店">
              <td><span class="tag tag-blue">携程</span><div><strong>凯撒旅游旗舰店</strong></div></td>
              <td>caissa-ctrip</td>
              <td>吴敏<div class="table-cell-sub">平台运营</div></td>
	              <td>平台月结<div class="table-cell-sub">参团游 / 邮轮</div></td>
              <td>按系统退改政策<div class="table-cell-sub">商品/价格/库存/订单</div></td>
              <td><span class="tag tag-green">已授权</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button" data-open-shop>配置</button><button type="button" data-auth-shop>授权</button><button type="button" data-sync-shop>同步</button></div></td>
            </tr>
            <tr data-shop="飞猪旗舰店">
              <td><span class="tag tag-purple">飞猪</span><div><strong>凯撒度假旗舰店</strong></div></td>
              <td>caissa-fliggy</td>
              <td>陈琳<div class="table-cell-sub">渠道运营</div></td>
              <td>平台月结<div class="table-cell-sub">邮轮 / 自由行</div></td>
              <td>平台标准退改<div class="table-cell-sub">商品/价格/库存</div></td>
              <td><span class="tag tag-orange">待授权</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button" data-open-shop>配置</button><button type="button" data-auth-shop>授权</button><button type="button" data-sync-shop>同步</button></div></td>
            </tr>
            <tr data-shop="同程旗舰店">
	              <td><span class="tag tag-green">同程</span><div><strong>凯撒参团游专营店</strong></div></td>
              <td>caissa-ly</td>
              <td>赵敏<div class="table-cell-sub">平台运营</div></td>
	              <td>平台周结<div class="table-cell-sub">参团游 / 日本</div></td>
              <td>按平台编码映射<div class="table-cell-sub">商品/订单/退款</div></td>
              <td><span class="tag tag-red">授权异常</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button" data-open-shop>配置</button><button type="button" data-auth-shop>授权</button><button type="button" data-sync-shop>同步</button></div></td>
            </tr>
          </tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span>第1-3条/共3条</span>
      </div>
    </section>
  </main>

  <div id="shopDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal drawer-edit drawer-md ota-shop-drawer" role="dialog" aria-modal="true" aria-labelledby="shopDrawerTitle">
      <div class="modal-header">
        <div id="shopDrawerTitle" class="modal-title">新增店铺</div>
        <button class="modal-close" type="button" aria-label="关闭店铺配置" data-close-shop>×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">基础信息</h3>
          </div>
          <div class="form-grid ota-shop-form">
            <div class="form-group">
              <label class="form-label" for="shopPlatform">平台</label>
              <select id="shopPlatform" class="form-control" data-shop-platform><option>携程</option><option>飞猪</option><option>同程</option></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="shopName">店铺名称</label>
              <input id="shopName" class="form-control" type="text" data-shop-name>
            </div>
            <div class="form-group">
              <label class="form-label" for="shopAccount">店铺账号</label>
              <input id="shopAccount" class="form-control" type="text" data-shop-account>
            </div>
            <div class="form-group">
              <label class="form-label" for="shopOwner">负责人</label>
              <input id="shopOwner" class="form-control" type="text" data-shop-owner>
            </div>
          </div>
        </section>

        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">结算与类目</h3>
          </div>
          <div class="form-grid ota-shop-form">
            <div class="form-group">
              <label class="form-label" for="shopSettlement">结算方式</label>
              <select id="shopSettlement" class="form-control" data-shop-settlement><option>平台月结</option><option>平台周结</option><option>单单结</option></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="shopCategory">默认类目</label>
              <select id="shopCategory" class="form-control" data-shop-category><option>参团游 / 欧洲多国</option><option>参团游 / 日本</option><option>邮轮 / 地中海</option><option>自由行 / 机酒套餐</option></select>
            </div>
          </div>
        </section>

        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">同步范围</h3>
          </div>
          <div class="checkbox-group">
            <label><input type="checkbox" checked> 商品</label>
            <label><input type="checkbox" checked> 价格</label>
            <label><input type="checkbox" checked> 库存</label>
            <label><input type="checkbox" checked> 订单</label>
            <label><input type="checkbox"> 退款状态</label>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <div class="drawer-footer-actions">
          <button class="btn btn-secondary" type="button" data-close-shop>取消</button>
          <button class="btn btn-primary" type="button" data-save-shop>保存配置</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('shopDrawer');

      function directText(cell) {
        if (!cell) return '';
        return Array.prototype.filter.call(cell.childNodes, function (node) {
          return node.nodeType === Node.TEXT_NODE;
        }).map(function (node) { return node.textContent; }).join('').trim();
      }

      function subText(cell) {
        var sub = cell ? cell.querySelector('.table-cell-sub') : null;
        return sub ? sub.textContent.trim() : '';
      }

      function fillShop(row) {
        drawer.querySelector('#shopDrawerTitle').textContent = row ? '店铺配置' : '新增店铺';
        drawer.querySelector('[data-shop-platform]').value = row ? row.querySelector('td:first-child .tag').textContent.trim() : '携程';
        drawer.querySelector('[data-shop-name]').value = row ? row.querySelector('td:first-child strong').textContent.trim() : '';
        drawer.querySelector('[data-shop-account]').value = row ? row.children[1].textContent.trim() : '';
        drawer.querySelector('[data-shop-owner]').value = row ? directText(row.children[2]) : '';
        drawer.querySelector('[data-shop-settlement]').value = row ? directText(row.children[3]) : '平台月结';
        drawer.querySelector('[data-shop-category]').value = row ? subText(row.children[3]) : '参团游 / 欧洲多国';
      }

      document.querySelectorAll('[data-open-shop]').forEach(function (button) {
        button.addEventListener('click', function () {
          fillShop(button.closest('tr'));
          window.caesarUI.openLayer(drawer);
        });
      });
      drawer.querySelectorAll('[data-close-shop]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
      document.querySelectorAll('[data-auth-shop], [data-sync-shop]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.toast('店铺配置已进入处理队列。'); });
      });
      drawer.querySelector('[data-save-shop]').addEventListener('click', function () {
        window.caesarUI.closeLayer(drawer);
        window.caesarUI.toast('店铺配置已保存。');
      });
    })();
  </script>
</body>
</html>
