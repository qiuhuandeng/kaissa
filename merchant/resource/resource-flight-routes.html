<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航线库 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel flight-route-page">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">航线库</h1>
      </div>

    </div>
  </section>

<section class="list-surface resource-flight-routes-list-surface" data-list-surface>
<section class="filter-card filter-card-compact flight-route-filter list-surface-filter" aria-label="航线筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-flight-drawer>新增航线</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="flightKeyword">航线/航司/航班</label>
          <input id="flightKeyword" type="search" placeholder="航线/航司/航班">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="departCity">出发城市</label>
          <select id="departCity">
            <option>全部出发</option>
            <option>北京</option>
            <option>上海</option>
            <option>广州</option>
            <option>成都</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="arrivalCity">目的地</label>
          <select id="arrivalCity">
            <option>全部目的地</option>
            <option>巴黎</option>
            <option>法兰克福</option>
            <option>罗马</option>
            <option>大阪</option>
            <option>曼谷</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

  <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="航线列表">
    <table>
      <thead>
        <tr>
          <th>航线名称</th>
          <th>出发城市</th>
          <th>出发机场</th>
          <th>到达城市</th>
          <th>到达机场</th>
          <th>航司</th>
          <th>航段类型</th>
          <th>飞行时长</th>
          <th>适用目的地</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>北京巴黎常用航线</td>
          <td>北京</td>
          <td>首都T3</td>
          <td>巴黎</td>
          <td>戴高乐T1</td>
          <td>国航 / 法航</td>
          <td>直飞</td>
          <td>约11小时</td>
          <td>法国 / 瑞士 / 意大利</td>
          <td><div class="table-action"><button type="button" data-open-flight-drawer class="table-action-primary">编辑</button></div></td>
        </tr>
        <tr>
          <td>北京法兰克福常用航线</td>
          <td>北京</td>
          <td>首都T3</td>
          <td>法兰克福</td>
          <td>法兰克福T1</td>
          <td>国航 / 汉莎</td>
          <td>直飞</td>
          <td>约10.5小时</td>
          <td>德国 / 奥地利 / 捷克</td>
          <td><div class="table-action"><button type="button" data-open-flight-drawer class="table-action-primary">编辑</button></div></td>
        </tr>
        <tr>
          <td>上海大阪常用航线</td>
          <td>上海</td>
          <td>浦东T1</td>
          <td>大阪</td>
          <td>关西T1</td>
          <td>东航 / 日航</td>
          <td>直飞</td>
          <td>约2.5小时</td>
          <td>大阪 / 京都 / 奈良</td>
          <td><div class="table-action"><button type="button" data-open-flight-drawer class="table-action-primary">编辑</button></div></td>
        </tr>
        <tr>
          <td>广州曼谷常用航线</td>
          <td>广州</td>
          <td>白云T2</td>
          <td>曼谷</td>
          <td>素万那普</td>
          <td>南航 / 泰航</td>
          <td>直飞</td>
          <td>约3小时</td>
          <td>曼谷 / 清迈 / 芭提雅</td>
          <td><div class="table-action"><button type="button" data-open-flight-drawer class="table-action-primary">编辑</button></div></td>
        </tr>
      </tbody>
    </table>
  </section>
  <div class="pagination list-surface-pagination list-pagination-attached">
    <span>第1-4条/共4条</span>
  </div>

  </section>
  <div id="flightDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="flightDrawerTitle">
      <div class="modal-header">
        <h2 id="flightDrawerTitle">航线维护</h2>
        <button class="modal-close" type="button" data-close-flight-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">航线名称</label><input class="form-control" type="text" value="北京巴黎常用航线"></div>
          <div class="form-group"><label class="form-label">航段类型</label><select class="form-control"><option selected>直飞</option><option>中转</option></select></div>
          <div class="form-group"><label class="form-label">出发城市</label><input class="form-control" type="text" value="北京"></div>
          <div class="form-group"><label class="form-label">出发机场</label><input class="form-control" type="text" value="首都T3"></div>
          <div class="form-group"><label class="form-label">到达城市</label><input class="form-control" type="text" value="巴黎"></div>
          <div class="form-group"><label class="form-label">到达机场</label><input class="form-control" type="text" value="戴高乐T1"></div>
          <div class="form-group"><label class="form-label">中转城市</label><input class="form-control" type="text" value="直飞"></div>
          <div class="form-group"><label class="form-label">航司</label><input class="form-control" type="text" value="国航 / 法航"></div>
          <div class="form-group"><label class="form-label">常用航班</label><input class="form-control" type="text" value="CA933 / AF111"></div>
          <div class="form-group"><label class="form-label">飞行时长</label><input class="form-control" type="text" value="约11小时"></div>
          <div class="form-group"><label class="form-label">适用目的地</label><input class="form-control" type="text" value="法国 / 瑞士 / 意大利"></div>
          <div class="form-group form-group-full"><label class="form-label">备注</label><textarea class="form-control" rows="4">用于线路方案选择大交通时带出基础航线信息。</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-flight-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-flight-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("flightDrawer");
      document.querySelectorAll("[data-open-flight-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.openLayer(drawer); }));
      document.querySelectorAll("[data-close-flight-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.closeLayer(drawer); }));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
