<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运营商 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">运营商</h1>
      </div>

    </div>
  </section>

<section class="list-surface resource-train-operators-list-surface" data-list-surface>
<section class="filter-card filter-card-compact list-surface-filter" aria-label="专列运营商筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-operator-drawer>新增运营商</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="operatorKeyword">运营商名称/铁路局</label>
          <input id="operatorKeyword" type="search" placeholder="运营商名称/铁路局">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="operatorBureau">铁路局</label>
          <select id="operatorBureau">
            <option>全部铁路局</option>
            <option>西安铁路局</option>
            <option>哈尔滨铁路局</option>
            <option>成都铁路局</option>
            <option>乌鲁木齐铁路局</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

  <section class="table-wrap train-operator-table list-surface-table list-table-with-pagination" aria-label="专列运营商列表">
    <table>
      <thead>
        <tr>
          <th>运营商</th>
          <th>铁路局归属</th>
          <th>合作区域</th>
          <th>联系人</th>
          <th>合作方式</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><strong>丝路专列运营中心</strong></td><td>西安铁路局</td><td>西北、丝路方向</td><td>张经理 029-****8866</td><td>按车厢铺位切位</td><td><div class="table-action"><button type="button" data-open-operator-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>冰雪北国旅游专列公司</strong></td><td>哈尔滨铁路局</td><td>东北冰雪方向</td><td>王主任 0451-****9021</td><td>运营商回传铺位</td><td><div class="table-action"><button type="button" data-open-operator-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>茶马古道铁路文旅</strong></td><td>成都铁路局</td><td>西南文旅方向</td><td>李总 028-****6677</td><td>人工确认</td><td><div class="table-action"><button type="button" data-open-operator-drawer class="table-action-primary">编辑</button></div></td></tr>
      </tbody>
    </table>
  </section>
  <div class="pagination list-surface-pagination list-pagination-attached">
    <span>第1-3条/共3条</span>
  </div>

  </section>
  <div id="operatorDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="operatorDrawerTitle">
      <div class="modal-header">
        <h2 id="operatorDrawerTitle">运营商维护</h2>
        <button class="modal-close" type="button" data-close-operator-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">运营商名称</label><input class="form-control" type="text" value="丝路专列运营中心"></div>
          <div class="form-group"><label class="form-label">铁路局归属</label><select class="form-control"><option>西安铁路局</option><option>哈尔滨铁路局</option><option>成都铁路局</option></select></div>
          <div class="form-group"><label class="form-label">联系人</label><input class="form-control" type="text" value="张经理"></div>
          <div class="form-group"><label class="form-label">联系电话</label><input class="form-control" type="tel" value="029-****8866"></div>
          <div class="form-group"><label class="form-label">合作方式</label><select class="form-control"><option>按车厢铺位切位</option><option>运营商回传铺位</option><option>人工确认</option></select></div>
          <div class="form-group form-group-full"><label class="form-label">合作区域</label><input class="form-control" type="text" value="西北、丝路方向"></div>
          <div class="form-group form-group-full"><label class="form-label">备注</label><textarea class="form-control" rows="4">维护专列运营商基础档案和合作方式。</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-operator-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-operator-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("operatorDrawer");


      document.querySelectorAll("[data-open-operator-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.openLayer(drawer); }));
      document.querySelectorAll("[data-close-operator-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.closeLayer(drawer); }));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
