<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空公司 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">航空公司</h1>
      </div>
    </div>
  </section>

  <section class="list-surface resource-airlines-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="航空公司筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-airline-drawer>新增航空公司</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="airlineKeyword">航空公司/航司代码/供应商</label>
          <input id="airlineKeyword" type="search" placeholder="航空公司/航司代码/供应商">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="airlineStatus">状态</label>
          <select id="airlineStatus">
            <option>全部状态</option>
            <option>启用</option>
            <option>停用</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="航空公司列表">
      <table>
        <thead>
          <tr>
            <th>航空公司</th>
            <th>航司代码</th>
            <th>绑定供应商</th>
            <th>默认币种</th>
            <th>联系信息</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>中国国际航空</strong></td>
            <td>CA</td>
            <td>国航团队票中心</td>
            <td>CNY</td>
            <td>票务组 / 010-****6688</td>
            <td><span class="tag tag-green">启用</span></td>
            <td><div class="table-action"><button type="button" data-open-airline-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
          <tr>
            <td><strong>海南航空</strong></td>
            <td>HU</td>
            <td>海航团队销售部</td>
            <td>CNY</td>
            <td>航服组 / 0898-****8899</td>
            <td><span class="tag tag-green">启用</span></td>
            <td><div class="table-action"><button type="button" data-open-airline-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
          <tr>
            <td><strong>中国东方航空</strong></td>
            <td>MU</td>
            <td>东航华东销售部</td>
            <td>CNY</td>
            <td>亚洲票务 / 021-****6620</td>
            <td><span class="tag tag-green">启用</span></td>
            <td><div class="table-action"><button type="button" data-open-airline-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
          <tr>
            <td><strong>德国汉莎航空</strong></td>
            <td>LH</td>
            <td>汉莎航空中国区</td>
            <td>EUR</td>
            <td>欧洲票务 / 010-****7712</td>
            <td><span class="tag tag-orange">停用</span></td>
            <td><div class="table-action"><button type="button" data-open-airline-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
        </tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span>第1-4条/共4条</span>
    </div>
  </section>

  <div id="airlineDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-edit drawer-md resource-airline-drawer" role="dialog" aria-modal="true" aria-labelledby="airlineDrawerTitle">
      <div class="modal-header">
        <div id="airlineDrawerTitle" class="modal-title">航空公司维护</div>
        <button class="modal-close" type="button" data-close-airline-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">基础信息</h3>
          </div>
          <div class="form-grid resource-airline-form">
            <div class="form-group"><label class="form-label">航空公司名称</label><input class="form-control" type="text" value="中国国际航空"></div>
            <div class="form-group"><label class="form-label">航司代码</label><input class="form-control" type="text" value="CA"></div>
            <div class="form-group"><label class="form-label">默认币种</label><select class="form-control"><option selected>CNY</option><option>EUR</option><option>USD</option><option>JPY</option></select></div>
            <div class="form-group"><label class="form-label">状态</label><select class="form-control"><option selected>启用</option><option>停用</option></select></div>
          </div>
        </section>

        <section class="drawer-section">
          <div class="drawer-section-head">
            <h3 class="drawer-section-title">供应商与联系</h3>
          </div>
          <div class="form-grid resource-airline-form">
            <div class="form-group"><label class="form-label">绑定供应商</label><select class="form-control"><option selected>国航团队票中心</option><option>海航团队销售部</option><option>东航华东销售部</option><option>汉莎航空中国区</option></select></div>
            <div class="form-group"><label class="form-label">负责组</label><input class="form-control" type="text" value="票务组"></div>
            <div class="form-group"><label class="form-label">联系电话</label><input class="form-control" type="tel" value="010-****6688"></div>
            <div class="form-group form-group-full"><label class="form-label">备注</label><textarea class="form-control" rows="3">团队票、锁位协议和机票采购关联供应商。</textarea></div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <div class="drawer-footer-actions">
          <button class="btn btn-secondary" type="button" data-close-airline-drawer>取消</button>
          <button class="btn btn-primary" type="button" data-close-airline-drawer>保存</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('airlineDrawer');
      document.querySelectorAll('[data-open-airline-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.openLayer(drawer); });
      });
      document.querySelectorAll('[data-close-airline-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
