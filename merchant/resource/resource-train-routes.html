<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专列线路 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">专列线路</h1>
      </div>
      <div class="list-page-actions">
        <button class="btn btn-primary" type="button" data-open-train-drawer>新增专列线路</button>
      </div>
    </div>

    <section class="filter-card filter-card-compact" aria-label="专列线路筛选">
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="trainKeyword">线路/运营商/站点</label>
          <input id="trainKeyword" type="search" placeholder="线路/运营商/站点">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="trainStart">起点</label>
          <select id="trainStart">
            <option>全部起点</option>
            <option>西安</option>
            <option>哈尔滨</option>
            <option>成都</option>
            <option>兰州</option>
          </select>
        </div>
        <div class="filter-item filter-item-status">
          <label class="sr-only" for="trainStatus">状态</label>
          <select id="trainStatus">
            <option>全部状态</option>
            <option>启用</option>
            <option>筹备中</option>
            <option>停用</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>
  </section>

  <section class="table-wrap train-route-table" aria-label="专列线路列表">
    <table>
      <thead>
        <tr>
          <th>线路名称</th>
          <th>运营商</th>
          <th>起终点</th>
          <th>途经站</th>
          <th>席别库存模板</th>
          <th>包列成本</th>
          <th>发车季节</th>
          <th>关联产品</th>
          <th>团期承接</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><strong>丝绸之路专列12日</strong></td><td>丝路专列运营中心</td><td>西安 → 乌鲁木齐</td><td>兰州、敦煌、吐鲁番、喀什</td><td>软卧64 / 硬卧144 / 包厢16</td><td>¥1,420,000/团期</td><td>5-10月</td><td>丝路专列深度游</td><td><span class="tag tag-green">可生成团期</span></td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-train-drawer>编辑</button><a href="../product/product-train-routes.html">产品</a></div></td></tr>
        <tr><td><strong>东北林海雪原8日</strong></td><td>冰雪北国旅游专列公司</td><td>哈尔滨 → 长春</td><td>雪乡、亚布力、吉林</td><td>软卧48 / 硬卧96</td><td>¥880,000/团期</td><td>12-2月</td><td>冰雪北国专列</td><td><span class="tag tag-green">可生成团期</span></td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-train-drawer>编辑</button><a href="../product/product-train-routes.html">产品</a></div></td></tr>
        <tr><td><strong>茶马古道专列10日</strong></td><td>茶马古道铁路文旅</td><td>成都 → 昆明</td><td>大理、丽江、香格里拉</td><td>车厢待确认</td><td>待确认</td><td>3-6月</td><td>茶马古道专列</td><td><span class="tag tag-orange">筹备中</span></td><td><span class="tag tag-orange">筹备中</span></td><td><div class="table-action"><button type="button" data-open-train-drawer>编辑</button><a href="../product/product-train-routes.html">产品</a></div></td></tr>
      </tbody>
    </table>
  </section>

  <div id="trainDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="trainDrawerTitle">
      <div class="modal-header">
        <h2 id="trainDrawerTitle">专列线路维护</h2>
        <button class="modal-close" type="button" data-close-train-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">线路名称</label><input class="form-control" type="text" value="丝绸之路专列12日"></div>
          <div class="form-group"><label class="form-label">运营商</label><select class="form-control"><option>丝路专列运营中心</option><option>冰雪北国旅游专列公司</option></select></div>
          <div class="form-group"><label class="form-label">起点站</label><input class="form-control" type="text" value="西安"></div>
          <div class="form-group"><label class="form-label">终点站</label><input class="form-control" type="text" value="乌鲁木齐"></div>
          <div class="form-group"><label class="form-label">包列成本</label><input class="form-control" type="text" value="¥1,420,000/团期"></div>
          <div class="form-group"><label class="form-label">团期承接</label><select class="form-control"><option>可生成团期</option><option>筹备中</option><option>停用</option></select></div>
          <div class="form-group form-group-full"><label class="form-label">席别库存模板</label><input class="form-control" type="text" value="软卧64 / 硬卧144 / 包厢16"></div>
          <div class="form-group form-group-full"><label class="form-label">途经站与服务</label><textarea class="form-control" rows="4">兰州、敦煌、吐鲁番、喀什，沿途景区和餐饮资源可在产品线路中组合。</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-train-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-train-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("trainDrawer");
      function openDrawer() {
        drawer.hidden = false;
        requestAnimationFrame(() => drawer.classList.add("show"));
      }
      function closeDrawer() {
        drawer.classList.remove("show");
        window.setTimeout(() => {
          drawer.hidden = true;
        }, 240);
      }
      document.querySelectorAll("[data-open-train-drawer]").forEach((button) => button.addEventListener("click", openDrawer));
      document.querySelectorAll("[data-close-train-drawer]").forEach((button) => button.addEventListener("click", closeDrawer));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) closeDrawer();
      });
    })();
  </script>
</body>
</html>
