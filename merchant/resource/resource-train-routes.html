<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专列模板 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">专列模板</h1>
      </div>
    </div>
  </section>

  <section class="list-surface resource-train-routes-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="专列模板筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-train-drawer>新增模板</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="trainKeyword">模板/车次/运营商</label>
          <input id="trainKeyword" type="search" placeholder="模板/车次/运营商">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="trainTrip">适用车次</label>
          <select id="trainTrip">
            <option>全部车次</option>
            <option>Y653</option>
            <option>Y668</option>
            <option>Y721</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="table-wrap train-route-table list-surface-table list-table-with-pagination" aria-label="专列模板列表">
      <table>
        <thead>
          <tr>
            <th>模板名称</th>
            <th>适用车次</th>
            <th>运营商</th>
            <th>车厢结构</th>
            <th>席别</th>
            <th>铺位</th>
            <th>标准容量</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td><strong>丝路铺位模板</strong></td><td>Y653 / Y655</td><td>丝路专列运营中心</td><td>6-9号软卧车、10-12号硬卧车、餐车</td><td>软卧/硬卧</td><td>上铺/中铺/下铺</td><td>96铺</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
          <tr><td><strong>冰雪铺位模板</strong></td><td>Y668</td><td>冰雪北国旅游专列公司</td><td>3-5号硬卧车、6号软卧车</td><td>软卧/硬卧</td><td>上铺/中铺/下铺</td><td>88铺</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
          <tr><td><strong>茶马铺位模板</strong></td><td>Y721</td><td>茶马古道铁路文旅</td><td>2-4号软卧车、5-7号硬卧车</td><td>软卧/硬卧</td><td>上铺/中铺/下铺</td><td>76铺</td><td><span class="tag tag-gray">停用</span></td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
        </tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span>第1-3条/共3条</span>
    </div>
  </section>

  <div id="trainDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-lg" role="dialog" aria-modal="true" aria-labelledby="trainDrawerTitle">
      <div class="modal-header">
        <h2 id="trainDrawerTitle">专列模板</h2>
        <button class="modal-close" type="button" data-close-train-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">模板名称</label><input class="form-control" type="text" value="丝路铺位模板"></div>
          <div class="form-group"><label class="form-label">适用车次</label><select class="form-control"><option selected>Y653 / Y655</option><option>Y668</option><option>Y721</option></select></div>
          <div class="form-group"><label class="form-label">运营商</label><input class="form-control" type="text" value="丝路专列运营中心" readonly></div>
          <div class="form-group"><label class="form-label">状态</label><select class="form-control"><option selected>启用</option><option>停用</option></select></div>
        </div>
        <section class="table-wrap" aria-label="铺位结构">
          <table>
            <thead>
              <tr>
                <th>车厢</th>
                <th>席别</th>
                <th>铺位</th>
                <th>标准容量</th>
                <th>是否售卖</th>
              </tr>
            </thead>
            <tbody>
              <tr><td><input class="table-input" type="text" value="6号车"></td><td><input class="table-input" type="text" value="软卧"></td><td><input class="table-input" type="text" value="下铺"></td><td><input class="table-input" type="number" value="16"></td><td><select class="table-input"><option selected>是</option><option>否</option></select></td></tr>
              <tr><td><input class="table-input" type="text" value="7号车"></td><td><input class="table-input" type="text" value="硬卧"></td><td><input class="table-input" type="text" value="中铺"></td><td><input class="table-input" type="number" value="24"></td><td><select class="table-input"><option selected>是</option><option>否</option></select></td></tr>
              <tr><td><input class="table-input" type="text" value="8号车"></td><td><input class="table-input" type="text" value="硬卧"></td><td><input class="table-input" type="text" value="上铺"></td><td><input class="table-input" type="number" value="24"></td><td><select class="table-input"><option selected>是</option><option>否</option></select></td></tr>
            </tbody>
          </table>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-train-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-train-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('trainDrawer');
      document.querySelectorAll('[data-open-train-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.openLayer(drawer); });
      });
      document.querySelectorAll('[data-close-train-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
