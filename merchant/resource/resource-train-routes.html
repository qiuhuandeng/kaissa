<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专列模板 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">专列模板</h1>
      </div>

    </div>
  </section>

<section class="list-surface resource-train-routes-list-surface" data-list-surface>
<section class="filter-card filter-card-compact list-surface-filter" aria-label="专列模板筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-train-drawer>新增模板</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="trainKeyword">模板/运营商/站点</label>
          <input id="trainKeyword" type="search" placeholder="模板/运营商/站点">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="trainStart">起点</label>
          <select id="trainStart">
            <option>全部起点</option>
            <option>西安</option>
            <option>哈尔滨</option>
            <option>成都</option>
            <option>兰州</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

  <section class="table-wrap train-route-table list-surface-table list-table-with-pagination" aria-label="专列模板列表">
    <table>
      <thead>
        <tr>
          <th>模板名称</th>
          <th>运营商</th>
          <th>起点站</th>
          <th>终点站</th>
          <th>途经站</th>
          <th>基础席别</th>
          <th>发车季节</th>
          <th>基础车厢</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><strong>丝绸之路基础线</strong></td><td>丝路专列运营中心</td><td>西安</td><td>乌鲁木齐</td><td>兰州、敦煌、吐鲁番、喀什</td><td>软卧/硬卧/包厢</td><td>5-10月</td><td>软卧车、硬卧车、餐车</td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>东北冰雪基础线</strong></td><td>冰雪北国旅游专列公司</td><td>哈尔滨</td><td>长春</td><td>雪乡、亚布力、吉林</td><td>软卧/硬卧</td><td>12-2月</td><td>软卧车、硬卧车</td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>茶马古道基础线</strong></td><td>茶马古道铁路文旅</td><td>成都</td><td>昆明</td><td>大理、丽江、香格里拉</td><td>软卧/硬卧</td><td>3-6月</td><td>软卧车、硬卧车</td><td><div class="table-action"><button type="button" data-open-train-drawer class="table-action-primary">编辑</button></div></td></tr>
      </tbody>
    </table>
  </section>
  <div class="pagination list-surface-pagination list-pagination-attached">
    <span>第1-3条/共3条</span>
  </div>

  </section>
  <div id="trainDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="trainDrawerTitle">
      <div class="modal-header">
        <h2 id="trainDrawerTitle">专列模板</h2>
        <button class="modal-close" type="button" data-close-train-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">模板名称</label><input class="form-control" type="text" value="丝绸之路基础线"></div>
          <div class="form-group"><label class="form-label">运营商</label><select class="form-control"><option>丝路专列运营中心</option><option>冰雪北国旅游专列公司</option></select></div>
          <div class="form-group"><label class="form-label">起点站</label><input class="form-control" type="text" value="西安"></div>
          <div class="form-group"><label class="form-label">终点站</label><input class="form-control" type="text" value="乌鲁木齐"></div>
          <div class="form-group"><label class="form-label">发车季节</label><input class="form-control" type="text" value="5-10月"></div>
          <div class="form-group form-group-full"><label class="form-label">基础席别</label><input class="form-control" type="text" value="软卧、硬卧、包厢"></div>
          <div class="form-group form-group-full"><label class="form-label">基础车厢结构</label><input class="form-control" type="text" value="软卧车、硬卧车、餐车、服务车"></div>
          <div class="form-group form-group-full"><label class="form-label">途经站顺序</label><textarea class="form-control" rows="4">西安 / 兰州 / 敦煌 / 吐鲁番 / 喀什 / 乌鲁木齐</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-train-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-train-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("trainDrawer");
      document.querySelectorAll("[data-open-train-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.openLayer(drawer); }));
      document.querySelectorAll("[data-close-train-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.closeLayer(drawer); }));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
