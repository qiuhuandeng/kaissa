<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车次库 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">车次库</h1>
      </div>
    </div>
  </section>

  <section class="list-surface resource-train-trips-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="车次筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-trip-drawer>新增车次</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="tripKeyword">车次/运营商/站点</label>
          <input id="tripKeyword" type="search" placeholder="车次/运营商/站点">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="tripOperator">运营商</label>
          <select id="tripOperator">
            <option>全部运营商</option>
            <option>丝路专列运营中心</option>
            <option>冰雪北国旅游专列公司</option>
            <option>茶马古道铁路文旅</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="tripStatus">状态</label>
          <select id="tripStatus">
            <option>全部状态</option>
            <option>启用</option>
            <option>停用</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="车次列表">
      <table>
        <thead>
          <tr>
            <th>车次</th>
            <th>运行线路</th>
            <th>始发/终到</th>
            <th>途经站</th>
            <th>运营商</th>
            <th>铁路局</th>
            <th>默认模板</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Y653</strong></td>
            <td>东方丝路线</td>
            <td>西安站 → 乌鲁木齐站</td>
            <td>兰州 / 敦煌 / 吐鲁番</td>
            <td>丝路专列运营中心</td>
            <td>西安铁路局</td>
            <td>丝路铺位模板</td>
            <td><span class="tag tag-green">启用</span></td>
            <td><div class="table-action"><button type="button" data-open-trip-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
          <tr>
            <td><strong>Y668</strong></td>
            <td>东北冰雪线</td>
            <td>北京站 → 漠河站</td>
            <td>哈尔滨 / 亚布力 / 雪乡</td>
            <td>冰雪北国旅游专列公司</td>
            <td>哈尔滨铁路局</td>
            <td>冰雪铺位模板</td>
            <td><span class="tag tag-green">启用</span></td>
            <td><div class="table-action"><button type="button" data-open-trip-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
          <tr>
            <td><strong>Y721</strong></td>
            <td>茶马古道线</td>
            <td>成都站 → 昆明站</td>
            <td>大理 / 丽江 / 香格里拉</td>
            <td>茶马古道铁路文旅</td>
            <td>成都铁路局</td>
            <td>茶马铺位模板</td>
            <td><span class="tag tag-gray">停用</span></td>
            <td><div class="table-action"><button type="button" data-open-trip-drawer class="table-action-primary">编辑</button></div></td>
          </tr>
        </tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span>第1-3条/共3条</span>
    </div>
  </section>

  <div id="tripDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="tripDrawerTitle">
      <div class="modal-header">
        <h2 id="tripDrawerTitle">车次维护</h2>
        <button class="modal-close" type="button" data-close-trip-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">车次</label><input class="form-control" type="text" value="Y653"></div>
          <div class="form-group"><label class="form-label">运行线路</label><input class="form-control" type="text" value="东方丝路线"></div>
          <div class="form-group"><label class="form-label">始发站</label><input class="form-control" type="text" value="西安站"></div>
          <div class="form-group"><label class="form-label">终到站</label><input class="form-control" type="text" value="乌鲁木齐站"></div>
          <div class="form-group"><label class="form-label">运营商</label><select class="form-control"><option selected>丝路专列运营中心</option><option>冰雪北国旅游专列公司</option><option>茶马古道铁路文旅</option></select></div>
          <div class="form-group"><label class="form-label">铁路局</label><input class="form-control" type="text" value="西安铁路局" readonly></div>
          <div class="form-group"><label class="form-label">默认专列模板</label><select class="form-control"><option selected>丝路铺位模板</option><option>冰雪铺位模板</option><option>茶马铺位模板</option></select></div>
          <div class="form-group"><label class="form-label">状态</label><select class="form-control"><option selected>启用</option><option>停用</option></select></div>
          <div class="form-group form-group-full"><label class="form-label">途经站</label><textarea class="form-control" rows="3">西安 / 兰州 / 敦煌 / 吐鲁番 / 乌鲁木齐</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-trip-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-trip-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('tripDrawer');
      document.querySelectorAll('[data-open-trip-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.openLayer(drawer); });
      });
      document.querySelectorAll('[data-close-trip-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
