<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>船只档案 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">船只档案</h1>
      </div>
    </div>
  </section>

  <section class="list-surface resource-cruise-ships-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="船只筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-ship-drawer>新增船只</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="shipKeyword">船名/船公司</label>
          <input id="shipKeyword" type="search" placeholder="船名/船公司">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="shipCompany">船公司</label>
          <select id="shipCompany">
            <option>全部船公司</option>
            <option>地中海邮轮</option>
            <option>皇家加勒比</option>
            <option>歌诗达邮轮</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <section class="table-wrap cruise-ship-table list-surface-table list-table-with-pagination" aria-label="船只档案列表">
      <table>
        <thead>
          <tr>
            <th>船只</th>
            <th>船公司</th>
            <th>供应商</th>
            <th>母港</th>
            <th>吨位/建造</th>
            <th>载客量</th>
            <th>基础舱型</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td><strong>理想号</strong></td><td>地中海邮轮</td><td>地中海邮轮中国销售中心</td><td>上海</td><td>17.16万吨 / 2019年</td><td>4,888人</td><td>内舱/海景/阳台/套房<br><span class="text-muted">支持三四人、儿童不占位</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">模板</a></div></td></tr>
          <tr><td><strong>海洋绿洲号</strong></td><td>皇家加勒比</td><td>皇家加勒比中国区</td><td>巴塞罗那</td><td>22.81万吨 / 2009年</td><td>6,780人</td><td>内舱/海景/阳台/套房<br><span class="text-muted">支持三四人、儿童不占位</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">模板</a></div></td></tr>
          <tr><td><strong>歌诗达威尼斯号</strong></td><td>歌诗达邮轮</td><td>歌诗达邮轮华东销售部</td><td>罗马</td><td>13.55万吨 / 2019年</td><td>5,260人</td><td>内舱/阳台<br><span class="text-muted">儿童不占位需船方确认</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">模板</a></div></td></tr>
        </tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span>第1-3条/共3条</span>
    </div>
  </section>

  <div id="shipDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-edit drawer-lg resource-cruise-ship-drawer" role="dialog" aria-modal="true" aria-labelledby="shipDrawerTitle">
      <div class="modal-header">
        <h2 id="shipDrawerTitle" class="modal-title">船只维护</h2>
        <button class="modal-close" type="button" data-close-ship-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <section class="drawer-section">
          <h3 class="drawer-section-title">船只信息</h3>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">船名</label><input class="form-control" type="text" value="理想号"></div>
            <div class="form-group"><label class="form-label">船公司</label><select class="form-control"><option selected>地中海邮轮</option><option>皇家加勒比</option><option>歌诗达邮轮</option></select></div>
            <div class="form-group"><label class="form-label">绑定供应商</label><input class="form-control" type="text" value="地中海邮轮中国销售中心" readonly></div>
            <div class="form-group"><label class="form-label">母港</label><input class="form-control" type="text" value="上海"></div>
            <div class="form-group"><label class="form-label">吨位/建造</label><input class="form-control" type="text" value="17.16万吨 / 2019年"></div>
            <div class="form-group"><label class="form-label">载客量</label><input class="form-control" type="text" value="4,888人"></div>
            <div class="form-group form-group-full"><label class="form-label">设施与舱型备注</label><textarea class="form-control" rows="3">甲板资料、公共设施和舱型规则以船方资料为准。</textarea></div>
          </div>
        </section>

        <section class="drawer-section">
          <h3 class="drawer-section-title">基础舱型</h3>
          <div class="table-wrap drawer-table-wrap resource-cruise-cabin-table drawer-table-fit drawer-table-cols-5" aria-label="基础舱型模板">
            <table>
              <thead>
                <tr>
                  <th>舱型</th>
                  <th>标准入住</th>
                  <th>最大入住</th>
                  <th>第三/第四人</th>
                  <th>儿童不占位</th>
                </tr>
              </thead>
              <tbody>
                <tr><td><input class="table-input" type="text" value="内舱"></td><td><input class="table-input" type="number" value="2"></td><td><input class="table-input" type="number" value="4"></td><td><select class="table-input"><option selected>支持</option><option>不支持</option></select></td><td><select class="table-input"><option selected>支持</option><option>需确认</option><option>不支持</option></select></td></tr>
                <tr><td><input class="table-input" type="text" value="海景"></td><td><input class="table-input" type="number" value="2"></td><td><input class="table-input" type="number" value="4"></td><td><select class="table-input"><option selected>支持</option><option>不支持</option></select></td><td><select class="table-input"><option selected>支持</option><option>需确认</option><option>不支持</option></select></td></tr>
                <tr><td><input class="table-input" type="text" value="阳台"></td><td><input class="table-input" type="number" value="2"></td><td><input class="table-input" type="number" value="4"></td><td><select class="table-input"><option selected>支持</option><option>不支持</option></select></td><td><select class="table-input"><option selected>支持</option><option>需确认</option><option>不支持</option></select></td></tr>
                <tr><td><input class="table-input" type="text" value="套房"></td><td><input class="table-input" type="number" value="2"></td><td><input class="table-input" type="number" value="4"></td><td><select class="table-input"><option selected>支持</option><option>不支持</option></select></td><td><select class="table-input"><option>支持</option><option selected>需确认</option><option>不支持</option></select></td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <div class="drawer-footer-actions">
          <button class="btn btn-secondary" type="button" data-close-ship-drawer>取消</button>
          <button class="btn btn-primary" type="button" data-close-ship-drawer>保存</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var drawer = document.getElementById('shipDrawer');
      document.querySelectorAll('[data-open-ship-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.openLayer(drawer); });
      });
      document.querySelectorAll('[data-close-ship-drawer]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(drawer); });
      });
      drawer.addEventListener('click', function (event) {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
