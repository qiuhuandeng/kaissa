<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>船只档案 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">船只档案</h1>
      </div>

    </div>
  </section>

<section class="list-surface resource-cruise-ships-list-surface" data-list-surface>
<section class="filter-card filter-card-compact list-surface-filter" aria-label="船只筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-ship-drawer>新增船只</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="shipKeyword">船名/船公司</label>
          <input id="shipKeyword" type="search" placeholder="船名/船公司">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="shipPort">母港</label>
          <select id="shipPort">
            <option>全部母港</option>
            <option>上海</option>
            <option>巴塞罗那</option>
            <option>罗马</option>
            <option>新加坡</option>
          </select>
        </div>
        <div class="filter-item filter-item-status">
          <label class="sr-only" for="shipStatus">状态</label>
          <select id="shipStatus">
            <option>全部状态</option>
            <option>启用</option>
            <option>维护中</option>
            <option>停用</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

  <section class="table-wrap cruise-ship-table list-surface-table list-table-with-pagination" aria-label="船只档案列表">
    <table>
      <thead>
        <tr>
          <th>船只</th>
          <th>船公司</th>
          <th>母港</th>
          <th>载客量</th>
          <th>舱型模板</th>
          <th>可售库存</th>
          <th>关联线路</th>
          <th>团期承接</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><strong>地中海荣耀号</strong><br><span class="text-muted">17.16万吨 / 2019年</span></td><td>地中海邮轮</td><td>上海</td><td>4,888人</td><td>内舱/海景/阳台/套房</td><td>7月可售326间</td><td>地中海经典线、日韩短线</td><td><span class="tag tag-green">可生成团期</span></td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">线路</a></div></td></tr>
        <tr><td><strong>海洋绿洲号</strong><br><span class="text-muted">22.81万吨 / 2009年</span></td><td>皇家加勒比</td><td>巴塞罗那</td><td>6,780人</td><td>内舱/海景/阳台/套房</td><td>8月可售218间</td><td>西地中海精华</td><td><span class="tag tag-green">可生成团期</span></td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">线路</a></div></td></tr>
        <tr><td><strong>歌诗达威尼斯号</strong><br><span class="text-muted">13.55万吨 / 2019年</span></td><td>歌诗达邮轮</td><td>罗马</td><td>5,260人</td><td>内舱/阳台</td><td>库存暂停确认</td><td>西地中海精华</td><td><span class="tag tag-orange">维护暂停</span></td><td><span class="tag tag-orange">维护中</span></td><td><div class="table-action"><button type="button" data-open-ship-drawer class="table-action-primary">编辑</button><a href="resource-cruise-routes.html">线路</a></div></td></tr>
      </tbody>
    </table>
  </section>
  <div class="pagination list-surface-pagination list-pagination-attached">
    <span>第1-3条/共3条</span>
  </div>

  </section>
  <div id="shipDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="shipDrawerTitle">
      <div class="modal-header">
        <h2 id="shipDrawerTitle">船只维护</h2>
        <button class="modal-close" type="button" data-close-ship-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">船名</label><input class="form-control" type="text" value="地中海荣耀号"></div>
          <div class="form-group"><label class="form-label">船公司</label><select class="form-control"><option>地中海邮轮</option><option>皇家加勒比</option><option>歌诗达邮轮</option></select></div>
          <div class="form-group"><label class="form-label">母港</label><input class="form-control" type="text" value="上海"></div>
          <div class="form-group"><label class="form-label">载客量</label><input class="form-control" type="text" value="4,888人"></div>
          <div class="form-group form-group-full"><label class="form-label">舱型模板</label><input class="form-control" type="text" value="内舱、海景、阳台、套房"></div>
          <div class="form-group form-group-full"><label class="form-label">库存说明</label><textarea class="form-control" rows="4">舱型库存用于邮轮产品开排团期和订单分舱，库存调整需同步产品和渠道。</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-ship-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-ship-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("shipDrawer");
      function openDrawer() {
        if (window.caesarUI) {
          window.caesarUI.openDrawer(drawer);
          return;
        }
        drawer.hidden = false;
        requestAnimationFrame(() => drawer.classList.add("show"));
      }
      function closeDrawer() {
        if (window.caesarUI) {
          window.caesarUI.closeDrawer(drawer);
          return;
        }
        drawer.classList.remove("show");
        window.setTimeout(() => {
          drawer.hidden = true;
        }, 240);
      }
      document.querySelectorAll("[data-open-ship-drawer]").forEach((button) => button.addEventListener("click", openDrawer));
      document.querySelectorAll("[data-close-ship-drawer]").forEach((button) => button.addEventListener("click", closeDrawer));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) closeDrawer();
      });
    })();
  </script>
</body>
</html>
