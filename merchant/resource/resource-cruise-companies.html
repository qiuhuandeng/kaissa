<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>船公司 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">船公司</h1>
      </div>

    </div>
  </section>

<section class="list-surface resource-cruise-companies-list-surface" data-list-surface>
<section class="filter-card filter-card-compact list-surface-filter" aria-label="船公司筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <button class="btn btn-primary" type="button" data-open-cruise-drawer>新增船公司</button>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="companyKeyword">船公司名称</label>
          <input id="companyKeyword" type="search" placeholder="船公司名称">
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="companyArea">国家地区</label>
          <select id="companyArea">
            <option>全部地区</option>
            <option>意大利</option>
            <option>美国</option>
            <option>中国</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

  <section class="table-wrap cruise-company-table list-surface-table list-table-with-pagination" aria-label="船公司列表">
    <table>
      <thead>
        <tr>
          <th>船公司</th>
          <th>国家/地区</th>
          <th>联系人</th>
          <th>合作方式</th>
          <th>基础备注</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><strong>地中海邮轮 MSC Cruises</strong></td><td>意大利</td><td>赵总监 021-****8800</td><td>直采合作</td><td>地中海、日韩、东南亚邮轮</td><td><div class="table-action"><button type="button" data-open-cruise-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>皇家加勒比国际游轮</strong></td><td>美国</td><td>李经理 010-****6621</td><td>直采合作</td><td>地中海、加勒比邮轮</td><td><div class="table-action"><button type="button" data-open-cruise-drawer class="table-action-primary">编辑</button></div></td></tr>
        <tr><td><strong>歌诗达邮轮 Costa Cruises</strong></td><td>意大利</td><td>陈经理 021-****2356</td><td>代理合作</td><td>欧洲短线、日韩航线</td><td><div class="table-action"><button type="button" data-open-cruise-drawer class="table-action-primary">编辑</button></div></td></tr>
      </tbody>
    </table>
  </section>
  <div class="pagination list-surface-pagination list-pagination-attached">
    <span>第1-3条/共3条</span>
  </div>

  </section>
  <div id="cruiseDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="cruiseDrawerTitle">
      <div class="modal-header">
        <h2 id="cruiseDrawerTitle">船公司维护</h2>
        <button class="modal-close" type="button" data-close-cruise-drawer aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">公司名称</label><input class="form-control" type="text" value="地中海邮轮 MSC Cruises"></div>
          <div class="form-group"><label class="form-label">国家/地区</label><input class="form-control" type="text" value="意大利"></div>
          <div class="form-group"><label class="form-label">联系人</label><input class="form-control" type="text" value="赵总监"></div>
          <div class="form-group"><label class="form-label">联系电话</label><input class="form-control" type="tel" value="021-****8800"></div>
          <div class="form-group"><label class="form-label">合作方式</label><select class="form-control"><option selected>直采合作</option><option>代理合作</option><option>资料备案</option></select></div>
          <div class="form-group form-group-full"><label class="form-label">基础备注</label><textarea class="form-control" rows="4">地中海、日韩、东南亚邮轮。</textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-cruise-drawer>取消</button>
        <button class="btn btn-primary" type="button" data-close-cruise-drawer>保存</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const drawer = document.getElementById("cruiseDrawer");


      document.querySelectorAll("[data-open-cruise-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.openLayer(drawer); }));
      document.querySelectorAll("[data-close-cruise-drawer]").forEach((button) => button.addEventListener("click", function () { window.caesarUI.closeLayer(drawer); }));
      drawer.addEventListener("click", (event) => {
        if (event.target === drawer) window.caesarUI.closeLayer(drawer);
      });
    })();
  </script>
</body>
</html>
