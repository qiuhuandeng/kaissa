<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预订中心 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-merchant.js"></script>

  <main class="booking-layout" aria-label="预订下单">
    <section class="card booking-product-panel" aria-label="产品选择区">
      <div class="booking-search">
        <label class="sr-only" for="bookingProductSearch">搜索产品名称或编号</label>
        <input id="bookingProductSearch" class="form-control booking-search-input" type="search" placeholder="搜索产品名称或编号">
      </div>

      <nav class="tab-bar booking-category-tabs" aria-label="产品分类筛选">
        <button class="tab-item active" type="button" data-booking-category="全部">全部</button>
        <button class="tab-item" type="button" data-booking-category="跟团游">跟团游</button>
        <button class="tab-item" type="button" data-booking-category="自由行">自由行</button>
        <button class="tab-item" type="button" data-booking-category="邮轮">邮轮</button>
        <button class="tab-item" type="button" data-booking-category="MICE">MICE</button>
      </nav>

      <div class="booking-product-list">
        <button class="booking-product-card selected" type="button" data-category="跟团游" data-product-name="欧洲十国经典游·12天" data-product-code="KS-EU-001" aria-pressed="true">
          <span class="booking-product-thumb thumb-blue"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">欧洲十国经典游·12天</span>
            <span class="booking-product-meta">北京出发 | 法国/德国等 | 12天</span>
            <span class="booking-product-bottom"><strong>¥12,800起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>

        <button class="booking-product-card" type="button" data-category="跟团游" data-product-name="日本关西深度游·7天" data-product-code="KS-JP-002" aria-pressed="false">
          <span class="booking-product-thumb thumb-green"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">日本关西深度游·7天</span>
            <span class="booking-product-meta">上海出发 | 大阪/京都 | 7天</span>
            <span class="booking-product-bottom"><strong>¥8,980起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>

        <button class="booking-product-card" type="button" data-category="自由行" data-product-name="三亚亲子5日游" data-product-code="KS-HN-003" aria-pressed="false">
          <span class="booking-product-thumb thumb-orange"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">三亚亲子5日游</span>
            <span class="booking-product-meta">全国出发 | 三亚 | 5天</span>
            <span class="booking-product-bottom"><strong>¥6,800起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>

        <button class="booking-product-card" type="button" data-category="邮轮" data-product-name="理想号地中海邮轮" data-product-code="KS-CZ-004" aria-pressed="false">
          <span class="booking-product-thumb thumb-purple"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">理想号地中海邮轮</span>
            <span class="booking-product-meta">上海出发 | 地中海 | 14天</span>
            <span class="booking-product-bottom"><strong>¥28,800起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>

        <button class="booking-product-card" type="button" data-category="自由行" data-product-name="北京故宫定制游" data-product-code="KS-BJ-006" aria-pressed="false">
          <span class="booking-product-thumb thumb-cyan"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">北京故宫定制游</span>
            <span class="booking-product-meta">全国出发 | 北京 | 3天</span>
            <span class="booking-product-bottom"><strong>¥3,800起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>

        <button class="booking-product-card" type="button" data-category="跟团游" data-product-name="泰国曼谷清迈8日" data-product-code="KS-TH-007" aria-pressed="false">
          <span class="booking-product-thumb thumb-red"></span>
          <span class="booking-product-info">
            <span class="booking-product-title">泰国曼谷清迈8日</span>
            <span class="booking-product-meta">上海出发 | 曼谷/清迈 | 8天</span>
            <span class="booking-product-bottom"><strong>¥5,980起</strong><span class="tag tag-green">在售</span></span>
          </span>
        </button>
      </div>
    </section>

    <section class="card booking-form-panel" aria-label="下单表单区">
      <div class="booking-selected-product">
        <div>
          <span class="booking-section-kicker">已选产品</span>
          <strong id="selectedProductName">欧洲十国经典游·12天</strong>
        </div>
        <button class="booking-change-product" type="button">更换产品×</button>
      </div>

      <section class="booking-section" aria-labelledby="scheduleTitle">
        <h2 id="scheduleTitle" class="booking-section-title">选择团期</h2>
        <div class="table-wrap booking-schedule-table">
          <table>
            <thead>
              <tr>
                <th>出发日期</th>
                <th>余位</th>
                <th>价格</th>
                <th>选择</th>
              </tr>
            </thead>
            <tbody>
              <tr class="selected" data-schedule-row>
                <td>2024-07-15</td>
                <td><span class="booking-seat-danger">余3位</span></td>
                <td>¥12,800</td>
                <td><span class="tag tag-blue">已选</span></td>
              </tr>
              <tr data-schedule-row>
                <td>2024-07-28</td>
                <td><span class="booking-seat-success">余18位</span></td>
                <td>¥12,800</td>
                <td><button class="btn btn-secondary btn-sm" type="button" data-select-schedule>选择</button></td>
              </tr>
              <tr data-schedule-row>
                <td>2024-08-10</td>
                <td><span class="booking-seat-success">余30位</span></td>
                <td>¥12,800</td>
                <td><button class="btn btn-secondary btn-sm" type="button" data-select-schedule>选择</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="booking-section" aria-labelledby="travelerTitle">
        <div class="booking-traveler-head">
          <h2 id="travelerTitle" class="booking-section-title">人数选择</h2>
          <div class="booking-subtotal">
            <span>费用小计</span>
            <strong id="bookingSubtotal">¥25,600</strong>
          </div>
        </div>
        <div class="booking-count-grid">
          <div class="booking-count-item">
            <span class="booking-count-label">成人</span>
            <span class="booking-stepper" data-stepper data-unit-price="12800" data-min="1">
              <button type="button" data-step="-1" aria-label="减少成人">-</button>
              <input type="text" value="2" readonly aria-label="成人数量">
              <button type="button" data-step="1" aria-label="增加成人">+</button>
            </span>
            <span class="booking-count-hint">余3位</span>
          </div>
          <div class="booking-count-item">
            <span class="booking-count-label">儿童占床</span>
            <span class="booking-stepper" data-stepper data-unit-price="12800" data-min="0">
              <button type="button" data-step="-1" aria-label="减少儿童占床">-</button>
              <input type="text" value="0" readonly aria-label="儿童占床数量">
              <button type="button" data-step="1" aria-label="增加儿童占床">+</button>
            </span>
          </div>
          <div class="booking-count-item">
            <span class="booking-count-label">儿童不占床</span>
            <span class="booking-stepper" data-stepper data-unit-price="9800" data-min="0">
              <button type="button" data-step="-1" aria-label="减少儿童不占床">-</button>
              <input type="text" value="0" readonly aria-label="儿童不占床数量">
              <button type="button" data-step="1" aria-label="增加儿童不占床">+</button>
            </span>
          </div>
          <div class="booking-count-item">
            <span class="booking-count-label">单房差</span>
            <span class="booking-stepper" data-stepper data-unit-price="3200" data-min="0">
              <button type="button" data-step="-1" aria-label="减少单房差">-</button>
              <input type="text" value="0" readonly aria-label="单房差数量">
              <button type="button" data-step="1" aria-label="增加单房差">+</button>
            </span>
          </div>
        </div>
      </section>

      <section class="booking-section" aria-labelledby="channelTitle">
        <h2 id="channelTitle" class="booking-section-title">渠道信息</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="channelSource">渠道来源</label>
            <select id="channelSource" class="form-control">
              <option selected>直客</option>
              <option>分销</option>
              <option>门店</option>
              <option>企业客户</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="distributor">分销商</label>
            <input id="distributor" class="form-control" type="search" list="distributorOptions" placeholder="搜索分销商">
            <datalist id="distributorOptions">
              <option value="美途旅行社"></option>
              <option value="旅途驿站"></option>
            </datalist>
          </div>
          <div class="form-group">
            <label class="form-label" for="salesMember">分销员</label>
            <select id="salesMember" class="form-control">
              <option>请先选择分销商</option>
              <option>王娜</option>
              <option>陈晨</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="store">所属门店</label>
            <select id="store" class="form-control">
              <option selected>北京王府井旗舰店</option>
              <option>上海南京路店</option>
            </select>
          </div>
        </div>
      </section>

      <section class="booking-section" aria-labelledby="contactTitle">
        <h2 id="contactTitle" class="booking-section-title">联系人信息</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="contactName">联系人姓名 <span class="req">*</span></label>
            <input id="contactName" class="form-control" type="text" placeholder="请输入联系人姓名" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="contactPhone">联系人手机 <span class="req">*</span></label>
            <input id="contactPhone" class="form-control" type="tel" placeholder="请输入联系人手机" required>
          </div>
          <div class="form-group form-group-full">
            <label class="form-label" for="contactEmail">联系人邮箱</label>
            <input id="contactEmail" class="form-control" type="email" placeholder="选填">
          </div>
        </div>
      </section>

      <section class="booking-section" aria-labelledby="remarkTitle">
        <h2 id="remarkTitle" class="booking-section-title">备注</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="customerRemark">客户备注</label>
            <textarea id="customerRemark" class="form-control" placeholder="客户可见"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="internalRemark">内部备注</label>
            <textarea id="internalRemark" class="form-control booking-internal-note" placeholder="内部备注，客户不可见"></textarea>
          </div>
        </div>
      </section>

      <div class="booking-footer">
        <div class="booking-fee-detail">
          <span>费用明细</span>
          <strong id="bookingFeeDetail">成人×2 ¥25,600</strong>
        </div>
        <div class="booking-actions">
          <button class="btn btn-secondary" type="button">取消</button>
          <button id="createOrder" class="btn btn-primary" type="button">生成订单</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const categoryTabs = document.querySelectorAll('[data-booking-category]');
      const productCards = document.querySelectorAll('.booking-product-card');
      const searchInput = document.getElementById('bookingProductSearch');
      const selectedProductName = document.getElementById('selectedProductName');
      let activeCategory = '全部';

      function filterProducts() {
        const keyword = searchInput.value.trim().toLowerCase();
        productCards.forEach(function (card) {
          const matchesCategory = activeCategory === '全部' || card.dataset.category === activeCategory;
          const text = (card.dataset.productName + ' ' + card.dataset.productCode).toLowerCase();
          card.hidden = !(matchesCategory && text.includes(keyword));
        });
      }

      categoryTabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          categoryTabs.forEach(function (item) { item.classList.remove('active'); });
          tab.classList.add('active');
          activeCategory = tab.dataset.bookingCategory;
          filterProducts();
        });
      });

      searchInput.addEventListener('input', filterProducts);

      productCards.forEach(function (card) {
        card.addEventListener('click', function () {
          productCards.forEach(function (item) {
            item.classList.remove('selected');
            item.setAttribute('aria-pressed', 'false');
          });
          card.classList.add('selected');
          card.setAttribute('aria-pressed', 'true');
          selectedProductName.textContent = card.dataset.productName;
        });
      });

      document.querySelectorAll('[data-schedule-row]').forEach(function (row) {
        row.addEventListener('click', function () {
          document.querySelectorAll('[data-schedule-row]').forEach(function (item) {
            item.classList.remove('selected');
            item.lastElementChild.innerHTML = '<button class="btn btn-secondary btn-sm" type="button" data-select-schedule>选择</button>';
          });
          row.classList.add('selected');
          row.lastElementChild.innerHTML = '<span class="tag tag-blue">已选</span>';
        });
      });

      function formatMoney(value) {
        return '¥' + value.toLocaleString('zh-CN');
      }

      function updateSubtotal() {
        let total = 0;
        const parts = [];
        document.querySelectorAll('[data-stepper]').forEach(function (stepper) {
          const input = stepper.querySelector('input');
          const count = Number(input.value);
          const price = Number(stepper.dataset.unitPrice);
          const label = stepper.closest('.booking-count-item').querySelector('.booking-count-label').textContent;
          if (count > 0) {
            total += count * price;
            parts.push(label + '×' + count);
          }
        });
        document.getElementById('bookingSubtotal').textContent = formatMoney(total);
        document.getElementById('bookingFeeDetail').textContent = parts.join('、') + ' ' + formatMoney(total);
      }

      document.querySelectorAll('[data-stepper] button').forEach(function (button) {
        button.addEventListener('click', function () {
          const stepper = button.closest('[data-stepper]');
          const input = stepper.querySelector('input');
          const min = Number(stepper.dataset.min);
          const nextValue = Math.max(min, Number(input.value) + Number(button.dataset.step));
          input.value = nextValue;
          updateSubtotal();
        });
      });

      document.getElementById('createOrder').addEventListener('click', function () {
        window.location.href = 'orders-detail.html';
      });
    })();
  </script>
</body>
</html>
