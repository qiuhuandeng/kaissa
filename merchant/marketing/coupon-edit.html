<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>优惠券配置 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="marketing-page marketing-campaign-edit-page marketing-coupon-edit-page" data-coupon-mode="new">
    <section class="page-workbar marketing-campaign-workbar">
      <div class="page-title-row"><a class="page-back-link" href="coupons.html">返回</a><h1 class="page-title" data-coupon-page-title>新建优惠券</h1><span class="tag tag-blue" data-coupon-status>草稿</span></div>
      <div class="btn-group"><button class="btn btn-secondary" type="button" data-copy-coupon hidden>复制优惠券</button><button class="btn btn-secondary" type="button" data-save-coupon>保存草稿</button><button class="btn btn-primary" type="button" data-enable-coupon>启用优惠券</button></div>
    </section>

    <form id="couponForm" class="marketing-campaign-form marketing-coupon-form" novalidate>
      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">基本信息</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label" for="couponName">优惠券名称 <span class="req">*</span></label><input id="couponName" class="form-control" type="text" placeholder="请输入优惠券名称"></div>
          <div class="form-group"><label class="form-label" for="couponType">券类型 <span class="req">*</span></label><select id="couponType" class="form-control"><option value="满减券">满减券</option><option value="折扣券">折扣券</option><option value="直减券">直减券</option><option value="按人优惠券">按人优惠券</option><option value="第N人优惠券">第N人优惠券</option></select></div>
          <div class="form-group"><label class="form-label" for="couponAudience">适用对象 <span class="req">*</span></label><select id="couponAudience" class="form-control"><option value="直客会员">直客会员</option><option value="企业客户">企业客户</option><option value="合作分销商">合作分销商</option></select></div>
          <div class="form-group"><label class="form-label" for="couponOwner">维护负责人 <span class="req">*</span></label><select id="couponOwner" class="form-control"><option>周宁</option><option>张敏</option><option>王磊</option><option>刘洋</option><option>赵明</option><option>陈晨</option></select></div>
          <div class="form-group"><label class="form-label" for="couponSource">券模板来源</label><select id="couponSource" class="form-control"><option>营销运营</option><option>门店运营</option><option>产品运营</option><option>渠道运营</option></select></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">券面规则</h2></div>
        <section class="marketing-rule-panel" data-coupon-rule-panel="满减券">
          <div class="form-grid"><div class="form-group"><label class="form-label" for="couponFullBasis">优惠门槛口径 <span class="req">*</span></label><select id="couponFullBasis" class="form-control"><option>订单应收团款</option><option>实收团款</option><option>指定产品应收金额</option></select></div><div class="form-group"><label class="form-label" for="couponFullThreshold">满额门槛 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponFullThreshold" class="form-control" type="number" min="0" value="20000"><span class="field-suffix">元</span></div></div><div class="form-group"><label class="form-label" for="couponFullAmount">减免金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponFullAmount" class="form-control" type="number" min="0" value="1000"><span class="field-suffix">元</span></div></div><div class="form-group"><label class="form-label" for="couponFullUsage">单笔使用</label><select id="couponFullUsage" class="form-control"><option>限用1张</option><option>允许使用多张</option></select></div></div>
        </section>
        <section class="marketing-rule-panel" data-coupon-rule-panel="折扣券" hidden>
          <div class="form-grid"><div class="form-group"><label class="form-label" for="couponDiscountBasis">折扣口径 <span class="req">*</span></label><select id="couponDiscountBasis" class="form-control"><option>订单应收团款</option><option>指定产品应收金额</option><option>成人团款</option></select></div><div class="form-group"><label class="form-label" for="couponDiscountRate">折扣 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponDiscountRate" class="form-control" type="number" min="0" max="10" step="0.1" value="9.5"><span class="field-suffix">折</span></div></div><div class="form-group"><label class="form-label" for="couponDiscountCap">单笔最高优惠</label><div class="field-with-suffix"><input id="couponDiscountCap" class="form-control" type="number" min="0" value="1500"><span class="field-suffix">元</span></div></div><div class="form-group"><label class="form-label" for="couponDiscountExclude">不参与折扣款项</label><select id="couponDiscountExclude" class="form-control"><option>代收款、升舱款</option><option>仅代收款</option><option>不排除款项</option></select></div></div>
        </section>
        <section class="marketing-rule-panel" data-coupon-rule-panel="直减券" hidden>
          <div class="form-grid"><div class="form-group"><label class="form-label" for="couponDirectAmount">直减金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponDirectAmount" class="form-control" type="number" min="0" value="500"><span class="field-suffix">元/单</span></div></div><div class="form-group"><label class="form-label" for="couponDirectBasis">适用金额口径 <span class="req">*</span></label><select id="couponDirectBasis" class="form-control"><option>订单应收团款</option><option>指定产品应收金额</option><option>分销结算前销售价</option></select></div><div class="form-group"><label class="form-label" for="couponDirectCondition">订单条件</label><select id="couponDirectCondition" class="form-control"><option>无最低金额</option><option>满指定金额可用</option><option>指定人数成行可用</option></select></div><div class="form-group"><label class="form-label" for="couponDirectUsage">单笔使用</label><select id="couponDirectUsage" class="form-control"><option>限用1张</option><option>允许使用多张</option></select></div></div>
        </section>
        <section class="marketing-rule-panel" data-coupon-rule-panel="按人优惠券" hidden>
          <div class="form-grid"><div class="form-group"><label class="form-label" for="couponPersonAudience">优惠旅客 <span class="req">*</span></label><select id="couponPersonAudience" class="form-control"><option>所有出行人</option><option>成人</option><option>学生</option><option>儿童</option></select></div><div class="form-group"><label class="form-label" for="couponPersonAmount">每人优惠 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponPersonAmount" class="form-control" type="number" min="0" value="300"><span class="field-suffix">元</span></div></div><div class="form-group"><label class="form-label" for="couponPersonCount">成行人数条件</label><select id="couponPersonCount" class="form-control"><option>无人数条件</option><option>同单2人及以上</option><option>同单10人及以上</option></select></div><div class="form-group"><label class="form-label" for="couponPersonCap">单笔最高优惠</label><div class="field-with-suffix"><input id="couponPersonCap" class="form-control" type="number" min="0" value="1500"><span class="field-suffix">元</span></div></div></div>
        </section>
        <section class="marketing-rule-panel" data-coupon-rule-panel="第N人优惠券" hidden>
          <div class="form-grid"><div class="form-group"><label class="form-label" for="couponNthCount">同单成行人数 <span class="req">*</span></label><select id="couponNthCount" class="form-control"><option>2人同行</option><option>3人同行</option><option>4人同行</option></select></div><div class="form-group"><label class="form-label" for="couponNthPerson">优惠人序 <span class="req">*</span></label><select id="couponNthPerson" class="form-control"><option>第2人</option><option>第3人</option><option>第4人</option></select></div><div class="form-group"><label class="form-label" for="couponNthAmount">优惠金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponNthAmount" class="form-control" type="number" min="0" value="1000"><span class="field-suffix">元</span></div></div><div class="form-group"><label class="form-label" for="couponNthAudience">优惠旅客</label><select id="couponNthAudience" class="form-control"><option>成人</option><option>学生</option><option>儿童</option></select></div></div>
        </section>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">适用范围</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label">产品类型 <span class="req">*</span></label><div class="checkbox-grid marketing-product-type-grid" id="couponProductTypes"><label><input type="checkbox" value="参团游" checked> 参团游</label><label><input type="checkbox" value="邮轮"> 邮轮</label><label><input type="checkbox" value="专列"> 专列</label><label><input type="checkbox" value="自由行"> 自由行</label><label><input type="checkbox" value="研学"> 研学</label><label><input type="checkbox" value="单项服务"> 单项服务</label></div></div>
          <div class="form-group form-group-full"><label class="form-label">指定产品</label><div class="marketing-selection-field"><div id="couponSelectedProducts" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-coupon-selector="product">选择产品</button></div></div>
          <div class="form-group form-group-full"><label class="form-label">指定团期/航次/班期</label><div class="marketing-selection-field"><div id="couponSelectedSchedules" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-coupon-selector="schedule">选择团期</button></div></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">领取与使用</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="couponEligibility">领取资格 <span class="req">*</span></label><select id="couponEligibility" class="form-control"><option>全部符合条件对象</option><option>新注册会员</option><option>银卡及以上会员</option><option>受邀企业客户</option><option>已授权合作分销商</option></select></div>
          <div class="form-group"><label class="form-label" for="couponClaimLimit">领取限制 <span class="req">*</span></label><select id="couponClaimLimit" class="form-control"><option>每人限领1张</option><option>每人限领3张</option><option>每家渠道限领10张</option></select></div>
          <div class="form-group"><label class="form-label" for="couponOrderLimit">订单使用限制 <span class="req">*</span></label><select id="couponOrderLimit" class="form-control"><option>每单限用1张</option><option>每个产品限用1张</option><option>允许使用多张</option></select></div>
          <div class="form-group"><label class="form-label" for="couponStacking">同享规则 <span class="req">*</span></label><select id="couponStacking" class="form-control"><option>不与其他营销活动同享</option><option>可与会员折扣同享</option><option>可与指定优惠券同享</option></select></div>
          <div class="form-group"><label class="form-label" for="couponDateBasis">适用日期口径 <span class="req">*</span></label><select id="couponDateBasis" class="form-control"><option>按预订日期</option><option>按出发日期</option><option>预订日期和出发日期均满足</option></select></div>
          <div class="form-group form-group-full"><label class="form-label">销售渠道 <span class="req">*</span></label><div class="checkbox-grid marketing-channel-grid" id="couponChannels"><label><input type="checkbox" value="门店销售" checked> 门店销售</label><label><input type="checkbox" value="小程序" checked> 小程序</label><label><input type="checkbox" value="官网"> 官网</label><label><input type="checkbox" value="合作分销商"> 合作分销商</label></div></div>
          <div class="form-group form-group-full"><label class="form-label">适用组织 <span class="req">*</span></label><div class="marketing-selection-field"><div id="couponSelectedOrganizations" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-coupon-selector="organization">选择适用组织</button></div></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">优惠承担</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full">
            <label class="form-label">承担比例 <span class="req">*</span></label>
            <div class="marketing-share-presets" aria-label="选择承担方">
              <button class="btn btn-secondary" type="button" data-coupon-share-party="headquarters" aria-pressed="true">总部营销</button>
              <button class="btn btn-secondary" type="button" data-coupon-share-party="store" aria-pressed="false">销售门店</button>
              <button class="btn btn-secondary" type="button" data-coupon-share-party="distributor" aria-pressed="false">合作分销商</button>
              <button class="btn btn-secondary" type="button" data-coupon-share-party="supplier" aria-pressed="false">供应商</button>
            </div>
            <div class="marketing-share-grid">
              <label data-coupon-share-row="headquarters">总部营销<div class="field-with-suffix"><input id="couponHeadquartersShare" class="form-control" type="number" min="0" max="100" value="100"><span class="field-suffix">%</span></div></label>
              <label data-coupon-share-row="store" hidden>销售门店<div class="field-with-suffix"><input id="couponStoreShare" class="form-control" type="number" min="0" max="100" value="0"><span class="field-suffix">%</span></div></label>
              <label data-coupon-share-row="distributor" hidden>合作分销商<div class="field-with-suffix"><input id="couponDistributorShare" class="form-control" type="number" min="0" max="100" value="0"><span class="field-suffix">%</span></div></label>
              <label data-coupon-share-row="supplier" hidden>供应商<div class="field-with-suffix"><input id="couponSupplierShare" class="form-control" type="number" min="0" max="100" value="0"><span class="field-suffix">%</span></div></label>
            </div>
            <div id="couponSupplierShareNote" class="marketing-share-note" hidden>按订单关联供应商承接</div>
          </div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">有效期</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="couponValidityMode">券有效期 <span class="req">*</span></label><select id="couponValidityMode" class="form-control"><option value="relative">领取后N天有效</option><option value="fixed">固定有效期</option></select></div>
          <div class="form-group"><label class="form-label" for="couponLastUseDate">最晚使用日期 <span class="req">*</span></label><input id="couponLastUseDate" class="form-control" type="date" value="2026-08-31"></div>
          <section class="marketing-rule-panel form-group form-group-full" data-coupon-validity-panel="relative"><div class="form-grid"><div class="form-group"><label class="form-label" for="couponValidityDays">领取后有效天数 <span class="req">*</span></label><div class="field-with-suffix"><input id="couponValidityDays" class="form-control" type="number" min="1" value="30"><span class="field-suffix">天</span></div></div></div></section>
          <section class="marketing-rule-panel form-group form-group-full" data-coupon-validity-panel="fixed" hidden><div class="form-grid"><div class="form-group form-group-full"><label class="form-label">固定有效期 <span class="req">*</span></label><div class="date-range marketing-date-range"><input id="couponFixedStart" class="form-control" type="date" value="2026-07-15" aria-label="固定有效期开始日期"><span>至</span><input id="couponFixedEnd" class="form-control" type="date" value="2026-08-31" aria-label="固定有效期结束日期"></div></div></div></section>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">售后处理</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="couponRefundRule">已用券退款处理 <span class="req">*</span></label><select id="couponRefundRule" class="form-control"><option>按退款后有效金额重算优惠</option><option>整单退款后恢复优惠券</option><option>整单退款后优惠券失效</option><option>转人工处理</option></select></div>
          <div class="form-group"><label class="form-label" for="couponUnusedRule">未用券退订处理 <span class="req">*</span></label><select id="couponUnusedRule" class="form-control"><option>保持原有效期</option><option>恢复为未使用状态</option><option>直接失效</option></select></div>
          <div class="form-group"><label class="form-label" for="couponComplaintRule">客诉订单处理</label><select id="couponComplaintRule" class="form-control"><option>暂缓确认优惠承担</option><option>正常确认优惠承担</option></select></div>
          <div class="form-group"><label class="form-label" for="couponExceptionRule">不满足用券条件</label><select id="couponExceptionRule" class="form-control"><option>不可使用</option><option>提示后转人工处理</option></select></div>
        </div>
      </section>
    </form>
  </main>

  <div id="couponScopeDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-md marketing-scope-drawer" role="dialog" aria-modal="true" aria-labelledby="couponScopeTitle">
      <div class="modal-header"><h2 id="couponScopeTitle">选择产品</h2><button class="modal-close" type="button" data-close-coupon-scope aria-label="关闭">×</button></div>
      <div class="modal-body"><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">筛选</h3></div><div class="marketing-selector-filters"><input id="couponSelectorKeyword" class="form-control" type="search" placeholder="搜索名称"><select id="couponSelectorType" class="form-control"><option value="">全部类型</option></select></div></section><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title" data-coupon-scope-title>可选产品</h3><span class="marketing-selector-count" data-coupon-scope-count>已选0项</span></div><div id="couponSelectorList" class="marketing-selector-list"></div></section></div>
      <div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-coupon-scope>取消</button><button id="confirmCouponScope" class="btn btn-primary" type="button">确认选择</button></div>
    </section>
  </div>

  <div id="couponEnableModal" class="modal-overlay" hidden>
    <section class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="couponEnableTitle"><div class="modal-header"><h2 id="couponEnableTitle">启用优惠券</h2><button class="modal-close" type="button" data-close-coupon-enable aria-label="关闭">×</button></div><div class="modal-body"><p class="modal-center-text" data-coupon-enable-copy>确认启用当前优惠券？</p></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-coupon-enable>取消</button><button id="confirmCouponEnable" class="btn btn-primary" type="button">确认启用</button></div></section>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var mode = ['new', 'edit', 'view', 'copy'].indexOf(params.get('mode')) > -1 ? params.get('mode') : 'new';
      var couponId = params.get('coupon') || '';
      var page = document.querySelector('.marketing-coupon-edit-page');
      var scopeDrawer = document.getElementById('couponScopeDrawer');
      var enableModal = document.getElementById('couponEnableModal');
      var selectorKind = 'product';
      var workingSelection = [];
      var selected = { product: [], schedule: [], organization: ['org-national'] };
      var optionData = {
        product: [
          { id: 'product-europe-ten', name: '欧洲十国经典游', meta: '参团游 · 欧洲长线' }, { id: 'product-france-italy', name: '法意瑞深度游', meta: '参团游 · 欧洲长线' }, { id: 'product-cruise-ideal', name: '理想号地中海邮轮', meta: '邮轮 · 地中海航线' }, { id: 'product-family-summer', name: '暑期亲子成长营', meta: '参团游 · 国内亲子' }, { id: 'product-nordic', name: '北欧极光追寻之旅', meta: '参团游 · 北欧长线' }, { id: 'product-silkroad', name: '金秋西北丝路专列', meta: '专列 · 西北环线' }, { id: 'product-uk-study', name: '英国名校研学营', meta: '研学 · 英国' }, { id: 'product-domestic-free', name: '云南轻奢自由行', meta: '自由行 · 国内' }
