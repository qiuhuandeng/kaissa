<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>营销活动 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="marketing-page marketing-campaign-edit-page" data-campaign-mode="new">
    <section class="page-workbar marketing-campaign-workbar">
      <div class="page-title-row">
        <a class="page-back-link" href="campaigns.html">返回</a>
        <h1 class="page-title" data-campaign-page-title>新建活动</h1>
        <span class="tag tag-blue" data-campaign-status>草稿</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" type="button" data-copy-campaign hidden>复制活动</button>
        <button class="btn btn-secondary" type="button" data-save-campaign>保存草稿</button>
        <button class="btn btn-primary" type="button" data-publish-campaign>发布活动</button>
      </div>
    </section>

    <form id="campaignForm" class="marketing-campaign-form" novalidate>
      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">基本信息</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label" for="campaignName">活动名称 <span class="req">*</span></label><input id="campaignName" class="form-control" type="text" placeholder="请输入活动名称"></div>
          <div class="form-group"><label class="form-label" for="campaignScene">营销场景 <span class="req">*</span></label><select id="campaignScene" class="form-control"><option>早鸟预订</option><option>余位促销</option><option>节庆/主题促销</option><option>会员日</option><option>门店开业</option><option>分销商激励</option><option>企业报名</option><option>服务早办</option><option>新客拉新</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignType">优惠方式 <span class="req">*</span></label><select id="campaignType" class="form-control"><option value="满减">满减</option><option value="折扣">折扣</option><option value="直减">直减</option><option value="按人优惠">按人优惠</option><option value="第N人优惠">第N人优惠</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignAudience">目标对象 <span class="req">*</span></label><select id="campaignAudience" class="form-control"><option value="直客会员">直客会员</option><option value="企业客户">企业客户</option><option value="合作分销商">合作分销商</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignOwner">活动负责人 <span class="req">*</span></label><select id="campaignOwner" class="form-control"><option>周宁</option><option>张敏</option><option>王磊</option><option>刘洋</option><option>赵明</option><option>陈晨</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignSource">活动来源</label><select id="campaignSource" class="form-control"><option>营销运营</option><option>门店运营</option><option>产品运营</option><option>渠道运营</option></select></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">营销触发条件</h2></div>
        <section class="marketing-scene-panel" data-scene-panel="早鸟预订"><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneAdvanceDays">提前预订天数 <span class="req">*</span></label><div class="field-with-suffix"><input id="sceneAdvanceDays" class="form-control" type="number" min="1" value="30"><span class="field-suffix">天</span></div></div><div class="form-group"><label class="form-label" for="sceneBookingBasis">预订日期口径 <span class="req">*</span></label><select id="sceneBookingBasis" class="form-control"><option>订单预订日期</option><option>订单支付日期</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="余位促销" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneInventoryUnit">余量口径 <span class="req">*</span></label><select id="sceneInventoryUnit" class="form-control"><option>余舱</option><option>余位</option><option>余铺</option></select></div><div class="form-group"><label class="form-label" for="sceneInventoryThreshold">触发余量 <span class="req">*</span></label><div class="field-with-suffix"><input id="sceneInventoryThreshold" class="form-control" type="number" min="1" value="10"><span class="field-suffix">个</span></div></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="节庆/主题促销" hidden><div class="form-grid"><div class="form-group form-group-full"><label class="form-label" for="sceneThemeName">主题名称 <span class="req">*</span></label><input id="sceneThemeName" class="form-control" type="text" value="暑期亲子同行" placeholder="请输入节庆或主题名称"></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="会员日" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneMemberLevel">会员范围 <span class="req">*</span></label><select id="sceneMemberLevel" class="form-control"><option>全量会员</option><option>银卡及以上</option><option>金卡及以上</option><option>黑钻会员</option></select></div><div class="form-group"><label class="form-label" for="sceneMemberFrequency">活动频次 <span class="req">*</span></label><select id="sceneMemberFrequency" class="form-control"><option>每月会员日</option><option>年度会员日</option><option>指定日期</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="门店开业" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneStoreStage">门店阶段 <span class="req">*</span></label><select id="sceneStoreStage" class="form-control"><option>新开业30天内</option><option>开业周年庆</option><option>指定门店推广期</option></select></div><div class="form-group"><label class="form-label" for="sceneStoreAudience">到店条件</label><select id="sceneStoreAudience" class="form-control"><option>到店咨询后可用</option><option>门店成交订单可用</option><option>线上线下均可用</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="分销商激励" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneDistributorTier">分销商范围 <span class="req">*</span></label><select id="sceneDistributorTier" class="form-control"><option>已授权合作分销商</option><option>指定产品授权渠道</option><option>核心分销商</option></select></div><div class="form-group"><label class="form-label" for="sceneDistributorTarget">激励条件 <span class="req">*</span></label><select id="sceneDistributorTarget" class="form-control"><option>首次下单</option><option>指定团期成单</option><option>达到预订数量</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="企业报名" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneEnterprisePeople">同单报名人数 <span class="req">*</span></label><select id="sceneEnterprisePeople" class="form-control"><option>10人及以上</option><option>20人及以上</option><option>30人及以上</option></select></div><div class="form-group"><label class="form-label" for="sceneEnterpriseCustomer">客户范围 <span class="req">*</span></label><select id="sceneEnterpriseCustomer" class="form-control"><option>签约企业客户</option><option>受邀企业客户</option><option>学校及教育机构</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="服务早办" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneServiceDays">提前办理天数 <span class="req">*</span></label><div class="field-with-suffix"><input id="sceneServiceDays" class="form-control" type="number" min="1" value="10"><span class="field-suffix">天</span></div></div><div class="form-group"><label class="form-label" for="sceneServiceBasis">办理日期口径 <span class="req">*</span></label><select id="sceneServiceBasis" class="form-control"><option>材料提交日期</option><option>服务预约日期</option></select></div></div></section>
        <section class="marketing-scene-panel" data-scene-panel="新客拉新" hidden><div class="form-grid"><div class="form-group"><label class="form-label" for="sceneNewCustomerRule">新客条件 <span class="req">*</span></label><select id="sceneNewCustomerRule" class="form-control"><option>首次下单会员</option><option>新注册会员</option><option>首次购买指定产品</option></select></div><div class="form-group"><label class="form-label" for="sceneNewCustomerWindow">注册时长</label><select id="sceneNewCustomerWindow" class="form-control"><option>注册30天内</option><option>注册90天内</option><option>不限注册时长</option></select></div></div></section>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">优惠规则</h2></div>
        <section class="marketing-rule-panel" data-rule-panel="满减">
          <div class="form-grid">
            <div class="form-group"><label class="form-label" for="fullReductionBasis">优惠门槛口径 <span class="req">*</span></label><select id="fullReductionBasis" class="form-control"><option>订单应收团款</option><option>实收团款</option><option>指定产品应收金额</option></select></div>
            <div class="form-group"><label class="form-label" for="fullReductionThreshold">满额门槛 <span class="req">*</span></label><div class="field-with-suffix"><input id="fullReductionThreshold" class="form-control" type="number" min="0" value="20000"><span class="field-suffix">元</span></div></div>
            <div class="form-group"><label class="form-label" for="fullReductionAmount">减免金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="fullReductionAmount" class="form-control" type="number" min="0" value="1000"><span class="field-suffix">元</span></div></div>
            <div class="form-group"><label class="form-label" for="fullReductionLimit">每单优惠次数</label><select id="fullReductionLimit" class="form-control"><option>限1次</option><option>按阶梯重复使用</option></select></div>
          </div>
        </section>
        <section class="marketing-rule-panel" data-rule-panel="折扣" hidden>
          <div class="form-grid">
            <div class="form-group"><label class="form-label" for="discountBasis">折扣口径 <span class="req">*</span></label><select id="discountBasis" class="form-control"><option>订单应收团款</option><option>指定产品应收金额</option><option>成人团款</option></select></div>
            <div class="form-group"><label class="form-label" for="discountRate">折扣 <span class="req">*</span></label><div class="field-with-suffix"><input id="discountRate" class="form-control" type="number" min="0" max="10" step="0.1" value="9.5"><span class="field-suffix">折</span></div></div>
            <div class="form-group"><label class="form-label" for="discountCap">单笔最高优惠</label><div class="field-with-suffix"><input id="discountCap" class="form-control" type="number" min="0" value="1500"><span class="field-suffix">元</span></div></div>
            <div class="form-group"><label class="form-label" for="discountPriceItem">不参与折扣款项</label><select id="discountPriceItem" class="form-control"><option>代收款、升舱款</option><option>仅代收款</option><option>不排除款项</option></select></div>
          </div>
        </section>
        <section class="marketing-rule-panel" data-rule-panel="直减" hidden>
          <div class="form-grid">
            <div class="form-group"><label class="form-label" for="directReductionAmount">直减金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="directReductionAmount" class="form-control" type="number" min="0" value="500"><span class="field-suffix">元/单</span></div></div>
            <div class="form-group"><label class="form-label" for="directReductionBasis">适用金额口径 <span class="req">*</span></label><select id="directReductionBasis" class="form-control"><option>订单应收团款</option><option>指定产品应收金额</option><option>分销结算前销售价</option></select></div>
            <div class="form-group"><label class="form-label" for="directReductionCondition">订单条件</label><select id="directReductionCondition" class="form-control"><option>无最低金额</option><option>满指定金额可用</option><option>指定人数成行可用</option></select></div>
            <div class="form-group"><label class="form-label" for="directReductionLimit">每单优惠次数</label><select id="directReductionLimit" class="form-control"><option>限1次</option><option>每个产品限1次</option></select></div>
          </div>
        </section>
        <section class="marketing-rule-panel" data-rule-panel="按人优惠" hidden>
          <div class="form-grid">
            <div class="form-group"><label class="form-label" for="personDiscountAudience">优惠旅客 <span class="req">*</span></label><select id="personDiscountAudience" class="form-control"><option>所有出行人</option><option>成人</option><option>学生</option><option>儿童</option></select></div>
            <div class="form-group"><label class="form-label" for="personDiscountAmount">每人优惠 <span class="req">*</span></label><div class="field-with-suffix"><input id="personDiscountAmount" class="form-control" type="number" min="0" value="300"><span class="field-suffix">元</span></div></div>
            <div class="form-group"><label class="form-label" for="personDiscountThreshold">成行人数条件</label><select id="personDiscountThreshold" class="form-control"><option>无人数条件</option><option>同单2人及以上</option><option>同单10人及以上</option></select></div>
            <div class="form-group"><label class="form-label" for="personDiscountCap">单笔最高优惠</label><div class="field-with-suffix"><input id="personDiscountCap" class="form-control" type="number" min="0" value="1500"><span class="field-suffix">元</span></div></div>
          </div>
        </section>
        <section class="marketing-rule-panel" data-rule-panel="第N人优惠" hidden>
          <div class="form-grid">
            <div class="form-group"><label class="form-label" for="nthPersonThreshold">同单成行人数 <span class="req">*</span></label><select id="nthPersonThreshold" class="form-control"><option>2人同行</option><option>3人同行</option><option>4人同行</option></select></div>
            <div class="form-group"><label class="form-label" for="nthPersonNumber">优惠人序 <span class="req">*</span></label><select id="nthPersonNumber" class="form-control"><option>第2人</option><option>第3人</option><option>第4人</option></select></div>
            <div class="form-group"><label class="form-label" for="nthPersonAmount">优惠金额 <span class="req">*</span></label><div class="field-with-suffix"><input id="nthPersonAmount" class="form-control" type="number" min="0" value="1000"><span class="field-suffix">元</span></div></div>
            <div class="form-group"><label class="form-label" for="nthPersonAudience">优惠旅客</label><select id="nthPersonAudience" class="form-control"><option>成人</option><option>学生</option><option>儿童</option></select></div>
          </div>
        </section>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">适用范围</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label">产品类型 <span class="req">*</span></label><div class="checkbox-grid marketing-product-type-grid" id="campaignProductTypes"><label><input type="checkbox" value="参团游" checked> 参团游</label><label><input type="checkbox" value="邮轮"> 邮轮</label><label><input type="checkbox" value="专列"> 专列</label><label><input type="checkbox" value="自由行"> 自由行</label><label><input type="checkbox" value="研学"> 研学</label><label><input type="checkbox" value="单项服务"> 单项服务</label></div></div>
          <div class="form-group form-group-full"><label class="form-label">指定产品</label><div class="marketing-selection-field"><div id="selectedProducts" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-scope-selector="product">选择产品</button></div></div>
          <div class="form-group form-group-full"><label class="form-label">指定团期/航次/班期</label><div class="marketing-selection-field"><div id="selectedSchedules" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-scope-selector="schedule">选择团期</button></div></div>
          <div class="form-group form-group-full"><label class="form-label">销售价格基准</label><div id="campaignPriceBaseline" class="marketing-price-baseline"></div></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">销售渠道与组织</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label">销售渠道 <span class="req">*</span></label><div class="checkbox-grid marketing-channel-grid" id="campaignChannels"><label><input type="checkbox" value="门店销售" checked> 门店销售</label><label><input type="checkbox" value="小程序" checked> 小程序</label><label><input type="checkbox" value="官网"> 官网</label><label><input type="checkbox" value="合作分销商"> 合作分销商</label></div></div>
          <div class="form-group form-group-full"><label class="form-label">适用组织 <span class="req">*</span></label><div class="marketing-selection-field"><div id="selectedOrganizations" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-scope-selector="organization">选择适用组织</button></div></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">优惠承担</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="campaignStacking">同享规则 <span class="req">*</span></label><select id="campaignStacking" class="form-control"><option>不与其他营销活动同享</option><option>可与会员折扣同享</option><option>可与优惠券同享</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignPriority">优惠优先级 <span class="req">*</span></label><input id="campaignPriority" class="form-control" type="number" min="1" value="100"></div>
          <div class="form-group form-group-full"><label class="form-label">承担比例 <span class="req">*</span></label><div class="marketing-share-grid"><label>总部营销中心<div class="field-with-suffix"><input id="headquartersShare" class="form-control" type="number" min="0" max="100" value="100"><span class="field-suffix">%</span></div></label><label>销售门店<div class="field-with-suffix"><input id="storeShare" class="form-control" type="number" min="0" max="100" value="0"><span class="field-suffix">%</span></div></label><label>合作分销商<div class="field-with-suffix"><input id="distributorShare" class="form-control" type="number" min="0" max="100" value="0"><span class="field-suffix">%</span></div></label></div></div>
          <div class="form-group form-group-full"><label class="form-label">优惠后价格校验</label><div id="campaignPriceGuard" class="marketing-price-guard"></div></div>
          <div class="form-group"><label class="form-label" for="campaignSettlementBasis">承担结算口径 <span class="req">*</span></label><select id="campaignSettlementBasis" class="form-control"><option>订单完成且无退款后确认</option><option>订单实收后确认</option><option>按退款后有效金额确认</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignSharingNote">分摊备注</label><input id="campaignSharingNote" class="form-control" type="text" placeholder="请输入分摊约定"></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">生效与售后</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label">活动时间 <span class="req">*</span></label><div class="date-range marketing-date-range"><input id="campaignStartDate" class="form-control" type="date" value="2026-07-15" aria-label="活动开始日期"><span>至</span><input id="campaignEndDate" class="form-control" type="date" value="2026-08-31" aria-label="活动结束日期"></div></div>
          <div class="form-group"><label class="form-label" for="campaignDateBasis">适用日期口径 <span class="req">*</span></label><select id="campaignDateBasis" class="form-control"><option>按预订日期</option><option>按出发日期</option><option>预订日期和出发日期均满足</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignUsageLimit">会员使用限制 <span class="req">*</span></label><select id="campaignUsageLimit" class="form-control"><option>每人限1次</option><option>每个产品限1次</option><option>不限次数</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignRefundRule">退款退订处理 <span class="req">*</span></label><select id="campaignRefundRule" class="form-control"><option>按退款后有效金额重算优惠</option><option>整单退款时取消优惠</option><option>转人工处理</option></select></div>
          <div class="form-group"><label class="form-label" for="campaignComplaintRule">客诉订单处理</label><select id="campaignComplaintRule" class="form-control"><option>暂缓确认优惠承担</option><option>正常确认优惠承担</option></select></div>
        </div>
      </section>
    </form>
  </main>

  <div id="campaignScopeDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-md marketing-scope-drawer" role="dialog" aria-modal="true" aria-labelledby="campaignScopeTitle">
      <div class="modal-header"><h2 id="campaignScopeTitle">选择产品</h2><button class="modal-close" type="button" data-close-scope-drawer aria-label="关闭">×</button></div>
      <div class="modal-body">
        <section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">筛选</h3></div><div class="marketing-selector-filters"><input id="scopeSelectorKeyword" class="form-control" type="search" placeholder="搜索名称"><select id="scopeSelectorType" class="form-control"><option value="">全部类型</option></select></div></section>
        <section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title" data-scope-list-title>可选产品</h3><span class="marketing-selector-count" data-scope-selected-count>已选0项</span></div><div id="scopeSelectorList" class="marketing-selector-list"></div></section>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-scope-drawer>取消</button><button id="confirmScopeSelection" class="btn btn-primary" type="button">确认选择</button></div>
    </section>
  </div>

  <div id="campaignPublishModal" class="modal-overlay" hidden>
    <section class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="campaignPublishTitle">

        if (type === '折扣') return Math.min(baseline.price * (1 - Number(document.getElementById('discountRate').value || 10) / 10), Number(document.getElementById('discountCap').value || baseline.price));

        document.querySelector('[data-scope-selected-count]').textContent = '已选' + workingSelection.length + '项';
      });
      document.getElementById('confirmScopeSelection').addEventListener('click', function () { selected[selectorKind] = workingSelection.slice(); if (selectorKind === 'product' || selectorKind === 'schedule' || selectorKind === 'organization') campaignPriceContext = null; renderSelection(selectorKind); renderPriceBaseline(); updatePriceGuard(); closeLayer(scopeDrawer); });
      document.getElementById('confirmPublishCampaign').addEventListener('click', function () {
        closeLayer(publishModal);
        currentStatus = '待开始';
        var statusNode = document.querySelector('[data-campaign-status]'); statusNode.textContent = currentStatus; statusNode.className = 'tag tag-orange';
        document.querySelector('[data-publish-campaign]').hidden = true;
        document.querySelector('[data-save-campaign]').textContent = '保存修改';
        toast('活动已发布');
      });

      if (current) applyPreset(current);
      else { updateRulePanel(); updateScenePanel(); if (campaignPriceContext) applyPriceStrategyContext(campaignPriceContext); else { renderSelections(); renderPriceBaseline(); updatePriceGuard(); } }
      configureMode();
    })();
  </script>
</body>
</html>
