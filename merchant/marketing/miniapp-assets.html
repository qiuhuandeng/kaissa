<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材中心 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="marketing-page miniapp-material-center-page">
    <section class="miniapp-material-surface">
      <nav class="tab-bar miniapp-material-tabs" aria-label="素材类型"><button class="tab-item active" type="button" data-material-type="image">图片</button><button class="tab-item" type="button" data-material-type="video">视频</button><button class="tab-item" type="button" data-material-type="audio">音频</button></nav>
      <div class="miniapp-material-layout">
        <aside class="miniapp-material-groups" aria-label="素材分组"><div class="miniapp-material-group-head"><strong>分组</strong><button type="button" data-open-group-drawer>管理</button></div><nav id="materialGroupList"><button class="active" type="button" data-material-group="all"><span>全部素材</span><em>28</em></button><button type="button" data-material-group="unfiled"><span>未分组</span><em>3</em></button><button type="button" data-material-group="brand"><span>品牌与门店形象</span><em>4</em></button><button type="button" data-material-group="home"><span>首页 Banner</span><em>5</em></button><button type="button" data-material-group="europe"><span>欧洲及长线产品</span><em>4</em></button><button type="button" data-material-group="cruise"><span>邮轮与海岛度假</span><em>4</em></button><button type="button" data-material-group="study"><span>亲子研学与定制游</span><em>3</em></button><button type="button" data-material-group="campaign"><span>节庆大促与会员活动</span><em>3</em></button><button type="button" data-material-group="channel"><span>分销商推广素材</span><em>2</em></button></nav></aside>
        <section class="miniapp-material-content">
          <section class="miniapp-material-toolbar" aria-label="素材操作"><div class="miniapp-material-tool-main"><button id="uploadMaterial" class="btn btn-primary" type="button">上传图片</button><div class="dropdown table-action-more"><button id="batchMaterialAction" class="btn btn-secondary table-more-toggle" type="button" disabled aria-expanded="false">批量操作</button><span class="dropdown-menu action-dropdown-menu"><button class="dropdown-item" type="button" data-batch-move>移动分组</button><button class="dropdown-item danger" type="button" data-batch-delete>删除素材</button></span></div></div><div class="miniapp-material-tool-filter"><label class="sr-only" for="materialKeyword">搜索素材</label><input id="materialKeyword" class="form-control" type="search" placeholder="搜索素材名称"><select id="materialRatio" class="form-control"><option value="">全部比例</option><option value="16:9">16:9</option><option value="3:2">3:2</option><option value="1:1">1:1</option><option value="9:16">9:16</option></select></div></section>
          <section id="materialGallery" class="miniapp-material-gallery" aria-label="素材列表">
            <label class="miniapp-material-card" data-type="image" data-group="home" data-ratio="9:16"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/home-hero.jpg" alt="夏日海岛首页主图"><i>9:16</i></span><span class="miniapp-material-name">夏日海岛首页主图</span><span class="miniapp-material-meta">1200 × 2400 · 2.6 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="brand" data-ratio="3:2"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/home-member.jpg" alt="会员权益横幅"><i>3:2</i></span><span class="miniapp-material-name">凯撒会员权益横幅</span><span class="miniapp-material-meta">1500 × 700 · 1.8 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="europe" data-ratio="3:2"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-italy.jpg" alt="欧洲宫殿文化之旅"><i>3:2</i></span><span class="miniapp-material-name">欧洲宫殿文化之旅</span><span class="miniapp-material-meta">1200 × 800 · 1.4 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="cruise" data-ratio="3:2"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-cruise.jpg" alt="理想号地中海邮轮"><i>3:2</i></span><span class="miniapp-material-name">理想号地中海邮轮</span><span class="miniapp-material-meta">1200 × 800 · 1.6 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="channel" data-ratio="3:2"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-nordic.jpg" alt="北欧极光推广海报"><i>3:2</i></span><span class="miniapp-material-name">北欧极光推广海报</span><span class="miniapp-material-meta">1200 × 800 · 1.3 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="study" data-ratio="3:2"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-study.jpg" alt="英国研学报名主图"><i>3:2</i></span><span class="miniapp-material-name">英国研学报名主图</span><span class="miniapp-material-meta">1200 × 800 · 1.7 MB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="campaign" data-ratio="1:1"><input type="checkbox"><span class="miniapp-material-thumb miniapp-material-thumb-poster"><img src="../../client/assets/product-italy.jpg" alt="欧洲早鸟活动方图"><i>1:1</i></span><span class="miniapp-material-name">欧洲早鸟活动方图</span><span class="miniapp-material-meta">1080 × 1080 · 984 KB</span></label>
            <label class="miniapp-material-card" data-type="image" data-group="unfiled" data-ratio="9:16"><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-study.jpg" alt="暑期研学竖版海报"><i>9:16</i></span><span class="miniapp-material-name">暑期研学竖版海报</span><span class="miniapp-material-meta">750 × 1334 · 865 KB</span></label>
            <label class="miniapp-material-card" data-type="video" data-group="home" data-ratio="16:9" hidden><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/home-hero.jpg" alt="暑期目的地短片"><b class="miniapp-media-mark">▶</b><i>00:18</i></span><span class="miniapp-material-name">暑期目的地短片</span><span class="miniapp-material-meta">1920 × 1080 · 24.6 MB</span></label>
            <label class="miniapp-material-card" data-type="video" data-group="cruise" data-ratio="16:9" hidden><input type="checkbox"><span class="miniapp-material-thumb"><img src="../../client/assets/product-cruise.jpg" alt="理想号航线短片"><b class="miniapp-media-mark">▶</b><i>00:30</i></span><span class="miniapp-material-name">理想号航线短片</span><span class="miniapp-material-meta">1920 × 1080 · 38.2 MB</span></label>
            <label class="miniapp-material-card" data-type="audio" data-group="brand" data-ratio="audio" hidden><input type="checkbox"><span class="miniapp-material-thumb miniapp-audio-thumb"><b>♫</b></span><span class="miniapp-material-name">凯撒旅行品牌音乐</span><span class="miniapp-material-meta">MP3 · 01:24 · 2.1 MB</span></label>
            <label class="miniapp-material-card" data-type="audio" data-group="campaign" data-ratio="audio" hidden><input type="checkbox"><span class="miniapp-material-thumb miniapp-audio-thumb"><b>♫</b></span><span class="miniapp-material-name">暑期活动提示音</span><span class="miniapp-material-meta">MP3 · 00:08 · 236 KB</span></label>
          </section>
          <div id="materialEmpty" class="list-empty-state" hidden>暂无符合条件的素材</div>
          <footer class="miniapp-material-footer"><label class="miniapp-material-select-all"><input id="selectAllMaterials" type="checkbox"> 全选当前素材</label><span id="materialSelectedCount">已选 0 项</span><div class="pagination"><button class="page-btn active" type="button">1</button><button class="page-btn" type="button">2</button><button class="page-btn" type="button">3</button></div></footer>
        </section>
      </div>
    </section>
  </main>

  <div id="materialUploadDrawer" class="modal-overlay drawer-overlay" hidden><section class="modal drawer-modal drawer-md" role="dialog" aria-modal="true" aria-labelledby="materialUploadTitle"><div class="modal-header"><h2 id="materialUploadTitle">上传图片</h2><button class="modal-close" type="button" data-close-material-upload aria-label="关闭">×</button></div><div class="modal-body"><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">素材信息</h3></div><div class="form-grid"><div class="form-group form-group-full"><label class="form-label" for="materialName">素材名称 <span class="req">*</span></label><input id="materialName" class="form-control" type="text" placeholder="请输入素材名称"></div><div class="form-group"><label class="form-label" for="materialGroup">素材分组 <span class="req">*</span></label><select id="materialGroup" class="form-control"><option>首页 Banner</option><option>品牌与门店形象</option><option>欧洲及长线产品</option><option>邮轮与海岛度假</option><option>亲子研学与定制游</option><option>节庆大促与会员活动</option><option>分销商推广素材</option></select></div><div class="form-group"><label class="form-label" for="materialFile">素材文件 <span class="req">*</span></label><input id="materialFile" class="form-control" type="file" accept="image/*"></div></div></section></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-material-upload>取消</button><button id="saveMaterial" class="btn btn-primary" type="button">保存素材</button></div></section></div>

  <div id="materialGroupDrawer" class="modal-overlay drawer-overlay" hidden><section class="modal drawer-modal drawer-md" role="dialog" aria-modal="true" aria-labelledby="materialGroupTitle"><div class="modal-header"><h2 id="materialGroupTitle">管理分组</h2><button class="modal-close" type="button" data-close-group-drawer aria-label="关闭">×</button></div><div class="modal-body"><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">素材分组</h3></div><div class="miniapp-group-editor"><div><span>首页 Banner</span><button type="button">重命名</button></div><div><span>欧洲及长线产品</span><button type="button">重命名</button></div><div><span>邮轮与海岛度假</span><button type="button">重命名</button></div><div><span>亲子研学与定制游</span><button type="button">重命名</button></div><div><span>节庆大促与会员活动</span><button type="button">重命名</button></div></div></section></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-group-drawer>关闭</button><button class="btn btn-primary" type="button">新建分组</button></div></section></div>

  <div id="materialActionModal" class="modal-overlay" hidden><section class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="materialActionTitle"><div class="modal-header"><h2 id="materialActionTitle">确认操作</h2><button class="modal-close" type="button" data-close-material-action aria-label="关闭">×</button></div><div class="modal-body"><p id="materialActionCopy" class="modal-center-text"></p></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-material-action>取消</button><button id="confirmMaterialAction" class="btn btn-primary" type="button">确认</button></div></section></div>

  <script>
    (function () {
      var activeType = 'image'; var activeGroup = 'all'; var uploadDrawer = document.getElementById('materialUploadDrawer'); var groupDrawer = document.getElementById('materialGroupDrawer'); var actionModal = document.getElementById('materialActionModal'); var pendingAction = '';
      function openLayer(layer) { if (window.caesarUI && window.caesarUI.openLayer) window.caesarUI.openLayer(layer); else { layer.hidden = false; layer.classList.add('show'); } }
      function closeLayer(layer) { if (window.caesarUI && window.caesarUI.closeLayer) window.caesarUI.closeLayer(layer); else { layer.classList.remove('show'); layer.hidden = true; } }
      function toast(message) { if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message, { type: 'success' }); }
      function cards() { return Array.prototype.slice.call(document.querySelectorAll('.miniapp-material-card')); }
      function visibleCards() { return cards().filter(function (card) { return !card.hidden; }); }
      function updateSelection() { var selected = visibleCards().filter(function (card) { return card.querySelector('input').checked; }).length; document.getElementById('materialSelectedCount').textContent = '已选 ' + selected + ' 项'; document.getElementById('batchMaterialAction').disabled = selected === 0; document.getElementById('selectAllMaterials').checked = selected > 0 && selected === visibleCards().length; }
      function applyFilter() { var keyword = document.getElementById('materialKeyword').value.trim().toLowerCase(); var ratio = document.getElementById('materialRatio').value; var visible = 0; cards().forEach(function (card) { var matched = card.dataset.type === activeType && (activeGroup === 'all' || card.dataset.group === activeGroup) && (!ratio || card.dataset.ratio === ratio) && (!keyword || card.textContent.toLowerCase().indexOf(keyword) > -1); card.hidden = !matched; if (!matched) card.querySelector('input').checked = false; if (matched) visible += 1; }); document.getElementById('materialEmpty').hidden = visible > 0; document.getElementById('uploadMaterial').textContent = '上传' + ({ image: '图片', video: '视频', audio: '音频' }[activeType]); document.getElementById('materialUploadTitle').textContent = '上传' + ({ image: '图片', video: '视频', audio: '音频' }[activeType]); updateSelection(); }
      function confirmAction(action) { pendingAction = action; var count = visibleCards().filter(function (card) { return card.querySelector('input').checked; }).length; document.getElementById('materialActionTitle').textContent = action === 'delete' ? '删除素材' : '移动分组'; document.getElementById('materialActionCopy').textContent = action === 'delete' ? '确认删除选中的 ' + count + ' 项素材？删除后不可恢复。' : '确认移动选中的 ' + count + ' 项素材到指定分组？'; var button = document.getElementById('confirmMaterialAction'); button.textContent = action === 'delete' ? '确认删除' : '确认移动'; button.className = 'btn ' + (action === 'delete' ? 'btn-danger' : 'btn-primary'); openLayer(actionModal); }
      document.addEventListener('click', function (event) {
        var typeTab = event.target.closest('[data-material-type]'); if (typeTab) { activeType = typeTab.dataset.materialType; document.querySelectorAll('[data-material-type]').forEach(function (button) { button.classList.toggle('active', button === typeTab); }); applyFilter(); return; }
        var group = event.target.closest('[data-material-group]'); if (group) { activeGroup = group.dataset.materialGroup; document.querySelectorAll('[data-material-group]').forEach(function (button) { button.classList.toggle('active', button === group); }); applyFilter(); return; }
        if (event.target.id === 'uploadMaterial') { openLayer(uploadDrawer); return; }
        if (event.target.closest('[data-open-group-drawer]')) { openLayer(groupDrawer); return; }
        if (event.target.id === 'batchMaterialAction') { var menu = event.target.nextElementSibling; var open = event.target.getAttribute('aria-expanded') === 'true'; event.target.setAttribute('aria-expanded', String(!open)); if (menu) menu.classList.toggle('show', !open); return; }
        if (event.target.closest('[data-batch-move]')) { confirmAction('move'); return; }
        if (event.target.closest('[data-batch-delete]')) { confirmAction('delete'); return; }
        if (event.target.closest('[data-close-material-upload]') || event.target === uploadDrawer) { closeLayer(uploadDrawer); return; }
        if (event.target.closest('[data-close-group-drawer]') || event.target === groupDrawer) { closeLayer(groupDrawer); return; }
        if (event.target.closest('[data-close-material-action]') || event.target === actionModal) { closeLayer(actionModal); }
      });
      document.getElementById('materialGallery').addEventListener('change', function (event) { if (event.target.matches('input[type="checkbox"]')) updateSelection(); });
      document.getElementById('selectAllMaterials').addEventListener('change', function (event) { visibleCards().forEach(function (card) { card.querySelector('input').checked = event.target.checked; }); updateSelection(); });
      document.getElementById('materialKeyword').addEventListener('input', applyFilter); document.getElementById('materialRatio').addEventListener('change', applyFilter);
      document.getElementById('saveMaterial').addEventListener('click', function () { closeLayer(uploadDrawer); toast('素材已保存'); });
      document.getElementById('confirmMaterialAction').addEventListener('click', function () { var selected = visibleCards().filter(function (card) { return card.querySelector('input').checked; }); if (pendingAction === 'delete') selected.forEach(function (card) { card.remove(); }); else selected.forEach(function (card) { card.dataset.group = 'campaign'; card.querySelector('input').checked = false; }); closeLayer(actionModal); applyFilter(); toast(pendingAction === 'delete' ? '素材已删除' : '素材已移动至节庆大促与会员活动'); pendingAction = ''; });
      applyFilter();
    })();
  </script>
</body>
</html>
