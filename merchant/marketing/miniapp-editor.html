      function selectComponent(index) { selectedIndex = index; renderCanvas(); renderComponentSetting(); document.querySelectorAll('[data-editor-tab]').forEach(function (tab) { tab.classList.toggle('active', tab.dataset.editorTab === 'component'); }); document.querySelectorAll('[data-editor-panel]').forEach(function (panel) { panel.hidden = panel.dataset.editorPanel !== 'component'; }); }
      document.addEventListener('click', function (event) { var component = event.target.closest('[data-add-component]'); if (component && !readonly) { var type = component.dataset.addComponent; components.push(Object.assign({ type: type }, defaults[type])); selectComponent(components.length - 1); return; } var canvas = event.target.closest('[data-canvas-component]'); if (canvas) { selectComponent(Number(canvas.dataset.canvasComponent)); return; } var tab = event.target.closest('[data-editor-tab]'); if (tab) { document.querySelectorAll('[data-editor-tab]').forEach(function (item) { item.classList.toggle('active', item === tab); }); document.querySelectorAll('[data-editor-panel]').forEach(function (panel) { panel.hidden = panel.dataset.editorPanel !== tab.dataset.editorTab; }); return; } if (event.target.closest('[data-open-asset-picker]')) { openLayer(assetDrawer); return; } if (event.target.closest('[data-close-asset-picker]') || event.target === assetDrawer) { closeLayer(assetDrawer); return; } if (event.target.closest('[data-open-link-picker]')) { openLayer(linkDrawer); return; } if (event.target.closest('[data-close-link-picker]') || event.target === linkDrawer) { closeLayer(linkDrawer); return; } var pickedAsset = event.target.closest('[data-editor-asset]'); if (pickedAsset) { selectedAsset = pickedAsset.dataset.editorAsset; document.querySelectorAll('[data-editor-asset]').forEach(function (node) { node.classList.toggle('selected', node === pickedAsset); }); return; } var action = event.target.closest('[data-component-action]'); if (action && !readonly && selectedIndex > -1) { if (action.dataset.componentAction === 'remove') components.splice(selectedIndex, 1); if (action.dataset.componentAction === 'up' && selectedIndex > 0) { var previous = components[selectedIndex - 1]; components[selectedIndex - 1] = components[selectedIndex]; components[selectedIndex] = previous; selectedIndex -= 1; } if (action.dataset.componentAction === 'down' && selectedIndex < components.length - 1) { var next = components[selectedIndex + 1]; components[selectedIndex + 1] = components[selectedIndex]; components[selectedIndex] = next; selectedIndex += 1; } selectedIndex = Math.min(selectedIndex, components.length - 1); renderCanvas(); renderComponentSetting(); return; } if (event.target.id === 'saveEditorPage') { toast('页面草稿已保存'); return; } if (event.target.id === 'previewEditorPage') { toast('当前页面预览已刷新'); return; } if (event.target.id === 'submitEditorPage') { if (!config.name || !components.length) { toast('请完善页面名称和页面组件', 'warning'); return; } document.getElementById('pagePublishCopy').textContent = '确认提交“' + config.name + '”当前版本发布？'; openLayer(publishModal); return; } if (event.target.closest('[data-close-publish-modal]') || event.target === publishModal) closeLayer(publishModal); });
      document.getElementById('editorBack').addEventListener('click', function (event) { if (!readonly && !window.confirm('当前内容未保存，确认离开吗？')) event.preventDefault(); });
      document.getElementById('editorPageName').addEventListener('input', function () { config.name = this.value; renderCanvas(); }); document.getElementById('editorOrganization').addEventListener('change', function () { config.organization = this.value; }); document.getElementById('editorAudience').addEventListener('change', function () { config.audience = this.value; }); document.getElementById('editorEntry').addEventListener('change', function () { config.entry = this.value; }); document.getElementById('editorPhoneTitle').addEventListener('input', function () { config.phoneTitle = this.value; renderCanvas(); }); document.getElementById('editorShareTitle').addEventListener('input', function () { config.shareTitle = this.value; }); document.getElementById('componentSettingBody').addEventListener('input', function (event) { if (event.target.matches('[data-component-title]') && components[selectedIndex]) { components[selectedIndex].title = event.target.value; renderCanvas(); } }); document.getElementById('confirmEditorAsset').addEventListener('click', function () { if (components[selectedIndex]) { components[selectedIndex].asset = selectedAsset; renderCanvas(); renderComponentSetting(); } closeLayer(assetDrawer); toast('素材已选用'); }); document.getElementById('confirmEditorLink').addEventListener('click', function () { var picked = document.querySelector('input[name="customPageLink"]:checked'); if (picked && components[selectedIndex]) { components[selectedIndex].title = picked.value; renderCanvas(); renderComponentSetting(); } closeLayer(linkDrawer); toast('专题活动已关联'); }); document.getElementById('confirmPagePublish').addEventListener('click', function () { closeLayer(publishModal); config.status = '待发布'; config.statusClass = 'tag-orange'; var status = document.querySelector('[data-editor-status]'); status.textContent = config.status; status.className = 'tag ' + config.statusClass; document.getElementById('submitEditorPage').hidden = true; toast('页面版本已提交发布'); });
      updateMode(); renderPageSetting(); renderCanvas(); renderComponentSetting();
    })();
  </script>
