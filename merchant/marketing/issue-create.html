<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发券任务 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="marketing-page marketing-campaign-edit-page marketing-issue-create-page" data-issue-mode="new">
    <section class="page-workbar marketing-campaign-workbar">
      <div class="page-title-row"><a class="page-back-link" href="issue-center.html">返回</a><h1 class="page-title" data-issue-page-title>新建发券任务</h1><span class="tag tag-blue" data-issue-task-status>草稿</span></div>
      <div class="btn-group"><button class="btn btn-secondary" type="button" data-copy-issue hidden>复制任务</button><button class="btn btn-secondary" type="button" data-save-issue>保存草稿</button><button class="btn btn-primary" type="button" data-launch-issue>提交发券</button></div>
    </section>

    <form id="issueForm" class="marketing-campaign-form marketing-issue-form" novalidate>
      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">任务与优惠券</h2></div>
        <div class="form-grid">
          <div class="form-group form-group-full"><label class="form-label" for="issueTaskName">任务名称 <span class="req">*</span></label><input id="issueTaskName" class="form-control" type="text" placeholder="请输入发券任务名称"></div>
          <div class="form-group form-group-full"><label class="form-label">发放优惠券 <span class="req">*</span></label><div class="marketing-selection-field"><div id="issueCouponSelection" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-coupon-picker>选择优惠券</button></div></div>
          <div class="form-group"><label class="form-label" for="issueCouponRule">券面规则</label><input id="issueCouponRule" class="form-control" type="text" readonly></div>
          <div class="form-group"><label class="form-label" for="issueCouponValidity">券有效期</label><input id="issueCouponValidity" class="form-control" type="text" readonly></div>
          <div class="form-group"><label class="form-label" for="issueOwner">任务负责人 <span class="req">*</span></label><select id="issueOwner" class="form-control"><option>周宁</option><option>张敏</option><option>王磊</option><option>刘洋</option><option>赵明</option><option>陈晨</option></select></div>
          <div class="form-group"><label class="form-label" for="issueSource">任务来源</label><select id="issueSource" class="form-control"><option>营销运营</option><option>门店运营</option><option>产品运营</option><option>渠道运营</option></select></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">发放对象</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="issueAudience">目标对象 <span class="req">*</span></label><select id="issueAudience" class="form-control"><option value="直客会员">直客会员</option><option value="企业客户">企业客户</option><option value="合作分销商">合作分销商</option></select></div>
          <div class="form-group"><label class="form-label" for="issuePerRecipient">每个对象发放张数 <span class="req">*</span></label><div class="field-with-suffix"><input id="issuePerRecipient" class="form-control" type="number" min="1" value="1"><span class="field-suffix">张</span></div></div>
          <div class="form-group"><label class="form-label" for="issueTotalQuantity">发券总量 <span class="req">*</span></label><div class="field-with-suffix"><input id="issueTotalQuantity" class="form-control" type="number" min="1" value="1000"><span class="field-suffix">张</span></div></div>
          <div class="form-group form-group-full"><label id="issueRecipientLabel" class="form-label">会员分群 <span class="req">*</span></label><div class="marketing-selection-field"><div id="issueRecipients" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-issue-selector="recipient">选择会员分群</button></div></div>
          <div class="form-group form-group-full"><label class="form-label">适用组织 <span class="req">*</span></label><div class="marketing-selection-field"><div id="issueOrganizations" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-issue-selector="organization">选择适用组织</button></div></div>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">本次适用范围</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="issueScopeMode">范围规则 <span class="req">*</span></label><select id="issueScopeMode" class="form-control"><option value="inherit">继承优惠券模板范围</option><option value="narrow">收窄为指定范围</option></select></div>
          <div class="form-group"><label class="form-label" for="issueCouponScope">券模板范围</label><input id="issueCouponScope" class="form-control" type="text" readonly></div>
          <section class="marketing-rule-panel form-group form-group-full" data-issue-scope-panel="narrow" hidden>
            <div class="form-grid">
              <div class="form-group form-group-full"><label class="form-label">产品类型</label><div class="checkbox-grid marketing-product-type-grid" id="issueProductTypes"><label><input type="checkbox" value="参团游" checked> 参团游</label><label><input type="checkbox" value="邮轮"> 邮轮</label><label><input type="checkbox" value="专列"> 专列</label><label><input type="checkbox" value="自由行"> 自由行</label><label><input type="checkbox" value="研学"> 研学</label></div></div>
              <div class="form-group form-group-full"><label class="form-label">指定产品</label><div class="marketing-selection-field"><div id="issueProducts" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-issue-selector="product">选择产品</button></div></div>
              <div class="form-group form-group-full"><label class="form-label">指定团期/航次/班期</label><div class="marketing-selection-field"><div id="issueSchedules" class="marketing-selected-tags"></div><button class="btn btn-secondary" type="button" data-open-issue-selector="schedule">选择团期</button></div></div>
            </div>
          </section>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">本次优惠规则</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="issueRuleMode">规则来源 <span class="req">*</span></label><select id="issueRuleMode" class="form-control"><option value="inherit">继承优惠券模板</option><option value="override">本次任务覆盖</option></select></div>
          <div class="form-group"><label class="form-label" for="issueRuleSnapshot">模板默认规则</label><input id="issueRuleSnapshot" class="form-control" type="text" readonly></div>
          <section class="marketing-rule-panel form-group form-group-full" data-issue-rule-panel="override" hidden>
            <div class="form-grid">
              <div class="form-group"><label class="form-label" for="issueStacking">同享规则 <span class="req">*</span></label><select id="issueStacking" class="form-control"><option>不与其他营销活动同享</option><option>可与会员折扣同享</option><option>可与指定优惠券同享</option></select></div>

              <div class="form-group"><label class="form-label" for="issueSettlementBasis">承担结算口径 <span class="req">*</span></label><select id="issueSettlementBasis" class="form-control"><option>订单完成且无退款后确认</option><option>订单实收后确认</option><option>按退款后有效金额确认</option></select></div>
              <div class="form-group"><label class="form-label" for="issueRuleNote">覆盖备注</label><input id="issueRuleNote" class="form-control" type="text" placeholder="请输入本次覆盖原因"></div>
            </div>
          </section>
        </div>
      </section>

      <section class="edit-form-card marketing-config-card">
        <div class="edit-section-titlebar"><h2 class="edit-section-title">发放计划</h2></div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="issueMethod">发放方式 <span class="req">*</span></label><select id="issueMethod" class="form-control"><option value="immediate">立即发放</option><option value="scheduled">定时发放</option></select></div>
          <section class="marketing-rule-panel form-group" data-issue-method-panel="scheduled" hidden><label class="form-label" for="issueScheduledAt">计划发放时间 <span class="req">*</span></label><input id="issueScheduledAt" class="form-control" type="datetime-local" value="2026-07-15T10:00"></section>
          <div class="form-group"><label class="form-label" for="issueDateBasis">适用日期口径</label><select id="issueDateBasis" class="form-control"><option>继承优惠券模板</option><option>按预订日期</option><option>按出发日期</option></select></div>
          <div class="form-group"><label class="form-label" for="issueDeliveryNote">发券备注</label><input id="issueDeliveryNote" class="form-control" type="text" placeholder="请输入本次发券备注"></div>
        </div>
      </section>
    </form>
  </main>

  </div>

  <div id="issueSelectorDrawer" class="modal-overlay drawer-overlay" hidden>
    <section class="modal drawer-modal drawer-md marketing-scope-drawer" role="dialog" aria-modal="true" aria-labelledby="issueSelectorTitle"><div class="modal-header"><h2 id="issueSelectorTitle">选择对象</h2><button class="modal-close" type="button" data-close-issue-selector aria-label="关闭">×</button></div><div class="modal-body"><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title">筛选</h3></div><div class="marketing-selector-filters"><input id="issueSelectorKeyword" class="form-control" type="search" placeholder="搜索名称"><select id="issueSelectorType" class="form-control"><option value="">全部类型</option></select></div></section><section class="drawer-section"><div class="drawer-section-head"><h3 class="drawer-section-title" data-issue-selector-list-title>可选对象</h3><span class="marketing-selector-count" data-issue-selector-count>已选0项</span></div><div id="issueSelectorList" class="marketing-selector-list"></div></section></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-issue-selector>取消</button><button id="confirmIssueSelector" class="btn btn-primary" type="button">确认选择</button></div></section>
  </div>

  <div id="issueLaunchModal" class="modal-overlay" hidden>
    <section class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="issueLaunchTitle"><div class="modal-header"><h2 id="issueLaunchTitle">提交发券</h2><button class="modal-close" type="button" data-close-issue-launch aria-label="关闭">×</button></div><div class="modal-body"><p class="modal-center-text" data-issue-launch-copy>确认提交当前发券任务？</p></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-close-issue-launch>取消</button><button id="confirmIssueLaunch" class="btn btn-primary" type="button">确认提交</button></div></section>

      function escapeHtml(value) { return String(value || '').replace(/[&<>'"]/g, function (character) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[character]; }); }
      function couponById(id) { return couponLibrary.filter(function (coupon) { return coupon.id === id; })[0] || couponLibrary[0]; }
      function recipientKind() { return document.getElementById('issueAudience').value === '企业客户' ? 'enterprise' : document.getElementById('issueAudience').value === '合作分销商' ? 'distributor' : 'member'; }
      function optionById(kind, id) { return (optionData[kind] || []).filter(function (item) { return item.id === id; })[0]; }
      function setCheckboxValues(containerId, values) { document.querySelectorAll('#' + containerId + ' input[type="checkbox"]').forEach(function (input) { input.checked = (values || []).indexOf(input.value) > -1; }); }
      function checkedValues(containerId) { return Array.prototype.slice.call(document.querySelectorAll('#' + containerId + ' input:checked')).map(function (input) { return input.value; }); }
      function selectedLabel(kind) { return { recipient: 'issueRecipients', organization: 'issueOrganizations', product: 'issueProducts', schedule: 'issueSchedules' }[kind]; }
      function renderSelection(kind) {
        var actualKind = kind === 'recipient' ? recipientKind() : kind;
        var chosen = selected[kind].map(function (id) { return optionById(actualKind, id); }).filter(Boolean);
        document.getElementById(selectedLabel(kind)).innerHTML = chosen.length ? chosen.map(function (item) { return '<span class="tag tag-blue">' + escapeHtml(item.name) + '</span>'; }).join('') : '<span class="marketing-selection-empty">未选择</span>';
      }
      function renderAllSelections() { renderSelection('recipient'); renderSelection('organization'); renderSelection('product'); renderSelection('schedule'); }
      function renderCouponSelection() {
        var coupon = couponById(selected.coupon);
        document.getElementById('issueCouponSelection').innerHTML = '<span class="tag tag-blue">' + escapeHtml(coupon.name) + '</span>';
        document.getElementById('issueCouponRule').value = coupon.rule;
        document.getElementById('issueCouponValidity').value = coupon.validity;
        document.getElementById('issueCouponScope').value = coupon.scope;
        document.getElementById('issueRuleSnapshot').value = '同享、优先级与承担比例继承券模板';
        setCheckboxValues('issueProductTypes', coupon.productTypes);
        document.querySelectorAll('#issueProductTypes input[type="checkbox"]').forEach(function (input) { input.disabled = coupon.productTypes.indexOf(input.value) === -1; });
        selected.product = selected.product.filter(function (id) { var item = optionById('product', id); return item && coupon.productTypes.indexOf(item.meta.split(' · ')[0]) > -1; });
        selected.schedule = selected.schedule.filter(function (id) { var item = optionById('schedule', id); return item && coupon.productTypes.indexOf(item.meta.split(' · ')[0]) > -1; });
      }
      function updateAudienceLabel() {
        var labelMap = { '直客会员': '会员分群', '企业客户': '企业客户', '合作分销商': '合作分销商' };
        var buttonMap = { '直客会员': '选择会员分群', '企业客户': '选择企业客户', '合作分销商': '选择合作分销商' };
        document.getElementById('issueRecipientLabel').innerHTML = labelMap[document.getElementById('issueAudience').value] + ' <span class="req">*</span>';
        document.querySelector('[data-open-issue-selector="recipient"]').textContent = buttonMap[document.getElementById('issueAudience').value];
      }
      function updateScopePanel() { var modeValue = document.getElementById('issueScopeMode').value; document.querySelectorAll('[data-issue-scope-panel]').forEach(function (panel) { panel.hidden = panel.dataset.issueScopePanel !== modeValue; }); }
      function updateRulePanel() { var modeValue = document.getElementById('issueRuleMode').value; document.querySelectorAll('[data-issue-rule-panel]').forEach(function (panel) { panel.hidden = panel.dataset.issueRulePanel !== modeValue; }); }
      function updateMethodPanel() { var method = document.getElementById('issueMethod').value; document.querySelectorAll('[data-issue-method-panel]').forEach(function (panel) { panel.hidden = panel.dataset.issueMethodPanel !== method; }); document.querySelector('[data-launch-issue]').textContent = method === 'scheduled' ? '提交定时发券' : '立即发放'; }
      function applyPreset(preset) {
        if (!preset) return;
        document.getElementById('issueTaskName').value = preset.name; document.getElementById('issueAudience').value = preset.audience; document.getElementById('issueOwner').value = preset.owner; document.getElementById('issueSource').value = preset.source; document.getElementById('issueTotalQuantity').value = preset.quantity; document.getElementById('issuePerRecipient').value = preset.perRecipient; document.getElementById('issueScopeMode').value = preset.scopeMode; document.getElementById('issueRuleMode').value = preset.ruleMode; document.getElementById('issueMethod').value = preset.method;
        if (preset.scheduledAt) document.getElementById('issueScheduledAt').value = preset.scheduledAt;
        selected.coupon = preset.coupon; selected.recipient = preset.recipients.slice(); selected.organization = preset.organizations.slice(); selected.product = (preset.products || []).slice(); selected.schedule = (preset.schedules || []).slice(); setCheckboxValues('issueProductTypes', preset.productTypes || []);
        updateAudienceLabel(); renderCouponSelection(); updateScopePanel(); updateRulePanel(); updateMethodPanel(); renderAllSelections();
      }
      function configureMode() {
        var viewOnly = mode === 'view'; var copyMode = mode === 'copy'; var launchable = mode === 'new' || copyMode || (mode === 'edit' && currentStatus === '草稿');
        var titleMap = { new: '新建发券任务', edit: '编辑发券任务', view: '发券任务详情', copy: '复制发券任务' }; var statusMap = { '草稿': 'tag-blue', '待发放': 'tag-orange', '发放中': 'tag-green', '已完成': 'tag-green', '已取消': 'tag-gray' }; var status = copyMode || mode === 'new' ? '草稿' : currentStatus;
        page.dataset.issueMode = mode; document.querySelector('[data-issue-page-title]').textContent = titleMap[mode]; var statusNode = document.querySelector('[data-issue-task-status]'); statusNode.textContent = status; statusNode.className = 'tag ' + (statusMap[status] || 'tag-blue');
        document.querySelector('[data-copy-issue]').hidden = !viewOnly; document.querySelector('[data-save-issue]').hidden = viewOnly; document.querySelector('[data-launch-issue]').hidden = viewOnly || !launchable; document.querySelector('[data-save-issue]').textContent = launchable ? '保存草稿' : '保存修改';
        document.querySelectorAll('#issueForm input, #issueForm select, #issueForm textarea').forEach(function (field) { field.disabled = viewOnly; }); document.querySelectorAll('[data-open-coupon-picker], [data-open-issue-selector]').forEach(function (button) { button.hidden = viewOnly; });
        if (copyMode) document.getElementById('issueTaskName').value = document.getElementById('issueTaskName').value + ' - 副本';
      }
      function renderCouponList() {
        var keyword = document.getElementById('issueCouponKeyword').value.trim().toLowerCase(); var audience = document.getElementById('issueCouponAudienceFilter').value;
        var choices = couponLibrary.filter(function (coupon) { return coupon.active !== false && (!keyword || (coupon.name + coupon.rule).toLowerCase().indexOf(keyword) > -1) && (!audience || coupon.audience === audience); });
        document.getElementById('issueCouponList').innerHTML = choices.length ? choices.map(function (coupon) { return '<label class="marketing-selector-option"><input type="radio" name="issueCouponChoice" value="' + coupon.id + '" data-issue-coupon-choice' + (coupon.id === selected.coupon ? ' checked' : '') + '><span><strong>' + escapeHtml(coupon.name) + '</strong><em>' + escapeHtml(coupon.rule + ' · ' + coupon.validity) + '</em></span></label>'; }).join('') : '<div class="marketing-selector-empty">暂无符合条件的优惠券</div>';
      }
      function selectorOptions(kind) {
        if (kind === 'recipient') return optionData[recipientKind()];
        var items = optionData[kind] || [];
        if (kind !== 'product' && kind !== 'schedule') return items;
        var allowedTypes = couponById(selected.coupon).productTypes;
        return items.filter(function (item) { return allowedTypes.indexOf(item.meta.split(' · ')[0]) > -1; });
      }
      function selectorLabels(kind) { return { recipient: [document.getElementById('issueRecipientLabel').textContent.replace('*', '').trim(), '可选对象'], organization: ['选择适用组织', '可选组织'], product: ['选择产品', '可选产品'], schedule: ['选择团期/航次/班期', '可选团期/航次/班期'] }[kind]; }
      function renderSelectorTypes() { var items = selectorOptions(selectorKind); var categories = items.map(function (item) { return item.meta.split(' · ')[0]; }).filter(function (item, index, list) { return list.indexOf(item) === index; }); document.getElementById('issueSelectorType').innerHTML = '<option value="">全部类型</option>' + categories.map(function (item) { return '<option>' + escapeHtml(item) + '</option>'; }).join(''); }
      function renderSelectorList() {
        var keyword = document.getElementById('issueSelectorKeyword').value.trim().toLowerCase(); var type = document.getElementById('issueSelectorType').value;
        var items = selectorOptions(selectorKind).filter(function (item) { return (!keyword || (item.name + item.meta).toLowerCase().indexOf(keyword) > -1) && (!type || item.meta.indexOf(type) === 0); });
        document.getElementById('issueSelectorList').innerHTML = items.length ? items.map(function (item) { return '<label class="marketing-selector-option"><input type="checkbox" value="' + item.id + '" data-issue-selector-item' + (workingSelection.indexOf(item.id) > -1 ? ' checked' : '') + '><span><strong>' + escapeHtml(item.name) + '</strong><em>' + escapeHtml(item.meta) + '</em></span></label>'; }).join('') : '<div class="marketing-selector-empty">暂无符合条件的选项</div>';
        document.querySelector('[data-issue-selector-count]').textContent = '已选' + workingSelection.length + '项';
      }
      function openSelector(kind) { selectorKind = kind; workingSelection = selected[kind].slice(); var labels = selectorLabels(kind); document.getElementById('issueSelectorTitle').textContent = labels[0]; document.querySelector('[data-issue-selector-list-title]').textContent = labels[1]; document.getElementById('issueSelectorKeyword').value = ''; renderSelectorTypes(); renderSelectorList(); openLayer(selectorDrawer); }
      function validateForLaunch() {
        var invalid = [];
        [['issueTaskName', '任务名称'], ['issueTotalQuantity', '发券总量']].forEach(function (item) { var field = document.getElementById(item[0]); field.classList.remove('field-invalid'); if (!field.value || Number(field.value) <= 0) { field.classList.add('field-invalid'); invalid.push(item[1]); } });
        if (!selected.coupon) invalid.push('发放优惠券'); if (!selected.recipient.length) invalid.push('发放对象'); if (!selected.organization.length) invalid.push('适用组织');
        if (document.getElementById('issueMethod').value === 'scheduled' && !document.getElementById('issueScheduledAt').value) invalid.push('计划发放时间');
        if (document.getElementById('issueRuleMode').value === 'override') { var share = ['issueHeadquartersShare', 'issueStoreShare', 'issueDistributorShare'].reduce(function (sum, id) { return sum + Number(document.getElementById(id).value || 0); }, 0); if (share !== 100) invalid.push('承担比例'); }
        if (invalid.length) { toast('请完善：' + invalid.join('、'), 'warning'); return false; } return true;
      }

      document.addEventListener('click', function (event) {
        if (event.target.closest('[data-open-coupon-picker]')) { document.getElementById('issueCouponAudienceFilter').value = document.getElementById('issueAudience').value; renderCouponList(); openLayer(couponDrawer); return; }
        var selectorButton = event.target.closest('[data-open-issue-selector]'); if (selectorButton) { openSelector(selectorButton.dataset.openIssueSelector); return; }
        if (event.target.closest('[data-close-issue-coupon]') || event.target === couponDrawer) { closeLayer(couponDrawer); return; }
        if (event.target.closest('[data-close-issue-selector]') || event.target === selectorDrawer) { closeLayer(selectorDrawer); return; }
        if (event.target.closest('[data-close-issue-launch]') || event.target === launchModal) { closeLayer(launchModal); return; }
        if (event.target.closest('[data-save-issue]')) { toast(document.querySelector('[data-save-issue]').textContent + '成功'); return; }
        if (event.target.closest('[data-launch-issue]')) { if (!validateForLaunch()) return; var scheduled = document.getElementById('issueMethod').value === 'scheduled'; document.getElementById('issueLaunchTitle').textContent = scheduled ? '提交定时发券' : '立即发放'; document.querySelector('[data-issue-launch-copy]').textContent = scheduled ? '确认按计划时间发放“' + document.getElementById('issueTaskName').value + '”？' : '确认立即发放“' + document.getElementById('issueTaskName').value + '”？'; document.getElementById('confirmIssueLaunch').textContent = scheduled ? '确认提交' : '确认发放'; openLayer(launchModal); return; }
        if (event.target.closest('[data-copy-issue]')) window.location.href = 'issue-create.html?task=' + encodeURIComponent(taskId) + '&mode=copy';
      });
      document.getElementById('issueAudience').addEventListener('change', function () { selected.recipient = []; var matchedCoupon = couponLibrary.filter(function (coupon) { return coupon.active !== false && coupon.audience === document.getElementById('issueAudience').value; })[0]; if (matchedCoupon) selected.coupon = matchedCoupon.id; updateAudienceLabel(); renderCouponSelection(); renderSelection('recipient'); });
      document.getElementById('issueScopeMode').addEventListener('change', updateScopePanel); document.getElementById('issueRuleMode').addEventListener('change', updateRulePanel); document.getElementById('issueMethod').addEventListener('change', updateMethodPanel);
      document.getElementById('issueCouponKeyword').addEventListener('input', renderCouponList); document.getElementById('issueCouponAudienceFilter').addEventListener('change', renderCouponList); document.getElementById('issueSelectorKeyword').addEventListener('input', renderSelectorList); document.getElementById('issueSelectorType').addEventListener('change', renderSelectorList);
      document.getElementById('issueCouponList').addEventListener('change', function (event) { var choice = event.target.closest('[data-issue-coupon-choice]'); if (choice) selected.coupon = choice.value; });
      document.getElementById('confirmIssueCoupon').addEventListener('click', function () { renderCouponSelection(); renderSelection('product'); renderSelection('schedule'); closeLayer(couponDrawer); });
      document.getElementById('issueSelectorList').addEventListener('change', function (event) { var item = event.target.closest('[data-issue-selector-item]'); if (!item) return; if (item.checked && workingSelection.indexOf(item.value) === -1) workingSelection.push(item.value); if (!item.checked) workingSelection = workingSelection.filter(function (id) { return id !== item.value; }); document.querySelector('[data-issue-selector-count]').textContent = '已选' + workingSelection.length + '项'; });
      document.getElementById('confirmIssueSelector').addEventListener('click', function () { selected[selectorKind] = workingSelection.slice(); renderSelection(selectorKind); closeLayer(selectorDrawer); });
      document.getElementById('confirmIssueLaunch').addEventListener('click', function () { closeLayer(launchModal); var scheduled = document.getElementById('issueMethod').value === 'scheduled'; currentStatus = scheduled ? '待发放' : '发放中'; var statusNode = document.querySelector('[data-issue-task-status]'); statusNode.textContent = currentStatus; statusNode.className = 'tag ' + (scheduled ? 'tag-orange' : 'tag-green'); document.querySelector('[data-launch-issue]').hidden = true; document.querySelector('[data-save-issue]').textContent = '保存修改'; toast(scheduled ? '定时发券任务已提交' : '发券任务已提交'); });
      if (current) applyPreset(current); else { updateAudienceLabel(); renderCouponSelection(); updateScopePanel(); updateRulePanel(); updateMethodPanel(); renderAllSelections(); }
      configureMode();
    })();
  </script>
</body>
</html>
