<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发起单团询价 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="custom-detail-page">
    <section class="page-workbar custom-detail-workbar">
      <div>
        <a class="back-link" href="product-custom-list.html">返回</a>
        <h1 class="page-title">发起单团询价</h1>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" type="button" data-save-inquiry-draft>保存草稿</button>
        <button class="btn btn-primary" type="button" data-submit-inquiry>提交计调询价</button>
      </div>
    </section>

    <section class="custom-summary-grid" aria-label="询价来源">
      <div class="custom-summary-item"><span>发起来源</span><strong id="inquirySourceName">手工新建</strong></div>
      <div class="custom-summary-item"><span>来源单据</span><strong id="inquirySourceNo">-</strong></div>
      <div class="custom-summary-item"><span>引用产品</span><strong id="inquiryProductName">未引用产品</strong></div>
      <div class="custom-summary-item"><span>产品线路</span><strong id="inquiryRouteName">按客户需求规划</strong></div>
      <div class="custom-summary-item"><span>参考价格</span><strong id="inquiryReferencePrice">待核价</strong></div>
      <div class="custom-summary-item"><span>当前状态</span><strong><span id="inquiryDraftStatus" class="tag tag-gray">未提交</span></strong></div>
    </section>

    <section class="card custom-section-card">
      <div class="section-head"><h2>客户与出行需求</h2></div>
      <div class="form-row">
        <div class="form-group form-group-full">
          <label class="form-label" for="inquiryProjectName">询价项目名称 <span class="req">*</span></label>
          <input id="inquiryProjectName" class="form-control" type="text" placeholder="如：某科技公司欧洲年会项目">
        </div>
        <div class="form-group form-group-full">
          <label class="form-label" for="inquiryCustomer">客户单位 <span class="req">*</span></label>
          <input id="inquiryCustomer" class="form-control" type="text" placeholder="请输入客户单位名称">
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryContact">客户联系人 <span class="req">*</span></label>
          <input id="inquiryContact" class="form-control" type="text" placeholder="请输入联系人姓名">
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryPhone">联系电话 <span class="req">*</span></label>
          <input id="inquiryPhone" class="form-control" type="tel" placeholder="请输入联系人电话">
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryType">业务类型</label>
          <select id="inquiryType" class="form-control"><option>MICE</option><option>定制团</option><option>企业团建</option><option>奖励旅游</option><option>私人包团</option><option>政企考察</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryDestination">出行目的地</label>
          <input id="inquiryDestination" class="form-control" type="text" placeholder="如：法国/德国/意大利">
        </div>
        <div class="form-group">
          <label class="form-label">计划出行日期 <span class="req">*</span></label>
          <div class="date-range custom-date-range"><input id="inquiryTravelStart" class="form-control" type="date" aria-label="出行开始日期"><span>至</span><input id="inquiryTravelEnd" class="form-control" type="date" aria-label="出行结束日期"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryPeople">预计人数 <span class="req">*</span></label>
          <input id="inquiryPeople" class="form-control" type="number" min="1" placeholder="请输入人数">
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryBudget">客户预算 <span class="req">*</span></label>
          <select id="inquiryBudget" class="form-control"><option value="">请选择</option><option>客户预算待确认</option><option>10万以内</option><option>10-50万</option><option>50-100万</option><option>100-200万</option><option>200万以上</option></select>
        </div>
      </div>
    </section>

    <section class="card custom-section-card">
      <div class="section-head"><h2>报价要求</h2></div>
      <div class="form-row">
        <div class="form-group form-group-full">
          <label class="form-label" for="inquiryRequirement">服务标准/客户需求 <span class="req">*</span></label>
          <textarea id="inquiryRequirement" class="form-control" rows="4" placeholder="填写酒店、交通、用车、餐标、导游、会议活动、特殊人群及客户关注事项"></textarea>
        </div>
        <div class="form-group form-group-full">
          <label class="form-label" for="inquiryDifference">与引用产品的差异</label>
          <textarea id="inquiryDifference" class="form-control" rows="3" placeholder="如：升级酒店、独立用车、增加公务拜访、调整行程或会务活动"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryPaymentExpect">客户付款预期</label>
          <select id="inquiryPaymentExpect" class="form-control"><option>以锁定报价付款节点为准</option><option>签约后 / 出行前 / 验收后分阶段收款</option><option>一次性收款</option><option>客户暂未明确</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryAttachment">需求附件</label>
          <input id="inquiryAttachment" class="form-control" type="file" multiple>
        </div>
      </div>
    </section>

    <section class="card custom-section-card">
      <div class="section-head"><h2>内部交办</h2></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="inquiryOwner">销售负责人</label>
          <select id="inquiryOwner" class="form-control"><option>陈刚</option><option>王芳</option><option>周伟</option><option>刘总监</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryPlannerGroup">计调组 <span class="req">*</span></label>
          <select id="inquiryPlannerGroup" class="form-control"><option value="">请选择</option><option>会奖计调组</option><option>欧洲计调组</option><option>亚洲计调组</option><option>国内定制组</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryPlanner">指定计调负责人</label>
          <select id="inquiryPlanner" class="form-control"><option>待计调组分派</option><option>李梅</option><option>赵磊</option><option>孙倩</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryQuoteDue">期望报价时间 <span class="req">*</span></label>
          <input id="inquiryQuoteDue" class="form-control" type="datetime-local">
        </div>
        <div class="form-group">
          <label class="form-label" for="inquiryUrgency">紧急度</label>
          <select id="inquiryUrgency" class="form-control"><option>普通</option><option>加急</option><option>客户当天要价</option></select>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sourceLabels = { intentInquiry: '意向订单', enterpriseInquiry: '企业客户', salesProductInquiry: '产品预订', productRouteInquiry: '产品详情', customInquiry: '单团项目' };
      function value(id) { return (document.getElementById(id).value || '').trim(); }
      function setValue(id, next) { if (next) document.getElementById(id).value = next; }
      function setSelectValue(id, next) {
        if (!next) return;
        var control = document.getElementById(id);
        var matched = Array.prototype.slice.call(control.options).some(function (option) { return option.value === next; });
        if (matched) control.value = next;
      }
      function setText(id, next) { if (next) document.getElementById(id).textContent = next; }
      function toast(message, type) { if (window.caesarUI && window.caesarUI.toast) window.caesarUI.toast(message, { type: type || 'success' }); }
      function required(id, label) {
        if (value(id)) return true;
        toast('请填写' + label + '。', 'warning');
        document.getElementById(id).focus();
        return false;
      }
      function dateToken() {
        var now = new Date();
        return String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
      }
      function projectHref() {
        var token = dateToken();
        var query = new URLSearchParams();
        query.set('source', params.get('source') || 'customInquiry');
        query.set('intentNo', params.get('intentNo') || '');
        query.set('inquiryNo', params.get('inquiryNo') || 'INQ-' + token);
        query.set('projectNo', 'CUS-' + token);
        query.set('projectStatus', '待计调接单');
        query.set('projectName', value('inquiryProjectName'));
        query.set('customer', value('inquiryCustomer'));
        query.set('contact', value('inquiryContact'));
        query.set('phone', value('inquiryPhone'));
        query.set('type', value('inquiryType'));
        query.set('destination', value('inquiryDestination'));
        query.set('route', params.get('route') || value('inquiryDestination'));
        query.set('productName', params.get('productName') || '');
        query.set('travelStart', value('inquiryTravelStart'));
        query.set('travelEnd', value('inquiryTravelEnd'));
        query.set('people', value('inquiryPeople'));
        query.set('budget', value('inquiryBudget'));
        query.set('requirement', [value('inquiryRequirement'), value('inquiryDifference')].filter(Boolean).join('；'));
        query.set('paymentExpect', value('inquiryPaymentExpect'));
        query.set('owner', value('inquiryOwner'));
        query.set('plannerGroup', value('inquiryPlannerGroup'));
        query.set('planner', value('inquiryPlanner'));
        query.set('quoteDue', value('inquiryQuoteDue'));
        query.set('urgency', value('inquiryUrgency'));
        query.set('quoteBasis', params.get('quoteBasis') || '销售发起单团询价');
        return 'product-custom-detail.html?' + query.toString();
      }

      var source = params.get('source') || 'customInquiry';
      setText('inquirySourceName', sourceLabels[source] || '手工新建');
      setText('inquirySourceNo', params.get('intentNo') || params.get('customer') || params.get('productName') || '-');
      setText('inquiryProductName', params.get('productName') || '未引用产品');
      setText('inquiryRouteName', params.get('route') || params.get('destination') || '按客户需求规划');
      setText('inquiryReferencePrice', params.get('budget') || params.get('referencePrice') || '待核价');
      setValue('inquiryProjectName', params.get('projectName') || (params.get('customer') ? params.get('customer') + '单团询价' : ''));
      setValue('inquiryCustomer', params.get('customer'));
      setValue('inquiryContact', params.get('contact'));
      setValue('inquiryPhone', params.get('phone'));
      setValue('inquiryDestination', params.get('destination'));
      setValue('inquiryTravelStart', params.get('travelStart'));
      setValue('inquiryTravelEnd', params.get('travelEnd'));
      setValue('inquiryPeople', params.get('people'));
      setValue('inquiryRequirement', params.get('requirement'));
      setValue('inquiryDifference', params.get('independentNote'));
      setValue('inquiryOwner', params.get('owner'));
      setValue('inquiryPlannerGroup', params.get('plannerGroup'));
      setValue('inquiryPlanner', params.get('planner'));
      setValue('inquiryQuoteDue', params.get('quoteDue'));
      setSelectValue('inquiryType', params.get('type'));
      setSelectValue('inquiryPaymentExpect', params.get('paymentExpect'));
      if (params.get('budget')) {
        var budget = params.get('budget');
        var budgetOption = Array.prototype.slice.call(document.getElementById('inquiryBudget').options).some(function (option) { return option.value === budget; });
        if (budgetOption) setSelectValue('inquiryBudget', budget);
      }

      document.querySelector('[data-save-inquiry-draft]').addEventListener('click', function () {
        document.getElementById('inquiryDraftStatus').textContent = '询价草稿';
        document.getElementById('inquiryDraftStatus').className = 'tag tag-gray';
        toast('询价草稿已保存，可继续补充后提交计调。');
      });
      document.querySelector('[data-submit-inquiry]').addEventListener('click', function () {
        var checks = [['inquiryProjectName', '询价项目名称'], ['inquiryCustomer', '客户单位'], ['inquiryContact', '客户联系人'], ['inquiryPhone', '联系电话'], ['inquiryTravelStart', '计划出行开始日期'], ['inquiryTravelEnd', '计划出行结束日期'], ['inquiryPeople', '预计人数'], ['inquiryBudget', '客户预算'], ['inquiryRequirement', '服务标准/客户需求'], ['inquiryPlannerGroup', '计调组'], ['inquiryQuoteDue', '期望报价时间']];
        for (var index = 0; index < checks.length; index += 1) {
          if (!required(checks[index][0], checks[index][1])) return;
        }
        if (value('inquiryTravelEnd') < value('inquiryTravelStart')) {
          toast('返回日期不能早于出发日期。', 'warning');
          document.getElementById('inquiryTravelEnd').focus();
          return;
        }
        window.location.href = projectHref();
      });
    })();
  </script>
</body>
</html>
