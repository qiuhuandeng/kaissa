<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量开排 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="product-create-page schedule-builder-page" data-schedule-builder="batch">
    <section class="page-workbar">
      <div>
        <div class="page-title-row">
          <a class="page-back-link" href="schedules.html" data-confirm-back>返回</a>
          <h1 class="page-title">批量开排</h1>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" type="button" data-preview-builder>生成预览</button>
        <button class="btn btn-primary" type="button" data-submit-builder>确认开排</button>
      </div>
    </section>

    <section class="schedule-builder-hero" aria-label="批量开排上下文">
      <div class="schedule-builder-title-row">
        <h2 id="heroTitle" class="schedule-builder-title">欧洲十国经典游</h2>
        <span id="heroType" class="tag tag-blue">跟团线路</span>
      </div>
      <div class="schedule-builder-strip">
        <div><span>当前方案</span><strong id="heroPlan">经济款</strong></div>
        <div><span>行程时长</span><strong id="heroDuration">12天11晚</strong></div>
        <div><span>默认容量</span><strong id="heroUnit">30人</strong></div>
      </div>
    </section>

    <section class="schedule-type-row" aria-label="线路类型">
      <button class="schedule-type-card active" type="button" data-schedule-type="group">
        <strong>跟团</strong>
        <span>生成多个出发日，按总名额分配</span>
      </button>
      <button class="schedule-type-card" type="button" data-schedule-type="cruise">
        <strong>邮轮</strong>
        <span>生成多个航次，按舱型矩阵分配</span>
      </button>
      <button class="schedule-type-card" type="button" data-schedule-type="train">
        <strong>专列</strong>
        <span>生成多个车次，按铺位矩阵分配</span>
      </button>
      <button class="schedule-type-card" type="button" data-schedule-type="study">
        <strong>研学</strong>
        <span>生成多个营期，按班级名额分配</span>
      </button>
    </section>

    <nav class="schedule-builder-progress" aria-label="批量开排步骤">
      <button class="schedule-builder-step active" type="button" data-builder-step><span class="schedule-builder-step-index">1</span><span>线路方案</span></button>
      <button class="schedule-builder-step" type="button" data-builder-step><span class="schedule-builder-step-index">2</span><span>日期规则</span></button>
      <button class="schedule-builder-step" type="button" data-builder-step><span class="schedule-builder-step-index">3</span><span>价格余量</span></button>
      <button class="schedule-builder-step" type="button" data-builder-step><span class="schedule-builder-step-index">4</span><span>预览确认</span></button>
    </nav>

    <section class="schedule-builder-panel active" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">选择线路与方案</h2>
        </div>
        <div class="schedule-builder-grid">
          <div class="form-group">
            <label class="form-label" for="lineSelect">线路 <span class="req">*</span></label>
            <select id="lineSelect" class="form-control"></select>
          </div>
          <div class="form-group">
            <label id="planLabel" class="form-label" for="planSelect">线路方案 <span class="req">*</span></label>
            <select id="planSelect" class="form-control"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="plannerSelect">负责计调</label>
            <select id="plannerSelect" class="form-control">
              <option>周伟</option>
              <option>赵明</option>
              <option>李铭</option>
              <option>刘洋</option>
              <option>孙丽</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">方案基准</label>
            <div id="planBasis" class="schedule-plan-basis">-</div>
          </div>
          <div class="form-group schedule-builder-full">
            <label class="form-label" for="lineMeta">开排摘要</label>
            <textarea id="lineMeta" class="form-control" rows="4" readonly></textarea>
          </div>
        </div>
      </section>
    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">日期生成规则</h2>
        </div>
        <div class="schedule-builder-grid">
          <div class="form-group">
            <label class="form-label" for="batchStart">开始日期</label>
            <input id="batchStart" class="form-control" type="date" value="2026-07-01">
          </div>
          <div class="form-group">
            <label class="form-label" for="batchEnd">结束日期</label>
            <input id="batchEnd" class="form-control" type="date" value="2026-08-31">
          </div>
          <div class="form-group schedule-builder-full">
            <label class="form-label">按星期生成</label>
            <div class="schedule-weekday-row">
              <label><input type="checkbox" name="batchWeekday" value="1"> 周一</label>
              <label><input type="checkbox" name="batchWeekday" value="2"> 周二</label>
              <label><input type="checkbox" name="batchWeekday" value="3"> 周三</label>
              <label><input type="checkbox" name="batchWeekday" value="4"> 周四</label>
              <label><input type="checkbox" name="batchWeekday" value="5" checked> 周五</label>
              <label><input type="checkbox" name="batchWeekday" value="6" checked> 周六</label>
              <label><input type="checkbox" name="batchWeekday" value="0"> 周日</label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="excludeDates">排除日期</label>
            <input id="excludeDates" class="form-control" type="text" placeholder="如 2026-07-12, 2026-08-01">
          </div>
          <div class="form-group">
            <label id="departLabel" class="form-label" for="departDate">出发日期 <span class="req">*</span></label>
            <input id="departDate" class="form-control" type="date" value="2026-07-01">
          </div>
          <div class="form-group">
            <label id="returnLabel" class="form-label" for="returnDate">返回日期 <span class="req">*</span></label>
            <input id="returnDate" class="form-control" type="date" value="2026-07-12">
            <div class="form-hint">单团时长：<span id="durationHint">12天11晚</span></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="deadlineDate">默认报名截止</label>
            <input id="deadlineDate" class="form-control" type="date" value="2026-06-20">
          </div>
        </div>
      </section>

      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">执行默认值</h2>
          <span id="scheduleCodePreview" class="tag tag-blue">GT260701001</span>
        </div>
        <div class="schedule-builder-grid three">
          <div class="form-group">
            <label id="startLabel" class="form-label" for="startPlace">出发城市 <span class="req">*</span></label>
            <input id="startPlace" class="form-control" type="text" value="北京">
          </div>
          <div class="form-group">
            <label id="endLabel" class="form-label" for="endPlace">返回城市 <span class="req">*</span></label>
            <input id="endPlace" class="form-control" type="text" value="北京">
          </div>
          <div class="form-group">
            <label id="deadline2Label" class="form-label" for="deadline2">尾款截止日期</label>
            <input id="deadline2" class="form-control" type="date" value="2026-06-25">
          </div>
        </div>
        <div id="typeNodeGrid" class="schedule-node-grid schedule-node-extra"></div>
      </section>
    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section schedule-matrix-table">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">批量价格与余量</h2>
        </div>
        <div class="schedule-matrix-meta">
          <span>单团总量 <strong id="matrixTotal">0</strong></span>
          <span>单团可售 <strong id="matrixSaleable">0</strong></span>
        </div>
        <section class="table-wrap" aria-label="批量价格与余量">
          <table>
            <thead id="matrixHead"></thead>
            <tbody id="matrixRows"></tbody>
          </table>
        </section>
      </section>

      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">渠道分配规则</h2>
        </div>
        <div class="schedule-channel-grid">
          <label><span>门店</span><input class="form-control schedule-channel-input" type="number" min="0" value="8" data-channel="门"></label>
          <label><span>官网</span><input class="form-control schedule-channel-input" type="number" min="0" value="6" data-channel="官"></label>
          <label><span>小程序</span><input class="form-control schedule-channel-input" type="number" min="0" value="5" data-channel="小"></label>
          <label><span>OTA</span><input class="form-control schedule-channel-input" type="number" min="0" value="6" data-channel="O"></label>
          <label><span>同业</span><input class="form-control schedule-channel-input" type="number" min="0" value="3" data-channel="同"></label>
          <label><span>代理</span><input class="form-control schedule-channel-input" type="number" min="0" value="2" data-channel="代"></label>
        </div>
        <div class="schedule-channel-total">
          <span>分配合计：<strong id="channelTotal">30</strong></span>
          <span>单团可售：<strong id="channelCapacity">30</strong></span>
          <span id="channelStatus" class="tag tag-green">分配正常</span>
        </div>
      </section>
    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">预览确认</h2>
          <span id="previewCount" class="tag tag-blue">0个团期</span>
        </div>
        <section class="table-wrap schedule-matrix-table" aria-label="批量开排预览">
          <table>
            <thead>
              <tr>
                <th>创建</th>
                <th>团期编号</th>
                <th>出发/开航/发车</th>
                <th>返回/返港/回程</th>
                <th>线路方案</th>
                <th>可售</th>
                <th>起价</th>
                <th>渠道分配</th>
              </tr>
            </thead>
            <tbody id="previewRows"></tbody>
          </table>
        </section>
      </section>
    </section>

    <div class="schedule-builder-actions">
      <a class="btn btn-secondary" href="schedules.html" data-confirm-back>取消</a>
      <button class="btn btn-secondary" type="button" data-prev-step>上一步</button>
      <button class="btn btn-primary" type="button" data-next-step>下一步</button>
    </div>
  </main>

  <div id="builderSuccessModal" class="modal-overlay schedule-builder-modal" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <div class="modal-header">
        <div id="successTitle" class="modal-title">批量开排完成</div>
        <button class="modal-close" type="button" data-close-builder-modal>×</button>
      </div>
      <div class="modal-body">
        <section class="readonly-summary">
          <div><span>处理状态</span><strong id="approvalNo">无需审批</strong></div>
          <div><span>后续位置</span><strong id="approvalNode">团期列表</strong></div>
        </section>
        <p id="successText" class="modal-center-text">已生成团期。</p>
      </div>
      <div class="modal-footer">
        <a id="approvalLink" class="btn btn-secondary" href="schedules.html">查看列表</a>
        <button class="btn btn-primary" type="button" data-builder-success>进入团期列表</button>
      </div>
    </div>
  </div>

  <script src="../../shared/schedule-builder-page.js"></script>
</body>
</html>
