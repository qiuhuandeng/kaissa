<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建团期 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="product-create-page schedule-builder-page edit-page" data-schedule-builder="single">
    <section class="page-workbar edit-workbar">
      <div class="page-title-row">
        <a class="page-back-link" href="schedules.html" data-confirm-back>返回</a>
        <h1 class="page-title">新建团期</h1>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" type="button" data-save-draft>保存草稿</button>
        <button class="btn btn-primary" type="button" data-submit-builder>生成团期</button>
      </div>
    </section>

    <section class="edit-summary-card" aria-label="团期开排上下文">
      <div class="edit-summary-band"></div>
      <div class="edit-summary-body">
        <div class="edit-summary-head">
          <div class="edit-summary-badges">
            <span id="heroType" class="tag tag-blue">出境游线路</span>
            <span class="tag tag-orange">待生成</span>
            <span id="scheduleCodePreview" class="tag tag-blue">GT260701001</span>
          </div>
          <span class="route-eyebrow">默认状态：筹备中 / 未出团 / 未维护成本</span>
        </div>
        <h2 id="heroTitle" class="edit-summary-title">欧洲十国经典游</h2>
        <p id="heroDesc" class="edit-summary-desc">出境游，12天11晚，法德瑞意核心城市连线。</p>
        <div class="edit-summary-divider"></div>
        <div class="edit-summary-bottom">
          <div class="edit-summary-metas">
            <span class="edit-meta">当前方案：<strong id="heroPlan">经济款</strong></span>
            <span class="edit-meta">行程时长：<strong id="heroDuration">12天11晚</strong></span>
            <span class="edit-meta">负责计调：<strong>周伟</strong></span>
          </div>
          <div class="edit-summary-metrics">
            <div class="edit-summary-metric"><span>默认容量</span><strong id="heroUnit">30人</strong></div>
            <div class="edit-summary-metric"><span>销售状态</span><strong>筹备中</strong></div>
            <div class="edit-summary-metric"><span>审批方式</span><strong>提交审核</strong></div>
          </div>
        </div>
      </div>
    </section>

    <nav class="edit-step-tabs" aria-label="新建团期步骤">
      <button class="edit-step-tab active" type="button" data-builder-step><span class="edit-step-index">1</span><span>基础信息</span></button>
      <button class="edit-step-tab" type="button" data-builder-step><span class="edit-step-index">2</span><span>执行设置</span></button>
      <button class="edit-step-tab" type="button" data-builder-step><span class="edit-step-index">3</span><span>价格库存</span></button>
      <button class="edit-step-tab" type="button" data-builder-step><span class="edit-step-index">4</span><span>提交确认</span></button>
    </nav>

    <section class="schedule-builder-panel edit-form-card active" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title edit-subsection-title">选择线路与方案</h2>
        </div>
        <div class="schedule-type-row" aria-label="线路类型">
          <button class="schedule-type-card active" type="button" data-schedule-type="outbound">
            <strong>出境游</strong>
            <span>按人群价格与总名额开排</span>
          </button>
          <button class="schedule-type-card" type="button" data-schedule-type="domestic">
            <strong>国内游</strong>
            <span>按人群价格与总名额开排</span>
          </button>
          <button class="schedule-type-card" type="button" data-schedule-type="cruise">
            <strong>邮轮</strong>
            <span>按舱型价格与舱房开排</span>
          </button>
          <button class="schedule-type-card" type="button" data-schedule-type="train">
            <strong>专列</strong>
            <span>按车厢/铺位价格开排</span>
          </button>
          <button class="schedule-type-card" type="button" data-schedule-type="free">
            <strong>自由行</strong>
            <span>按出行日期与套餐余量开排</span>
          </button>
          <button class="schedule-type-card" type="button" data-schedule-type="study">
            <strong>研学</strong>
            <span>按班级、导师和学生名额开排</span>
          </button>
        </div>
        <div class="schedule-builder-grid">
          <div class="form-group">
            <label class="form-label" for="lineSelect">线路 <span class="req">*</span></label>
            <select id="lineSelect" class="form-control"></select>
          </div>
          <div class="form-group">
            <label id="planLabel" class="form-label" for="planSelect">线路方案 <span class="req">*</span></label>
            <select id="planSelect" class="form-control"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="plannerSelect">负责计调</label>
            <select id="plannerSelect" class="form-control">
              <option>周伟</option>
              <option>赵明</option>
              <option>李铭</option>
              <option>刘洋</option>
              <option>孙丽</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">方案基准</label>
            <div id="planBasis" class="schedule-plan-basis">-</div>
          </div>
          <div class="form-group schedule-builder-full">
            <label class="form-label" for="lineMeta">线路摘要</label>
            <textarea id="lineMeta" class="form-control" rows="4" readonly></textarea>
          </div>
        </div>
      </section>
    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">日期与执行信息</h2>
        </div>
        <div class="schedule-builder-grid three">
          <div class="form-group">
            <label id="departLabel" class="form-label" for="departDate">出发日期 <span class="req">*</span></label>
            <input id="departDate" class="form-control" type="date" value="2026-07-01">
          </div>
          <div class="form-group">
            <label id="returnLabel" class="form-label" for="returnDate">返回日期 <span class="req">*</span></label>
            <input id="returnDate" class="form-control" type="date" value="2026-07-12">
            <div class="form-hint">自动计算：<span id="durationHint">12天11晚</span></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="saleStatus">销售状态</label>
            <select id="saleStatus" class="form-control">
              <option selected>筹备中</option>
              <option>开放报名</option>
              <option>已截止</option>
              <option>售罄</option>
              <option>已取消</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="executionStatus">执行状态</label>
            <input id="executionStatus" class="form-control" type="text" value="未出团" readonly>
          </div>
          <div class="form-group">
            <label class="form-label" for="settlementStatus">结算状态</label>
            <input id="settlementStatus" class="form-control" type="text" value="未维护成本" readonly>
          </div>
          <div class="form-group">
            <label id="startLabel" class="form-label" for="startPlace">出发城市 <span class="req">*</span></label>
            <input id="startPlace" class="form-control" type="text" value="北京">
          </div>
          <div class="form-group">
            <label id="endLabel" class="form-label" for="endPlace">返回城市 <span class="req">*</span></label>
            <input id="endPlace" class="form-control" type="text" value="北京">
          </div>
          <div class="form-group">
            <label class="form-label" for="deadlineDate">报名截止日期</label>
            <input id="deadlineDate" class="form-control" type="date" value="2026-06-20">
          </div>
        </div>
      </section>

      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">类型执行节点</h2>
        </div>
        <div id="typeNodeGrid" class="schedule-node-grid"></div>
        <div class="schedule-builder-grid schedule-node-extra">
          <div class="form-group">
            <label id="deadline2Label" class="form-label" for="deadline2">尾款截止日期</label>
            <input id="deadline2" class="form-control" type="date" value="2026-06-25">
          </div>
          <div class="form-group">
            <label class="form-label" for="executeRemark">执行补充</label>
            <input id="executeRemark" class="form-control" type="text" placeholder="如航班待确认、集合时间另行通知">
          </div>
        </div>
      </section>

    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">名额与价格</h2>
        </div>
        <div class="schedule-builder-grid three schedule-resource-bind-grid">
          <div class="form-group schedule-builder-full" data-resource-source-field>
            <label id="resourceBorrowSourceLabel" class="form-label" for="resourceBorrowSource">交通资源</label>
            <select id="resourceBorrowSource" class="form-control"></select>
            <div id="resourceBorrowCheck" class="form-hint">保存后占用对应可分配库存</div>
          </div>
          <div class="form-group">
            <label id="quotaPlanCountLabel" class="form-label" for="quotaPlanCount">计划收客</label>
            <input id="quotaPlanCount" class="form-control" type="number" min="0" value="30">
          </div>
          <div class="form-group">
            <label id="adultCountLabel" class="form-label" for="adultCount">成人数</label>
            <input id="adultCount" class="form-control" type="number" min="0" value="18">
          </div>
          <div class="form-group">
            <label class="form-label" for="reserveHours">预留时长（小时） <span class="req">*</span></label>
            <input id="reserveHours" class="form-control" type="number" min="0" value="24">
          </div>
        </div>
        <input id="trafficDemand" type="hidden" value="绑定已采购交通">
        <input id="resourceBorrowQty" type="hidden" value="30">
        <input id="resourceBorrowStatus" type="hidden" value="未绑定">
      </section>

      <section class="schedule-builder-section schedule-matrix-table">
        <div class="schedule-builder-section-head">
          <h2 id="matrixSectionTitle" class="schedule-builder-section-title">价格结构</h2>
        </div>
        <div class="schedule-matrix-meta">
          <span>总量 <strong id="matrixTotal">0</strong></span>
          <span>可售 <strong id="matrixSaleable">0</strong></span>
        </div>
        <section class="table-wrap" aria-label="价格与余量">
          <table>
            <thead id="matrixHead"></thead>
            <tbody id="matrixRows"></tbody>
          </table>
        </section>
      </section>
    </section>

    <section class="schedule-builder-panel" data-builder-panel>
      <section class="schedule-builder-section">
        <div class="schedule-builder-section-head">
          <h2 class="schedule-builder-section-title">提交确认</h2>
        </div>
        <div id="summaryContent" class="schedule-summary-grid"></div>
      </section>
    </section>

    <div class="schedule-builder-actions">
      <a class="btn btn-secondary" href="schedules.html" data-confirm-back>取消</a>
      <button class="btn btn-secondary" type="button" data-prev-step>上一步</button>
      <button class="btn btn-primary" type="button" data-next-step>下一步</button>
    </div>
  </main>

  <div id="builderSuccessModal" class="modal-overlay schedule-builder-modal" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <div class="modal-header">
        <div id="successTitle" class="modal-title">排期已提交</div>
        <button class="modal-close" type="button" data-close-builder-modal>×</button>
      </div>
      <div class="modal-body">
        <section class="readonly-summary">
          <div><span>审批单号</span><strong id="approvalNo">APR-20260624-030</strong></div>
          <div><span>当前节点</span><strong id="approvalNode">线路负责人</strong></div>
        </section>
        <p id="successText" class="modal-center-text">排期已提交审批。</p>
      </div>
      <div class="modal-footer">
        <a id="approvalLink" class="btn btn-secondary" href="schedules.html">返回列表</a>
        <button class="btn btn-primary" type="button" data-builder-success>进入团期列表</button>
      </div>
    </div>
  </div>

  <script src="../../shared/schedule-builder-page.js"></script>
</body>
</html>
