<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出团执行 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">出团执行</h1>
      </div>
    </div>
  </section>

  <section class="list-surface fulfillment-outbound-list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="出团执行筛选">
      <div class="list-surface-filter-actions list-filter-pinned-actions">
        <div class="btn-group">
          <button id="openAiOutboundRisk" class="btn btn-ai" type="button">🤖 AI出团风险扫描</button>
          <button id="exportExecutionPlan" class="btn btn-secondary" type="button">导出执行计划</button>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label class="sr-only" for="executionKeyword">团号/线路名称</label>
          <input id="executionKeyword" type="search" placeholder="团号/线路名称">
        </div>
        <div class="filter-item filter-item-wide filter-item-date-range">
          <label class="sr-only">出发日期范围</label>
          <div class="date-range">
            <input id="executionStartDate" type="date" aria-label="出发开始日期">
            <span>至</span>
            <input id="executionEndDate" type="date" aria-label="出发结束日期">
          </div>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="executionType">线路类型</label>
          <select id="executionType">
            <option value="全部类型">全部类型</option>
            <option value="普通团期">普通团期</option>
            <option value="邮轮团期">邮轮团期</option>
            <option value="专列团期">专列团期</option>
            <option value="研学团期">研学团期</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="executionStatus">执行状态</label>
          <select id="executionStatus">
            <option value="全部状态">全部状态</option>
            <option value="待出团">待出团</option>
            <option value="登船准备">登船准备</option>
            <option value="发车准备">发车准备</option>
            <option value="出团中">出团中</option>
            <option value="已回团">已回团</option>
          </select>
        </div>
        <div class="filter-item filter-item-sm">
          <label class="sr-only" for="executionRisk">风险类型</label>
          <select id="executionRisk">
            <option value="全部风险">全部风险</option>
            <option value="名单待补">名单待补</option>
            <option value="证件/签证异常">证件/签证异常</option>
            <option value="资源待确认">资源待确认</option>
            <option value="通知待发">通知待发</option>
            <option value="领队待安排">领队待安排</option>
          </select>
        </div>
        <div class="filter-actions">
          <button id="searchExecution" class="btn btn-secondary" type="button">搜索</button>
          <button id="resetExecution" class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>

    <nav id="executionQueueTabs" class="tab-bar list-surface-tabs" aria-label="出团执行队列筛选">
      <button class="tab-item active" type="button" data-queue-filter="全部">全部</button>
      <button class="tab-item outbound-tab-danger" type="button" data-queue-filter="本周出团">本周出团</button>
      <button class="tab-item" type="button" data-queue-filter="名单待补">名单待补</button>
      <button class="tab-item" type="button" data-queue-filter="证件/签证异常">证件/签证异常</button>
      <button class="tab-item" type="button" data-queue-filter="资源待确认">资源待确认</button>
      <button class="tab-item" type="button" data-queue-filter="通知待发">通知待发</button>
      <button class="tab-item" type="button" data-queue-filter="领队待安排">领队待安排</button>
      <button class="tab-item" type="button" data-queue-filter="已出发">已出发</button>
    </nav>

    <section class="table-wrap outbound-table-wrap list-surface-table list-table-with-pagination" aria-label="出团执行列表">
      <table>
        <thead>
          <tr>
            <th>团号/线路</th>
            <th>出发节点</th>
            <th>人数/名单</th>
            <th>证件/签证</th>
            <th>资源/票务</th>
            <th>通知/确认</th>
            <th>责任人/领队</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="executionRows"></tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached">
      <span id="executionPagination">第0-0条/共0条</span>
    </div>
  </section>

  <div id="rosterDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outbound-resource-drawer" role="dialog" aria-modal="true" aria-labelledby="rosterDrawerTitle">
      <div class="modal-header">
        <div id="rosterDrawerTitle" class="modal-title">名单</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="rosterSummary" class="readonly-summary"></div>
        <section class="table-wrap fulfillment-table" aria-label="团期名单">
          <table>
            <thead><tr><th>游客</th><th>手机号</th><th>订单号</th><th>证件/实名</th><th>房型/舱房/铺位</th><th>特殊需求</th><th>确认状态</th><th>操作</th></tr></thead>
            <tbody id="rosterRows"></tbody>
          </table>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button">导出名单</button>
        <button class="btn btn-primary" type="button">同步领队名单</button>
        <button class="btn btn-secondary" type="button" data-close-layer>关闭</button>
      </div>
    </div>
  </div>

  <div id="documentsDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outbound-resource-drawer" role="dialog" aria-modal="true" aria-labelledby="documentsDrawerTitle">
      <div class="modal-header">
        <div id="documentsDrawerTitle" class="modal-title">证件/签证</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="documentsSummary" class="readonly-summary"></div>
        <section class="table-wrap fulfillment-table" aria-label="证件签证资料">
          <table>
            <thead><tr><th>游客</th><th>资料类型</th><th>有效期/节点</th><th>签证/实名状态</th><th>缺失项</th><th>最近跟进</th><th>操作</th></tr></thead>
            <tbody id="documentsRows"></tbody>
          </table>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button">批量补件提醒</button>
        <button class="btn btn-primary" type="button">标记资料已收</button>
        <button class="btn btn-secondary" type="button" data-close-layer>关闭</button>
      </div>
    </div>
  </div>

  <div id="resourceDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outbound-resource-drawer" role="dialog" aria-modal="true" aria-labelledby="resourceDrawerTitle">
      <div class="modal-header">
        <div id="resourceDrawerTitle" class="modal-title">资源确认</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="resourceSummary" class="readonly-summary"></div>
        <div class="outbound-resource-overview" id="resourceOverview"></div>
        <section class="outbound-resource-list" id="resourceItems" aria-label="资源确认项"></section>
        <div class="form-group">
          <label class="form-label" for="resourceRemark">确认备注</label>
          <textarea id="resourceRemark" class="form-control" rows="4" placeholder="记录供应商确认号、异常说明或催办结果"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <a id="resourceCostLink" class="btn btn-secondary" href="fulfillment-cost.html">成本复核</a>
        <button id="confirmResources" class="btn btn-primary" type="button">标记资源已确认</button>
        <button class="btn btn-secondary" type="button" data-close-layer>关闭</button>
      </div>
    </div>
  </div>

  <div id="noticeDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outbound-resource-drawer" role="dialog" aria-modal="true" aria-labelledby="noticeDrawerTitle">
      <div class="modal-header">
        <div id="noticeDrawerTitle" class="modal-title">出团通知</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="noticeSummary" class="readonly-summary"></div>
        <div class="form-group">
          <div class="outbound-notice-head">
            <label class="form-label">通知对象</label>
            <label class="outbound-check-all"><input id="checkAllGuests" type="checkbox" checked> 全选</label>
          </div>
          <div class="outbound-guest-list" id="noticeGuestList"></div>
        </div>
        <div class="form-group">
          <label class="form-label">通知方式</label>
          <div class="outbound-method-row">
            <label><input type="checkbox" checked> 短信</label>
            <label><input type="checkbox" checked> 系统消息</label>
            <label><input type="checkbox"> 邮件</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="noticeContent">通知内容</label>
          <textarea id="noticeContent" class="form-control outbound-notice-text" rows="12"></textarea>
        </div>
        <div id="noticeFee" class="outbound-fee"></div>
      </div>
      <div class="modal-footer">
        <button id="sendNotice" class="btn btn-primary" type="button">确认发送</button>
        <button class="btn btn-secondary" type="button" data-close-layer>取消</button>
      </div>
    </div>
  </div>

  <div id="leaderDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal outbound-leader-drawer" role="dialog" aria-modal="true" aria-labelledby="leaderDrawerTitle">
      <div class="modal-header">
        <div id="leaderDrawerTitle" class="modal-title">安排领队</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="leaderSummary" class="readonly-summary"></div>
        <section class="outbound-leader-alert">
          <strong>匹配规则</strong>
          <span id="leaderRule"></span>
        </section>
        <div class="outbound-leader-list" id="leaderOptions" role="radiogroup" aria-label="可安排领队"></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="leaderMeetTime">集合时间</label>
            <input id="leaderMeetTime" class="form-control" type="datetime-local">
          </div>
          <div class="form-group">
            <label class="form-label" for="leaderMeetPlace">集合地点</label>
            <input id="leaderMeetPlace" class="form-control" type="text">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="leaderRemark">领队备注</label>
          <textarea id="leaderRemark" class="form-control" rows="4" placeholder="给领队的补充说明"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveLeaderAssign" class="btn btn-primary" type="button">确认安排</button>
        <button class="btn btn-secondary" type="button" data-close-layer>取消</button>
      </div>
    </div>
  </div>

  <div id="aiOutboundRiskModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-lg" role="dialog" aria-modal="true" aria-labelledby="aiOutboundRiskTitle">
      <div class="modal-header">
        <div id="aiOutboundRiskTitle" class="modal-title">AI出团风险扫描</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div class="ai-embedded-summary">
          <span id="aiRiskCount" class="tag tag-orange">0项风险</span>
          <strong id="aiRiskSummary">已扫描当前执行队列。</strong>
        </div>
        <section class="table-wrap ai-embedded-table" aria-label="AI出团风险明细">
          <table>
            <thead><tr><th>团号</th><th>风险类型</th><th>AI判断</th><th>建议动作</th></tr></thead>
            <tbody id="aiRiskRows"></tbody>
          </table>
        </section>
      </div>
      <div class="modal-footer">
        <button id="createOutboundRiskTasks" class="btn btn-primary" type="button">生成待办任务</button>
        <button class="btn btn-secondary" type="button" data-close-layer>关闭</button>
      </div>
    </div>
  </div>

  <div id="executionToastModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="executionToastTitle">
      <div class="modal-header">
        <div id="executionToastTitle" class="modal-title">操作已记录</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-layer>×</button>
      </div>
      <div class="modal-body">
        <div id="executionToastText" class="modal-center-text"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" type="button" data-close-layer>知道了</button>
      </div>
    </div>
  </div>

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function openLayer(layer) {
        if (!layer) return;
        if (window.caesarUI && window.caesarUI.openLayer) {
          window.caesarUI.openLayer(layer);
        } else {
          layer.classList.add('show');
          layer.setAttribute('aria-hidden', 'false');
        }
      }

      function closeLayer(layer) {
        if (!layer) return;
        if (window.caesarUI && window.caesarUI.closeLayer) {
          window.caesarUI.closeLayer(layer);
        } else {
          layer.classList.remove('show');
          layer.setAttribute('aria-hidden', 'true');
        }
      }

      function closeMenus() {
        document.querySelectorAll('.table-action-more .dropdown-menu.show').forEach(function (menu) {
          menu.classList.remove('show');
        });
        document.querySelectorAll('[data-row-more][aria-expanded="true"]').forEach(function (button) {
          button.setAttribute('aria-expanded', 'false');
        });
      }

      function findRecord(code) {
        return executionRows.find(function (item) { return item.code === code; }) || executionRows[0];
      }

      function recordSummary(record) {
        return record.code + ' | ' + record.product + ' | ' + record.plan + ' | ' + record.people + ' | ' + record.departText;
      }

      function queueMatches(record) {
        return activeQueue === '全部' || record.queue.indexOf(activeQueue) >= 0;
      }

      function filtersMatch(record) {
        var keyword = keywordInput.value.trim().toLowerCase();
        var risk = riskSelect.value;
        if (keyword && [record.code, record.product, record.plan, record.owner, record.leader].join(' ').toLowerCase().indexOf(keyword) < 0) return false;
        if (startDateInput.value && record.departDate < startDateInput.value) return false;
        if (endDateInput.value && record.departDate > endDateInput.value) return false;
        if (typeSelect.value !== '全部类型' && record.type !== typeSelect.value) return false;
        if (statusSelect.value !== '全部状态' && record.executionStatus !== statusSelect.value) return false;
        if (risk !== '全部风险' && record.queue.indexOf(risk) < 0) return false;
        return true;
      }

      function mutedLine(text) {
        return '<span class="text-muted schedule-route-name">' + escapeHtml(text) + '</span>';
      }

      function statusTag(status, className) {
        return '<span class="' + escapeHtml(className) + '">' + escapeHtml(status) + '</span>';
      }

      function scheduleCell(record) {
        return '<a class="table-link table-main-link" href="schedules-detail.html?scheduleNo=' + encodeURIComponent(record.code) + '">' + escapeHtml(record.code) + '</a>' +
          mutedLine(record.product + ' / ' + record.plan) +
          statusTag(record.type, record.tagClass);
      }

      function peopleRosterCell(record) {
        return '<span class="schedule-product-name">' + escapeHtml(record.people) + '</span>' +
          '<span class="' + escapeHtml(record.rosterClass) + '">' + escapeHtml(record.rosterStatus) + '</span>';
      }

      function ownerLeaderCell(record) {
        return '<span class="schedule-product-name">' + escapeHtml(record.owner) + '</span>' +
          mutedLine(record.leader);
      }

      function executionActionHtml(record) {
        if (record.executionStatus === '已回团') {
          return '<div class="table-action">' +
            '<a class="table-action-primary" href="fulfillment-return.html?scheduleNo=' + encodeURIComponent(record.code) + '&type=' + encodeURIComponent(record.typeKey) + '">去结算</a>' +
            '<a href="schedules-detail.html?scheduleNo=' + encodeURIComponent(record.code) + '">详情</a>' +
            '</div>';
        }
        return '<div class="table-action">' +
          '<button class="table-action-primary" type="button" data-open-roster>名单</button>' +
          '<button type="button" data-open-documents>证件</button>' +
          '<button type="button" data-open-resource>资源</button>' +
          '<button type="button" data-open-notice>通知</button>' +
          '<span class="dropdown table-action-more"><button class="muted table-more-toggle" type="button" data-row-more aria-expanded="false">更多</button><span class="dropdown-menu action-dropdown-menu"><button class="dropdown-item" type="button" data-open-leader>领队安排</button>' + markActionHtml(record) + '<a class="dropdown-item" href="schedules-detail.html?scheduleNo=' + encodeURIComponent(record.code) + '">团期详情</a></span></span>' +
          '</div>';
      }

      function markActionHtml(record) {
        if (record.executionStatus === '待出团' || record.executionStatus === '登船准备' || record.executionStatus === '发车准备') {
          return '<button class="dropdown-item" type="button" data-mark-departed>标记已出发</button>';
        }
        if (record.executionStatus === '出团中') {
          return '<button class="dropdown-item" type="button" data-mark-returned>标记已回团</button>';
        }
        return '';
      }

      function rowHtml(record) {
        return '<tr data-code="' + escapeHtml(record.code) + '" data-tab-status="' + escapeHtml(record.queue.join(' ')) + '">' +
          '<td>' + scheduleCell(record) + '</td>' +
          '<td><span class="schedule-product-name">' + escapeHtml(record.departText) + '</span>' + mutedLine(record.departDate) + '</td>' +
          '<td>' + peopleRosterCell(record) + '</td>' +
          '<td><span class="' + escapeHtml(record.documentsClass) + '">' + escapeHtml(record.documentsStatus) + '</span></td>' +
          '<td><span class="' + escapeHtml(record.resourceClass) + '">' + escapeHtml(record.resourceStatus) + '</span></td>' +
          '<td><span class="' + escapeHtml(record.noticeClass) + '">' + escapeHtml(record.noticeStatus) + '</span></td>' +
          '<td>' + ownerLeaderCell(record) + '</td>' +
          '<td>' + executionActionHtml(record) + '</td>' +
        '</tr>';
      }

      function renderRows() {
        var rows = executionRows.filter(function (record) {
          return queueMatches(record) && filtersMatch(record);
        });
        executionRowsBody.innerHTML = rows.length ? rows.map(rowHtml).join('') : '<tr><td colspan="8" class="table-empty">暂无符合条件的出团执行事项</td></tr>';
        executionPagination.textContent = rows.length ? '第1-' + rows.length + '条/共' + rows.length + '条' : '第0-0条/共0条';
        closeMenus();
      }

      function currentFromTrigger(trigger) {
        var row = trigger.closest('tr');

      }

      function renderDocumentsDrawer(record) {
        document.getElementById('documentsDrawerTitle').textContent = record.typeKey === 'train' ? '实名制资料' : record.typeKey === 'cruise' ? '登船资料' : '证件/签证';
        document.getElementById('documentsSummary').textContent = recordSummary(record);
        document.getElementById('documentsRows').innerHTML = record.documents.map(function (item) {
          return '<tr><td>' + escapeHtml(item[0]) + '</td><td>' + escapeHtml(item[1]) + '</td><td>' + escapeHtml(item[2]) + '</td><td>' + escapeHtml(item[3]) + '</td><td>' + escapeHtml(item[4]) + '</td><td>' + escapeHtml(item[5]) + '</td><td><div class="table-action"><button class="table-action-primary" type="button">' + escapeHtml(item[6]) + '</button></div></td></tr>';
        }).join('');
      }

      function renderResourceDrawer(record) {
        document.getElementById('resourceSummary').textContent = recordSummary(record);
        var pendingCount = record.resources.filter(function (item) { return item[4] === 'warning'; }).length;
        document.getElementById('resourceOverview').innerHTML =
          '<div><span>资源完成度</span><strong>' + escapeHtml((record.resources.length - pendingCount) + '/' + record.resources.length + '项') + '</strong></div>' +
          '<div><span>待确认</span><strong class="amount-orange">' + escapeHtml(pendingCount + '项') + '</strong></div>' +
          '<div><span>风险提示</span><strong>' + escapeHtml(record.riskText) + '</strong></div>';
        document.getElementById('resourceItems').innerHTML = record.resources.map(function (item) {
          return '<article class="outbound-resource-item ' + escapeHtml(item[4]) + '"><div><strong>' + escapeHtml(item[0]) + '</strong><span>' + escapeHtml(item[1]) + '</span></div><span class="' + escapeHtml(item[3]) + '">' + escapeHtml(item[2]) + '</span></article>';
        }).join('');
        document.getElementById('resourceRemark').value = record.resourceRemark;
        document.getElementById('resourceCostLink').href = 'fulfillment-cost.html?scheduleNo=' + encodeURIComponent(record.code) + '&type=' + encodeURIComponent(record.typeKey);
      }

      function renderNoticeDrawer(record) {
        document.getElementById('noticeDrawerTitle').textContent = record.notice.title;
        document.getElementById('noticeSummary').textContent = recordSummary(record);
        noticeGuestList.innerHTML = record.notice.guests.map(function (guest) {
          return '<label><input type="checkbox" checked> ' + escapeHtml(guest) + '</label>';
        }).join('');
        checkAllGuests.checked = true;
        document.querySelector('.outbound-check-all').innerHTML = '<input id="checkAllGuests" type="checkbox" checked> 全选 共' + escapeHtml(record.people.replace('人', '位游客'));
        checkAllGuests = document.getElementById('checkAllGuests');
        checkAllGuests.addEventListener('change', syncGuestChecks);
        document.getElementById('noticeContent').value = record.notice.content;
        document.getElementById('noticeFee').textContent = record.notice.fee;
      }

      function renderLeaderDrawer(record) {
        document.getElementById('leaderDrawerTitle').textContent = record.leaderPlan.title;
        document.getElementById('leaderSummary').textContent = recordSummary(record);
        document.getElementById('leaderRule').textContent = record.leaderPlan.rule;
        document.getElementById('leaderMeetTime').value = record.leaderPlan.meetTime;
        document.getElementById('leaderMeetPlace').value = record.leaderPlan.meetPlace;
        document.getElementById('leaderRemark').value = record.leaderPlan.remark;
        document.getElementById('leaderOptions').innerHTML = record.leaderPlan.options.map(function (item) {
          return '<label class="outbound-leader-card' + (item[4] ? ' selected' : '') + (item[5] ? ' disabled' : '') + '"><input type="radio" name="leaderOption" value="' + escapeHtml(item[0]) + '"' + (item[4] ? ' checked' : '') + (item[5] ? ' disabled' : '') + '><span><strong>' + escapeHtml(item[0]) + '</strong><em>' + escapeHtml(item[1]) + '</em></span><b class="' + escapeHtml(item[3]) + '">' + escapeHtml(item[2]) + '</b></label>';
        }).join('');
      }

      function renderAiRisk() {
        var risks = executionRows.reduce(function (items, record) {
          record.risks.forEach(function (risk) {
            items.push([record.code, risk[0], risk[1], risk[2]]);
          });
          return items;
        }, []);
        document.getElementById('aiRiskCount').textContent = risks.length + '项风险';
        document.getElementById('aiRiskSummary').textContent = '已扫描当前出团执行队列，发现名单、证件、资源、通知和领队安排风险。';
        document.getElementById('aiRiskRows').innerHTML = risks.map(function (row) {
          var cls = /未|待|缺|回传/.test(row[2]) ? 'tag tag-orange' : 'tag tag-blue';
          return '<tr><td>' + escapeHtml(row[0]) + '</td><td>' + escapeHtml(row[1]) + '</td><td><span class="' + cls + '">' + escapeHtml(row[2]) + '</span></td><td>' + escapeHtml(row[3]) + '</td></tr>';
        }).join('');
      }

      function primaryDrawer(record) {
        if (record.queue.indexOf('名单待补') >= 0) return 'roster';
        if (record.queue.indexOf('证件/签证异常') >= 0) return 'documents';
        if (record.queue.indexOf('资源待确认') >= 0) return 'resource';
        if (record.queue.indexOf('领队待安排') >= 0) return 'leader';
        if (record.queue.indexOf('通知待发') >= 0) return 'notice';
        if (record.executionStatus === '出团中') return 'resource';
        return 'notice';
      }

      function openFor(record, drawerName) {
        currentRecord = record;
        if (drawerName === 'roster') {
          renderRosterDrawer(record);
          openLayer(document.getElementById('rosterDrawer'));
        } else if (drawerName === 'documents') {
          renderDocumentsDrawer(record);
          openLayer(document.getElementById('documentsDrawer'));
        } else if (drawerName === 'resource') {
          renderResourceDrawer(record);
          openLayer(document.getElementById('resourceDrawer'));
        } else if (drawerName === 'notice') {
          renderNoticeDrawer(record);
          openLayer(document.getElementById('noticeDrawer'));
        } else if (drawerName === 'leader') {
          renderLeaderDrawer(record);
          openLayer(document.getElementById('leaderDrawer'));
        }
      }

      function showResult(message) {
        document.getElementById('executionToastText').textContent = message;
        openLayer(document.getElementById('executionToastModal'));
      }

      function syncGuestChecks() {
        noticeGuestList.querySelectorAll('input[type="checkbox"]').forEach(function (checkbox) {
          checkbox.checked = checkAllGuests.checked;
        });
      }

      document.getElementById('executionQueueTabs').addEventListener('click', function (event) {
        var button = event.target.closest('[data-queue-filter]');
        if (!button) return;
        activeQueue = button.dataset.queueFilter;
        document.querySelectorAll('[data-queue-filter]').forEach(function (item) {
          item.classList.toggle('active', item === button);
        });
        renderRows();
      });

      document.getElementById('searchExecution').addEventListener('click', renderRows);
      [keywordInput, startDateInput, endDateInput, typeSelect, statusSelect, riskSelect].forEach(function (field) {
        field.addEventListener('change', renderRows);
      });
      keywordInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') renderRows();
      });
      document.getElementById('resetExecution').addEventListener('click', function () {
        keywordInput.value = '';
        startDateInput.value = '';
        endDateInput.value = '';
        typeSelect.value = '全部类型';
        statusSelect.value = '全部状态';
        riskSelect.value = '全部风险';
        renderRows();
      });

      document.addEventListener('click', function (event) {
        var moreButton = event.target.closest('[data-row-more]');
        if (moreButton) {
          event.preventDefault();
          event.stopPropagation();
          var menu = moreButton.nextElementSibling;
          var willShow = !menu.classList.contains('show');
          closeMenus();
          menu.classList.toggle('show', willShow);
          moreButton.setAttribute('aria-expanded', willShow ? 'true' : 'false');
          return;
        }

        var triggerMap = [
          ['[data-open-roster]', 'roster'],
          ['[data-open-documents]', 'documents'],
          ['[data-open-resource]', 'resource'],
          ['[data-open-notice]', 'notice'],
          ['[data-open-leader]', 'leader']
        ];
        for (var i = 0; i < triggerMap.length; i += 1) {
          var trigger = event.target.closest(triggerMap[i][0]);
          if (trigger) {
            event.preventDefault();
            closeMenus();
            openFor(currentFromTrigger(trigger), triggerMap[i][1]);
            return;
          }
        }

        var departedAction = event.target.closest('[data-mark-departed]');
        if (departedAction) {
          event.preventDefault();
          closeMenus();
          var departedRecord = currentFromTrigger(departedAction);
          departedRecord.executionStatus = '出团中';
          departedRecord.executionClass = 'tag tag-purple';
          departedRecord.queue = departedRecord.queue.concat(departedRecord.queue.indexOf('已出发') >= 0 ? [] : ['已出发']);
          renderRows();
          showResult('已将 ' + departedRecord.code + ' 标记为出团中。');
          return;
        }

        var returnedAction = event.target.closest('[data-mark-returned]');
        if (returnedAction) {
          event.preventDefault();
          closeMenus();
          var returnedRecord = currentFromTrigger(returnedAction);
          returnedRecord.executionStatus = '已回团';
          returnedRecord.executionClass = 'tag tag-green';
          returnedRecord.riskText = '待回团结算';
          returnedRecord.queue = ['已出发'];
          renderRows();
          showResult('已将 ' + returnedRecord.code + ' 标记为已回团。');
          return;
        }

        var closeButton = event.target.closest('[data-close-layer]');
        if (closeButton) {
          closeLayer(closeButton.closest('.modal-overlay'));
          return;
        }

        if (event.target.classList.contains('modal-overlay')) {
          closeLayer(event.target);
          return;
        }

        closeMenus();
      });

      document.getElementById('confirmResources').addEventListener('click', function () {
        if (!currentRecord) return;
        currentRecord.resourceStatus = '已确认';
        currentRecord.resourceClass = 'tag tag-green';
        currentRecord.queue = currentRecord.queue.filter(function (item) { return item !== '资源待确认'; });
        renderRows();
        closeLayer(document.getElementById('resourceDrawer'));
        showResult('资源确认结果已写入当前团期。');
      });

      document.getElementById('sendNotice').addEventListener('click', function () {
        if (!currentRecord) return;
        currentRecord.noticeStatus = '已发送';
        currentRecord.noticeClass = 'tag tag-green';
        currentRecord.queue = currentRecord.queue.filter(function (item) { return item !== '通知待发'; });
        renderRows();
        closeLayer(document.getElementById('noticeDrawer'));
        showResult('出团通知已发送，列表状态已更新。');
      });

      document.getElementById('saveLeaderAssign').addEventListener('click', function () {
        if (!currentRecord) return;
        var selected = document.querySelector('input[name="leaderOption"]:checked');
        if (selected) currentRecord.leader = selected.value;
        currentRecord.queue = currentRecord.queue.filter(function (item) { return item !== '领队待安排'; });
        renderRows();
        closeLayer(document.getElementById('leaderDrawer'));
        showResult('领队安排已保存。');
      });

      document.getElementById('leaderOptions').addEventListener('change', function (event) {
        var radio = event.target.closest('input[name="leaderOption"]');
        if (!radio) return;
        document.querySelectorAll('.outbound-leader-card').forEach(function (card) {
          card.classList.toggle('selected', card.contains(radio) && radio.checked);
        });
      });

      document.getElementById('openAiOutboundRisk').addEventListener('click', function () {
        renderAiRisk();
        openLayer(document.getElementById('aiOutboundRiskModal'));
      });

      document.getElementById('createOutboundRiskTasks').addEventListener('click', function () {
        closeLayer(document.getElementById('aiOutboundRiskModal'));
        showResult('AI风险已生成待办任务。');
      });

      document.getElementById('exportExecutionPlan').addEventListener('click', function () {
        showResult('执行计划导出任务已创建。');
      });

      renderRows();

      if (pageParams.has('type')) {
        var targetType = pageParams.get('type');
        var matchedType = executionRows.find(function (record) { return record.typeKey === targetType; });
        if (matchedType) openFor(matchedType, primaryDrawer(matchedType));
      }

      if (pageParams.has('scheduleNo')) {
        var matchedSchedule = findRecord(pageParams.get('scheduleNo'));
        openFor(matchedSchedule, primaryDrawer(matchedSchedule));
      }
    })();
  </script>
</body>
</html>
