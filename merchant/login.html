<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商户端登录 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="merchant-login-page">
  <main class="login-split">
    <section class="login-brand-panel" aria-label="凯撒旅游平台介绍">
      <div>
        <h1 class="login-brand-title">凯撒旅游</h1>
        <p class="login-brand-subtitle">新一代旅游业务管理平台</p>
        <ul class="login-feature-list">
          <li class="login-feature-item">
            <span class="login-feature-icon" aria-hidden="true"></span>
            <span>覆盖出境游/邮轮/MICE全业务场景</span>
          </li>
          <li class="login-feature-item">
            <span class="login-feature-icon" aria-hidden="true"></span>
            <span>财务与业务实时打通，告别人工对账</span>
          </li>
          <li class="login-feature-item">
            <span class="login-feature-icon" aria-hidden="true"></span>
            <span>AI智能计调助手，效率提升40%</span>
          </li>
        </ul>
      </div>
      <div class="login-copyright">© 2026 凯撒旅游集团</div>
    </section>

    <section class="login-form-panel" aria-label="商户端登录表单">
      <div class="login-card">
        <span class="tag tag-blue">商户端</span>
        <h2 class="login-title">欢迎登录</h2>
        <p class="login-subtitle">请使用您的账号登录系统</p>

        <div class="login-field">
          <input class="form-control" type="tel" placeholder="请输入手机号" autocomplete="tel">
        </div>

        <div class="login-field password-field">
          <input id="loginPassword" class="form-control" type="password" placeholder="请输入密码" autocomplete="current-password">
          <button class="password-toggle" type="button" aria-label="切换密码显示" data-toggle-password="loginPassword">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <div class="login-options">
          <label class="login-check">
            <input type="checkbox" checked>
            <span>记住我</span>
          </label>
          <button id="forgotPasswordBtn" class="login-link" type="button">忘记密码</button>
        </div>

        <button id="loginBtn" class="btn btn-primary btn-lg login-full-btn" type="button">登录</button>

        <div class="login-divider">—— 其他登录方式 ——</div>

        <button class="btn btn-secondary btn-lg login-full-btn" type="button">
          <span class="wechat-dot" aria-hidden="true"></span>
          <span>企业微信登录</span>
        </button>
      </div>
    </section>
  </main>

  <div id="forgotPasswordModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-md" role="dialog" aria-modal="true" aria-labelledby="resetPasswordTitle">
      <div class="modal-header">
        <div id="resetPasswordTitle" class="modal-title">重置密码</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="resetPhone">手机号</label>
          <input id="resetPhone" class="form-control" type="tel" placeholder="请输入手机号" autocomplete="tel">
        </div>

        <div class="form-group">
          <label class="form-label" for="captchaInput">图形验证码</label>
          <div class="captcha-row">
            <input id="captchaInput" class="form-control" type="text" placeholder="请输入图形验证码">
            <button id="captchaBox" class="captcha-box" type="button">XKJM</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="smsCode">短信验证码</label>
          <div class="sms-row">
            <input id="smsCode" class="form-control" type="text" placeholder="请输入短信验证码">
            <button id="sendSmsBtn" class="btn btn-secondary" type="button">发送验证码</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="newPassword">新密码</label>
          <input id="newPassword" class="form-control" type="password" placeholder="请输入新密码" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">确认新密码</label>
          <input id="confirmPassword" class="form-control" type="password" placeholder="请再次输入新密码" autocomplete="new-password">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-modal>取消</button>
        <button class="btn btn-primary" type="button">重置密码</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var loginBtn = document.getElementById('loginBtn');
      var forgotBtn = document.getElementById('forgotPasswordBtn');
      var modal = document.getElementById('forgotPasswordModal');
      var captchaBox = document.getElementById('captchaBox');
      var sendSmsBtn = document.getElementById('sendSmsBtn');
      var countdownTimer = null;

      loginBtn.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

      document.querySelectorAll('[data-toggle-password]').forEach(function (button) {
        button.addEventListener('click', function () {
          var input = document.getElementById(button.getAttribute('data-toggle-password'));
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });

      function openModal() {
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }

      forgotBtn.addEventListener('click', openModal);

      document.querySelectorAll('[data-close-modal]').forEach(function (button) {
        button.addEventListener('click', closeModal);
      });

      modal.addEventListener('click', function (event) {
        if (event.target === modal) {
          closeModal();
        }
      });

      captchaBox.addEventListener('click', function () {
        captchaBox.textContent = 'R7PQ';
      });

      sendSmsBtn.addEventListener('click', function () {
        var remaining = 59;
        sendSmsBtn.disabled = true;
        sendSmsBtn.textContent = remaining + '秒后重发';
        window.clearInterval(countdownTimer);

        countdownTimer = window.setInterval(function () {
          remaining -= 1;
          if (remaining <= 0) {
            window.clearInterval(countdownTimer);
            sendSmsBtn.disabled = false;
            sendSmsBtn.textContent = '发送验证码';
            return;
          }
          sendSmsBtn.textContent = remaining + '秒后重发';
        }, 1000);
      });
    })();
  </script>
</body>
</html>
