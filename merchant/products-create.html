<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建跟团游产品 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-merchant.js"></script>

  <main class="product-create-page">
    <section class="page-workbar">
      <div>
        <div class="page-title-row">
          <a class="page-back-link" href="products.html" data-confirm-back>返回产品管理</a>
          <h1 class="page-title">新建跟团游产品</h1>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" type="button">保存草稿</button>
        <button class="btn btn-primary" type="button">提交审核</button>
      </div>
    </section>

    <section class="product-create-layout">
      <aside class="product-step-panel" aria-label="产品创建步骤">
        <div class="steps">
          <button class="product-step active" type="button" data-step-target="step1"><span class="product-step-index">Step 1</span><span>基础信息</span></button>
          <button class="product-step" type="button" data-step-target="step2"><span class="product-step-index">Step 2</span><span>行程内容</span></button>
          <button class="product-step" type="button" data-step-target="step3"><span class="product-step-index">Step 3</span><span>价格费用</span></button>
          <button class="product-step" type="button" data-step-target="step4"><span class="product-step-index">Step 4</span><span>销售设置</span></button>
          <button class="product-step" type="button" data-step-target="step5"><span class="product-step-index">Step 5</span><span>确认提交</span></button>
        </div>
      </aside>

      <div>
        <section id="step1" class="product-step-content active">
          <section class="card">
            <div class="card-header">
              <div class="card-title">核心信息</div>
            </div>
            <div class="form-grid">
              <div class="form-group form-group-full">
                <label class="form-label" for="productName">产品名称 <span class="req">*</span></label>
                <div class="field-with-count">
                  <input id="productName" class="form-control" type="text" maxlength="50" placeholder="请输入产品名称">
                  <span id="productNameCount" class="field-count">0/50</span>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="productCode">产品编号 <span class="req">*</span></label>
                <div class="field-with-action">
                  <input id="productCode" class="form-control" type="text" placeholder="请输入产品编号">
                  <button id="generateCode" class="btn btn-secondary" type="button">自动生成</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">产品类型</label>
                <div class="readonly-field">跟团游</div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label" for="supplierInput">供应商 <span class="req">*</span></label>
                <div id="supplierSearch" class="select-search">
                  <input id="supplierInput" class="form-control" type="text" placeholder="输入供应商名称搜索" autocomplete="off">
                  <div class="select-dropdown" role="listbox">
                    <button class="select-option" type="button">北京凯撒旅游</button>
                    <button class="select-option" type="button">日本地接XYZ</button>
                    <button class="select-option" type="button">泰国地接DEF</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div class="card-title">目的地信息</div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">出发地</label>
                <div class="inline-value">
                  <span id="departureCity">北京</span>
                  <button id="openCityModal" class="btn btn-secondary btn-sm" type="button">修改</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="durationDays">行程天数</label>
                <div class="field-with-suffix">
                  <input id="durationDays" class="form-control" type="number" min="1" value="12">
                  <span id="durationNights" class="field-suffix">11晚</span>
                </div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label">目的地</label>
                <div class="tag-row" data-tag-row>
                  <span class="tag tag-blue">法国<button class="tag-remove" type="button" aria-label="删除法国">×</button></span>
                  <span class="tag tag-blue">德国<button class="tag-remove" type="button" aria-label="删除德国">×</button></span>
                  <span class="tag tag-blue">意大利<button class="tag-remove" type="button" aria-label="删除意大利">×</button></span>
                  <button class="btn btn-secondary btn-sm" type="button">+添加目的地</button>
                </div>
              </div>
              <div class="form-group form-group-full">
                <label class="form-label">产品标签</label>
                <div class="tag-row" data-tag-row>
                  <span class="tag tag-purple">纯玩<button class="tag-remove" type="button" aria-label="删除纯玩">×</button></span>
                  <span class="tag tag-purple">含签证<button class="tag-remove" type="button" aria-label="删除含签证">×</button></span>
                  <span class="tag tag-purple">直飞<button class="tag-remove" type="button" aria-label="删除直飞">×</button></span>
                  <button class="btn btn-secondary btn-sm" type="button">+添加</button>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div class="card-title">封面与简介</div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">封面图</label>
                <div class="cover-row">
                  <button class="upload-box" type="button">
                    <span class="upload-icon">📷</span>
                    <span>点击上传封面图</span>
                  </button>
                  <div class="cover-preview">
                    <button class="cover-remove" type="button" aria-label="删除封面图">×</button>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="productIntro">产品简介</label>
                <textarea id="productIntro" class="form-control" rows="6" maxlength="200">欧洲十国经典游是凯撒旅游明星产品，涵盖法国、德国、意大利等十个顶级目的地，全程纯玩无购物...</textarea>
                <div id="introCount" class="textarea-foot">48/200</div>
              </div>
            </div>
          </section>
        </section>

        <section id="step2" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">行程内容</div>
              <button id="aiGenerateTrip" class="ai-btn" type="button">🤖 AI生成行程内容</button>
            </div>
            <div class="form-group">
              <label class="form-label" for="tripContent">行程文本</label>
              <textarea id="tripContent" class="form-control" rows="12" placeholder="请输入每日行程安排"></textarea>
            </div>
            <div id="aiSuggestion" class="ai-suggestion-card" hidden>
              <div class="ai-suggestion-title">🤖 AI提示</div>
              <div class="ai-suggestion-content">AI已根据目的地自动生成12天行程，请确认后修改</div>
            </div>
          </section>
        </section>

        <section id="step3" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">价格费用</div>
            </div>
            <p class="text-muted">请在此维护成人价、儿童价、单房差、费用包含与费用不含。</p>
          </section>
        </section>

        <section id="step4" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">销售设置</div>
            </div>
            <p class="text-muted">请在此维护上架渠道、销售日期、提前预订天数与库存规则。</p>
          </section>
        </section>

        <section id="step5" class="product-step-content">
          <section class="card">
            <div class="card-header">
              <div class="card-title">确认提交</div>
            </div>
            <p class="text-muted">请核对产品信息后提交审核。</p>
          </section>
        </section>

        <div class="page-bottom-actions">
          <a class="btn btn-secondary" href="products.html" data-confirm-back>取消</a>
          <button id="nextStep" class="btn btn-primary" type="button">下一步</button>
        </div>
      </div>
    </section>
  </main>

  <div id="cityModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-md" role="dialog" aria-modal="true" aria-labelledby="cityModalTitle">
      <div class="modal-header">
        <div id="cityModalTitle" class="modal-title">选择出发城市</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-city-close>×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input id="citySearch" class="form-control" type="text" placeholder="搜索城市">
        </div>
        <div class="form-group">
          <label class="form-label">热门城市</label>
          <div class="city-tags">
            <button class="city-tag active" type="button">北京</button>
            <button class="city-tag" type="button">上海</button>
            <button class="city-tag" type="button">广州</button>
            <button class="city-tag" type="button">深圳</button>
            <button class="city-tag" type="button">成都</button>
            <button class="city-tag" type="button">杭州</button>
            <button class="city-tag" type="button">西安</button>
          </div>
        </div>
        <div class="city-group">
          <div class="city-letter">A</div>
          <div class="city-list"><button class="city-tag" type="button">安庆</button><button class="city-tag" type="button">澳门</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">B</div>
          <div class="city-list"><button class="city-tag active" type="button">北京</button><button class="city-tag" type="button">保定</button><button class="city-tag" type="button">包头</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">C</div>
          <div class="city-list"><button class="city-tag" type="button">成都</button><button class="city-tag" type="button">重庆</button><button class="city-tag" type="button">长沙</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">G</div>
          <div class="city-list"><button class="city-tag" type="button">广州</button><button class="city-tag" type="button">贵阳</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">H</div>
          <div class="city-list"><button class="city-tag" type="button">杭州</button><button class="city-tag" type="button">哈尔滨</button><button class="city-tag" type="button">合肥</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">S</div>
          <div class="city-list"><button class="city-tag" type="button">上海</button><button class="city-tag" type="button">深圳</button><button class="city-tag" type="button">沈阳</button></div>
        </div>
        <div class="city-group">
          <div class="city-letter">X</div>
          <div class="city-list"><button class="city-tag" type="button">西安</button><button class="city-tag" type="button">厦门</button></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-city-close>取消</button>
        <button id="confirmCity" class="btn btn-primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var currentStep = 0;
      var selectedCity = '北京';
      var stepButtons = Array.from(document.querySelectorAll('[data-step-target]'));
      var stepPanels = Array.from(document.querySelectorAll('.product-step-content'));
      var nextButton = document.getElementById('nextStep');
      var nameInput = document.getElementById('productName');
      var nameCount = document.getElementById('productNameCount');
      var introInput = document.getElementById('productIntro');
      var introCount = document.getElementById('introCount');
      var durationInput = document.getElementById('durationDays');
      var durationNights = document.getElementById('durationNights');
      var supplierSearch = document.getElementById('supplierSearch');
      var supplierInput = document.getElementById('supplierInput');
      var cityModal = document.getElementById('cityModal');
      var departureCity = document.getElementById('departureCity');
      var formDirty = false;

      function markDirty() {
        formDirty = true;
      }

      function setStep(index) {
        currentStep = index;
        stepButtons.forEach(function (button, buttonIndex) {
          button.classList.toggle('active', buttonIndex === index);
        });
        stepPanels.forEach(function (panel, panelIndex) {
          panel.classList.toggle('active', panelIndex === index);
        });
        nextButton.textContent = index >= stepPanels.length - 1 ? '提交审核' : '下一步';
      }

      function updateCount(input, target, max) {
        target.textContent = input.value.length + '/' + max;
      }

      function updateNights() {
        var days = Number(durationInput.value || 1);
        durationNights.textContent = Math.max(days - 1, 0) + '晚';
      }

      function openCityModal() {
        cityModal.classList.add('show');
        cityModal.setAttribute('aria-hidden', 'false');
      }

      function closeCityModal() {
        cityModal.classList.remove('show');
        cityModal.setAttribute('aria-hidden', 'true');
      }

      function selectCity(button) {
        selectedCity = button.textContent.trim();
        document.querySelectorAll('.city-tag').forEach(function (item) {
          item.classList.toggle('active', item.textContent.trim() === selectedCity);
        });
      }

      stepButtons.forEach(function (button, index) {
        button.addEventListener('click', function () {
          setStep(index);
        });
      });

      nextButton.addEventListener('click', function () {
        if (currentStep < stepPanels.length - 1) {
          setStep(currentStep + 1);
        }
      });

      document.getElementById('generateCode').addEventListener('click', function () {
        var randomCode = String(Math.floor(Math.random() * 900) + 100);
        document.getElementById('productCode').value = 'KS-EU-' + randomCode;
        markDirty();
      });

      nameInput.addEventListener('input', function () {
        updateCount(nameInput, nameCount, 50);
      });

      introInput.addEventListener('input', function () {
        updateCount(introInput, introCount, 200);
      });

      durationInput.addEventListener('input', updateNights);

      supplierInput.addEventListener('focus', function () {
        supplierSearch.classList.add('open');
      });

      supplierInput.addEventListener('input', function () {
        supplierSearch.classList.add('open');
      });

      document.querySelectorAll('.select-option').forEach(function (option) {
        option.addEventListener('click', function () {
          supplierInput.value = option.textContent.trim();
          supplierSearch.classList.remove('open');
          markDirty();
        });
      });

      document.addEventListener('click', function (event) {
        if (!supplierSearch.contains(event.target)) {
          supplierSearch.classList.remove('open');
        }
      });

      document.querySelectorAll('[data-tag-row]').forEach(function (row) {
        row.addEventListener('click', function (event) {
          if (event.target.classList.contains('tag-remove')) {
            event.target.closest('.tag').remove();
            markDirty();
          }
        });
      });

      document.getElementById('openCityModal').addEventListener('click', openCityModal);
      document.querySelectorAll('[data-city-close]').forEach(function (button) {
        button.addEventListener('click', closeCityModal);
      });
      cityModal.addEventListener('click', function (event) {
        if (event.target === cityModal) {
          closeCityModal();
        }
      });
      document.querySelectorAll('.city-tag').forEach(function (button) {
        button.addEventListener('click', function () {
          selectCity(button);
        });
      });
      document.getElementById('confirmCity').addEventListener('click', function () {
        departureCity.textContent = selectedCity;
        markDirty();
        closeCityModal();
      });

      document.getElementById('aiGenerateTrip').addEventListener('click', function () {
        document.getElementById('tripContent').value = '第1天 北京集合，搭乘国际航班前往巴黎。\n第2天 巴黎市区游览，参观卢浮宫、凯旋门、香榭丽舍大道。\n第3天 巴黎自由活动，傍晚前往法国小镇。\n第4天 前往瑞士，沿途欣赏阿尔卑斯风光。\n第5天 游览卢塞恩，体验湖区小镇慢行程。\n第6天 前往德国，参观新天鹅堡外观与巴伐利亚小镇。\n第7天 抵达奥地利，游览维也纳城市精华。\n第8天 前往意大利威尼斯，体验水城风貌。\n第9天 佛罗伦萨文艺复兴主题游览。\n第10天 罗马深度游，参观古罗马斗兽场外观。\n第11天 整理行程亮点，安排特色晚餐。\n第12天 返回北京，结束欧洲十国经典游。';
        document.getElementById('aiSuggestion').hidden = false;
        markDirty();
      });

      document.querySelector('.cover-remove').addEventListener('click', function (event) {
        event.currentTarget.closest('.cover-preview').remove();
        markDirty();
      });

      document.querySelectorAll('input, textarea, select').forEach(function (field) {
        field.addEventListener('input', markDirty);
        field.addEventListener('change', markDirty);
      });

      document.querySelectorAll('[data-confirm-back]').forEach(function (link) {
        link.addEventListener('click', function (event) {
          if (formDirty && !window.confirm('当前内容未保存，确认离开吗？')) {
            event.preventDefault();
          }
        });
      });

      window.addEventListener('load', function () {
        document.querySelectorAll('.nav-item').forEach(function (item) {
          var isProductManage = item.textContent.trim() === '产品管理';
          item.classList.toggle('active', isProductManage);
          if (isProductManage) {
            item.closest('.nav-parent').classList.add('open');
          }
        });
      });

      updateCount(nameInput, nameCount, 50);
      updateNights();
    })();
  </script>
</body>
</html>
