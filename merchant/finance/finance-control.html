<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务对象 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div><h1 id="pageTitle" class="page-title">财务对象</h1></div>
      <div class="btn-group"><button id="headerAction" class="btn btn-primary" type="button">处理对象</button><button class="btn btn-secondary" type="button" data-export>导出</button></div>
    </div>
  </section>

  <section class="list-surface" data-list-surface>
    <section class="filter-card filter-card-compact list-surface-filter" aria-label="财务对象筛选">
      <div class="filter-row">
        <div class="filter-item"><label class="sr-only" for="keyword">快速搜索</label><input id="keyword" type="search"></div>
        <div class="filter-item-sm"><label class="sr-only" for="entity">业务主体</label><select id="entity"><option value="">全部主体</option><option>总部财务</option><option>福建凯撒</option><option>上海凯撒</option><option>北京王府井旗舰店</option></select></div>
        <div class="filter-item-sm"><label class="sr-only" for="status">状态</label><select id="status"><option value="">全部状态</option></select></div>
        <div class="filter-item-wide filter-item-date-range"><label class="sr-only">业务日期</label><div class="date-range"><input id="dateStart" type="date" aria-label="开始日期"><span>至</span><input id="dateEnd" type="date" aria-label="结束日期"></div></div>
        <div class="filter-actions"><button class="btn btn-secondary" type="button" data-search>查询</button><button class="btn btn-secondary" type="button" data-reset>重置</button></div>
      </div>
    </section>

    <nav id="statusTabs" class="tab-bar list-surface-tabs" aria-label="财务对象状态"></nav>

    <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="财务对象列表">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableRows"></tbody>
      </table>
    </section>
    <div class="pagination list-surface-pagination list-pagination-attached"><span id="pagination">第0条/共0条</span></div>
  </section>

  <div id="detailDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
      <div class="modal-header">
        <div id="drawerTitle" class="modal-title">财务处理</div>
        <button class="modal-close" type="button" aria-label="关闭财务处理" data-close>×</button>
      </div>
      <div class="modal-body">
        <section class="enterprise-drawer-object"><strong id="drawerObject"></strong><span id="drawerStatus"></span></section>
        <section class="drawer-section">
          <div class="drawer-section-head"><h3 class="drawer-section-title">基础信息</h3></div>
          <div id="drawerGrid" class="description-grid"></div>
        </section>
        <section class="drawer-section">
          <div class="drawer-section-head"><h3 class="drawer-section-title">处理记录</h3></div>
          <section class="table-wrap drawer-table-wrap"><table><thead><tr><th>时间</th><th>处理环节</th><th>处理人</th><th>结果</th></tr></thead><tbody id="drawerRecords"></tbody></table></section>
        </section>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" type="button" data-close>关闭</button><button id="drawerAction" class="btn btn-primary" type="button">确认处理</button></div>
    </div>
  </div>

  <script>
    (function () {
      var views = {
        'supplier-bills': {
          title: '供应商账单', keyword: '账单号/供应商/团期/项目', action: '导入账单', actionLabel: '核对账单',
          columns: ['账单号/供应商', '关联业务', '账单金额', '已确认应付', '账单差异', '账期', '状态'],
          statuses: ['待核对', '差异处理', '已确认'],
          rows: [
            ['BN20260701001', '欧洲联合地接社', '欧洲十国经典游 / EU-FRA-20250720-001', '¥428,600', '¥422,600', '¥6,000', '2026-07-15', '差异处理', '福建凯撒'],
            ['BN20260701002', '理想号邮轮公司', '理想号地中海邮轮 / CR-MED-20250803-001', '¥996,000', '¥996,000', '¥0', '2026-07-12', '待核对', '上海凯撒'],
            ['BN20260628008', '京都酒店集团', '日本关西深度游 / JP-KAN-20250712-001', '¥86,400', '¥86,400', '¥0', '2026-06-30', '已确认', '总部财务']
          ]
        },
        'payment-apply': {
          title: '付款申请', keyword: '申请单/供应商/团期/项目', action: '查看审批', actionLabel: '查看申请',
          columns: ['申请单/付款对象', '关联业务', '应付金额', '可申请金额', '本次申请', '付款节点', '状态'],
          statuses: ['待提交', '审批中', '已审批', '已驳回'],
          rows: [
            ['FK20260702003', '理想号邮轮公司', '理想号地中海邮轮 / CR-MED-20250803-001', '¥996,000', '¥437,200', '¥437,200', '出发前30日', '已审批', '上海凯撒'],
            ['FK20260702004', '欧洲联合地接社', '欧洲十国经典游 / EU-FRA-20250720-001', '¥428,600', '¥316,600', '¥216,600', '行前首款', '审批中', '福建凯撒'],
            ['FK20260701007', '京都酒店集团', '日本关西深度游 / JP-KAN-20250712-001', '¥86,400', '¥86,400', '¥43,200', '入住前7日', '待提交', '总部财务']
          ]
        },
        'prepayment-offset': {
          title: '预付冲抵', keyword: '预付单/供应商/团期/项目', action: '查看冲抵', actionLabel: '确认冲抵',
          columns: ['预付单/供应商', '关联业务', '预付余额', '本次冲抵', '冲抵后余额', '冲抵依据', '状态'],
          statuses: ['待冲抵', '冲抵中', '已冲抵'],
          rows: [
            ['YF20260618001', '欧洲联合地接社', '欧洲十国经典游 / EU-FRA-20250720-001', '¥200,000', '¥120,000', '¥80,000', 'BN20260701001', '待冲抵', '福建凯撒'],
            ['YF20260612003', '理想号邮轮公司', '理想号地中海邮轮 / CR-MED-20250803-001', '¥300,000', '¥300,000', '¥0', 'BN20260701002', '冲抵中', '上海凯撒'],
            ['YF20260528002', '京都酒店集团', '日本关西深度游 / JP-KAN-20250712-001', '¥43,200', '¥43,200', '¥0', 'BN20260628008', '已冲抵', '总部财务']
          ]
        },
        'channel-settlement': {
          title: '渠道结算', keyword: '结算单/渠道/订单/周期', action: '生成对账单', actionLabel: '核对渠道',
          columns: ['结算单/渠道', '结算周期', '订单金额', '渠道应收', '已收金额', '待收金额', '状态'],
          statuses: ['待生成', '待核对', '已确认'],
          rows: [
            ['QD202606-CTRIP', '携程旅行网', '2026-06', '¥286,400', '¥274,400', '¥274,400', '¥0', '待核对', '总部财务'],
            ['QD202606-TONGYE', '环球同业', '2026-06', '¥64,800', '¥64,800', '¥40,000', '¥24,800', '待生成', '福建凯撒'],
            ['QD202605-FLT', '飞猪旅行', '2026-05', '¥122,600', '¥122,600', '¥122,600', '¥0', '已确认', '上海凯撒']
          ]
        },
        'settlement-adjustment': {
          title: '结算调整', keyword: '调整单/结算单/团期/项目', action: '新增调整', actionLabel: '查看调整',
          columns: ['调整单/关联结算', '调整类型', '关联业务', '调整金额', '调整后结算', '调整依据', '状态'],
          statuses: ['待审核', '已确认', '已驳回'],
          rows: [
            ['TZ20260701003', 'JS20260623003', '供应商成本补差', '丝路专列深度游 / TR-SILK-20250815-001', '¥6,000', '¥869,200', '供应商对账单', '待审核', '福建凯撒'],
            ['TZ20260629008', 'JS-PRJ-20250623', '项目退款调整', 'MICE 项目团 / PRJ-MICE-20260915-001', '-¥12,800', '¥380,600', '退款单 TK20260629008', '已确认', '总部财务'],
            ['TZ20260628006', 'JS20260624001', '订单收入调整', '欧洲十国经典游 / EU-FRA-20250720-001', '-¥600', '¥143,200', '订单优惠审批', '已驳回', '上海凯撒']
          ]
        },
        'store-reconciliation': {
          title: '门店对账', keyword: '对账单/门店/周期/订单', action: '生成对账单', actionLabel: '复核对账',
          columns: ['对账单/门店', '对账周期', '订单应收', '实收金额', '预存扣款', '差异金额', '状态'],
          statuses: ['待生成', '待复核', '已确认'],
          rows: [
            ['MD20260625001', '北京王府井旗舰店', '2026-06', '¥186,000', '¥164,400', '¥18,400', '¥3,200', '待复核', '北京王府井旗舰店'],
            ['MD20260625002', '上海徐汇门市', '2026-06', '¥96,800', '¥96,800', '¥0', '¥0', '待生成', '上海凯撒'],
            ['MD20260531001', '福州东街口门市', '2026-05', '¥128,600', '¥128,600', '¥8,000', '¥0', '已确认', '福建凯撒']
          ]
        },
        'period-close': {
          title: '期间关账', keyword: '关账单/会计期间/主体', action: '发起预检', actionLabel: '查看预检',
          columns: ['关账单/会计期间', '主体公司', '业务结算', '收付款完成', '票据核对', 'NC状态', '状态'],
          statuses: ['预检中', '待关账', '已关账', '已反关'],
          rows: [
            ['QJ202606-FJ', '2026-06', '福建凯撒', '12笔待确认', '1笔待回单', '2笔待收票', '1笔失败', '预检中', '福建凯撒'],
            ['QJ202606-SH', '2026-06', '上海凯撒', '已完成', '已完成', '1笔待收票', '待推送', '待关账', '上海凯撒'],
            ['QJ202605-HQ', '2026-05', '总部财务', '已完成', '已完成', '已完成', '已推送', '已关账', '总部财务']
          ]
        },
        'fund-transfer': {
          title: '资金调拨', keyword: '调拨单/调出账户/调入账户/主体', action: '发起调拨', actionLabel: '查看调拨',
          columns: ['调拨单/调拨主体', '调出账户', '调入账户', '调拨金额', '用途', '预计到账', '状态'],
          statuses: ['待提交', '审批中', '待到账', '已到账', '已退回'],
          rows: [
            ['DB20260702001', '上海凯撒 → 福建凯撒', '招商银行上海分行', '民生银行北京分行', '¥260,000', '团款支付补充', '2026-07-14', '审批中', '上海凯撒'],
            ['DB20260701003', '总部财务 → 上海凯撒', '集团汇总账户', '招商银行上海分行', '¥500,000', '邮轮尾款支付', '2026-07-13', '待到账', '总部财务'],
            ['DB20260628002', '福建凯撒 → 总部财务', '民生银行北京分行', '集团汇总账户', '¥180,000', '门店资金归集', '2026-06-28', '已到账', '福建凯撒']
          ]
        }
      };

      var params = new URLSearchParams(window.location.search);
      var view = views[params.get('view')] ? params.get('view') : 'supplier-bills';
      var config = views[view];
      var activeStatus = '';
      var activeRow = null;
      var pageTitle = document.getElementById('pageTitle');
      var headerAction = document.getElementById('headerAction');
      var keyword = document.getElementById('keyword');
      var status = document.getElementById('status');
      var entity = document.getElementById('entity');
      var tabs = document.getElementById('statusTabs');
      var tableHead = document.getElementById('tableHead');
      var tableRows = document.getElementById('tableRows');
      var pagination = document.getElementById('pagination');
      var drawer = document.getElementById('detailDrawer');

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>'\"]/g, function (character) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[character]; });
      }
      function statusClass(value) {
        if (/差异|驳回|失败/.test(value)) return 'tag-red';
        if (/待|审批中|预检中|冲抵中/.test(value)) return 'tag-orange';
        if (/确认|到账|关账|冲抵/.test(value)) return 'tag-green';
        return 'tag-blue';
      }
      function rowFields(row) {
        return row.slice(0, 8);
      }
      function openDrawer(row) {
        activeRow = row;
        var item = rowFields(row);
        document.getElementById('drawerTitle').textContent = config.actionLabel + ' - ' + item[0];
        document.getElementById('drawerObject').textContent = item[0] + ' / ' + item[1];
        document.getElementById('drawerStatus').innerHTML = '<span class="tag ' + statusClass(item[7]) + '">' + escapeHtml(item[7]) + '</span>';
        var drawerValues = [item[0] + ' / ' + item[1]].concat(item.slice(2, 8));
        document.getElementById('drawerGrid').innerHTML = config.columns.map(function (name, index) {
          return '<div class="description-item"><div class="description-label">' + escapeHtml(name) + '</div><div class="description-value">' + escapeHtml(drawerValues[index]) + '</div></div>';
        }).join('');
        document.getElementById('drawerRecords').innerHTML = '<tr><td>2026-07-13 10:20</td><td>来源单据生成</td><td>系统</td><td>已承接</td></tr><tr><td>2026-07-13 14:30</td><td>' + escapeHtml(config.actionLabel) + '</td><td>财务专员</td><td>' + escapeHtml(item[7]) + '</td></tr>';
        document.getElementById('drawerAction').textContent = config.actionLabel;
        drawer.classList.add('is-open');
        drawer.setAttribute('aria-hidden', 'false');
      }
      function render() {
        var word = keyword.value.trim().toLowerCase();
        var chosenEntity = entity.value;
        var data = config.rows.filter(function (row) {
          var matchesStatus = !activeStatus || row[7] === activeStatus;
          var matchesWord = !word || row.join(' ').toLowerCase().indexOf(word) >= 0;
          var matchesEntity = !chosenEntity || row[8] === chosenEntity;
          return matchesStatus && matchesWord && matchesEntity;
        });
        tableRows.innerHTML = data.map(function (row) {
          var item = rowFields(row);
          return '<tr><td>' + escapeHtml(item[0]) + '<br><span class="text-muted">' + escapeHtml(item[1]) + '</span></td>' +
            item.slice(2, 7).map(function (cell, index) { return '<td' + (index === 1 || index === 2 ? ' class="amount-strong"' : '') + '>' + escapeHtml(cell) + '</td>'; }).join('') +
            '<td><span class="tag ' + statusClass(item[7]) + '">' + escapeHtml(item[7]) + '</span></td><td><div class="table-action"><button class="table-action-primary" type="button" data-row="' + config.rows.indexOf(row) + '">' + escapeHtml(config.actionLabel) + '</button></div></td></tr>';
        }).join('') || '<tr><td colspan="8" class="empty-state">暂无符合条件的数据</td></tr>';
        pagination.textContent = data.length ? '第1-' + data.length + '条/共' + data.length + '条' : '第0条/共0条';
      }
      function renderTabs() {
        tabs.innerHTML = '<button class="tab-item active" type="button" data-status="">全部</button>' + config.statuses.map(function (item) { return '<button class="tab-item" type="button" data-status="' + escapeHtml(item) + '">' + escapeHtml(item) + '</button>'; }).join('');
        status.innerHTML = '<option value="">全部状态</option>' + config.statuses.map(function (item) { return '<option>' + escapeHtml(item) + '</option>'; }).join('');
      }
      function notify(message) {
        var container = document.querySelector('.caesar-toast-container');
        if (!container) { container = document.createElement('div'); container.className = 'caesar-toast-container'; document.body.appendChild(container); }
        var toast = document.createElement('div'); toast.className = 'caesar-toast caesar-toast-success'; toast.textContent = message; container.appendChild(toast);
        window.setTimeout(function () { toast.classList.add('closing'); window.setTimeout(function () { toast.remove(); }, 180); }, 2200);
      }

      document.title = config.title + ' - 凯撒旅游';
      pageTitle.textContent = config.title;
      headerAction.textContent = config.action;
      keyword.placeholder = config.keyword;
      tableHead.innerHTML = '<tr>' + config.columns.map(function (name) { return '<th>' + escapeHtml(name) + '</th>'; }).join('') + '<th>操作</th></tr>';
      renderTabs();
      render();

      tabs.addEventListener('click', function (event) {
        var button = event.target.closest('[data-status]');
        if (!button) return;
        activeStatus = button.dataset.status;
        status.value = activeStatus;
        tabs.querySelectorAll('.tab-item').forEach(function (item) { item.classList.toggle('active', item === button); });
        render();
      });
      tableRows.addEventListener('click', function (event) {
        var button = event.target.closest('[data-row]');
        if (button) openDrawer(config.rows[Number(button.dataset.row)]);
      });
      document.querySelector('[data-search]').addEventListener('click', render);
      keyword.addEventListener('keydown', function (event) { if (event.key === 'Enter') render(); });
      status.addEventListener('change', function () { activeStatus = status.value; tabs.querySelectorAll('.tab-item').forEach(function (item) { item.classList.toggle('active', item.dataset.status === activeStatus); }); render(); });
      document.querySelector('[data-reset]').addEventListener('click', function () { keyword.value = ''; entity.value = ''; status.value = ''; document.getElementById('dateStart').value = ''; document.getElementById('dateEnd').value = ''; activeStatus = ''; tabs.querySelectorAll('.tab-item').forEach(function (item, index) { item.classList.toggle('active', index === 0); }); render(); });
      headerAction.addEventListener('click', function () { notify(config.action + '入口已打开，请从列表选择业务对象'); });
      document.querySelector('[data-export]').addEventListener('click', function () { notify(config.title + '已导出'); });
      drawer.addEventListener('click', function (event) { if (event.target === drawer || event.target.closest('[data-close]')) { drawer.classList.remove('is-open'); drawer.setAttribute('aria-hidden', 'true'); } });
      document.getElementById('drawerAction').addEventListener('click', function () { if (!activeRow) return; notify(activeRow[0] + '已提交' + config.actionLabel); drawer.classList.remove('is-open'); drawer.setAttribute('aria-hidden', 'true'); });
    })();
  </script>
</body>
</html>
