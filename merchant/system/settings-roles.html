<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色权限 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="role-permission-page">
    <aside class="card role-list-card" aria-label="角色列表">
      <div class="role-list-head">
        <h1 class="card-title">角色列表</h1>
        <button class="btn btn-primary btn-sm" type="button">新建角色</button>
      </div>
      <div class="role-card-list">
        <button class="role-card" type="button"><strong>商户管理员</strong><span>系统内置，3人使用</span></button>
        <button class="role-card" type="button"><strong>计调</strong><span>8人使用</span></button>
        <button class="role-card active" type="button"><strong>销售顾问</strong><span>12人使用</span></button>
        <button class="role-card" type="button"><strong>财务</strong><span>4人使用</span></button>
        <button class="role-card" type="button"><strong>客服</strong><span>6人使用</span></button>
        <button class="role-card" type="button"><strong>门店管理员</strong><span>5人使用</span></button>
        <button class="role-card" type="button"><strong>门店销售</strong><span>18人使用</span></button>
        <button class="role-card" type="button"><strong>数据分析</strong><span>2人使用</span></button>
        <button class="role-card" type="button"><strong>只读审计</strong><span>1人使用</span></button>
      </div>
    </aside>

    <section class="card role-config-card">
      <div class="role-config-head">
        <h2 class="page-title">销售顾问</h2>
        <div class="btn-group">
          <button class="btn btn-primary" type="button">保存权限</button>
          <button class="btn btn-secondary" type="button">复制角色</button>
          <button class="btn btn-danger-outline" type="button">删除角色</button>
        </div>
      </div>

      <nav class="tab-bar" aria-label="权限配置标签页">
        <button class="tab-item active" type="button" data-tab="menus">菜单权限</button>
        <button class="tab-item" type="button" data-tab="buttons">按钮权限</button>
        <button class="tab-item" type="button" data-tab="data">数据权限</button>
        <button class="tab-item" type="button" data-tab="fields">字段权限</button>
      </nav>

      <section id="tab-menus" class="detail-tab-panel active">
        <div class="permission-tree">
          <section class="permission-group">
            <h3>资源</h3>
            <label><input type="checkbox" checked> 航空资源</label>
            <label><input type="checkbox" checked> 供应商管理</label>
          </section>
          <section class="permission-group">
            <h3>产品</h3>
            <label><input type="checkbox" checked> 产品市场</label>
            <label><input type="checkbox" checked> 产品管理</label>
            <label><input type="checkbox"> 产品审核</label>
            <label><input type="checkbox"> 定价策略</label>
          </section>
          <section class="permission-group">
            <h3>出团</h3>
            <label><input type="checkbox"> 单团自组</label>
            <label><input type="checkbox" checked> 团期团控</label>
            <label><input type="checkbox" checked> 团期成本</label>
            <label><input type="checkbox" checked> 出团执行</label>
            <label><input type="checkbox" checked> 回团处理</label>
          </section>
          <section class="permission-group">
            <h3>销售</h3>
            <label><input type="checkbox" checked> 产品报价</label>
            <label><input type="checkbox" checked> 意向订单</label>
            <label><input type="checkbox" checked> 订单管理</label>
            <label><input type="checkbox" checked> 合同管理</label>
            <label><input type="checkbox" checked> 售后处理</label>
            <label><input type="checkbox"> 门店管理</label>
          </section>
          <section class="permission-group">
            <h3>渠道</h3>
            <label><input type="checkbox" checked> 渠道来源</label>
            <label><input type="checkbox"> 佣金规则</label>
          </section>
          <section class="permission-group">
            <h3>客户</h3>
            <label><input type="checkbox" checked> 客户列表</label>
          </section>
          <section class="permission-group">
            <h3>财务</h3>
            <label><input type="checkbox"> 收款管理</label>
            <label><input type="checkbox"> 认款管理</label>
            <label><input type="checkbox"> 应收管理</label>
            <label><input type="checkbox"> 应付管理</label>
            <label><input type="checkbox"> 付款执行</label>
            <label><input type="checkbox"> 退款执行</label>
            <label><input type="checkbox"> 对账结算</label>
            <label><input type="checkbox"> 发票管理</label>
            <label><input type="checkbox"> 回单管理</label>
            <label><input type="checkbox"> 财务报表</label>
          </section>
          <section class="permission-group">
            <h3>审批</h3>
            <label><input type="checkbox" checked> 待我审批</label>
            <label><input type="checkbox"> 我发起的</label>
          </section>
          <section class="permission-group">
            <h3>AI</h3>
            <label><input type="checkbox" checked> AI助手</label>
          </section>
          <section class="permission-group">
            <h3>系统</h3>
            <label><input type="checkbox"> 角色权限</label>
          </section>
        </div>
      </section>

      <section id="tab-buttons" class="detail-tab-panel">
        <div class="table-wrap role-permission-table">
          <table>
            <thead>
              <tr>
                <th>页面</th>
                <th>按钮名称</th>
                <th>是否有权限</th>
              </tr>
            </thead>
            <tbody>
              <tr><td>订单管理</td><td>新建订单</td><td><label class="permission-check"><input type="checkbox" checked> 允许</label></td></tr>
              <tr><td>订单管理</td><td>导出订单</td><td><label class="permission-check"><input type="checkbox"> 需财务</label></td></tr>
              <tr><td>订单管理</td><td>登记收款</td><td><label class="permission-check"><input type="checkbox"> 需财务</label></td></tr>
              <tr><td>订单管理</td><td>申请退款</td><td><label class="permission-check"><input type="checkbox" checked> 允许</label></td></tr>
              <tr><td>订单管理</td><td>改价申请</td><td><label class="permission-check"><input type="checkbox" checked> 允许</label></td></tr>
              <tr><td>产品管理</td><td>新建产品</td><td><label class="permission-check"><input type="checkbox" checked> 允许</label></td></tr>
              <tr><td>产品管理</td><td>上下架产品</td><td><label class="permission-check"><input type="checkbox"> 需产品经理</label></td></tr>
              <tr><td>产品管理</td><td>删除产品</td><td><label class="permission-check"><input type="checkbox"> 禁止</label></td></tr>
              <tr><td>财务</td><td>查看成本价</td><td><label class="permission-check"><input type="checkbox"> 需财务</label></td></tr>
              <tr><td>财务</td><td>查看毛利</td><td><label class="permission-check"><input type="checkbox"> 需财务</label></td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="tab-data" class="detail-tab-panel">
        <div class="role-data-scope">
          <label><input type="radio" name="dataScope" checked> 本人创建的数据</label>
          <label><input type="radio" name="dataScope"> 本部门所有数据</label>
          <label><input type="radio" name="dataScope"> 本部门+下级部门</label>
          <label><input type="radio" name="dataScope"> 指定部门</label>
          <select class="form-control role-department-select" multiple size="4" aria-label="指定部门多选">
            <option>出境游事业部</option>
            <option>国内游事业部</option>
            <option>MICE事业部</option>
            <option>财务部</option>
            <option>客户服务部</option>
          </select>
          <label><input type="radio" name="dataScope"> 全公司所有数据（仅管理员）</label>
        </div>
      </section>

      <section id="tab-fields" class="detail-tab-panel">
        <div class="table-wrap role-permission-table">
          <table>
            <thead>
              <tr>
                <th>字段名称</th>
                <th>所在页面</th>
                <th>权限设置</th>
              </tr>
            </thead>
            <tbody>
              <tr><td>手机号</td><td>客户/订单</td><td><select class="form-control role-field-select"><option>完全可见</option><option selected>脱敏显示</option><option>完全隐藏</option></select></td></tr>
              <tr><td>证件号</td><td>游客名单</td><td><select class="form-control role-field-select"><option>完全可见</option><option selected>脱敏显示</option><option>完全隐藏</option></select></td></tr>
              <tr><td>成本价</td><td>产品/团期</td><td><select class="form-control role-field-select"><option>完全可见</option><option>脱敏显示</option><option selected>完全隐藏</option></select></td></tr>
              <tr><td>毛利率</td><td>报表/订单</td><td><select class="form-control role-field-select"><option>完全可见</option><option>脱敏显示</option><option selected>完全隐藏</option></select></td></tr>
              <tr><td>银行卡号</td><td>财务</td><td><select class="form-control role-field-select"><option>完全可见</option><option>脱敏显示</option><option selected>完全隐藏</option></select></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      var roleCards = Array.from(document.querySelectorAll('.role-card'));
      var tabs = Array.from(document.querySelectorAll('.role-config-card .tab-item'));
      var panels = Array.from(document.querySelectorAll('.role-config-card .detail-tab-panel'));

      roleCards.forEach(function (card) {
        card.addEventListener('click', function () {
          roleCards.forEach(function (item) {
            item.classList.toggle('active', item === card);
          });
        });
      });

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          var name = tab.dataset.tab;
          tabs.forEach(function (item) {
            item.classList.toggle('active', item === tab);
          });
          panels.forEach(function (panel) {
            panel.classList.toggle('active', panel.id === 'tab-' + name);
          });
        });
      });
    })();
  </script>
</body>
</html>
