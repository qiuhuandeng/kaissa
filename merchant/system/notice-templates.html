<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知模板 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main>
    <section class="list-page-panel">
      <div class="list-page-head">
        <div>
          <h1 class="page-title">通知模板</h1>
        </div>
        <div class="list-page-actions">
          <button class="btn btn-primary" type="button">新增模板</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>模板名称</th>
              <th>业务场景</th>
              <th>渠道</th>
              <th>更新人</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>出团通知</td>
              <td>出团执行</td>
              <td>短信、企微</td>
              <td>赵明</td>
              <td><span class="tag tag-green">启用</span></td>
              <td><button class="btn-text" type="button">编辑</button></td>
            </tr>
            <tr>
              <td>收款提醒</td>
              <td>销售订单</td>
              <td>短信、站内信</td>
              <td>陈红</td>
              <td><span class="tag tag-green">启用</span></td>
              <td><button class="btn-text" type="button">编辑</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
