<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知模板 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main>
    <section class="list-surface notice-template-surface" data-list-surface>
      <section class="filter-card filter-card-compact list-surface-filter" aria-label="通知模板筛选">
        <div class="list-surface-filter-actions list-filter-pinned-actions">
          <div class="btn-group">
            <button class="btn btn-primary" type="button">新增模板</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-item">
            <label class="sr-only" for="noticeTemplateKeyword">模板名称/业务场景</label>
            <input id="noticeTemplateKeyword" type="search" placeholder="模板名称/业务场景">
          </div>
          <div class="filter-item filter-item-status">
            <label class="sr-only" for="noticeTemplateChannel">发送渠道</label>
            <select id="noticeTemplateChannel">
              <option>全部渠道</option>
              <option>短信</option>
              <option>企微</option>
              <option>站内信</option>
            </select>
          </div>
          <div class="filter-item filter-item-status">
            <label class="sr-only" for="noticeTemplateStatus">模板状态</label>
            <select id="noticeTemplateStatus">
              <option>全部状态</option>
              <option>启用</option>
              <option>停用</option>
            </select>
          </div>
          <div class="filter-actions">
            <button class="btn btn-secondary" type="button">查询</button>
            <button class="btn btn-secondary" type="button">重置</button>
          </div>
        </div>
      </section>

      <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="通知模板列表">
        <table>
          <thead>
            <tr>
              <th>模板名称</th>
              <th>业务场景</th>
              <th>渠道</th>
              <th>更新人</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>出团通知</td>
              <td>出团执行</td>
              <td>短信、企微</td>
              <td>赵明</td>
              <td><span class="tag tag-green">启用</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button">编辑</button></div></td>
            </tr>
            <tr>
              <td>收款提醒</td>
              <td>销售订单</td>
              <td>短信、站内信</td>
              <td>陈红</td>
              <td><span class="tag tag-green">启用</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button">编辑</button></div></td>
            </tr>
          </tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span>第1-2条/共2条</span>
      </div>
    </section>
  </main>
</body>
</html>
