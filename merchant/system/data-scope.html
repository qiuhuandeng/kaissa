<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据范围 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main>
    <section class="list-page-panel">
      <div class="list-page-head">
        <div>
          <h1 class="page-title">数据范围</h1>
        </div>
        <div class="list-page-actions">
          <a class="btn btn-primary" href="role-assignment.html">前往角色授权</a>
        </div>
      </div>
    </section>

    <section class="list-surface data-scope-surface" data-list-surface>
      <div class="merchant-merge-note">
        数据范围已合并到“角色授权”统一申请。业务端不直接维护数据权限模型，只能在 admin 下发的角色模板和数据上限内发起申请。
      </div>
      <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="数据范围列表">
        <table>
          <thead>
            <tr>
              <th>员工/角色</th>
              <th>业务模块</th>
              <th>当前范围</th>
              <th>上限模型</th>
              <th>敏感字段</th>
              <th>上限来源</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>孙丽</td>
              <td>销售订单</td>
              <td>北京朝阳门店</td>
              <td>本门店</td>
              <td>证件号脱敏</td>
              <td><span class="tag tag-blue">admin角色模板</span></td>
              <td><div class="table-action"><a class="table-action-primary" href="role-assignment.html">调整</a></div></td>
            </tr>
            <tr>
              <td>周伟</td>
              <td>团期执行</td>
              <td>欧洲事业部</td>
              <td>本部门</td>
              <td>供应商成本受控</td>
              <td><span class="tag tag-blue">admin数据上限</span></td>
              <td><div class="table-action"><a class="table-action-primary" href="role-assignment.html">调整</a></div></td>
            </tr>
            <tr>
              <td>门店管理员</td>
              <td>客户列表</td>
              <td>本门店客户</td>
              <td>本门店</td>
              <td>手机号脱敏</td>
              <td><span class="tag tag-blue">admin角色模板</span></td>
              <td><div class="table-action"><a class="table-action-primary" href="role-assignment.html">调整</a></div></td>
            </tr>
          </tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span>第1-3条/共3条</span>
      </div>
    </section>
  </main>
</body>
</html>
