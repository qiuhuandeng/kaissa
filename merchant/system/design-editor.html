<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C端页面编辑 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <a class="page-back-link" href="design-pages.html">返回页面管理</a>
        <h1 class="page-title">C端页面编辑</h1>
      </div>
      <div class="list-page-actions">
        <button class="btn btn-secondary" type="button">预览</button>
        <button class="btn btn-primary" type="button">保存发布</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="pageName">页面名称</label>
        <input id="pageName" class="form-control" type="text" value="首页 Banner">
      </div>
      <div class="form-group">
        <label class="form-label" for="pageStatus">发布状态</label>
        <select id="pageStatus" class="form-control">
          <option selected>已发布</option>
          <option>草稿</option>
          <option>已停用</option>
        </select>
      </div>
      <div class="form-group form-group-full">
        <label class="form-label" for="pageContent">页面配置</label>
        <textarea id="pageContent" class="form-control" rows="8">主标题：暑期欧洲经典线路
副标题：严选团期，门店顾问一对一服务
按钮：立即咨询</textarea>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="section-head">
      <h2 class="section-title">移动端预览</h2>
    </div>
    <div class="readonly-summary">
      <strong>首页 Banner</strong>
      <span>展示位：C端首页首屏；更新后将同步小程序和移动H5。</span>
    </div>
  </section>
</body>
</html>
