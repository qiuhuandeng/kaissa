<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基础参数 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main>
    <section class="list-surface business-params-surface" data-list-surface>
      <section class="filter-card filter-card-compact list-surface-filter" aria-label="基础参数筛选">
        <div class="list-surface-filter-actions list-filter-pinned-actions">
          <div class="btn-group">
            <button class="btn btn-primary" type="button">保存配置</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-item">
            <label class="sr-only" for="businessParamKeyword">参数名称/适用模块</label>
            <input id="businessParamKeyword" type="search" placeholder="参数名称/适用模块">
          </div>
          <div class="filter-item filter-item-status">
            <label class="sr-only" for="businessParamModule">适用模块</label>
            <select id="businessParamModule">
              <option>全部模块</option>
              <option>销售订单</option>
              <option>报价单</option>
              <option>出团执行</option>
            </select>
          </div>
          <div class="filter-item filter-item-status">
            <label class="sr-only" for="businessParamSource">配置来源</label>
            <select id="businessParamSource">
              <option>全部来源</option>
              <option>租户下发</option>
              <option>业务可配</option>
            </select>
          </div>
          <div class="filter-actions">
            <button class="btn btn-secondary btn-filter-search" type="button">搜索</button>
            <button class="btn btn-secondary" type="button">重置</button>
          </div>
        </div>
      </section>

      <section class="table-wrap list-surface-table list-table-with-pagination" aria-label="基础参数列表">
        <table>
          <thead>
            <tr>
              <th>参数名称</th>
              <th>适用模块</th>
              <th>当前值</th>
              <th>来源</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>订单保留小时数</td>
              <td>销售订单</td>
              <td>48</td>
              <td><span class="tag tag-blue">租户下发</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button">调整</button></div></td>
            </tr>
            <tr>
              <td>门店报价有效天数</td>
              <td>报价单</td>
              <td>7</td>
              <td><span class="tag tag-green">业务可配</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button">编辑</button></div></td>
            </tr>
            <tr>
              <td>出团通知提前天数</td>
              <td>出团执行</td>
              <td>5</td>
              <td><span class="tag tag-green">业务可配</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><div class="table-action"><button class="table-action-primary" type="button">编辑</button></div></td>
            </tr>
          </tbody>
        </table>
      </section>
      <div class="pagination list-surface-pagination list-pagination-attached">
        <span>第1-3条/共3条</span>
      </div>
    </section>
  </main>
</body>
</html>
