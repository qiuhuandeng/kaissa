<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>业务参数 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main>
    <section class="list-page-panel">
      <div class="list-page-head">
        <div>
          <h1 class="page-title">业务参数</h1>
        </div>
        <div class="list-page-actions">
          <button class="btn btn-primary" type="button">保存配置</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>参数名称</th>
              <th>适用模块</th>
              <th>当前值</th>
              <th>来源</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>订单保留小时数</td>
              <td>销售订单</td>
              <td>48</td>
              <td><span class="tag tag-blue">租户下发</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><button class="btn-text" type="button">申请调整</button></td>
            </tr>
            <tr>
              <td>门店报价有效天数</td>
              <td>报价单</td>
              <td>7</td>
              <td><span class="tag tag-green">业务可配</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><button class="btn-text" type="button">编辑</button></td>
            </tr>
            <tr>
              <td>出团通知提前天数</td>
              <td>出团执行</td>
              <td>5</td>
              <td><span class="tag tag-green">业务可配</span></td>
              <td><span class="tag tag-green">启用</span></td>
              <td><button class="btn-text" type="button">编辑</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
