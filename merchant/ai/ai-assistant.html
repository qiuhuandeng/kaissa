<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI助手 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main id="assistantPage" class="ai-assistant-v2-page">
    <section class="ai-assistant-v2-shell" aria-label="AI助手工作区">
      <aside class="ai-command-panel" aria-label="快捷指令面板">
        <div class="ai-command-panel-head">
          <label class="ai-role-select ai-role-card">
            <span class="ai-role-label"><span aria-hidden="true"></span>当前角色</span>
            <select id="roleSelect" class="form-control" aria-label="切换角色">
              <option>产品总监</option>
              <option>产品经理/计调</option>
              <option>运营专员</option>
              <option>财务主管</option>
              <option>财务专员</option>
              <option>销售总监</option>
              <option>门店店长</option>
              <option>销售顾问</option>
            </select>
          </label>
        </div>

        <div id="commandGroups" class="ai-command-groups" aria-live="polite"></div>
      </aside>

      <section class="ai-chat-main" aria-label="AI对话区">
        <header class="ai-chat-header">
          <div class="ai-chat-title">
            <strong>AI助手</strong>
            <span id="chatContextText">产品总监</span>
          </div>
          <div class="ai-chat-actions">
            <button id="newChatButton" class="ai-header-icon-button" type="button" aria-label="新建对话" title="新建对话">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
            <button id="openHistoryDrawer" class="ai-header-icon-button" type="button" aria-label="历史对话" title="历史对话">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg>
            </button>
          </div>
        </header>
        <div id="messageList" class="ai-message-list" aria-live="polite"></div>

        <footer class="ai-chat-input-area">
          <div class="ai-input-tools" aria-label="输入工具">
            <button class="ai-tool-button" type="button" data-upload-file><span class="ai-tool-icon ai-tool-icon-upload">↥</span><span>上传文档</span></button>
            <button class="ai-tool-button" type="button" data-open-picker="schedule"><span class="ai-tool-icon ai-tool-icon-date">▦</span><span>选择团期</span></button>
            <button class="ai-tool-button" type="button" data-open-picker="product"><span class="ai-tool-icon ai-tool-icon-product">◆</span><span>选择产品</span></button>
            <button class="ai-tool-button" type="button" data-open-picker="customer"><span class="ai-tool-icon ai-tool-icon-customer">●</span><span>选择客户</span></button>
            <input id="assistantFileInput" type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" hidden>
          </div>
          <div class="ai-input-compose">
            <textarea id="assistantInput" class="form-control" rows="3" placeholder="输入问题或指令，例如：帮我导出 ZY-202506-0028 的游客名单"></textarea>
            <div class="ai-input-meta">
              <button id="sendButton" class="ai-send-button" type="button" disabled>发送</button>
            </div>
          </div>
        </footer>
      </section>
    </section>
  </main>

  <div id="historyDrawer" class="modal-overlay drawer-overlay" aria-hidden="true">
    <div class="modal drawer-modal ai-history-drawer" role="dialog" aria-modal="true" aria-labelledby="historyDrawerTitle">
      <div class="modal-header">
        <div id="historyDrawerTitle" class="modal-title">历史对话</div>
        <button class="modal-close" type="button" aria-label="关闭历史对话" data-close-history>×</button>
      </div>
      <div class="modal-body">
        <div id="historyList" class="ai-history-list"></div>
      </div>
    </div>
  </div>

  <div id="pickerModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-md" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="modal-header">
        <div id="pickerTitle" class="modal-title">选择</div>
        <button class="modal-close" type="button" aria-label="关闭选择器" data-close-picker>×</button>
      </div>
      <div class="modal-body">
        <input id="pickerSearch" class="form-control" type="search" placeholder="搜索关键词">
        <div id="pickerList" class="ai-picker-list"></div>
      </div>
    </div>
  </div>

  <div id="actionConfirmModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="actionConfirmTitle">
      <div class="modal-header">
        <div id="actionConfirmTitle" class="modal-title">确认执行操作</div>
        <button class="modal-close" type="button" aria-label="关闭确认弹窗" data-close-action-confirm>×</button>
      </div>
      <div class="modal-body">
        <p id="actionConfirmText" class="modal-center-text">确认执行此操作？</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-action-confirm>取消</button>
        <button id="confirmActionButton" class="btn btn-primary" type="button">确认执行</button>
      </div>
    </div>
  </div>

      ];

      var pickerData = {
        schedule: ['ZY-202506-0028｜欧洲经典12日｜2025-06-28', 'EU20240715001｜欧洲十国经典游｜2025-07-15', 'TR-SILK-20250805-001｜东方丝路专列｜2025-08-05'],
        product: ['欧洲经典12日｜自营产品｜已上架', '理想号地中海邮轮｜邮轮产品｜航次4个', '日本签证代办｜单项委托｜服务项3个'],
        customer: ['张建国｜KS20240618001｜欧洲十国经典游', '李梅｜意向订单待跟进｜日本关西深度游', '王强｜高价值客户｜邮轮偏好']
      };

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function getPolicy() {
        return rolePolicies[activeRole] || rolePolicies['销售顾问'];
      }

      function evaluatePermission(text) {
        var content = String(text || '');
        var policy = getPolicy();
        var matched = actionRules.filter(function (rule) {
          return rule.pattern.test(content);
        });
        var denied = matched.filter(function (rule) {
          return !policy.allow || !policy.allow[rule.type];
        });
        if (denied.length) {
          return {
            allowed: false,
            confirm: false,
            labels: denied.map(function (rule) { return rule.label; }),
            message: '该指令暂不能直接执行，请调整指令或进入对应业务页面处理。'
          };
        }
        var needsConfirm = matched.filter(function (rule) {
          return policy.confirm && policy.confirm[rule.type];
        });
        return {
          allowed: true,
          confirm: needsConfirm.length > 0,
          labels: needsConfirm.map(function (rule) { return rule.label; }),
          message: needsConfirm.length ? '需要二次确认：' + needsConfirm.map(function (rule) { return rule.label; }).join('、') : ''
        };
      }

      function permissionDeniedReply(result, text) {
        return [
          '<div class="alert alert-red">' + escapeHtml(result.message) + '</div>',
          '<p>该指令暂不能在当前对话中直接执行。</p>',
          '<p>原始指令：' + escapeHtml(text) + '</p>'
        ].join('');
      }

      function updatePermissionSummary() {
        return getPolicy();
      }

      function normalizeCommand(item) {
        if (typeof item === 'string') {
          return { title: item, content: item };
        }
        return {
          title: item.title || item.content,
          content: item.content || item.title
        };
      }

      function renderCommands() {
        var groups = roles[activeRole] || [];
        commandGroups.innerHTML = groups.map(function (group, groupIndex) {
          var items = group.items.map(function (item, itemIndex) {
            var command = normalizeCommand(item);
            return [
              '<button class="ai-command-card" type="button" title="' + escapeHtml(command.title) + '" data-command="' + escapeHtml(command.content) + '">',
              '<span>' + escapeHtml(command.title) + '</span>',
              '</button>'
            ].join('');
          }).join('');
          return [
            '<details class="ai-command-group" open>',
            '<summary><span>' + escapeHtml(group.group) + '</span><em>' + group.items.length + '条</em></summary>',
            '<div class="ai-command-card-list">',
            items,
            '</div>',
            '</details>'
          ].join('');
        }).join('');
      }

      function setRole(role) {
        activeRole = role;
        chatContextText.textContent = role;
        updatePermissionSummary();
        renderCommands();
      }

      function addUserMessage(text) {
        messageList.insertAdjacentHTML('beforeend', '<div class="ai-message-row user"><div class="ai-message-bubble">' + escapeHtml(text) + '</div></div>');
        scrollMessages();
      }

      function addAiMessage(html, options) {
        var action = options && options.action ? '<button class="btn btn-primary btn-sm" type="button" data-execute-action="' + escapeHtml(options.action) + '">执行此操作</button>' : '';
        var label = options && options.actionLabel ? '<span class="ai-action-label">执行此操作：' + escapeHtml(options.actionLabel) + '</span>' : '';
        messageList.insertAdjacentHTML('beforeend', [
          '<div class="ai-message-row ai">',
          '<div class="ai-avatar">AI</div>',
          '<div class="ai-message-bubble">',
          '<div class="ai-rich-text">' + html + '</div>',
          '<div class="ai-message-actions">',
          '<button type="button" data-copy-message>复制</button>',
          '<button type="button" data-rate-message="up">满意</button>',
          '<button type="button" data-rate-message="down">不满意</button>',
          label,
          action,
          '</div>',
          '</div>',
          '</div>'
        ].join(''));
        scrollMessages();
      }

      function addTypingMessage() {
        var id = 'typing-' + Date.now();
        messageList.insertAdjacentHTML('beforeend', '<div id="' + id + '" class="ai-message-row ai"><div class="ai-avatar">AI</div><div class="ai-message-bubble"><div class="ai-typing"><span></span><span></span><span></span></div></div></div>');
        scrollMessages();
        return id;
      }

      function removeTyping(id) {
        var node = document.getElementById(id);
        if (node) node.remove();
      }

      function tableToolbar() {
        return '<div class="ai-table-tools"><button type="button" data-copy-table>复制表格</button><button type="button" data-export-table>导出为Excel</button></div>';
      }

      function approvalReply() {
        return [
          '<p>今日共有 <strong>3 个产品</strong> 等待您审批。</p>',
          tableToolbar(),
          '<div class="table-wrap ai-data-table"><table><thead><tr><th data-sortable>序号</th><th data-sortable>产品名称</th><th data-sortable>提交人</th><th data-sortable>提交时间</th><th data-sortable>产品类型</th></tr></thead><tbody>',
          '<tr><td>1</td><td><a class="ai-entity-link" href="../approval/approval-product-review.html">欧洲经典12日</a></td><td>计调张明</td><td>10:23</td><td><span class="ai-result-tag ai-result-tag-blue">自营产品</span></td></tr>',
          '<tr><td>2</td><td><a class="ai-entity-link" href="../approval/approval-product-review.html">理想号地中海邮轮</a></td><td>产品经理李梅</td><td>09:48</td><td><span class="ai-result-tag ai-result-tag-green">邮轮产品</span></td></tr>',
          '<tr><td>3</td><td><a class="ai-entity-link" href="../approval/approval-product-review.html">东方丝路专列9日</a></td><td>计调王强</td><td>09:12</td><td><span class="ai-result-tag ai-result-tag-purple">专列产品</span></td></tr>',
          '</tbody></table></div>',
          '<p><a class="ai-inline-link" href="../approval/approval-product-review.html">前往审批中心查看全部</a></p>'
        ].join('');
      }

      function noticeReply() {
        return [
          '<p>正在为您生成 <a class="ai-entity-link" href="../tour/schedules-detail.html">ZY-202506-0028</a> 的旅游通知书...</p>',
          '<div class="ai-progress-box"><span class="ai-spinner"></span><span>正在读取游客名单 → 正在填充模板 → 生成完成</span></div>',
          '<div class="ai-success-box">旅游通知书已生成</div>',
          '<div class="ai-file-preview"><strong>旅游通知书.pdf</strong><span>PDF预览缩略图</span></div>',
          '<div class="ai-file-actions"><button class="btn btn-secondary btn-sm" type="button">下载PDF</button><button class="btn btn-primary btn-sm" type="button" data-execute-action="发送给游客">发送给游客</button></div>'
        ].join('');
      }

      function financeReply() {
        return [
          '<div class="ai-finance-card">',
          '<h3>今日待收款汇总</h3>',
          '<p>门市渠道待收款 <a class="ai-entity-link" href="../finance/finance-receivable.html">¥128,000</a>（3笔）</p>',
          '<p>OTA渠道待收款 <a class="ai-entity-link" href="../finance/finance-receivable.html">¥86,500</a>（携程2笔/飞猪1笔）</p>',
          '<p>直客渠道待收款 <a class="ai-entity-link" href="../finance/finance-receivable.html">¥42,000</a>（2笔）</p>',
          '<strong>合计待收款 ¥256,500 共8笔</strong>',
          '</div>',
          '<p><a class="ai-inline-link" href="../finance/finance-matching.html">前往认款管理处理</a></p>',
          '<button class="btn btn-primary btn-sm" type="button" data-execute-action="一键催款">一键催款</button>'
        ].join('');
      }

      function genericReply(text) {
        return [
          '<p>已收到指令：<strong>' + escapeHtml(text) + '</strong></p>',
          '<ul><li>已按当前角色上下文读取相关业务信息</li><li>已整理可执行的下一步建议</li><li>涉及写入、导出或发送的动作会在执行前再次确认</li></ul>',
          '<pre><code>下一步：确认对象 → 生成结果 → 执行业务操作</code></pre>'
        ].join('');
      }

      function sendMessage(text) {
        var content = String(text || assistantInput.value || '').trim();
        if (!content) return;
        assistantInput.value = '';
        syncInputState();
        addUserMessage(content);
        var permission = evaluatePermission(content);
        if (!permission.allowed) {
          addAiMessage(permissionDeniedReply(permission, content), null);
          return;
        }
        var typingId = addTypingMessage();
        window.setTimeout(function () {
          removeTyping(typingId);
          if (content.indexOf('待审批产品') >= 0 || content.indexOf('今日有哪些待审批产品') >= 0) {
            addAiMessage(approvalReply(), { action: '跳转审批页面', actionLabel: '跳转审批页面' });
          } else if (content.indexOf('旅游通知书') >= 0 || content.indexOf('出团通知') >= 0) {
            addAiMessage(noticeReply(), { action: '发送给游客', actionLabel: '发送给游客' });
          } else if (content.indexOf('待收款') >= 0 || content.indexOf('收款') >= 0) {
            addAiMessage(financeReply(), { action: '一键催款', actionLabel: '一键催款' });
          } else {
            addAiMessage(genericReply(content), { action: '继续执行', actionLabel: '继续执行' });
          }
        }, 700);
      }

      function renderDefaultMessages() {
        messageList.innerHTML = '';
        addUserMessage('今日有哪些待审批产品？');
        addAiMessage(approvalReply(), { action: '跳转审批页面', actionLabel: '跳转审批页面' });
        addUserMessage('帮我生成ZY-202506-0028团期的旅游通知书');
        addAiMessage(noticeReply(), { action: '发送给游客', actionLabel: '发送给游客' });
        addUserMessage('今日待收款是多少？');
        addAiMessage(financeReply(), { action: '一键催款', actionLabel: '一键催款' });
      }

      function syncInputState() {
        var hasValue = assistantInput.value.trim().length > 0;
        sendButton.disabled = !hasValue;
      }

      function scrollMessages() {
        messageList.scrollTop = messageList.scrollHeight;
      }





      function renderHistory() {
        var base = ['今日待审批产品查询', '旅游通知书生成', '今日待收款汇总', '竞品价格预警', '出团风险扫描', '游客名单导出'];
        var rows = [];
        for (var i = 0; i < 30; i += 1) {
          var title = base[i % base.length] + ' #' + String(i + 1).padStart(2, '0');
          rows.push('<button type="button" data-history-title="' + escapeHtml(title) + '"><strong>' + escapeHtml(title) + '</strong><span>最近会话 · ' + (i + 1) + '小时前</span></button>');
        }
        historyList.innerHTML = rows.join('');
      }

      function renderPicker(type) {
        var titleMap = { schedule: '选择团期', product: '选择产品', customer: '选择客户' };
        pickerTitle.textContent = titleMap[type] || '选择';
        pickerSearch.value = '';
        pickerList.innerHTML = (pickerData[type] || []).map(function (item) {
          return '<button type="button" data-picker-value="' + escapeHtml(item.split('｜')[0]) + '">' + escapeHtml(item) + '</button>';
        }).join('');
        window.caesarUI.openLayer(pickerModal);
      }

      roleSelect.addEventListener('change', function () {
        setRole(roleSelect.value);
      });

      commandGroups.addEventListener('click', function (event) {
        var card = event.target.closest('.ai-command-card');
        if (!card) return;
        commandGroups.querySelectorAll('.ai-command-card.active').forEach(function (item) {
          item.classList.remove('active');
        });
        card.classList.add('active');
        assistantInput.value = card.dataset.command;
        syncInputState();
        sendMessage(card.dataset.command);
      });

      assistantInput.addEventListener('input', syncInputState);
      assistantInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      document.addEventListener('keydown', function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
          event.preventDefault();
          assistantInput.focus();
        }
      });

      sendButton.addEventListener('click', function () { sendMessage(); });

      document.getElementById('assistantFileInput').addEventListener('change', function (event) {
        var file = event.target.files[0];
        if (!file) return;
        assistantInput.value = '请分析上传文件：' + file.name;
        syncInputState();
        assistantInput.focus();
      });

      document.querySelector('[data-upload-file]').addEventListener('click', function () {
        document.getElementById('assistantFileInput').click();
      });

      document.querySelectorAll('[data-open-picker]').forEach(function (button) {
        button.addEventListener('click', function () {
          renderPicker(button.dataset.openPicker);
        });
      });

      pickerList.addEventListener('click', function (event) {
        var button = event.target.closest('[data-picker-value]');
        if (!button) return;
        assistantInput.value = (assistantInput.value ? assistantInput.value + ' ' : '') + button.dataset.pickerValue;
        syncInputState();
        window.caesarUI.closeLayer(pickerModal);
        assistantInput.focus();
      });

      document.querySelectorAll('[data-close-picker]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(pickerModal); });
      });

      document.getElementById('newChatButton').addEventListener('click', function () {
        messageList.innerHTML = '';
        assistantInput.value = '';
        syncInputState();
      });

      document.getElementById('openHistoryDrawer').addEventListener('click', function () {
        renderHistory();
        window.caesarUI.openLayer(historyDrawer);
      });
      document.querySelectorAll('[data-close-history]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(historyDrawer); });
      });
      historyList.addEventListener('click', function (event) {
        var button = event.target.closest('[data-history-title]');
        if (!button) return;
        messageList.innerHTML = '';
        addUserMessage('恢复历史会话：' + button.dataset.historyTitle);
        addAiMessage('<p>已恢复历史会话上下文，可继续追问或执行后续操作。</p>', null);
        window.caesarUI.closeLayer(historyDrawer);
      });

      messageList.addEventListener('click', function (event) {
        var actionButton = event.target.closest('[data-execute-action]');
        if (actionButton) {
          pendingAction = actionButton.dataset.executeAction;
          var actionPermission = evaluatePermission(pendingAction);
          if (!actionPermission.allowed) {
            addAiMessage(permissionDeniedReply(actionPermission, pendingAction), null);
            return;
          }
          actionConfirmText.textContent = '即将执行「' + pendingAction + '」。系统会记录本次操作，确认后继续。';
          window.caesarUI.openLayer(actionConfirmModal);
          return;
        }
        if (event.target.closest('[data-copy-message]')) {
          window.alert('消息内容已复制');
        }
        if (event.target.closest('[data-rate-message]')) {
          window.alert('感谢反馈，已记录本次评价');
        }
        if (event.target.closest('[data-copy-table]')) {
          window.alert('表格已复制');
        }
        if (event.target.closest('[data-export-table]')) {
          var exportPermission = evaluatePermission('导出当前表格');
          if (!exportPermission.allowed) {
            addAiMessage(permissionDeniedReply(exportPermission, '导出当前表格'), null);
          } else {
            pendingAction = '导出当前表格';
            actionConfirmText.textContent = '即将导出当前表格。确认后系统会生成导出任务。';
            window.caesarUI.openLayer(actionConfirmModal);
          }
        }
        var sortable = event.target.closest('[data-sortable]');
        if (sortable) {
          var table = sortable.closest('table');
          var index = Array.from(sortable.parentElement.children).indexOf(sortable);
          var rows = Array.from(table.tBodies[0].rows);
          rows.reverse().forEach(function (row) { table.tBodies[0].appendChild(row); });
          sortable.dataset.sorted = index;
        }
      });

      document.getElementById('confirmActionButton').addEventListener('click', function () {
        var actionPermission = evaluatePermission(pendingAction);
        if (!actionPermission.allowed) {
          window.caesarUI.closeLayer(actionConfirmModal);
          addAiMessage(permissionDeniedReply(actionPermission, pendingAction), null);
          return;
        }
        window.caesarUI.closeLayer(actionConfirmModal);
        addAiMessage('<p><strong>操作已提交：</strong>' + escapeHtml(pendingAction) + '</p><p>系统已生成任务，请稍后查看处理结果。</p>', null);
      });
      document.querySelectorAll('[data-close-action-confirm]').forEach(function (button) {
        button.addEventListener('click', function () { window.caesarUI.closeLayer(actionConfirmModal); });
      });

      [historyDrawer, pickerModal, actionConfirmModal].forEach(function (overlay) {
        overlay.addEventListener('click', function (event) {
          if (event.target === overlay) window.caesarUI.closeLayer(overlay);
        });
      });

      setRole(activeRole);
      renderDefaultMessages();
      syncInputState();
    })();
  </script>
</body>
</html>
