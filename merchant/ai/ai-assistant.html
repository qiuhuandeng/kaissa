<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI助手 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-merchant.js"></script>

  <main class="ai-command-page">
    <section class="list-page-panel">
      <div class="list-page-head">
        <div>
          <h1 class="page-title">AI助手</h1>
        </div>
      </div>
    </section>

    <section class="card ai-assistant-workbench" aria-label="AI助手">
      <div class="ai-assistant-toolbar">
        <div>
          <div class="card-title">工作台助手</div>
          <span id="roleSceneText" class="text-muted">计调工作台常用：出团文件、名单导出、证件风险、通知生成</span>
        </div>
        <label class="ai-role-picker">
          <span>使用角色</span>
          <select id="roleSelect" class="form-control">
            <option value="计调">计调</option>
            <option value="产品">产品</option>
            <option value="销售">销售</option>
            <option value="客服">客服</option>
            <option value="财务">财务</option>
            <option value="管理层">管理层</option>
          </select>
        </label>
      </div>

      <div class="ai-assistant-compose">
        <div class="ai-section-title">常用指令</div>
        <div id="shortcutList" class="ai-shortcut-grid ai-shortcut-grid-compact" aria-label="常用指令"></div>
        <div class="ai-command-input ai-command-input-inline">
          <textarea id="assistantInput" class="form-control" rows="2" placeholder="输入指令，例如：帮我导出明天出发团的游客名单">帮我生成 EU20240715001 的出团文件</textarea>
          <div class="ai-command-actions">
            <button id="clearAssistantInput" class="btn btn-secondary" type="button">清空</button>
            <button id="sendAssistantCommand" class="btn btn-ai" type="button">🤖 AI执行</button>
          </div>
        </div>
      </div>
    </section>

    <section class="ai-assistant-dashboard">
      <section class="card ai-assistant-panel" aria-label="最近聊天记录">
        <div class="card-header">
          <div class="card-title">最近聊天记录</div>
        </div>
        <div id="recentList" class="ai-recent-chat-list" aria-live="polite"></div>
      </section>

      <section class="card ai-assistant-panel" aria-label="当前角色可用能力">
        <div class="card-header">
          <div class="card-title">当前角色可用能力</div>
        </div>
        <div id="abilityList" class="ai-ability-list"></div>
      </section>
    </section>
  </main>

  <div id="assistantNoticeModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm modal-confirm" role="dialog" aria-modal="true" aria-labelledby="assistantNoticeTitle">
      <div class="modal-header">
        <div id="assistantNoticeTitle" class="modal-title">提示</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-assistant-modal>×</button>
      </div>
      <div class="modal-body">
        <p id="assistantNoticeText" class="modal-center-text">操作已完成</p>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" type="button" data-close-assistant-modal>确认</button></div>
    </div>
  </div>

  <script>
    (function () {
      var assistantInput = document.getElementById('assistantInput');
      var recentList = document.getElementById('recentList');
      var abilityList = document.getElementById('abilityList');
      var shortcutList = document.getElementById('shortcutList');
      var roleSelect = document.getElementById('roleSelect');
      var roleSceneText = document.getElementById('roleSceneText');
      var noticeModal = document.getElementById('assistantNoticeModal');
      var noticeText = document.getElementById('assistantNoticeText');
      var activeRole = '计调';

      var roleData = {
        '计调': {
          sample: '帮我生成 EU20240715001 的出团文件',
          scene: '计调工作台常用：出团文件、名单导出、证件风险、通知生成',
          abilities: [
            { title: '出团文件生成', text: '按团号生成通知书、游客名单、保险清单和领队交接单' },
            { title: '名单核验', text: '检查缺证件、重复游客、手机号缺失和特殊需求风险' },
            { title: '执行风险扫描', text: '汇总未发通知、资源未确认、签证未完成等风险' },
            { title: '业务导出', text: '按团期导出游客名单、证件清单、房间分配和领队资料' }
          ],
          commands: [
            '帮我生成 EU20240715001 的出团文件',
            '帮我导出明天出发团的游客名单',
            '帮我检查欧洲十国经典游的证件和签证风险',
            '帮我生成 EU20240715001 的出团通知',
            '帮我汇总本周资源未确认的团期'
          ],
          records: [
            { time: '09:14', title: '明日出发团证件风险检查', summary: '发现2名游客护照有效期不足6个月，1名游客签证状态待补件', status: '待复核', tag: 'tag-orange' },
            { time: '09:12', title: 'EU20240715001 出团文件生成', summary: '已生成游客名单、保险清单、领队交接单和出团通知', status: '已完成', tag: 'tag-green' },
            { time: '昨天 17:40', title: '欧洲十国经典游资源确认扫描', summary: '酒店资源已确认，巴黎段用车合同待补传', status: '有风险', tag: 'tag-red' }
          ]
        },
        '产品': {
          sample: '帮我根据上传文件生成欧洲十国经典游产品草稿',
          scene: '产品工作台常用：产品草稿、行程优化、竞品价差、拆解校正',
          abilities: [
            { title: '产品草稿生成', text: '从线路文件生成产品基础信息、行程、费用包含和预订须知' },
            { title: '行程内容优化', text: '生成卖点、亮点、短标题、长文案和渠道展示文案' },
            { title: '竞品价差分析', text: '读取竞品价格池，提示价差、舱型权益和调价建议' },
            { title: '低置信校正', text: '汇总线路拆解中待人工确认的字段和来源文本' }
          ],
          commands: [
            '帮我根据上传文件生成欧洲十国经典游产品草稿',
            '帮我优化日本关西深度游的产品卖点',
            '帮我检查今天低置信度线路拆解任务',
            '帮我对比理想号地中海邮轮的竞品价格',
            '帮我生成泰国曼谷清迈8日的行程亮点'
          ],
          records: [
            { time: '10:08', title: '理想号地中海邮轮竞品价差', summary: '较同平台同航线低3.6%，建议复核舱型权益和儿童价策略', status: '已完成', tag: 'tag-green' },
            { time: '10:05', title: '欧洲十国经典游产品草稿', summary: '酒店等级和自费项目说明为低置信字段，待产品运营校正', status: '待校正', tag: 'tag-orange' },
            { time: '昨天 15:20', title: '日本关西深度游卖点优化', summary: '已生成渠道标题、产品亮点和小红书风格短文案', status: '已完成', tag: 'tag-green' }
          ]
        },
        '销售': {
          sample: '帮我给意向客户李梅生成今天的跟进话术',
          scene: '销售工作台常用：客户跟进、报价说明、产品推荐、催付提醒',
          abilities: [
            { title: '跟进话术', text: '按客户偏好、预算、意向产品生成微信、电话和短信话术' },
            { title: '产品推荐', text: '基于历史咨询和客户标签推荐合适线路' },
            { title: '报价说明', text: '把价格、名额、签证、取消规则整理成顾问可发送话术' },
            { title: '成交风险', text: '识别临近锁位、价格敏感、二次咨询和未付款客户' }
          ],
          commands: [
            '帮我给意向客户李梅生成今天的跟进话术',
            '帮我为欧洲十国经典游生成报价说明',
            '帮我根据张建国的偏好推荐合适产品',
            '帮我总结本周高意向未成交订单',
            '帮我生成三亚亲子5日游的催付话术'
          ],
          records: [
            { time: '11:24', title: '今日优先跟进客户汇总', summary: '5位客户需优先跟进，其中2位临近锁位截止，1位价格敏感', status: '已完成', tag: 'tag-green' },
            { time: '11:20', title: '李梅跟进话术', summary: '突出亲子房型、签证协助和早鸟优惠，已生成微信话术', status: '已完成', tag: 'tag-green' },
            { time: '昨天 18:10', title: '三亚亲子5日游催付提醒', summary: '3个订单出发临近未完成尾款，建议今日跟进', status: '待处理', tag: 'tag-orange' }
          ]
        },
        '客服': {
          sample: '帮我查张建国的签证材料还缺什么',
          scene: '客服工作台常用：材料查询、补件提醒、会话总结、转人工判断',
          abilities: [
            { title: '材料缺失查询', text: '按订单和游客汇总签证、证件、合同、保险材料缺口' },
            { title: '补件话术', text: '根据缺失材料和截止时间生成提醒话术' },
            { title: '未解决问题汇总', text: '从对话记录中沉淀高频问题和知识库补充项' },
            { title: '转人工判断', text: '按置信度、关键词和情绪识别判断是否需要人工接管' }
          ],
          commands: [
            '帮我查张建国的签证材料还缺什么',
            '帮我生成签证补件提醒话术',
            '帮我汇总今天AI未解决的问题',
            '帮我判断这个会话是否需要转人工',
            '帮我把高频问题加入知识库待维护清单'
          ],
          records: [
            { time: '13:09', title: '今日未解决问题汇总', summary: '高频问题为签证补件、集合地点变更和邮轮登船证件说明', status: '待入库', tag: 'tag-orange' },
            { time: '13:02', title: '张建国签证材料查询', summary: '缺少在职证明原件和近6个月银行流水，护照有效期符合要求', status: '已完成', tag: 'tag-green' },
            { time: '昨天 16:50', title: '投诉会话转人工判断', summary: '识别到负面情绪和退款关键词，建议转人工处理', status: '已转人工', tag: 'tag-blue' }
          ]
        },
        '财务': {
          sample: '帮我汇总本周毛利异常的团期',
          scene: '财务工作台常用：毛利异常、认款差异、付款风险、NC推送',
          abilities: [
            { title: '毛利异常分析', text: '扫描团期收入、成本、汇率和供应商费用变化' },
            { title: '认款辅助', text: '匹配流水、订单、客户和金额，提示疑似归属' },
            { title: '付款风险提醒', text: '识别重复付款、超预算付款和资料缺失付款申请' },
            { title: 'NC推送检查', text: '汇总待推送、推送失败和字段缺失的财务单据' }
          ],
          commands: [
            '帮我汇总本周毛利异常的团期',
            '帮我检查应收应付差异超过5000元的订单',
            '帮我分析今天未认款流水',
            '帮我生成付款风险提醒',
            '帮我汇总待推送NC的财务单据'
          ],
          records: [
            { time: '14:36', title: '今日未认款流水分析', summary: '未认款流水8笔，建议优先处理3笔金额超过¥20,000的记录', status: '待处理', tag: 'tag-orange' },
            { time: '14:30', title: '本周毛利异常团期', summary: '4个团期低于预警线，主要原因是酒店确认价上涨和汇率波动', status: '已完成', tag: 'tag-green' },
            { time: '昨天 19:05', title: 'NC推送失败单据检查', summary: '2张应付单缺供应商税号，1张退款单缺退款原因', status: '失败', tag: 'tag-red' }
          ]
        },
        '管理层': {
          sample: '帮我生成今天的经营异常摘要',
          scene: '管理层工作台常用：经营异常、AI待处理、竞品异动、服务风险',
          abilities: [
            { title: '经营异常摘要', text: '汇总销售、毛利、履约、服务和财务异常' },
            { title: 'AI运营总览', text: '查看低置信任务、人工复核量、自动化节省时长' },
            { title: '竞品异动', text: '按目的地和产品类型汇总竞品价格变化' },
            { title: '服务风险', text: '聚合客诉、转人工、未解决问题和满意度变化' }
          ],
          commands: [
            '帮我生成今天的经营异常摘要',
            '帮我汇总AI低置信任务和待人工处理量',
            '帮我看本周竞品价格异动',
            '帮我汇总客诉风险和转人工趋势',
            '帮我生成本月AI使用效果摘要'
          ],
          records: [
            { time: '16:06', title: '本月AI使用效果摘要', summary: 'AI处理1,286次任务，产品拆解节省约42小时，签证审查待复核率8.4%', status: '已完成', tag: 'tag-green' },
            { time: '16:00', title: '今日经营异常摘要', summary: '异常集中在欧洲长线毛利波动、2个团期签证风险和3条竞品低价预警', status: '已完成', tag: 'tag-green' },
            { time: '昨天 20:12', title: '客诉风险和转人工趋势', summary: '邮轮登船证件说明导致咨询上升，建议补充出行助理知识库', status: '待跟进', tag: 'tag-orange' }
          ]
        }
      };

      function escapeHtml(text) {
        return text.replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function renderShortcuts(role) {
        shortcutList.innerHTML = roleData[role].commands.map(function (command) {
          return '<button type="button" data-command="' + escapeHtml(command) + '">' + escapeHtml(command) + '</button>';
        }).join('');
      }

      function renderRecords(role) {
        recentList.innerHTML = roleData[role].records.map(function (item) {
          return [
            '<button class="ai-recent-chat-item" type="button" data-command="' + escapeHtml(item.title) + '">',
            '<span class="ai-recent-chat-time">' + escapeHtml(item.time) + '</span>',
            '<strong>' + escapeHtml(item.title) + '</strong>',
            '<span>' + escapeHtml(item.summary) + '</span>',
            '<em class="tag ' + item.tag + '">' + escapeHtml(item.status) + '</em>',
            '</button>'
          ].join('');
        }).join('');
      }

      function renderAbilities(role) {
        abilityList.innerHTML = roleData[role].abilities.map(function (item) {
          return '<div><strong>' + escapeHtml(item.title) + '</strong><span>' + escapeHtml(item.text) + '</span></div>';
        }).join('');
      }

      function setRole(role) {
        activeRole = role;
        roleSelect.value = role;
        roleSceneText.textContent = roleData[role].scene;
        assistantInput.value = roleData[role].sample;
        renderShortcuts(role);
        renderRecords(role);
        renderAbilities(role);
      }

      function showNotice(text) {
        noticeText.textContent = text;
        noticeModal.classList.add('show');
        noticeModal.setAttribute('aria-hidden', 'false');
      }

      roleSelect.addEventListener('change', function () {
        setRole(roleSelect.value);
      });

      shortcutList.addEventListener('click', function (event) {
        var button = event.target.closest('[data-command]');
        if (!button) return;
        assistantInput.value = button.dataset.command;
        assistantInput.focus();
      });

      recentList.addEventListener('click', function (event) {
        var button = event.target.closest('[data-command]');
        if (!button) return;
        assistantInput.value = '继续处理：' + button.dataset.command;
        assistantInput.focus();
      });

      document.getElementById('sendAssistantCommand').addEventListener('click', function () {
        var command = assistantInput.value.trim();
        if (!command) {
          showNotice('请输入需要AI助手执行的指令');
          return;
        }
        roleData[activeRole].records.unshift({
          time: '刚刚',
          title: command,
          summary: '已按' + activeRole + '角色读取相关业务上下文，执行前会提示确认涉及写入、发送或导出的动作',
          status: '处理中',
          tag: 'tag-blue'
        });
        renderRecords(activeRole);
      });

      document.getElementById('clearAssistantInput').addEventListener('click', function () {
        assistantInput.value = '';
        assistantInput.focus();
      });

      document.querySelectorAll('[data-close-assistant-modal]').forEach(function (button) {
        button.addEventListener('click', function () {
          noticeModal.classList.remove('show');
          noticeModal.setAttribute('aria-hidden', 'true');
        });
      });

      noticeModal.addEventListener('click', function (event) {
        if (event.target === noticeModal) {
          noticeModal.classList.remove('show');
          noticeModal.setAttribute('aria-hidden', 'true');
        }
      });

      setRole(activeRole);
    })();
  </script>
</body>
</html>
