<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择公司主体 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="workspace-select-page workspace-subject-page">
  <main class="workspace-main">
    <section class="workspace-panel" aria-label="选择公司主体">
      <section class="workspace-picker">
        <div class="workspace-account-row">
          <div class="workspace-brand">
            <span class="workspace-brand-mark">K</span>
            <span>凯撒旅游</span>
          </div>
        </div>

        <h1 class="workspace-title">选择板块与主体公司</h1>
        <p class="workspace-subtitle">主体公司决定合同、财务和数据边界；业务板块决定本次进入的业务归属。集团仅作名义归属，不作为业务工作范围。</p>

        <div class="workspace-list" aria-label="板块与主体公司列表">
          <article class="workspace-card active" data-company="福建凯撒">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">旅游板块 / 福建凯撒</span>
                  <span class="workspace-card-desc">独立法人主体 · 分公司与中心同级管理</span>
                  <span class="workspace-card-meta">厦门分公司、泉州分公司、福州分公司、漳州分公司、产品中心、长线中心、短线中心/销售中心</span>
                </span>
              </span>
              <span class="tag tag-blue">默认主体</span>
            </button>
          </article>
        </div>

        <footer class="workspace-actionbar">
          <div>
            <span class="workspace-selected-label">当前选择</span>
            <div id="selectedWorkspace" class="workspace-selected">福建凯撒</div>
          </div>
          <button id="enterDashboard" class="btn btn-primary btn-lg" type="button">进入该主体</button>
        </footer>
        <div class="workspace-footnote">进入系统后，可在右上角切换分公司、中心、部门、门市部或门店工作范围；分公司不是合同/财务主体。</div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      var cards = document.querySelectorAll('.workspace-card');
      var selectedText = document.getElementById('selectedWorkspace');
      var enterDashboard = document.getElementById('enterDashboard');
      var currentCompany = '福建凯撒';

      function updateSelected(company) {
        currentCompany = company;
        selectedText.textContent = currentCompany;
      }

      cards.forEach(function (card) {
        var head = card.querySelector('.workspace-card-head');

        head.addEventListener('click', function () {
          cards.forEach(function (item) {
            item.classList.remove('active');
          });
          card.classList.add('active');
          updateSelected(card.getAttribute('data-company'));
        });
      });

      enterDashboard.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

    })();
  </script>
</body>
</html>
