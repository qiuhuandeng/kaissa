<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择工作空间 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="workspace-select-page">
  <header class="workspace-topbar">
    <div class="workspace-brand">
      <span class="workspace-brand-mark">K</span>
      <span>凯撒旅游</span>
    </div>
    <div class="workspace-user">
      <span class="topbar-user-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M5 21a7 7 0 0 1 14 0"></path>
        </svg>
      </span>
      <span class="workspace-username">张三</span>
      <button class="btn btn-secondary btn-sm" type="button">退出登录</button>
    </div>
  </header>

  <main class="workspace-main">
    <section class="workspace-panel" aria-label="选择工作空间">
      <section class="workspace-picker">
        <h1 class="workspace-title">请选择工作空间</h1>
        <p class="workspace-subtitle">您在以下公司/部门拥有访问权限，请选择本次工作环境</p>

        <div class="workspace-list" aria-label="工作空间列表">
          <article class="workspace-card active" data-company="凯撒旅游集团（北京总部）">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">凯撒旅游集团（北京总部）</span>
                  <span class="workspace-card-desc">集团总部 · 出境游/国内游/MICE/财务中心</span>
                </span>
              </span>
            </button>
          </article>

          <article class="workspace-card" data-company="凯撒亿步旅行社（上海）">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">凯撒亿步旅行社（上海）</span>
                  <span class="workspace-card-desc">华东区域 · 散客与团队业务</span>
                </span>
              </span>
            </button>
          </article>

          <article class="workspace-card" data-company="体坛旅游（产品公司）">
            <button class="workspace-card-head" type="button">
              <span class="workspace-card-left">
                <span>
                  <span class="workspace-company">体坛旅游（产品公司）</span>
                  <span class="workspace-card-desc">产品公司 · 研发与资源采购</span>
                </span>
              </span>
            </button>
          </article>
        </div>

        <footer class="workspace-actionbar">
          <div>
            <span class="workspace-selected-label">当前选择</span>
            <div id="selectedWorkspace" class="workspace-selected">凯撒旅游集团（北京总部）</div>
          </div>
          <button id="enterDashboard" class="btn btn-primary btn-lg" type="button">进入工作台</button>
        </footer>
      </section>
    </section>
  </main>

  <script>
    (function () {
      var cards = document.querySelectorAll('.workspace-card');
      var selectedText = document.getElementById('selectedWorkspace');
      var enterDashboard = document.getElementById('enterDashboard');
      var currentCompany = '凯撒旅游集团（北京总部）';

      function updateSelected(company) {
        currentCompany = company;
        selectedText.textContent = currentCompany;
      }

      cards.forEach(function (card) {
        var head = card.querySelector('.workspace-card-head');

        head.addEventListener('click', function () {
          cards.forEach(function (item) {
            item.classList.remove('active');
          });
          card.classList.add('active');
          updateSelected(card.getAttribute('data-company'));
        });
      });

      enterDashboard.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });
    })();
  </script>
</body>
</html>
