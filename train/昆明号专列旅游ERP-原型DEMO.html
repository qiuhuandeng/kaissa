<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>昆明号 · 专列旅游 ERP 系统 原型 DEMO（一期）</title>
<style>
:root{
  --bg:#f4f6f8; --panel:#fff; --line:#e3e6ea; --line2:#eef1f4;
  --tx:#1d2129; --tx2:#4e5969; --mut:#86909c;
  --brand:#0a5c4d; --brand2:#0f7c67;
  --gold:#a8791c; --goldbg:#fdf3e0; --goldln:#e8cf9e;
  --blue:#1e5eb8; --bluebg:#eaf1fc; --blueln:#bcd3f0;
  --ok:#16a34a; --okbg:#e7f6ec;
  --hold:#d97706; --holdbg:#fdf1dd;
  --lock:#7c3aed; --lockbg:#f0eafd;
  --dep:#0891b2; --depbg:#e2f6fa;
  --sold:#c0392b; --soldbg:#fbeceb;
  --blk:#8a94a6; --blkbg:#f0f2f5;
  --rd:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:13px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}

/* ---------- sidebar ---------- */
#side{width:196px;background:#0d1b26;color:#b9c4cf;flex-shrink:0;display:flex;flex-direction:column}
.logo{padding:16px 16px 14px;border-bottom:1px solid #1e2f3d}
.logo b{color:#fff;font-size:15px;letter-spacing:.5px;display:block}
.logo span{font-size:11px;color:#6b7c8c}
#nav{padding:8px 0;flex:1}
.ngrp{font-size:10px;color:#5a6b7a;padding:12px 16px 4px;letter-spacing:1px}
.nitem{padding:8px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;border-left:3px solid transparent}
.nitem:hover{background:#152633;color:#e6edf3}
.nitem.on{background:#152633;color:#fff;border-left-color:var(--brand2);font-weight:600}
.nitem small{font-size:10px;background:#c0392b;color:#fff;border-radius:8px;padding:0 5px}
.sfoot{padding:10px 16px;border-top:1px solid #1e2f3d;font-size:11px;color:#5a6b7a}

/* ---------- main ---------- */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
#top{background:var(--panel);border-bottom:1px solid var(--line);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0}
#top h1{font-size:15px;font-weight:600}
#top .crumb{color:var(--mut);font-size:12px}
.spacer{flex:1}
.usr{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2)}
.avt{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px}
#view{padding:18px 20px 40px;overflow:auto}

/* ---------- shared ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rd);margin-bottom:14px}
.card>h3{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
.card>h3 .sub{font-weight:400;color:var(--mut);font-size:11px}
.card>h3 .spacer{flex:1}
.cbody{padding:14px}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--rd);padding:13px 14px}
.kpi .l{font-size:11px;color:var(--mut)}
.kpi .v{font-size:24px;font-weight:600;margin:3px 0 2px;letter-spacing:-.5px}
.kpi .d{font-size:11px;color:var(--tx2)}
.kpi .v small{font-size:12px;font-weight:400;color:var(--mut)}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafbfc;color:var(--tx2);font-weight:500;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fafbfc}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px}

.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;line-height:18px;white-space:nowrap}
.t-ok{background:var(--okbg);color:var(--ok)}
.t-hold{background:var(--holdbg);color:var(--hold)}
.t-lock{background:var(--lockbg);color:var(--lock)}
.t-dep{background:var(--depbg);color:var(--dep)}
.t-sold{background:var(--soldbg);color:var(--sold)}
.t-blk{background:var(--blkbg);color:var(--blk)}
.t-gold{background:var(--goldbg);color:var(--gold)}
.t-blue{background:var(--bluebg);color:var(--blue)}
.t-gray{background:#f0f2f5;color:var(--tx2)}

.btn{border:1px solid var(--line);background:#fff;border-radius:4px;padding:5px 11px;font-size:12px;cursor:pointer;color:var(--tx2)}
.btn:hover{border-color:#c3cad2;color:var(--tx)}
.btn.p{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.p:hover{background:var(--brand2)}
.btn.sm{padding:2px 8px;font-size:11px}
.btn:disabled{opacity:.45;cursor:not-allowed}
select,input[type=text]{border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:12px;background:#fff;color:var(--tx)}

.hint{background:#fffbe9;border:1px solid #f5e3a8;border-left:3px solid #d9a441;padding:8px 11px;border-radius:4px;font-size:12px;color:#6b5316;margin-bottom:12px}
.hint b{color:#4a3a0d}
.src{font-size:11px;color:var(--mut);margin-top:8px}

/* ---------- inventory ---------- */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--tx2);align-items:center}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:-1px}
.consist{display:flex;gap:3px;align-items:stretch;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.cc{min-width:44px;height:38px;border:1px solid var(--line);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--mut);background:#fafbfc;flex-shrink:0}
.cc b{font-size:11px;color:var(--tx2)}
.cc.s{background:var(--goldbg);border-color:var(--goldln);color:var(--gold)} .cc.s b{color:var(--gold)}
.cc.y{background:var(--bluebg);border-color:var(--blueln);color:var(--blue)} .cc.y b{color:var(--blue)}

.carline{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:5px;margin-bottom:6px;background:#fff;overflow:hidden}
.carhd{width:126px;flex-shrink:0;padding:9px 10px;border-right:1px solid var(--line2);background:#fafbfc}
.carhd b{font-size:12px;display:block}
.carhd span{font-size:10px;color:var(--mut)}
.rooms{display:flex;gap:6px;padding:8px 10px;flex-wrap:wrap;flex:1}
.rm{width:96px;border:1px solid var(--line);border-radius:4px;padding:5px 6px;cursor:pointer;background:#fff;position:relative}
.rm:hover{box-shadow:0 0 0 2px rgba(15,124,103,.18);border-color:var(--brand2)}
.rm .no{font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.rm .st{font-size:10px;margin-top:1px}
.beds{display:flex;gap:2px;margin-top:4px}
.bd{flex:1;height:5px;border-radius:2px;background:var(--okbg);border:1px solid #bfe5cc}
.bd.hold{background:var(--holdbg);border-color:#eccb92}
.bd.lock{background:var(--lockbg);border-color:#cfbcf7}
.bd.deposit{background:var(--depbg);border-color:#a9dfe9}
.bd.sold{background:var(--soldbg);border-color:#eec0bb}
.bd.blocked{background:var(--blkbg);border-color:#d3d8e0}
.rm.avail{background:var(--okbg);border-color:#bfe5cc} .rm.avail .st{color:var(--ok)}
.rm.hold{background:var(--holdbg);border-color:#eccb92} .rm.hold .st{color:var(--hold)}
.rm.lock{background:var(--lockbg);border-color:#cfbcf7} .rm.lock .st{color:var(--lock)}
.rm.deposit{background:var(--depbg);border-color:#a9dfe9} .rm.deposit .st{color:var(--dep)}
.rm.sold{background:var(--soldbg);border-color:#eec0bb} .rm.sold .st{color:var(--sold)}
.rm.blocked{background:var(--blkbg);border-color:#d3d8e0} .rm.blocked .st{color:var(--blk)}
.rm.mix{background:#fff}
.rm.mix .st{color:var(--tx2)}

/* client view */
.cview{border:1px solid var(--line);border-radius:6px;padding:0;overflow:hidden;background:#fff;max-width:360px}
.cvhd{background:linear-gradient(135deg,#0d5b4c,#128a70);color:#fff;padding:12px 14px}
.cvhd b{font-size:14px}.cvhd div{font-size:11px;opacity:.85}
.cvrow{padding:11px 14px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center}
.cvrow:last-child{border:0}
.cvrow .n{font-size:13px;font-weight:600}
.cvrow .p{font-size:11px;color:var(--mut)}
.cvrow .r{text-align:right}
.cvrow .pr{color:#c0392b;font-weight:600;font-size:15px}
.cvrow .pr small{font-weight:400;font-size:10px;color:var(--mut)}
.stk{font-size:11px;margin-top:2px}
.stk.a{color:var(--ok)}.stk.b{color:#d97706}.stk.c{color:var(--sold)}

/* drawer */
#mask{position:fixed;inset:0;background:rgba(15,23,32,.35);display:none;z-index:50}
#dw{position:fixed;top:0;right:0;bottom:0;width:420px;background:#fff;box-shadow:-4px 0 18px rgba(0,0,0,.12);transform:translateX(100%);transition:.22s;z-index:51;display:flex;flex-direction:column}
#dw.open{transform:none}
#dwh{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
#dwh b{font-size:14px}
#dwb{padding:16px;overflow:auto;flex:1}
#dwf{padding:11px 16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.kv{display:grid;grid-template-columns:88px 1fr;gap:6px 10px;font-size:12px;margin-bottom:14px}
.kv .k{color:var(--mut)}
.sect{font-size:12px;font-weight:600;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--line2)}
.close{cursor:pointer;color:var(--mut);font-size:18px;line-height:1}

/* misc */
.bar{height:6px;background:#eef1f4;border-radius:3px;overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--brand2)}
.flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;font-size:11px}
.fl{padding:4px 10px;border:1px solid var(--line);border-radius:3px;background:#fafbfc;color:var(--tx2)}
.fl.on{background:var(--brand);border-color:var(--brand);color:#fff}
.fl.done{background:var(--okbg);border-color:#bfe5cc;color:var(--ok)}
.fa{color:var(--mut);padding:0 5px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:12px}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.todo{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:12px}
.todo:last-child{border:0}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.paper{background:#fff;border:1px solid var(--line);padding:22px;font-size:12px}
.paper h4{text-align:center;font-size:15px;margin-bottom:3px}
.paper .pm{text-align:center;color:var(--mut);font-size:11px;margin-bottom:14px}
.sig{margin-top:18px;display:flex;justify-content:space-between;color:var(--tx2);font-size:11px}
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <div class="logo"><b>昆明号 · 专列 ERP</b><span>Charter Train ERP v0.1 · 原型</span></div>
    <div id="nav"></div>
    <div class="sfoot">一期：库存 / 销售 / 订单 / 操作 / 财务</div>
  </div>
  <div id="main">
    <div id="top">
      <h1 id="ttl">工作台</h1>
      <span class="crumb" id="crumb"></span>
      <span class="spacer"></span>
      <div class="usr"><span>销售部 · 计调组</span><div class="avt">兰</div></div>
    </div>
    <div id="view"></div>
  </div>
</div>
<div id="mask"></div>
<div id="dw">
  <div id="dwh"><b id="dwt"></b><span class="spacer"></span><span class="close" onclick="closeDw()">×</span></div>
  <div id="dwb"></div>
  <div id="dwf" style="display:none"></div>
</div>

<script>
/* =====================================================================
   数据层 —— 全部来自两份源文件，未编造的字段已标注「假设」
   来源A《昆明号-列车介绍3.0.pdf》p6/p9/p10
   来源B《【同】昆明号10月-12月销售政策-定稿.pdf》
   ===================================================================== */
const TODAY = new Date('2026-07-14');

// 编组（来源A p6：全列16辆 / 72包厢 / 定员264）
const CONSIST = [
  {no:'1', kind:'发电车', t:'x'}, {no:'2', kind:'工作车', t:'x'},
  {no:'3', kind:'尊享01', t:'s'}, {no:'4', kind:'尊享02', t:'s'},
  {no:'5', kind:'尊享03', t:'s'}, {no:'6', kind:'尊享04', t:'s'},
  {no:'7', kind:'彩云多功能', t:'x'}, {no:'8', kind:'特色餐车', t:'x'},
  {no:'9', kind:'品质01', t:'y'}, {no:'10',kind:'品质02', t:'y'},
  {no:'11',kind:'品质03', t:'y'}, {no:'12',kind:'品质04', t:'y'},
  {no:'13',kind:'品质05', t:'y'}, {no:'14',kind:'品质06', t:'y'},
  {no:'15',kind:'品质07', t:'y'}, {no:'16',kind:'品质08', t:'y'}
];

// 房型（来源A p9/p10）
const ROOMTYPE = {
  S:{code:'S', name:'安途尊享房', star:'5钻', cars:4, perCar:6, rooms:24, cap:3, minPax:2,
     bath:'独立卫浴（干湿分离）', bed:'200×150 双人床 + 200×75 上铺 + 抽拉沙发床',
     rule:'不接受单人拼房，整间售卖', color:'gold'},
  Y:{code:'Y', name:'悦途品质房', star:'4钻', cars:8, perCar:6, rooms:48, cap:4, minPax:1,
     bath:'公共卫浴（每车厢 2淋浴+2洗漱+2卫生间）', bed:'上下铺 200×75 ×4',
     rule:'可按铺位散拼；2人可加价独享整间', color:'blue'}
};

// 价格（来源B，单位 元/人；F=同业返佣，结算价=门市价-返佣）
const PRICE = {
  S:{ two:{label:'两人入住',   list:12999, f:1800},
      third:{label:'第三人（成人需补地面单房差）', list:7999, f:1000},
      single:{label:'单房差', list:1200, f:0} },
  Y:{ upper:{label:'上铺',     list:5999, f:1000},
      lower:{label:'下铺',     list:6399, f:1000},
      excl :{label:'两人享专属包厢', list:8299, f:1200},
      single:{label:'单房差', list:700, f:0} }
};
const REFUND = [
  {d:'30天以上', r:'免费取消（同一客户累计取消3间及以上，收10%取消费）', pct:0},
  {d:'15–30天',  r:'订单金额的30%作为取消费', pct:30},
  {d:'8–14天',   r:'订单金额的50%作为取消费', pct:50},
  {d:'1–7天',    r:'订单金额的70%作为取消费', pct:70},
  {d:'当天',     r:'订单金额的90%作为取消费', pct:90}
];
const PRODUCT = '环云南9天（蒙自·建水·腾冲·普洱·版纳·抚仙湖）';
const DEPS = [
  {id:'KM260925', date:'2026-09-25'},
  {id:'KM261017', date:'2026-10-17'},
  {id:'KM261114', date:'2026-11-14'},
  {id:'KM261219', date:'2026-12-19'},
  {id:'KM261228', date:'2026-12-28'}
];
// 地接站点（来源B线路名）
const STOPS=['蒙自','建水','腾冲','普洱','西双版纳','抚仙湖'];
const AGENTS=['红河国旅（蒙自·建水）','腾冲康辉地接','普洱茶乡国旅','版纳雨林假日','玉溪抚仙湖接待中心'];

/* ---------- 状态机（会议共识 + 老柯原话「提前锁半年，半年内不下定金则释放」） ---------- */
const ST = {
  avail  :{n:'可售',   c:'t-ok'},
  hold   :{n:'预留',   c:'t-hold'},
  lock   :{n:'锁仓',   c:'t-lock'},
  deposit:{n:'已付定', c:'t-dep'},
  sold   :{n:'已成交', c:'t-sold'},
  blocked:{n:'不可售', c:'t-blk'}
};

/* ---------- 伪随机生成演示库存（种子固定，每次打开一致） ---------- */
function rng(seed){let s=seed;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff}}
const CHANNELS=['银发俱乐部·北京朝阳','中旅·云南分社','某机构团（国企工会）','携程专列频道','未签约渠道分销'];
const NAMES=['王建国','李淑芬','张伟','陈桂英','刘志强','杨秀兰','赵德海','孙丽华','周国庆','吴金枝','郑福生','冯玉梅'];

// 按 load 抽一个状态（同一分布用于「整间」与「单铺」两种粒度）
function draw(r,load){
  const x=r();
  if(x<load*0.60) return 'sold';
  if(x<load*0.76) return 'deposit';
  if(x<load*0.88) return 'hold';
  if(x<load*1.00) return 'lock';
  return 'avail';
}
function buildInv(dep,idx){
  const r=rng(9001+idx*137);
  const load=[0.86,0.71,0.55,0.42,0.63][idx]; // 越近的班期越满
  const cars=[];
  CONSIST.filter(c=>c.t!=='x').forEach(c=>{
    const T=c.t==='s'?'S':'Y';
    const rooms=[];
    for(let i=1;i<=6;i++){
      const roomNo=c.no.padStart(2,'0')+'-'+String(i).padStart(2,'0');
      const nb=T==='S'?3:4;
      let beds;
      if(T==='S'){
        // 尊享房：整间售卖、不接受单人拼房 → 房间级抽一次状态，占 2 人或 3 人
        const st=draw(r,load), third=r()<0.4;
        beds=Array.from({length:nb},(_,b)=> st==='avail'?'avail':(b<2||third?st:'avail'));
      }else{
        // 品质房：铺位级库存，上/下铺可散拼
        beds=Array.from({length:nb},()=>draw(r,load));
      }
      rooms.push({no:roomNo,car:c.no,carName:c.kind,type:T,beds,
        ch: CHANNELS[Math.floor(r()*CHANNELS.length)],
        exp: new Date(new Date(dep.date).getTime()-Math.floor(30+r()*150)*864e5)});
    }
    cars.push({...c,type:T,rooms});
  });
  return cars;
}
const INV={}; DEPS.forEach((d,i)=>INV[d.id]=buildInv(d,i));

function roomState(rm){
  const s=new Set(rm.beds);
  if(s.size===1) return [...s][0];
  const pri=['sold','deposit','lock','hold','avail'];
  if(rm.type==='S') return pri.find(p=>s.has(p));
  return 'mix';
}
function stats(depId){
  const o={avail:0,hold:0,lock:0,deposit:0,sold:0,blocked:0,paxSold:0,rev:0,roomsAvail:0};
  INV[depId].forEach(c=>c.rooms.forEach(rm=>{
    rm.beds.forEach(b=>o[b]++);
    const st=roomState(rm); if(st==='avail')o.roomsAvail++;
    rm.beds.forEach(b=>{
      if(b==='sold'||b==='deposit'){
        o.paxSold++;
        o.rev += rm.type==='S'?PRICE.S.two.list:PRICE.Y.lower.list;
      }
    });
  }));
  return o;
}
function days(d){return Math.round((new Date(d)-TODAY)/864e5)}
function refundTier(d){const n=days(d);if(n>30)return REFUND[0];if(n>=15)return REFUND[1];if(n>=8)return REFUND[2];if(n>=1)return REFUND[3];return REFUND[4]}
function money(n){return '¥'+n.toLocaleString('zh-CN')}

/* ---------- 订单（手工构造，覆盖 To B / To C 与全部单据状态） ---------- */
const ORDERS=[

function clientPanel(s){

  const yBeds=INV[curDep].filter(c=>c.type==='Y').reduce((a,c)=>a+c.rooms.reduce((x,r)=>x+r.beds.filter(b=>b==='avail').length,0),0);
  const lvl=n=>n===0?['c','已售罄']:n<=3?['b',`仅剩最后 ${n} ${n===sAvail?'间':'个'}，手慢无`]:n<=8?['b','库存紧张']:['a','库存充足'];
  const a=lvl(sAvail),b=lvl(yBeds);
  const dep=DEPS.find(d=>d.id===curDep);

function openRoom(depId,no){
  let rm,car;
  INV[depId].forEach(c=>c.rooms.forEach(r=>{if(r.no===no){rm=r;car=c}}));
  const T=ROOMTYPE[rm.type], P=PRICE[rm.type];
  const st=roomState(rm);
  const priceRows = rm.type==='S'
    ? [P.two,P.third,P.single] : [P.upper,P.lower,P.excl,P.single];
  dw(`包间 ${rm.no}`,`
    <div class="kv">
      <div class="k">车厢</div><div>${car.no}车 · ${car.kind}</div>
      <div class="k">房型</div><div><span class="tag t-${T.color==='gold'?'gold':'blue'}">${T.name} ${T.star}</span></div>
      <div class="k">床型</div><div>${T.bed}</div>
      <div class="k">卫浴</div><div>${T.bath}</div>
      <div class="k">售卖规则</div><div>${T.rule}</div>
      <div class="k">当前状态</div><div><span class="tag ${(ST[st]||{c:'t-gray'}).c}">${(ST[st]||{n:'部分占用'}).n}</span></div>
    </div>
    <div class="sect">铺位级库存</div>
    <table><thead><tr><th>铺位</th><th>类型</th><th>状态</th><th>占用方</th></tr></thead><tbody>
    ${rm.beds.map((b,i)=>{
      const bn = rm.type==='S' ? ['双人床A','双人床B','上铺'][i] : ['下铺1','下铺2','上铺1','上铺2'][i];
      const own = b==='avail'?'—':b==='lock'?rm.ch:b==='hold'?rm.ch+'（预留）':NAMES[(i+rm.no.charCodeAt(4))%NAMES.length];
      return `<tr><td>${i+1}</td><td>${bn}</td><td><span class="tag ${ST[b].c}">${ST[b].n}</span></td><td>${own}</td></tr>`;
    }).join('')}
    </tbody></table>

    <div class="sect">适用价格（门市 / 返佣 / 同业结算）</div>
    <table><thead><tr><th>价类</th><th class="num">门市价</th><th class="num">返佣 F</th><th class="num">同业结算价</th></tr></thead><tbody>
    ${priceRows.map(p=>`<tr><td>${p.label}</td><td class="num">${money(p.list)}</td><td class="num">${p.f?'-'+money(p.f):'—'}</td><td class="num"><b>${money(p.list-p.f)}</b></td></tr>`).join('')}
    </tbody></table>

    ${(st==='lock'||st==='hold')?`<div class="sect">锁仓 / 预留规则</div>
    <div class="kv"><div class="k">占用渠道</div><div>${rm.ch}</div>
    <div class="k">释放日期</div><div>${rm.exp.toISOString().slice(0,10)}</div>
    <div class="k">规则</div><div>到期未收定金 → 自动释放回可售池（可提前锁 6 个月）</div></div>`:''}
  `,[
    {t:'锁仓/预留',f:"alert('演示：选择渠道 + 释放日期 → 库存转为锁仓')"},
    {t:'直接下单',f:"alert('演示：跳转订单创建，带入班期/车厢/包间/价类')",p:1}
  ]);
}

    <table><thead><tr><th>订单号</th><th>班期</th><th>付款方</th><th>渠道</th><th class="num">门市价</th><th class="num">返佣</th><th class="num">应收</th><th class="num">已收</th><th class="num">未收</th><th>账期</th><th>状态</th></tr></thead><tbody>
    ${ar.map(o=>{
      const due=o.list-o.fy;
      const rec=(o.st==='paid'||o.st==='settled')?due:o.st==='deposit'?Math.round(due*0.3):0;
      const over=(o.st==='confirmed');
      return `<tr><td class="mono">${o.id}</td><td>${DEPS.find(d=>d.id===o.dep).date}</td><td>${o.cust}</td>
        <td><span class="tag ${o.ch==='TOB'?'t-blue':'t-gold'}">${o.ch==='TOB'?'To B':'To C'}</span></td>
        <td class="num">${money(o.list)}</td><td class="num" style="color:var(--sold)">${o.fy?'-'+money(o.fy):'—'}</td>
        <td class="num"><b>${money(due)}</b></td><td class="num">${money(rec)}</td>
        <td class="num" style="color:${due-rec?'var(--sold)':'var(--mut)'}">${due-rec?money(due-rec):'—'}</td>
        <td>${o.ch==='TOB'?'发车前15天':'即时'}</td>
        <td>${rec===due?'<span class="tag t-ok">已结清</span>':over?'<span class="tag t-sold">逾期未付</span>':'<span class="tag t-hold">待收</span>'}</td></tr>`;
    }).join('')}
    </tbody></table>
    <div class="src">To B 应收按渠道账期自动预警；To C 为即时收款（小程序/客服链接）。会议原话：「应收应该大部分都是应收账款…除非地接落地时做地接款结算」。</div>`
    :`
    <table><thead><tr><th>结算单号</th><th>班期</th><th>供应商（地接社）</th><th>站点</th><th class="num">人数</th><th class="num">应付</th><th class="num">已付</th><th>状态</th></tr></thead><tbody>
    ${AGENTS.map((a,i)=>{const amt=264*[68,55,120,80,150][i]+10800+3000;
      return `<tr><td class="mono">JS2607140${i+1}</td><td>${DEPS[0].date}</td><td>${a}</td><td>${STOPS[i]}</td><td class="num">264</td>
      <td class="num"><b>${money(amt)}</b></td><td class="num">${i<2?money(amt):'¥0'}</td>
      <td>${i<2?'<span class="tag t-ok">已付</span>':'<span class="tag t-hold">待审核</span>'}</td></tr>`}).join('')}
    </tbody></table>
    <div class="src">地接款在专列靠站落地后结算，金额随实际成团人数自动回算。</div>`}
  </div></div>`;
}

/* ---------------- drawer ---------------- */
function dw(title,html,btns){
  document.getElementById('dwt').textContent=title;
  document.getElementById('dwb').innerHTML=html;
  const f=document.getElementById('dwf');
  if(btns&&btns.length){f.style.display='flex';f.innerHTML=btns.map(b=>`<button class="btn ${b.p?'p':''}" onclick="${b.f}">${b.t}</button>`).join('')}
  else f.style.display='none';
  document.getElementById('mask').style.display='block';
  document.getElementById('dw').classList.add('open');
}
function closeDw(){document.getElementById('dw').classList.remove('open');document.getElementById('mask').style.display='none'}
document.getElementById('mask').onclick=closeDw;

nav();render();
