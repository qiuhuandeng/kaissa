<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI使用统计 - 凯撒旅游</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <script src="../../shared/nav-admin.js"></script>

  <main>
    <section class="list-page-panel">
      <div class="list-page-head">
        <div>
          <h1 class="page-title">AI使用统计</h1>
        </div>
        <div class="list-page-actions">
          <button class="btn btn-secondary" type="button">导出明细</button>
        </div>
      </div>
    </section>

    <section class="kpi-grid kpi-grid-4">
      <article class="kpi-card blue">
        <div class="kpi-label">本月调用</div>
        <div class="kpi-value">82,460</div>
        <div class="kpi-sub">较上月 +12.4%</div>
      </article>
      <article class="kpi-card green">
        <div class="kpi-label">成功率</div>
        <div class="kpi-value">99.2%</div>
        <div class="kpi-sub">最近 24 小时</div>
      </article>
      <article class="kpi-card orange">
        <div class="kpi-label">本月费用</div>
        <div class="kpi-value">¥82,600</div>
        <div class="kpi-sub">预算使用 82.6%</div>
      </article>
      <article class="kpi-card purple">
        <div class="kpi-label">高费用场景</div>
        <div class="kpi-value">3</div>
        <div class="kpi-sub">需持续观察</div>
      </article>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">场景调用排行</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>业务场景</th>
              <th>调用次数</th>
              <th>平均响应</th>
              <th>费用</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>行程生成</td>
              <td>18,320</td>
              <td>1,560ms</td>
              <td>¥24,800</td>
              <td><span class="tag tag-green">正常</span></td>
            </tr>
            <tr>
              <td>签证审查</td>
              <td>9,860</td>
              <td>2,420ms</td>
              <td>¥21,300</td>
              <td><span class="tag tag-orange">高费用</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="data-note">
        <strong>数据口径说明</strong>
        <span>统计口径：按AI网关请求聚合；数据更新频率：每小时；数据范围：当前租户内全部业务端AI调用。</span>
      </div>
    </section>
  </main>
</body>
</html>
