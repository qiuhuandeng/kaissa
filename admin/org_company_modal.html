<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑主体公司 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-admin.js"></script>

  <main class="org-admin-page org-control-page org-company-modal-page" aria-hidden="true">
    <section class="org-admin-layout">
      <aside class="org-admin-tree-panel" aria-label="组织架构树">
        <div class="org-admin-panel-head">
          <h1 class="org-admin-panel-title">组织架构树</h1>
          <a class="btn btn-primary" href="org_company_modal.html">+ 新增节点</a>
        </div>
        <div class="org-admin-tree">
          <div class="org-admin-tree-node is-open" data-node-type="根组织">
            <div class="org-admin-tree-row active">
              <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
              <button class="org-admin-tree-name" type="button">凯撒旅游集团</button>
            </div>
            <div class="org-admin-tree-children">
              <div class="org-admin-tree-node is-open" data-node-type="产业板块">
                <div class="org-admin-tree-row">
                  <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
                  <button class="org-admin-tree-name" type="button">出境游板块</button>
                </div>
                <div class="org-admin-tree-children">
                  <div class="org-admin-tree-node is-open" data-node-type="主体公司">
                    <div class="org-admin-tree-row">
                      <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
                      <button class="org-admin-tree-name" type="button">凯撒国际旅游</button>
                    </div>
                    <div class="org-admin-tree-children">
                      <div class="org-admin-tree-node is-open" data-node-type="管理中心">
                        <div class="org-admin-tree-row">
                          <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
                          <button class="org-admin-tree-name" type="button">出境游管理中心</button>
                        </div>
                        <div class="org-admin-tree-children">
                          <div class="org-admin-tree-node" data-node-type="部门">
                            <div class="org-admin-tree-row">
                              <span class="org-admin-tree-toggle placeholder"></span>
                              <button class="org-admin-tree-name" type="button">欧洲产品部</button>
                            </div>
                          </div>
                          <div class="org-admin-tree-node" data-node-type="门市">
                            <div class="org-admin-tree-row">
                              <span class="org-admin-tree-toggle placeholder"></span>
                              <button class="org-admin-tree-name" type="button">北京朝阳门店</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="org-admin-tree-node" data-node-type="产业板块">
                <div class="org-admin-tree-row">
                  <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
                  <button class="org-admin-tree-name" type="button">邮轮板块</button>
                </div>
              </div>
              <div class="org-admin-tree-node" data-node-type="产业板块">
                <div class="org-admin-tree-row">
                  <button class="org-admin-tree-toggle" type="button" aria-label="展开或收起"></button>
                  <button class="org-admin-tree-name" type="button">定制旅游板块</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section class="org-admin-detail-panel">
        <div class="org-admin-workbar">
          <nav class="tab-bar org-admin-tabs" aria-label="组织架构管理标签">
            <button class="tab-item active" type="button">主体公司管理</button>
            <button class="tab-item" type="button">管理中心管理</button>
            <button class="tab-item" type="button">部门/门市管理</button>
            <button class="tab-item" type="button">跨主体调拨记录</button>
          </nav>
          <a class="btn btn-primary" href="org_company_modal.html">+ 新增主体公司</a>
        </div>
        <section class="org-admin-tab-panel active">
          <div class="org-admin-data-card">
            <div class="org-admin-table-head">
              <div class="org-admin-table-context">当前查看：<strong>凯撒旅游集团</strong><span>关联主体公司</span></div>
              <div class="org-admin-table-count">共 3 家主体公司</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>公司名称</th>
                    <th>统一信用代码</th>
                    <th>法人代表</th>
                    <th>独立核算状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>凯撒国际旅游有限公司</td>
                    <td>91110105MA001X9A2C</td>
                    <td>郑传辉</td>
                    <td><span class="tag tag-green">开启</span></td>
                    <td><a class="btn-text" href="org_company_modal.html">编辑</a><button class="btn-text danger" type="button">停用</button></td>
                  </tr>
                  <tr>
                    <td>凯撒欧洲旅游(德国)股份公司</td>
                    <td>91110105MA90XU917A</td>
                    <td>Jean-Paul</td>
                    <td><span class="tag tag-green">开启</span></td>
                    <td><a class="btn-text" href="org_company_modal.html">编辑</a><button class="btn-text danger" type="button">停用</button></td>
                  </tr>
                  <tr>
                    <td>凯撒定制极光极地旅游有限公司</td>
                    <td>91110105MA42Y882C7</td>
                    <td>陈立峰</td>
                    <td><span class="tag tag-gray">关闭</span></td>
                    <td><a class="btn-text" href="org_company_modal.html">编辑</a><button class="btn-text" type="button">启用</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <div class="modal-overlay drawer-overlay show" aria-hidden="false">
    <section class="modal drawer-modal org-company-drawer" role="dialog" aria-modal="true" aria-labelledby="companyDrawerTitle">
      <div class="modal-header">
        <h2 id="companyDrawerTitle" class="modal-title">编辑主体公司</h2>
        <a class="modal-close" href="org.html" aria-label="关闭">×</a>
      </div>
      <form>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="companyName">公司名称 <span class="req">*</span></label>
            <input id="companyName" class="form-control" type="text" value="凯撒国际旅游有限公司" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="creditCode">统一信用代码 <span class="req">*</span></label>
            <input id="creditCode" class="form-control" type="text" value="91110105MA001X9A2C" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="legalPerson">法人代表 <span class="req">*</span></label>
            <input id="legalPerson" class="form-control" type="text" value="郑传辉" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="accountingSwitch">独立核算开关</label>
            <div class="org-toggle-control">
              <button id="accountingSwitch" class="org-toggle-switch is-on" type="button" role="switch" aria-checked="true"></button>
              <span class="org-toggle-label">开启</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="subjectSpace">科目空间编号</label>
            <input id="subjectSpace" class="form-control" type="text" value="NC-KS-INTL-001">
            <div class="field-help">用于区分不同主体的NC科目空间</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="billingDays">账期天数</label>
            <div class="org-input-with-unit">
              <input id="billingDays" class="form-control" type="number" value="30" min="0">
              <span>天</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="ncRule">NC推送规则</label>
            <select id="ncRule" class="form-control">
              <option>实时推送</option>
              <option selected>每日批量</option>
              <option>手动触发</option>
            </select>
          </div>
        </div>
        <div class="modal-footer org-company-drawer-footer">
          <a class="btn btn-secondary" href="org.html">取消</a>
          <button class="btn btn-primary" type="submit">保存</button>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
