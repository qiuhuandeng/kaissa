<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统主题 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-admin.js"></script>

  <main class="theme-admin-page">
    <section class="page-workbar">
      <div class="page-title-row">
        <h1 class="page-title">系统主题</h1>
        <span class="theme-scope-tag">仅商户端生效</span>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" type="button" data-theme-reset>恢复默认</button>
        <button class="btn btn-primary" type="button" data-theme-save>保存并应用</button>
      </div>
    </section>

    <section class="theme-config-grid">
      <section class="theme-config-main">
        <section class="theme-config-section">
          <div class="theme-section-head">
            <h2 class="card-title">业务主体与菜单配色</h2>
            <span>控制商户端主色、菜单背景、按钮和选中态</span>
          </div>
          <div class="theme-option-grid theme-color-option-grid" role="radiogroup" aria-label="业务主体与菜单配色">
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-theme-option="blue">
              <span class="theme-option-top">
                <span class="theme-option-title">蓝色标准版</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">延续当前业务主色，适合默认上线与稳定演示。</span>
              <span class="theme-color-strip" aria-hidden="true"><span></span><span></span><span></span></span>
            </button>
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-theme-option="purple">
              <span class="theme-option-top">
                <span class="theme-option-title">紫色高级版</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">替换为紫色业务主色，导航选中和关键按钮同步变化。</span>
              <span class="theme-color-strip" aria-hidden="true"><span></span><span></span><span></span></span>
            </button>
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-theme-option="teal">
              <span class="theme-option-top">
                <span class="theme-option-title">曜石青专业版</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">深青主色配冷灰浅底，适合高频后台和长时间经营管理场景。</span>
              <span class="theme-color-strip" aria-hidden="true"><span></span><span></span><span></span></span>
            </button>
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-theme-option="onyx">
              <span class="theme-option-top">
                <span class="theme-option-title">墨金典藏版</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">开单橙金搭配墨绿菜单背景，适合强调品牌质感的经营后台。</span>
              <span class="theme-color-strip" aria-hidden="true"><span></span><span></span><span></span></span>
            </button>
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-theme-option="titan">
              <span class="theme-option-top">
                <span class="theme-option-title">铂钛灰蓝版</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">钛灰菜单搭配冷雾浅底和灰蓝主色，适合克制、长期使用的企业后台。</span>
              <span class="theme-color-strip" aria-hidden="true"><span></span><span></span><span></span></span>
            </button>
          </div>
        </section>

        <section class="theme-config-section">
          <div class="theme-section-head">
            <h2 class="card-title">菜单结构</h2>
            <span>控制商户端后台导航布局</span>
          </div>
          <div class="theme-option-grid" role="radiogroup" aria-label="菜单结构">
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-layout-option="double">
              <span class="theme-option-top">
                <span class="theme-option-title">左侧双栏</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">一级模块和二三级菜单都在左侧，适合高频业务录入。</span>
              <span class="theme-layout-preview layout-double" aria-hidden="true">
                <span class="preview-primary"></span><span class="preview-secondary"></span><span class="preview-work"></span>
              </span>
            </button>
            <button class="theme-option-card" type="button" role="radio" aria-checked="false" data-layout-option="t">
              <span class="theme-option-top">
                <span class="theme-option-title">T 型导航</span>
                <span class="theme-radio-dot" aria-hidden="true"></span>
              </span>
              <span class="theme-option-desc">一级模块横向置顶，二三级菜单保留左侧，信息空间更开阔。</span>
              <span class="theme-layout-preview layout-t" aria-hidden="true">
                <span class="preview-primary"></span><span class="preview-secondary"></span><span class="preview-work"></span>
              </span>
            </button>
          </div>
        </section>
      </section>

      <aside class="theme-preview-panel">
        <div class="theme-preview-head">
          <h2 class="card-title">商户端效果预览</h2>
          <span class="tag tag-blue" data-theme-current>蓝色 / 左侧双栏</span>
        </div>
        <div class="theme-live-preview" data-theme-preview data-preview-theme="blue" data-preview-layout="double">
          <div class="theme-preview-shell">
            <div class="theme-preview-primary"></div>
            <div class="theme-preview-secondary"></div>
            <div class="theme-preview-content">
              <div class="theme-preview-topbar"></div>
              <div class="theme-preview-body">
                <div class="theme-preview-card">
                  <div class="theme-preview-kpis">
                    <div class="theme-preview-kpi"></div>
                    <div class="theme-preview-kpi"></div>
                  </div>
                  <div class="theme-preview-button"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    (function () {
      var themeKey = "caesar-merchant-theme";
      var layoutKey = "caesar-merchant-nav-layout";
      var state = {
        theme: normalizeTheme(localStorage.getItem(themeKey)),
        navLayout: normalizeLayout(localStorage.getItem(layoutKey))
      };
      var labels = {
        blue: "蓝色",
        purple: "紫色",
        teal: "曜石青",
        onyx: "墨金",
        titan: "铂钛灰蓝",
        double: "左侧双栏",
        t: "T 型导航"
      };

      function normalizeTheme(value) {
        return value === "purple" || value === "teal" || value === "onyx" || value === "titan" ? value : "blue";
      }

      function normalizeLayout(value) {
        return value === "t" ? "t" : "double";
      }

      function updateOptionCards() {
        document.querySelectorAll("[data-theme-option]").forEach(function (card) {
          var active = card.dataset.themeOption === state.theme;
          card.classList.toggle("active", active);
          card.setAttribute("aria-checked", String(active));
        });
        document.querySelectorAll("[data-layout-option]").forEach(function (card) {
          var active = card.dataset.layoutOption === state.navLayout;
          card.classList.toggle("active", active);
          card.setAttribute("aria-checked", String(active));
        });
      }

      function updatePreview() {
        var preview = document.querySelector("[data-theme-preview]");
        var current = document.querySelector("[data-theme-current]");
        if (preview) {
          preview.dataset.previewTheme = state.theme;
          preview.dataset.previewLayout = state.navLayout;
        }
        if (current) {
          current.textContent = labels[state.theme] + " / " + labels[state.navLayout];
          current.className = state.theme === "purple" ? "tag tag-purple" : state.theme === "teal" ? "tag tag-green" : state.theme === "onyx" ? "tag tag-orange" : "tag tag-blue";
        }
      }

      function persist(showToast) {
        localStorage.setItem(themeKey, state.theme);
        localStorage.setItem(layoutKey, state.navLayout);
        if (showToast && window.caesarUI && window.caesarUI.toast) {
          window.caesarUI.toast("商户端主题配置已保存", { type: "success" });
        }
      }

      function render() {
        updateOptionCards();
        updatePreview();
      }

      document.querySelectorAll("[data-theme-option]").forEach(function (card) {
        card.addEventListener("click", function () {
          state.theme = normalizeTheme(card.dataset.themeOption);
          render();
          persist(false);
        });
      });

      document.querySelectorAll("[data-layout-option]").forEach(function (card) {
        card.addEventListener("click", function () {
          state.navLayout = normalizeLayout(card.dataset.layoutOption);
          render();
          persist(false);
        });
      });

      document.querySelector("[data-theme-save]").addEventListener("click", function () {
        persist(true);
      });

      document.querySelector("[data-theme-reset]").addEventListener("click", function () {
        state.theme = "blue";
        state.navLayout = "double";
        render();
        persist(true);
      });

      render();
    })();
  </script>
</body>
</html>
