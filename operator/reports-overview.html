<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经营总览 - 凯撒旅游运营平台</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-operator.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">经营总览</h1>
      </div>
      <div class="list-page-actions">
        <button class="btn btn-secondary" type="button">导出月报</button>
      </div>
    </div>
    <section class="filter-card filter-card-compact">
      <div class="filter-row">
        <div class="filter-item-sm">
          <select>
            <option>近30天</option>
            <option>本月</option>
            <option>本季度</option>
          </select>
        </div>
        <div class="filter-item-sm">
          <select>
            <option>全部套餐</option>
            <option>基础版</option>
            <option>专业版</option>
            <option>旗舰版</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" type="button">查询</button>
          <button class="btn btn-secondary" type="button">重置</button>
        </div>
      </div>
    </section>
  </section>

  <section class="operator-metric-grid">
    <article class="operator-metric-card"><span>付费租户</span><strong>38</strong><em>较上月 +4</em></article>
    <article class="operator-metric-card"><span>月经常性收入</span><strong>¥426,800</strong><em>较上月 +12.4%</em></article>
    <article class="operator-metric-card"><span>活跃账号</span><strong>1,284</strong><em>日活率 63%</em></article>
    <article class="operator-metric-card"><span>平台接口调用</span><strong>2.86M</strong><em>成功率 99.92%</em></article>
  </section>

  <section class="operator-work-grid">
    <section class="operator-section-card">
      <div class="operator-section-head">
        <h2>租户健康度排行</h2>
        <a class="btn-text" href="reports-drill.html">查看下钻</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>租户</th><th>套餐</th><th>活跃账号</th><th>模块启用</th><th>近30日订单</th><th>健康度</th><th>风险</th></tr></thead>
          <tbody>
            <tr><td>凯撒旅游（北京）</td><td><span class="tag tag-orange">旗舰版</span></td><td>50/100</td><td>18/20</td><td>3,482</td><td><span class="tag tag-green">高</span></td><td>无</td></tr>
            <tr><td>凯撒亿步（上海）</td><td><span class="tag tag-orange">旗舰版</span></td><td>32/100</td><td>16/20</td><td>1,905</td><td><span class="tag tag-green">高</span></td><td>无</td></tr>
            <tr><td>体坛旅游</td><td><span class="tag tag-blue">专业版</span></td><td>18/50</td><td>12/15</td><td>864</td><td><span class="tag tag-orange">中</span></td><td>30天后续费</td></tr>
            <tr><td>航服旅游</td><td><span class="tag tag-gray">基础版</span></td><td>8/20</td><td>7/9</td><td>214</td><td><span class="tag tag-orange">中</span></td><td>模板下发失败</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="operator-section-card">
      <h2>模块使用分布</h2>
      <div class="operator-chart-bars">
        <div class="operator-chart-bar"><span>销售订单</span><div class="operator-chart-track"><i class="operator-chart-fill w-92"></i></div><strong>92%</strong></div>
        <div class="operator-chart-bar"><span>产品中心</span><div class="operator-chart-track"><i class="operator-chart-fill green w-88"></i></div><strong>88%</strong></div>
        <div class="operator-chart-bar"><span>财务对账</span><div class="operator-chart-track"><i class="operator-chart-fill orange w-64"></i></div><strong>64%</strong></div>
        <div class="operator-chart-bar"><span>AI工具</span><div class="operator-chart-track"><i class="operator-chart-fill purple w-41"></i></div><strong>41%</strong></div>
      </div>
    </aside>
  </section>
</body>
</html>
