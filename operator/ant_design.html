<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双栏后台视觉样板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .quiet-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    .quiet-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .quiet-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
  </style>
</head>
<body class="bg-[#f6f7f9] text-neutral-800 antialiased overflow-hidden h-screen w-full flex relative select-none">
  <aside class="hidden md:flex flex-col w-[84px] bg-[#001529] text-white shrink-0 z-30">
    <div class="flex items-center justify-center h-14 w-full border-b border-white/10 bg-[#001b33]">
      <div class="w-8 h-8 rounded-md bg-[#3568F5] flex items-center justify-center">
        <span class="font-semibold text-white text-sm">C</span>
      </div>
    </div>
    <nav id="primary-nav-container" class="flex-1 w-full py-3 space-y-1 quiet-scrollbar overflow-y-auto overflow-x-hidden"></nav>
  </aside>

  <aside id="secondary-sidebar" class="hidden md:flex flex-col bg-white border-r border-[#edf1f7] shrink-0 z-20 relative w-[172px] opacity-100">
    <div id="secondary-list-container" class="flex-1 overflow-y-auto py-3.5 space-y-2 px-3 quiet-scrollbar"></div>
    <div class="h-3 shrink-0"></div>
  </aside>

  <div id="mobile-drawer" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-50 md:hidden transition-opacity hidden" onclick="toggleMobileDrawer(false)">
    <div class="w-[260px] h-full bg-white flex" onclick="event.stopPropagation()">
      <div id="mobile-primary-container" class="w-14 bg-[#001529] text-white flex flex-col items-center py-4 space-y-3"></div>
      <div class="flex-1 flex flex-col bg-white">
        <div class="p-3 border-b border-neutral-100 flex items-center justify-between">
          <span id="mobile-secondary-title" class="font-bold text-xs text-neutral-800">服务菜单</span>
          <button class="text-[11px] text-neutral-400" onclick="toggleMobileDrawer(false)">关闭</button>
        </div>
        <div id="mobile-secondary-container" class="p-2 overflow-y-auto flex-1 space-y-3"></div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-14 bg-white border-b border-[#edf1f7] flex items-center justify-between px-5 shrink-0 z-10">
      <div class="flex items-center space-x-2 md:pl-5">
        <button onclick="toggleMobileDrawer(true)" class="md:hidden p-1.5 rounded-lg border border-neutral-200 text-neutral-600 hover:bg-neutral-50 transition-colors">
          <i data-lucide="menu" class="w-4 h-4"></i>
        </button>
        <div id="breadcrumb-container" class="hidden sm:flex items-center space-x-1.5 text-[13px] text-neutral-400 select-none"></div>
      </div>
      <div class="flex items-center space-x-2">
        <button class="group hidden sm:inline-flex h-7 items-center gap-1.5 text-xs text-neutral-600 bg-[#f7f9fc] px-2.5 rounded-full hover:bg-[#eef5ff] transition-colors">
          <span class="inline-flex h-3.5 w-3.5 items-center justify-center rounded-full bg-emerald-50">
            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
          </span>
          <span class="text-neutral-500">生产</span>
          <span class="h-3 w-px bg-neutral-200"></span>
          <span class="font-medium text-neutral-800">集群-A区</span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-neutral-400 group-hover:text-[#3568F5] transition-colors"></i>
        </button>
        <span class="hidden sm:block h-4 w-px bg-neutral-200"></span>
        <button class="h-8 flex items-center gap-2 rounded-md pl-1 pr-2 cursor-pointer group hover:bg-[#f6f8fb] transition-colors">
          <div class="w-7 h-7 bg-[#3568F5] rounded-full flex items-center justify-center text-white font-semibold text-xs">李</div>
          <span class="text-[13px] text-neutral-700 font-medium group-hover:text-[#3568F5] transition-colors">李经理</span>
          <i data-lucide="chevron-down" class="w-3 h-3 text-neutral-400"></i>
        </button>
      </div>
    </header>

    <div id="page-tabs-container" class="h-[38px] bg-white border-b border-[#edf1f7] px-5 flex items-end gap-1 overflow-x-auto quiet-scrollbar shrink-0"></div>
    <main id="main-content" class="flex-1 overflow-y-auto p-5 space-y-4 quiet-scrollbar"></main>
  </div>

  <script>
    const MENU_DATA = [
      {
        id: 'dashboard',
        label: '仪表',
        icon: 'layout-dashboard',
        groups: [
          {
            id: 'data-analysis',
            label: '数据分析',
            items: [
              { id: 'realtime-monitor', label: '实时监控' },
              { id: 'user-retention', label: '用户留存' },
              { id: 'behavior-analysis', label: '行为轨迹' }
            ]
          },
          {
            id: 'business-board',
            label: '业务大盘',
            items: [
              { id: 'sales-stats', label: '销售统计' },
              { id: 'cost-control', label: '成本核算' }
            ]
          }
        ]
      },
      {
        id: 'orders',
        label: '订单',
        icon: 'shopping-cart',
        groups: [
          {
            id: 'order-management',
            label: '订单管理',
            items: [
              { id: 'all-orders', label: '全部订单' },
              { id: 'after-sales', label: '售后退款' }
            ]
          },
          { id: 'order-overview', label: '订单总览' },
          {
            id: 'logistics',
            label: '物流履约',
            items: [
              { id: 'pending-deliver', label: '待发货列表' },
              { id: 'logistic-tracking', label: '物流轨迹' }
            ]
          }
        ]
      },
      {
        id: 'develop',
        label: '研发',
        icon: 'code-2',
        groups: [
          { id: 'project-management', label: '项目管理', items: [{ id: 'sprint-plan', label: '迭代计划' }, { id: 'task-board', label: '任务看板' }] }
        ]
      },
      {
        id: 'marketing',
        label: '营销',
        icon: 'megaphone',
        groups: [
          { id: 'channels', label: '渠道推广', items: [{ id: 'ad-delivery', label: '广告投放' }, { id: 'sms-marketing', label: '短信通知' }] }
        ]
      },
      {
        id: 'system',
        label: '系统',
        icon: 'settings',
        groups: [
          { id: 'security', label: '安全与权限', items: [{ id: 'role-acl', label: '权限控制' }, { id: 'user-roles', label: '分配角色' }] }
        ]
      }
    ];

    const ORDERS = [
      { id: 'KS202406250001', time: '2026-06-25 15:30:22', user: '张建国', phone: '139****1223', channel: '淘宝旗舰店', amount: '¥1,280', status: '待发货', tag: 'bg-amber-50 text-amber-700 border-amber-100' },
      { id: 'KS202406250002', time: '2026-06-25 14:15:00', user: '李梅', phone: '186****9928', channel: '京东自营', amount: '¥328', status: '已发货', tag: 'bg-blue-50 text-blue-700 border-blue-100' },
      { id: 'KS202406250003', time: '2026-06-25 11:02:45', user: '王强', phone: '155****3301', channel: '抖音直播', amount: '¥5,999', status: '已完成', tag: 'bg-green-50 text-green-700 border-green-100' },
      { id: 'KS202406250004', time: '2026-06-25 09:44:12', user: '刘洋', phone: '130****7762', channel: '微信小程序', amount: '¥88', status: '待付款', tag: 'bg-neutral-50 text-neutral-700 border-neutral-200' },
      { id: 'KS202406240005', time: '2026-06-24 18:22:10', user: '陈红', phone: '189****0012', channel: '线下收银', amount: '¥450', status: '已完成', tag: 'bg-green-50 text-green-700 border-green-100' },
      { id: 'KS202406240006', time: '2026-06-24 16:05:33', user: '赵明', phone: '173****5541', channel: '官网商城', amount: '¥2,100', status: '退款中', tag: 'bg-red-50 text-red-700 border-red-100' }
    ];

    const state = {
      activePrimary: 'orders',
      activeTertiary: 'all-orders',
      orderStatus: '全部',
      pageTabs: [
        { id: 'sales-stats', primaryId: 'dashboard', title: '销售统计' },
        { id: 'cost-control', primaryId: 'dashboard', title: '成本核算' },
        { id: 'all-orders', primaryId: 'orders', title: '全部订单' },
        { id: 'order-overview', primaryId: 'orders', title: '订单总览' },
        { id: 'after-sales', primaryId: 'orders', title: '售后退款' },
        { id: 'pending-deliver', primaryId: 'orders', title: '送代计划' },
        { id: 'container-service', primaryId: 'develop', title: '容器服务' },
        { id: 'logistic-tracking', primaryId: 'orders', title: '待发货列表' }
      ]
    };

    window.addEventListener('DOMContentLoaded', () => renderAll());

    function findMenuItemById(itemId) {
      for (const primary of MENU_DATA) {
        for (const group of primary.groups) {
          const items = Array.isArray(group.items) ? group.items : [];
          if (items.length === 0 && group.id === itemId) {
            return { primary, group: { id: primary.id, label: primary.label }, item: group, isLeaf: true };
          }
          const item = items.find(entry => entry.id === itemId);
          if (item) return { primary, group, item };
        }
      }
      return null;
    }

    function getActiveObjects() {
      return findMenuItemById(state.activeTertiary) || findMenuItemById('all-orders');
    }

    function renderAll() {
      renderPrimaryMenu();
      renderSecondaryMenu();
      renderBreadcrumbs();
      renderPageTabs();
      renderWorkspace();
      lucide.createIcons();
    }

    function renderPrimaryMenu() {
      const container = document.getElementById('primary-nav-container');
      const mobile = document.getElementById('mobile-primary-container');
      container.innerHTML = MENU_DATA.map(menu => {
        const isActive = menu.id === state.activePrimary;
        return `
          <button onclick="handlePrimaryClick('${menu.id}')" class="relative flex items-center w-full h-10 px-3 gap-2 group transition-all duration-150 ${isActive ? 'text-white bg-[#3568F5]' : 'text-[#9bb0c4] hover:text-white hover:bg-white/10'}">
            <i data-lucide="${menu.icon}" class="w-4 h-4 shrink-0"></i>
            <span class="text-[13px] leading-5 font-medium">${menu.label}</span>
          </button>
        `;
      }).join('');

      mobile.innerHTML = MENU_DATA.map(menu => {
        const isActive = menu.id === state.activePrimary;
        return `<button onclick="handlePrimaryClick('${menu.id}')" class="p-2.5 rounded-lg transition-colors ${isActive ? 'bg-[#3568F5] text-white' : 'text-neutral-400'}"><i data-lucide="${menu.icon}" class="w-4 h-4"></i></button>`;
      }).join('');
    }

    function renderSecondaryMenu() {
      const currentPrimary = MENU_DATA.find(menu => menu.id === state.activePrimary) || MENU_DATA[0];
      document.getElementById('mobile-secondary-title').innerText = `${currentPrimary.label}中心`;
      document.getElementById('secondary-list-container').innerHTML = currentPrimary.groups.map(group => {
        const items = Array.isArray(group.items) ? group.items : [];
        const isLeaf = items.length === 0;
        if (isLeaf) return renderSecondaryLeaf(group);
        return `
          <div class="space-y-1">
            <button onclick="toggleGroup('${group.id}')" class="flex items-center justify-between w-full h-10 px-2 rounded text-neutral-700 hover:text-neutral-900 hover:bg-neutral-50 transition-colors text-[14px] leading-5 font-normal">
              <span class="truncate">${group.label}</span>
              <i data-lucide="chevron-down" class="w-3 h-3 text-neutral-400"></i>
            </button>
            <div class="space-y-0.5">${items.map(renderSecondaryLeaf).join('')}</div>
          </div>
        `;
      }).join('');

      document.getElementById('mobile-secondary-container').innerHTML = currentPrimary.groups.map(group => {
        const items = Array.isArray(group.items) ? group.items : [];
        if (!items.length) return renderMobileLeaf(group);
        return `<div class="space-y-1"><div class="text-xs font-semibold text-neutral-500 px-2">${group.label}</div><div>${items.map(renderMobileLeaf).join('')}</div></div>`;
      }).join('');
    }

    function renderSecondaryLeaf(item) {
      const isActive = item.id === state.activeTertiary;
      const isTopLeaf = !(MENU_DATA.find(menu => menu.id === state.activePrimary) || MENU_DATA[0]).groups.some(group => (group.items || []).some(child => child.id === item.id));
      return `
        <button onclick="handleTertiaryClick('${item.id}')" class="group/item flex items-center justify-between w-full ${isTopLeaf ? 'h-10 px-2 text-[14px]' : 'h-9 pl-5 pr-2 text-[13px]'} text-left rounded transition-colors duration-100 leading-5 ${isActive ? 'bg-[#EEF3FF] text-[#3568F5] font-semibold' : 'text-neutral-600 hover:text-neutral-900 hover:bg-neutral-50'}">
          <span class="truncate">${item.label}</span>
          <span class="w-1 h-1 rounded-full shrink-0 ml-1 transition-all ${isActive ? 'bg-[#3568F5] scale-100 opacity-100' : 'bg-neutral-300 opacity-0 scale-50 group-hover/item:opacity-60 group-hover/item:scale-100'}"></span>
        </button>
      `;
    }

    function renderMobileLeaf(item) {
      const isActive = item.id === state.activeTertiary;
      return `<button onclick="handleTertiaryClick('${item.id}'); toggleMobileDrawer(false);" class="w-full text-left px-3 py-1.5 rounded text-xs ${isActive ? 'bg-[#EEF3FF] text-[#3568F5] font-semibold' : 'text-neutral-600'}">${item.label}</button>`;
    }

    function renderBreadcrumbs() {
      const active = getActiveObjects();
      const parts = active.isLeaf ? [`${active.primary.label}中心`, active.item.label] : [`${active.primary.label}中心`, active.group.label, active.item.label];
      document.getElementById('breadcrumb-container').innerHTML = parts.map((part, index) => `
        ${index > 0 ? '<span class="text-neutral-300">/</span>' : ''}
        <span class="${index === parts.length - 1 ? 'text-neutral-700 font-medium' : 'hover:text-neutral-600 cursor-pointer'}">${part}</span>
      `).join('');
    }

    function renderPageTabs() {
      const container = document.getElementById('page-tabs-container');
      if (!state.pageTabs.some(tab => tab.id === state.activeTertiary)) {
        const active = getActiveObjects();
        state.pageTabs.push({ id: state.activeTertiary, primaryId: state.activePrimary, title: active.item.label });
        state.pageTabs = state.pageTabs.slice(-10);
      }
      container.innerHTML = state.pageTabs.map(tab => {
        const isActive = tab.id === state.activeTertiary;
        return `
          <div onclick="switchPageTab('${tab.id}')" class="h-[30px] max-w-[132px] min-w-0 px-2.5 border border-b-0 rounded-t inline-flex items-center gap-1.5 shrink-0 transition-colors cursor-pointer ${isActive ? 'bg-[#f6f7f9] border-[#d4ddff] text-[#3568F5]' : 'bg-white border-[#edf1f7] text-neutral-500 hover:text-neutral-800 hover:bg-[#fafbfc]'}">
            <span class="min-w-0 truncate text-xs font-medium" title="${tab.title}">${tab.title}</span>
            <button type="button" onclick="closePageTab(event, '${tab.id}')" class="w-3.5 h-3.5 rounded inline-flex items-center justify-center text-neutral-400 hover:text-neutral-700 hover:bg-neutral-100 shrink-0 text-xs" aria-label="关闭标签">×</button>
          </div>
        `;
      }).join('');
    }

    function renderWorkspace() {
      const active = getActiveObjects();
      const main = document.getElementById('main-content');
      if (state.activePrimary === 'orders') {
        main.innerHTML = renderOrdersWorkspace();
        renderOrderRows();
        lucide.createIcons();
        return;
      }
      main.innerHTML = `
        <div class="flex items-center justify-between min-h-9">
          <h1 class="text-xl font-semibold text-neutral-900">${active.item.label}</h1>
          <button class="h-8 inline-flex items-center text-sm bg-white text-neutral-700 px-3.5 border border-[#dfe5ee] rounded hover:border-[#BFD0FF] hover:text-[#3568F5] transition-colors">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5 mr-1.5"></i>刷新视图
          </button>
        </div>
        <div class="bg-white rounded-lg border border-[#e6eaf2] p-5 text-[13px] text-neutral-500">当前为样板页内容区，菜单样式已回到自定义视觉稿。</div>
      `;
    }

    function renderOrdersWorkspace() {
      return `
        <div class="bg-white rounded-lg border border-[#e6eaf2] overflow-hidden">
          <div class="p-4 border-b border-[#edf1f7]">
            <div class="flex flex-col xl:flex-row xl:items-start justify-between gap-3">
              <div class="flex flex-wrap items-center gap-2.5 min-w-0 xl:max-w-[980px] 2xl:max-w-[1040px]">
                ${inputFilter('order-search-input', '搜索单号/买家/手机', 'w-full sm:w-[220px]', 'search')}
                ${selectFilter('所有下单渠道', ['淘宝旗舰店', '京东自营', '抖音直播', '官网商城'], 'w-full sm:w-[148px]')}
                ${selectFilter('订单类型', ['自营订单', '外采订单', '门店订单', 'OTA订单'])}
                ${selectFilter('结算状态', ['待结算', '结算中', '已结算', '异常'])}
                ${inputFilter('', '结果时间')}
                ${selectFilter('全部门店', ['北京旗舰店', '上海门店', 'MICE中心'])}
                ${selectFilter('全部顾问', ['李经理', '王顾问', '陈顾问'])}
                <button class="h-8 px-1 text-[13px] text-neutral-500 hover:text-[#3568F5] transition-colors">清空筛选条件</button>
              </div>
              <div class="flex items-center space-x-2 shrink-0 xl:self-start">
                <button class="h-8 inline-flex items-center text-sm text-neutral-700 bg-white border border-[#dfe5ee] px-3.5 rounded hover:border-[#BFD0FF] hover:text-[#3568F5] transition-colors">
                  <i data-lucide="download" class="w-3.5 h-3.5 mr-1"></i>导出对账单
                </button>
                <button class="h-8 inline-flex items-center text-sm text-white bg-[#3568F5] px-3.5 rounded hover:bg-[#2E56D9] font-medium transition-colors">
                  <i data-lucide="plus" class="w-3.5 h-3.5 mr-1"></i>创建新订单
                </button>
              </div>
            </div>
          </div>
          <div class="flex space-x-6 px-4 border-b border-[#edf1f7] text-[13px] bg-white">
            ${['全部', '待付款', '待发货', '已发货', '已完成', '退款中'].map(status => `
              <button onclick="changeOrderTabStatus('${status}')" class="py-3 relative font-medium transition-colors ${state.orderStatus === status ? 'text-[#3568F5] font-semibold' : 'text-neutral-500 hover:text-neutral-900'}">
                ${status}${state.orderStatus === status ? '<span class="absolute bottom-0 left-0 right-0 h-[2px] bg-[#3568F5] rounded-full"></span>' : ''}
              </button>
            `).join('')}
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-[13px] text-neutral-600 border-collapse">
              <thead>
                <tr class="bg-[#f8fafc] border-b border-[#edf1f7] text-neutral-500 font-semibold select-none">
                  <th class="py-3 px-4 whitespace-nowrap">订单编号</th>
                  <th class="py-3 px-4 whitespace-nowrap">下单时间</th>
                  <th class="py-3 px-4 whitespace-nowrap">买家主体信息</th>
                  <th class="py-3 px-4 whitespace-nowrap">交易源渠道</th>
                  <th class="py-3 px-4 whitespace-nowrap">实付总金额</th>
                  <th class="py-3 px-4 whitespace-nowrap">当前履约状态</th>
                  <th class="py-3 px-4 text-right whitespace-nowrap">行为操作</th>
                </tr>
              </thead>
              <tbody id="orders-table-body" class="divide-y divide-neutral-100 bg-white"></tbody>
            </table>
          </div>
          <div class="px-4 py-3 bg-[#fbfcfe] flex items-center justify-between text-[13px] text-neutral-500 border-t border-[#edf1f7]">
            <span id="orders-count-text"></span>
            <div class="flex items-center space-x-1">
              <button class="h-7 px-2.5 border border-[#dfe5ee] rounded bg-white text-neutral-400">上页</button>
              <button class="h-7 px-2.5 border border-[#3568F5] rounded bg-[#3568F5] text-white font-medium">1</button>
              <button class="h-7 px-2.5 border border-[#dfe5ee] rounded bg-white hover:border-[#BFD0FF] hover:text-[#3568F5] text-neutral-700">下页</button>
            </div>
          </div>
        </div>
      `;
    }

    function inputFilter(id, placeholder, width = 'w-full sm:w-[136px]', icon) {
      return `
        <div class="relative flex items-center ${width}">
          ${icon ? '<i data-lucide="search" class="absolute left-2.5 w-3.5 h-3.5 text-neutral-400"></i>' : ''}
          <input ${id ? `id="${id}"` : ''} type="text" placeholder="${placeholder}" class="w-full h-8 text-[13px] ${icon ? 'pl-8' : 'px-2'} pr-2 bg-white border border-[#dfe5ee] rounded text-neutral-600 placeholder:text-neutral-400 focus:outline-none focus:border-[#3568F5] focus:ring-2 focus:ring-[rgba(53,104,245,0.10)]">
        </div>
      `;
    }

    function selectFilter(label, options, width = 'w-full sm:w-[136px]') {
      return `<div class="${width}"><select class="w-full h-8 text-[13px] px-2 bg-white border border-[#dfe5ee] rounded text-neutral-700 focus:outline-none focus:border-[#3568F5] focus:ring-2 focus:ring-[rgba(53,104,245,0.10)]"><option>${label}</option>${options.map(item => `<option>${item}</option>`).join('')}</select></div>`;
    }

    function renderOrderRows() {
      const rows = state.orderStatus === '全部' ? ORDERS : ORDERS.filter(order => order.status === state.orderStatus);
      document.getElementById('orders-count-text').innerText = `共显示 ${rows.length} 个订单项`;
      document.getElementById('orders-table-body').innerHTML = rows.map(order => `
        <tr class="hover:bg-[#fafbfc] transition-colors">
          <td class="py-3.5 px-4 font-medium text-neutral-900 font-mono">${order.id}</td>
          <td class="py-3.5 px-4 text-neutral-500 text-xs">${order.time}</td>
          <td class="py-3.5 px-4"><div class="font-medium text-neutral-800">${order.user}</div><div class="text-xs text-neutral-400 mt-0.5">${order.phone}</div></td>
          <td class="py-3.5 px-4 text-neutral-500 font-medium">${order.channel}</td>
          <td class="py-3.5 px-4 font-semibold font-mono text-neutral-900">${order.amount}</td>
          <td class="py-3.5 px-4"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border whitespace-nowrap ${order.tag}">${order.status}</span></td>
          <td class="py-3.5 px-4 text-right text-[#3568F5] font-medium space-x-3 whitespace-nowrap"><button class="hover:text-[#2E56D9]">处理</button><button class="text-neutral-400 hover:text-neutral-600">日志</button></td>
        </tr>
      `).join('');
    }

    function handlePrimaryClick(id) {
      state.activePrimary = id;
      const primary = MENU_DATA.find(menu => menu.id === id);
      const firstGroup = primary.groups[0];
      const firstItems = firstGroup.items || [];
      state.activeTertiary = firstItems.length ? firstItems[0].id : firstGroup.id;
      renderAll();
    }

    function handleTertiaryClick(id) {
      const target = findMenuItemById(id);
      if (!target) return;
      state.activePrimary = target.primary.id;
      state.activeTertiary = target.item.id;
      renderAll();
    }

    function switchPageTab(id) {
      const target = findMenuItemById(id);
      if (!target) return;
      state.activePrimary = target.primary.id;
      state.activeTertiary = id;
      renderAll();
    }

    function closePageTab(event, id) {
      event.stopPropagation();
      const closedIndex = state.pageTabs.findIndex(tab => tab.id === id);
      const wasActive = state.activeTertiary === id;
      state.pageTabs = state.pageTabs.filter(tab => tab.id !== id);
      if (wasActive && state.pageTabs.length) {
        const next = state.pageTabs[Math.min(closedIndex, state.pageTabs.length - 1)];
        switchPageTab(next.id);
        return;
      }
      renderPageTabs();
    }

    function changeOrderTabStatus(status) {
      state.orderStatus = status;
      renderWorkspace();
    }

    function toggleGroup() {}

    function toggleMobileDrawer(open) {
      document.getElementById('mobile-drawer').classList.toggle('hidden', !open);
    }
  </script>
</body>
</html>
