<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ant Design 风格双栏菜单与订单管理系统</title>
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide 图标库 CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    /* 隐藏滚动条但保留滚动能力 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-[#f5f7fa] text-neutral-800 antialiased overflow-hidden h-screen w-full flex relative select-none">

  <!-- 1. 最左侧：极窄暗色一级菜单 (宽度: 严格 64px / w-16) -->
  <aside class="hidden md:flex flex-col items-center w-16 bg-[#001529] text-white shrink-0 z-30 shadow-lg">
    <!-- Ant Design 经典 LOGO 缩影 -->
    <div class="flex items-center justify-center h-16 w-full border-b border-white/10 bg-[#002140]">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-md shadow-blue-500/30">
        <span class="font-bold text-white text-base">A</span>
      </div>
    </div>

    <!-- 一级菜单项容器 -->
    <nav id="primary-nav-container" class="flex-1 w-full py-4 space-y-1">
      <!-- 动态通过 JS 渲染 -->
    </nav>

    <!-- 底部辅助区 -->
    <div class="w-full border-t border-white/10 p-3 space-y-3 flex flex-col items-center">
      <button class="text-neutral-400 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition-colors" title="帮助文档">
        <i data-lucide="help-circle" class="w-5 h-5"></i>
      </button>
      <div class="relative group cursor-pointer">
        <div class="w-7 h-7 rounded-full bg-blue-500/20 border border-blue-500 flex items-center justify-center text-xs text-blue-300 font-bold overflow-hidden">
          <i data-lucide="user" class="w-4 h-4 text-blue-200"></i>
        </div>
      </div>
    </div>
  </aside>

  <!-- 2. 次级侧边栏：白色长条 (宽度: 严格 160px) + 整体收纳过渡 -->
  <aside 
    id="secondary-sidebar"
    class="hidden md:flex flex-col bg-white border-r border-neutral-200/80 shrink-0 z-20 transition-all duration-300 ease-in-out relative w-[160px] opacity-100"
  >
    <!-- 二级菜单模块头部 -->
    <div class="h-16 flex flex-col justify-center px-4 border-b border-neutral-100 overflow-hidden whitespace-nowrap">
      <div class="flex items-center justify-between">
        <h2 id="secondary-title" class="text-xs font-bold text-neutral-800 tracking-wider">
          <!-- 动态二级名 -->
        </h2>
        <span id="secondary-badge" class="text-[10px] px-1.5 py-0.5 rounded-full bg-blue-50 text-blue-600 font-medium scale-90">
          <!-- 动态分组数 -->
        </span>
      </div>
    </div>

    <!-- 搜索框：快速检索当前模块的二三级功能 -->
    <div class="p-2 border-b border-neutral-100/50 overflow-hidden">
      <div class="relative flex items-center">
        <i data-lucide="search" class="absolute left-2 w-3.5 h-3.5 text-neutral-400"></i>
        <input
          type="text"
          id="menu-search"
          placeholder="过滤当前功能..."
          class="w-full text-[11px] pl-6 pr-2 py-1 bg-neutral-50 border border-neutral-200 rounded focus:outline-none focus:border-blue-500 focus:bg-white transition-all text-neutral-700 placeholder:text-neutral-400"
        />
      </div>
    </div>

    <!-- 二三级折叠列表容器 -->
    <div id="secondary-list-container" class="flex-1 overflow-y-auto py-2 space-y-3 px-1.5 no-scrollbar">
      <!-- 动态通过 JS 渲染 -->
    </div>

    <!-- 侧边栏底部版本标识 -->
    <div class="p-2 border-t border-neutral-100 text-center overflow-hidden whitespace-nowrap">
      <p class="text-[9px] text-neutral-400 font-mono tracking-tight scale-90">Ant Menu v4.5</p>
    </div>
  </aside>

  <!-- 🌟 核心：二级整栏收纳折叠悬浮按钮 (Ant Design 经典悬浮小边翼) -->
  <div 
    id="sidebar-toggle-btn-container"
    class="hidden md:flex absolute top-1/2 -translate-y-1/2 z-40 transition-all duration-300 ease-in-out"
    style="left: 214px;" 
  >
    <button
      onclick="toggleSecondarySidebar()"
      class="w-5 h-8 bg-white border border-neutral-200 rounded-r-md shadow-md flex items-center justify-center text-neutral-500 hover:text-blue-600 active:scale-95 transition-all focus:outline-none"
    >
      <i id="sidebar-toggle-icon" data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
    </button>
  </div>

  <!-- 3. 移动端自适应抽屉式导航 -->
  <div id="mobile-drawer" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-50 md:hidden transition-opacity hidden" onclick="toggleMobileDrawer(false)">
    <div class="w-[260px] h-full bg-white flex" onclick="event.stopPropagation()">
      <!-- 移动端一级暗色栏 -->
      <div id="mobile-primary-container" class="w-14 bg-[#001529] text-white flex flex-col items-center py-4 space-y-3">
        <!-- JS 渲染 -->
      </div>
      <!-- 移动端二级白色列表 -->
      <div class="flex-1 flex flex-col bg-white">
        <div class="p-3 border-b border-neutral-100 flex items-center justify-between">
          <span id="mobile-secondary-title" class="font-bold text-xs text-neutral-800">服务菜单</span>
          <button class="text-[11px] text-neutral-400" onclick="toggleMobileDrawer(false)">关闭</button>
        </div>
        <div id="mobile-secondary-container" class="p-2 overflow-y-auto flex-1 space-y-3">
          <!-- JS 渲染 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 右侧内容主画布 -->
  <div class="flex-1 flex flex-col overflow-hidden">
    
    <!-- 顶部全局导航栏 -->
    <header class="h-16 bg-white border-b border-neutral-200/80 flex items-center justify-between px-6 shrink-0 z-10">
      <div class="flex items-center space-x-4">
        <!-- 移动端菜单激活器 -->
        <button 
          onclick="toggleMobileDrawer(true)"
          class="md:hidden p-1.5 rounded-lg border border-neutral-200 text-neutral-600 hover:bg-neutral-50 transition-colors"
        >
          <i data-lucide="menu" class="w-4 h-4"></i>
        </button>

        <!-- 面包屑路径导航 -->
        <div id="breadcrumb-container" class="hidden sm:flex items-center space-x-1.5 text-xs text-neutral-400 select-none">
          <!-- JS 渲染 -->
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <!-- 极简双栏折叠提示 -->
        <div class="hidden lg:flex items-center space-x-1 text-xs text-blue-600 bg-blue-50 px-2.5 py-1 rounded border border-blue-200/60">
          <span class="font-semibold">极简双栏：</span>
          <span>一级 64px，二级 160px。点击边界浮动按钮，可以折叠整栏。</span>
        </div>

        <div class="hidden sm:flex items-center text-xs text-neutral-600 bg-neutral-100 px-2.5 py-1.5 rounded border border-neutral-200">
          <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>
          <span>生产集群-A区</span>
        </div>

        <hr class="h-4 w-[1px] bg-neutral-200" />

        <!-- 个人资料 -->
        <div class="flex items-center space-x-2 cursor-pointer group">
          <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white font-semibold text-xs shadow-sm">
            李
          </div>
          <span class="text-xs text-neutral-600 font-medium group-hover:text-blue-600 transition-colors">李经理</span>
        </div>
      </div>
    </header>

    <!-- 主画布滚动区 -->
    <main id="main-content" class="flex-1 overflow-y-auto p-6 space-y-6">
      <!-- 动态画布内容由 JS 替换渲染 -->
    </main>

  </div>

  <script>
    // 菜单全局数据配置
    const MENU_DATA = [
      {
        id: 'dashboard',
        label: '仪表',
        icon: 'layout-dashboard',
        groups: [
          {
            id: 'data-analysis',
            label: '数据分析',
            items: [
              { id: 'realtime-monitor', label: '实时监控', desc: '实时系统流量及并发数据指标' },
              { id: 'user-retention', label: '用户留存', desc: '新老用户次周/月度留存漏斗' },
              { id: 'behavior-analysis', label: '行为轨迹', desc: '全链路行为路径监测与归因' }
            ]
          },
          {
            id: 'business-board',
            label: '业务大盘',
            items: [
              { id: 'sales-stats', label: '销售统计', desc: '各品类及渠道销售数据汇总' },
              { id: 'cost-control', label: '成本核算', desc: '研发、运营与营销费用边际曲线' }
            ]
          }
        ]
      },
      {
        id: 'orders',
        label: '订单',
        icon: 'shopping-cart',
        groups: [
          {
            id: 'order-management',
            label: '订单管理',
            items: [
              { id: 'all-orders', label: '全部订单', desc: '查询及处理系统所有全渠道订单数据' },
              { id: 'after-sales', label: '售后退款', desc: '处理用户退货、换货及退款申请' }
            ]
          },
          {
            id: 'logistics',
            label: '物流履约',
            items: [
              { id: 'pending-deliver', label: '待发货列表', desc: '待同步仓储与分配物流单号的订单' },
              { id: 'logistic-tracking', label: '物流轨迹', desc: '全网快递实时路由节点状态跟踪' }
            ]
          }
        ]
      },
      {
        id: 'develop',
        label: '研发',
        icon: 'code-2',
        groups: [
          {
            id: 'project-management',
            label: '项目管理',
            items: [
              { id: 'sprint-plan', label: '迭代计划', desc: '双周敏捷迭代看板与里程碑' },
              { id: 'task-board', label: '任务看板', desc: '协同任务拖拽及状态跟踪流' },
              { id: 'bug-tracking', label: '缺陷跟踪', desc: '线上故障与研发工单快速流转' }
            ]
          },
          {
            id: 'ci-cd',
            label: '持续集成',
            items: [
              { id: 'pipelines', label: '流水线', desc: '云原生自动化构建与部署流' },
              { id: 'container-service', label: '容器服务', desc: 'K8s集群资源监视与Pod调度' }
            ]
          }
        ]
      },
      {
        id: 'marketing',
        label: '营销',
        icon: 'megaphone',
        groups: [
          {
            id: 'channels',
            label: '渠道推广',
            items: [
              { id: 'ad-delivery', label: '广告投放', desc: '多源广告平台投资回报率ROI分析' },
              { id: 'sms-marketing', label: '短信通知', desc: '个性化场景营销短信批量群发' }
            ]
          },
          {
            id: 'benefits',
            label: '权益管理',
            items: [
              { id: 'coupons', label: '优惠券发放', desc: '立减券、折扣券生命周期策略' },
              { id: 'points-mall', label: '积分商城', desc: '用户成长激励与实体/虚拟兑换' }
            ]
          }
        ]
      },
      {
        id: 'system',
        label: '系统',
        icon: 'settings',
        groups: [
          {
            id: 'security',
            label: '安全与权限',
            items: [
              { id: 'role-acl', label: '权限控制', desc: 'RBAC精细化菜单与按钮级授权' },
              { id: 'user-roles', label: '分配角色', desc: '企业组织架构及员工职位分配' }
            ]
          }
        ]
      }
    ];

    // 仿真订单数据
    const MOCK_ORDERS = [
      { id: 'ORD-20260625-8831', time: '2026-06-25 15:30:22', price: '￥1,280.00', user: '陈先生', phone: '139****1223', channel: '淘宝旗舰店', status: '待发货', statusColor: 'amber' },
      { id: 'ORD-20260625-7729', time: '2026-06-25 14:15:00', price: '￥328.50', user: '林女士', phone: '186****9928', channel: '京东自营', status: '已发货', statusColor: 'blue' },
      { id: 'ORD-20260625-4412', time: '2026-06-25 11:02:45', price: '￥5,999.00', user: '高先生', phone: '155****3301', channel: '抖音直播', status: '已完成', statusColor: 'green' },
      { id: 'ORD-20260625-1029', time: '2026-06-25 09:44:12', price: '￥88.00', user: '周女士', phone: '130****7762', channel: '微信小程序', status: '待付款', statusColor: 'neutral' },
      { id: 'ORD-20260624-9981', time: '2026-06-24 18:22:10', price: '￥450.00', user: '马先生', phone: '189****0012', channel: '线下收银', status: '已完成', statusColor: 'green' },
      { id: 'ORD-20260624-8842', time: '2026-06-24 16:05:33', price: '￥2,100.00', user: '王先生', phone: '173****5541', channel: '官网商城', status: '退款中', statusColor: 'red' },
    ];

    // 响应式状态管理 state
    const state = {
      activePrimary: 'dashboard',
      activeTertiary: 'realtime-monitor',
      isSecondaryCollapsed: false,
      searchQuery: '',
      collapsedGroups: {},
      orderFilterStatus: '全部',
      orderSearchText: ''
    };

    // 页面初次载入
    window.addEventListener('DOMContentLoaded', () => {
      renderAll();
      
      // 菜单搜索过滤联动绑定
      const searchInput = document.getElementById('menu-search');
      searchInput.addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        renderSecondaryMenu();
        lucide.createIcons();
      });
    });

    // 统一渲染引擎
    function renderAll() {
      renderPrimaryMenu();
      renderSecondaryMenu();
      renderBreadcrumbs();
      renderWorkspace();
      lucide.createIcons();
    }

    // 1. 渲染一级极窄暗栏
    function renderPrimaryMenu() {
      const container = document.getElementById('primary-nav-container');
      const mobileContainer = document.getElementById('mobile-primary-container');
      let pcHtml = '';
      let mobHtml = '';

      MENU_DATA.forEach(menu => {
        const isActive = menu.id === state.activePrimary;
        
        pcHtml += `
          <button
            onclick="handlePrimaryClick('${menu.id}')"
            class="relative flex flex-col items-center justify-center w-full py-3 group transition-all duration-200 ${
              isActive 
                ? 'text-white bg-blue-600/95' 
                : 'text-neutral-400 hover:text-white hover:bg-white/5'
            }"
          >
            ${isActive ? `<div class="absolute left-0 top-0 bottom-0 w-[3px] bg-blue-400 rounded-r-sm animate-pulse"></div>` : ''}
            <i data-lucide="${menu.icon}" class="w-5 h-5 transition-transform duration-200 group-hover:scale-105 ${isActive ? 'scale-105' : ''}"></i>
            <span class="text-[11px] mt-1 font-medium tracking-wider scale-90">${menu.label}</span>
            <div class="absolute left-16 px-2.5 py-1.5 bg-neutral-900 text-neutral-100 text-xs rounded shadow-md opacity-0 translate-x-2 pointer-events-none group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200 whitespace-nowrap z-50">
              ${menu.label}中心
            </div>
          </button>
        `;

        mobHtml += `
          <button
            onclick="handlePrimaryClick('${menu.id}')"
            class="p-2.5 rounded-lg transition-colors ${isActive ? 'bg-blue-600 text-white' : 'text-neutral-400'}"
          >
            <i data-lucide="${menu.icon}" class="w-4 h-4"></i>
          </button>
        `;
      });

      container.innerHTML = pcHtml;
      mobileContainer.innerHTML = mobHtml;
    }

    // 2. 渲染二级 160px 白色长条 (含三级菜单项)
    function renderSecondaryMenu() {
      const currentPrimary = MENU_DATA.find(m => m.id === state.activePrimary) || MENU_DATA[0];
      
      document.getElementById('secondary-title').innerText = `${currentPrimary.label}服务`;
      document.getElementById('secondary-badge').innerText = `${currentPrimary.groups.length}大类`;
      document.getElementById('mobile-secondary-title').innerText = `${currentPrimary.label}中心`;

      const container = document.getElementById('secondary-list-container');
      const mobContainer = document.getElementById('mobile-secondary-container');
      let pcHtml = '';
      let mobHtml = '';

      // 关键词菜单本地模糊搜索过滤
      const query = state.searchQuery.toLowerCase().trim();

      currentPrimary.groups.forEach(group => {
        const isGroupCollapsed = state.collapsedGroups[group.id] || false;
        
        // 过滤子项
        const filteredItems = group.items.filter(item => 
          item.label.toLowerCase().includes(query) || 
          item.desc.toLowerCase().includes(query)
        );

        const hasVisibleItems = filteredItems.length > 0 || group.label.toLowerCase().includes(query);

        if (hasVisibleItems) {
          const renderList = query ? filteredItems : group.items;

          // PC 端渲染
          pcHtml += `
            <div class="space-y-1">
              <button
                onclick="toggleGroupCollapse('${group.id}')"
                class="flex items-center justify-between w-full px-2 py-1 rounded text-neutral-400 hover:text-neutral-800 hover:bg-neutral-50 transition-all text-[10px] font-bold tracking-wider uppercase"
              >
                <span class="truncate">${group.label}</span>
                <i id="chevron-${group.id}" data-lucide="${isGroupCollapsed ? 'chevron-right' : 'chevron-down'}" class="w-2.5 h-2.5"></i>
              </button>
              
              ${!isGroupCollapsed ? `
                <div class="space-y-[1px] transition-all">
                  ${renderList.map(item => {
                    const isActive = item.id === state.activeTertiary;
                    return `
                      <button
                        onclick="handleTertiaryClick('${item.id}')"
                        class="group/item flex items-center justify-between w-full text-left px-2 py-1.5 rounded transition-all duration-100 text-[12px] ${
                          isActive
                            ? 'bg-blue-50/80 text-blue-600 font-semibold'
                            : 'text-neutral-600 hover:text-neutral-900 hover:bg-neutral-50'
                        }"
                      >
                        <span class="truncate">${item.label}</span>
                        <span class="w-1 h-1 rounded-full shrink-0 ml-1 transition-all ${
                          isActive ? 'bg-blue-500 scale-100' : 'bg-neutral-300 opacity-0 scale-50 group-hover/item:opacity-60 group-hover/item:scale-100'
                        }"></span>
                      </button>
                    `;
                  }).join('')}
                </div>
              ` : ''}
            </div>
          `;

          // 移动端侧边抽屉渲染
          mobHtml += `
            <div class="space-y-1">
              <div class="text-[10px] font-bold text-neutral-400 px-2 uppercase">${group.label}</div>
              <div class="space-y-[1px]">
                ${renderList.map(item => {
                  const isActive = item.id === state.activeTertiary;
                  return `
                    <button
                      onclick="handleTertiaryClick('${item.id}'); toggleMobileDrawer(false);"
                      class="w-full text-left px-3 py-1.5 rounded text-xs ${
                        isActive ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-neutral-600'
                      }"
                    >
                      ${item.label}
                    </button>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }
      });

      if (pcHtml === '') {
        pcHtml = `<div class="text-center py-6"><p class="text-[11px] text-neutral-400">无匹配结果</p></div>`;
      }

      container.innerHTML = pcHtml;
      mobContainer.innerHTML = mobHtml;
    }

    // 3. 渲染面包屑
    function renderBreadcrumbs() {
      const activeObj = getActiveObjects();
      const container = document.getElementById('breadcrumb-container');
      container.innerHTML = `
        <span class="hover:text-neutral-600 cursor-pointer">控制台</span>
        <span>/</span>
        <span class="hover:text-neutral-600 cursor-pointer">${activeObj.primary.label}中心</span>
        <span>/</span>
        <span class="text-neutral-500 font-medium">${activeObj.group.label}</span>
        <span>/</span>
        <span class="text-blue-600 font-medium">${activeObj.item.label}</span>
      `;
    }

    // 4. 渲染核心功能主工作区
    function renderWorkspace() {
      const activeObj = getActiveObjects();
      const mainContent = document.getElementById('main-content');

      // 🌟 重新优化美化后的标题部分：不再包含蓝色路径小字面包屑，也不再包含灰色英文字 ID 标识徽章和副标题说明
      let titleHeaderHtml = `
        <div class="bg-white p-5 rounded-lg border border-neutral-200/80 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div>
            <h1 class="text-lg font-bold text-neutral-900 tracking-tight">
              ${activeObj.item.label}
            </h1>
          </div>
          <div class="flex items-center space-x-2 shrink-0">
            <button onclick="simulateRefresh()" class="flex items-center text-xs bg-white text-neutral-600 px-3 py-1.5 border border-neutral-200 rounded hover:bg-neutral-50 active:scale-95 transition-all">
              <i data-lucide="refresh-cw" class="w-3 h-3 mr-1.5"></i>
              刷新视图
            </button>
          </div>
        </div>
      `;

      // 根据选中的一级大类进行渲染分流
      if (state.activePrimary === 'orders') {
        // 分流到：专业的【订单管理】工作区
        const filteredOrders = MOCK_ORDERS.filter(order => {
          const matchStatus = state.orderFilterStatus === '全部' || order.status === state.orderFilterStatus;
          const matchText = state.orderSearchText.trim() === '' || 
            order.id.toLowerCase().includes(state.orderSearchText.toLowerCase()) ||

    function getActiveObjects() {
      for (const p of MENU_DATA) {

          const item = g.items.find(i => i.id === state.activeTertiary);
          if (item) {
            return { primary: p, group: g, item: item };
          }
        }
      }
      return {
        primary: MENU_DATA[0],
        group: MENU_DATA[0].groups[0],
        item: MENU_DATA[0].groups[0].items[0]
      };
    }

      document.getElementById('menu-search').value = '';

      // 默认选中新一级模块下的第一个三级功能项
      const nextPrimary = MENU_DATA.find(m => m.id === id);
      if (nextPrimary && nextPrimary.groups.length > 0 && nextPrimary.groups[0].items.length > 0) {
        state.activeTertiary = nextPrimary.groups[0].items[0].id;
      }

      // 重设大模块时默认拉开二级侧边栏以显示列表
      state.isSecondaryCollapsed = false;
      updateSidebarCollapseUI();

      renderAll();

      if (open) {
        drawer.classList.remove('hidden');
      } else {
        drawer.classList.add('hidden');
      }
    }

    // 订单模块：输入过滤监听 (局部刷新，不重置聚焦输入框)
    function handleOrderSearch(val) {
      state.orderSearchText = val;
      const filteredOrders = MOCK_ORDERS.filter(order => {
        const matchStatus = state.orderFilterStatus === '全部' || order.status === state.orderFilterStatus;
        const matchText = state.orderSearchText.trim() === '' || 
          order.id.toLowerCase().includes(state.orderSearchText.toLowerCase()) ||
          order.user.toLowerCase().includes(state.orderSearchText.toLowerCase()) ||
          order.phone.includes(state.orderSearchText);
        return matchStatus && matchText;
      });
      renderOrderTableRows(filteredOrders);
    }

    // 订单模块：页签切换
    function changeOrderTabStatus(status) {
      state.orderFilterStatus = status;
      renderWorkspace();
      lucide.createIcons();
    }

    // 订单模块：重置筛选
    function resetOrderFilters() {
      state.orderSearchText = '';
      state.orderFilterStatus = '全部';
      renderWorkspace();
      lucide.createIcons();
    }

    // 模拟刷新仪表大盘
    function simulateRefresh() {
      alert("全网业务指标重新校验校准成功！");
    }
  </script>
</body>
</html>
