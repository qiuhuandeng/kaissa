<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平台配置 - 凯撒旅游运营平台</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <script src="../shared/nav-operator.js"></script>

  <section class="list-page-panel">
    <div class="list-page-head">
      <div>
        <h1 class="page-title">平台配置</h1>
      </div>
    </div>
  </section>

  <section class="card operator-config-page">
    <nav class="tab-bar" aria-label="平台配置标签页">
      <button class="tab-item active" type="button" data-tab="dict">字典配置</button>
      <button class="tab-item" type="button" data-tab="area">地区配置</button>
      <button class="tab-item" type="button" data-tab="product">产品类型</button>
      <button class="tab-item" type="button" data-tab="channel">渠道来源</button>
      <button class="tab-item" type="button" data-tab="payment">支付方式</button>
      <button class="tab-item" type="button" data-tab="finance">财务科目</button>
      <button class="tab-item" type="button" data-tab="order">订单状态</button>
    </nav>

    <section id="tab-dict" class="detail-tab-panel active">
      <div class="operator-dict-layout">
        <aside class="operator-dict-sidebar" aria-label="字典分类">
          <button class="active" type="button">地区信息</button>
          <button type="button">产品类型</button>
          <button type="button">订单状态</button>
          <button type="button">合同状态</button>
          <button type="button">支付方式</button>
          <button type="button">渠道来源</button>
          <button type="button">客户标签</button>
          <button type="button">签证类型</button>
          <button type="button">证件类型</button>
          <button type="button">费用项目</button>
        </aside>

        <section class="operator-dict-panel">
          <div class="operator-dict-head">
            <h2>当前：地区信息</h2>
            <button id="openDictModal" class="btn btn-primary btn-sm" type="button">新增字典项</button>
          </div>
          <div class="table-wrap operator-dict-table">
            <table>
              <thead>
                <tr>
                  <th>字典编码</th>
                  <th>字典名称</th>
                  <th>排序</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>AREA_BJ</td><td>北京</td><td>1</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_SH</td><td>上海</td><td>2</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_GZ</td><td>广州</td><td>3</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_CD</td><td>成都</td><td>4</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_SZ</td><td>深圳</td><td>5</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_HZ</td><td>杭州</td><td>6</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_XI</td><td>西安</td><td>7</td><td><span class="tag tag-green">启用</span></td><td><div class="table-action"><button type="button">编辑</button><button type="button">停用</button></div></td></tr>
                <tr><td>AREA_NJ</td><td>南京</td><td>8</td><td><span class="tag tag-orange">停用</span></td><td><div class="table-action"><button type="button">启用</button><button type="button">编辑</button></div></td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </section>

    <section id="tab-area" class="detail-tab-panel"><div class="operator-empty-panel">地区配置内容待维护</div></section>
    <section id="tab-product" class="detail-tab-panel"><div class="operator-empty-panel">产品类型内容待维护</div></section>
    <section id="tab-channel" class="detail-tab-panel"><div class="operator-empty-panel">渠道来源内容待维护</div></section>
    <section id="tab-payment" class="detail-tab-panel"><div class="operator-empty-panel">支付方式内容待维护</div></section>
    <section id="tab-finance" class="detail-tab-panel"><div class="operator-empty-panel">财务科目内容待维护</div></section>
    <section id="tab-order" class="detail-tab-panel"><div class="operator-empty-panel">订单状态内容待维护</div></section>
  </section>

  <div id="dictModal" class="modal-overlay" aria-hidden="true">
    <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="dictModalTitle">
      <div class="modal-header">
        <div id="dictModalTitle" class="modal-title">新增字典项</div>
        <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="dictCode">字典编码 <span class="req">*</span></label>
          <input id="dictCode" class="form-control" type="text" placeholder="例如 AREA_QD" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="dictName">字典名称 <span class="req">*</span></label>
          <input id="dictName" class="form-control" type="text" placeholder="请输入字典名称" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="dictSort">排序数字</label>
          <input id="dictSort" class="form-control" type="number" value="9">
        </div>
        <div class="form-group">
          <label class="operator-switch-line">
            <span>状态开关</span>
            <input type="checkbox" checked>
          </label>
        </div>
        <div class="form-group">
          <label class="form-label" for="dictRemark">备注</label>
          <textarea id="dictRemark" class="form-control" rows="3" placeholder="可填写字典项说明"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-close-modal>取消</button>
        <button class="btn btn-primary" type="button" data-close-modal>保存</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var tabs = Array.from(document.querySelectorAll('[data-tab]'));
      var panels = Array.from(document.querySelectorAll('.detail-tab-panel'));
      var dictButtons = Array.from(document.querySelectorAll('.operator-dict-sidebar button'));
      var modal = document.getElementById('dictModal');

      function openModal() {
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          var name = tab.dataset.tab;
          tabs.forEach(function (item) {
            item.classList.toggle('active', item === tab);
          });
          panels.forEach(function (panel) {
            panel.classList.toggle('active', panel.id === 'tab-' + name);
          });
        });
      });

      dictButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          dictButtons.forEach(function (item) {
            item.classList.toggle('active', item === button);
          });
        });
      });

      document.getElementById('openDictModal').addEventListener('click', openModal);

      document.querySelectorAll('[data-close-modal]').forEach(function (button) {
        button.addEventListener('click', closeModal);
      });

      modal.addEventListener('click', function (event) {
        if (event.target === modal) closeModal();
      });
    })();
  </script>
</body>
</html>
