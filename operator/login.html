<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运营平台登录 - 凯撒旅游</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="operator-login-page">
  <main class="operator-login-layout">
    <section class="operator-login-hero" aria-label="运营管理平台介绍">
      <div>
        <div class="operator-login-logo">
          <span class="operator-login-logo-mark">运</span>
          <span>凯撒旅游集团</span>
        </div>

        <h1 class="operator-login-heading">运营管理平台</h1>
        <p class="operator-login-subheading">统一管理所有商户端 · 全局数据洞察</p>

        <ul class="operator-login-features">
          <li>
            <span aria-hidden="true">✓</span>
            <span>支持N个商户端统一创建和管理</span>
          </li>
          <li>
            <span aria-hidden="true">✓</span>
            <span>跨主体公司经营数据全局报表</span>
          </li>
          <li>
            <span aria-hidden="true">✓</span>
            <span>系统模板、套餐、审计一站管理</span>
          </li>
        </ul>
      </div>

      <p class="operator-login-guard">仅限平台运营人员使用，请勿分享账号</p>
    </section>

    <section class="operator-login-form-panel" aria-label="管理员登录表单">
      <div class="operator-login-card">
        <span class="operator-login-badge">运营平台 · 管理员专用</span>
        <h2 class="operator-login-title">管理员登录</h2>

        <div class="operator-login-field">
          <span class="operator-login-field-icon" aria-hidden="true">📧</span>
          <input class="form-control" type="text" placeholder="请输入管理员账号" autocomplete="username">
        </div>

        <div class="operator-login-field operator-password-field">
          <span class="operator-login-field-icon" aria-hidden="true">🔒</span>
          <input id="operatorPassword" class="form-control" type="password" placeholder="请输入密码" autocomplete="current-password">
          <button class="operator-password-toggle" type="button" aria-label="切换密码显示" data-toggle-password="operatorPassword">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <p class="operator-login-note">账号由系统管理员直接创建，暂不支持自助找回或重置密码。</p>

        <button id="operatorLoginBtn" class="btn operator-login-submit" type="button">登录</button>

        <div class="operator-login-footer">
          <p>© 2026 凯撒旅游集团技术部 | 运营平台 v2.5.0</p>
          <p>如有账号问题请联系：<a href="javascript:void(0)">技术支持中心</a></p>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var loginBtn = document.getElementById('operatorLoginBtn');

      loginBtn.addEventListener('click', function () {
        window.location.href = 'dashboard.html';
      });

      document.querySelectorAll('[data-toggle-password]').forEach(function (button) {
        button.addEventListener('click', function () {
          var input = document.getElementById(button.getAttribute('data-toggle-password'));
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });
    })();
  </script>
</body>
</html>
